<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公司治理刷題</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #e8c84a;
    --accent2: #4ae8c0;
    --correct: #3ecf8e;
    --wrong: #f0605a;
    --text: #e8e8f0;
    --text-dim: #888899;
    --text-muted: #555568;
    --radius: 12px;
    --font-scale: 1;
  }

  /* 淺色配色：抄 GitHub Primer Light（對比度高、學術感） */
  :root.theme-light {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --surface2: #eaeef2;
    --border: #d0d7de;
    --accent: #d97706;     /* amber-600，對應原黃；淺底 + 黑字 contrast 6.5 達 WCAG AA */
    --accent2: #0d7e6c;    /* 深青綠，對應原淺青 */
    --correct: #1a7f37;    /* GitHub success */
    --wrong: #cf222e;      /* GitHub danger */
    --text: #1f2328;       /* 主字色，#000 太硬 */
    --text-dim: #59636e;
    --text-muted: #818b98;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 600;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--accent);
  }
  .header-right {
    display: flex; gap: 12px; align-items: center;
  }
  .header-settings {
    display: flex;
    gap: 10px;
    align-items: center;
    padding-left: 14px;
    border-left: 1px solid var(--border);
  }
  .mode-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all .2s;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 57px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-title {
    padding: 14px 16px 10px;
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .chapter-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    border-left: 3px solid transparent;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    line-height: 1.4;
  }
  .chapter-item:hover { background: var(--surface2); color: var(--text); }
  .chapter-item.active {
    border-left-color: var(--accent);
    color: var(--accent);
    background: rgba(232,200,74,.07);
  }
  .chapter-item .ch-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .chapter-item .ch-stars {
    font-size: 10px;
    flex-shrink: 0;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Chapter header ── */
  .chapter-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .chapter-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .chapter-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── Progress bar ── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .4s ease;
  }
  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }
  .q-card.answered-correct { border-color: rgba(62,207,142,.35); }
  .q-card.answered-wrong { border-color: rgba(240,96,90,.35); }
  .q-card.starred { border-color: rgba(232,200,74,.4); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 20px 20px 0;
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: calc(15px * var(--font-scale));
    line-height: 1.75;
    color: var(--text);
    flex: 1;
  }
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-muted);
    padding: 0 4px;
    flex-shrink: 0;
    transition: all .15s;
    line-height: 1;
  }
  .star-btn.starred { color: var(--accent); }
  .star-btn:hover { transform: scale(1.2); }

  .q-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 16px 20px 20px;
  }
  @media (max-width: 600px) {
    .q-options { grid-template-columns: 1fr; }
  }

  .opt-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: calc(14px * var(--font-scale));
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    text-align: left;
    transition: all .15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,200,74,.08);
  }
  .opt-btn .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: calc(13px * var(--font-scale));
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .opt-btn.correct {
    border-color: var(--correct);
    background: rgba(62,207,142,.12);
    color: var(--correct);
  }
  .opt-btn.correct .opt-letter { color: var(--correct); }
  .opt-btn.wrong {
    border-color: var(--wrong);
    background: rgba(240,96,90,.12);
    color: var(--wrong);
  }
  .opt-btn.wrong .opt-letter { color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .q-result {
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .q-result > *:first-child {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .q-explain {
    font-size: calc(12px * var(--font-scale));
    color: var(--text-dim);
    line-height: 1.65;
    padding: 8px 12px;
    background: rgba(74,232,192,.06);
    border-left: 2px solid rgba(74,232,192,.4);
    border-radius: 0 6px 6px 0;
  }
  .result-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .result-badge.correct { background: rgba(62,207,142,.15); color: var(--correct); }
  .result-badge.wrong { background: rgba(240,96,90,.15); color: var(--wrong); }
  .result-text { font-size: calc(13px * var(--font-scale)); color: var(--text-dim); }

  /* ── Summary panel ── */
  .summary-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-block { text-align: center; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .divider { width: 1px; height: 48px; background: var(--border); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tool-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.danger:hover { border-color: var(--wrong); color: var(--wrong); }

  /* ── Starred mode empty ── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; line-height: 1.6; }

  /* ── Drill mode overlay ── */
  .drill-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
    overflow: hidden;
  }
  .drill-header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .drill-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--wrong);
    display: flex; align-items: center; gap: 8px;
  }
  .drill-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .drill-close:hover { border-color: var(--wrong); color: var(--wrong); }

  .drill-body {
    flex: 1;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 24px;
    overflow: hidden;
  }

  .drill-counter {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
  }
  .drill-remain {
    font-size: 36px;
    font-weight: 600;
    color: var(--wrong);
    line-height: 1;
  }
  .drill-remain-label {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .drill-sep { width: 1px; height: 40px; background: var(--border); }
  .drill-correct-count {
    font-size: 22px;
    font-weight: 600;
    color: var(--correct);
  }
  .drill-correct-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  .drill-progress-wrap {
    width: 100%;
  }
  .drill-progress-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .drill-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--wrong), var(--accent));
    border-radius: 3px;
    transition: width .5s ease;
  }

  .drill-card-wrap {
    width: 100%;
    position: relative;
  }
  .drill-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    transition: border-color .2s;
  }
  .drill-card.answered-correct { border-color: rgba(62,207,142,.5); }
  .drill-card.answered-wrong { border-color: rgba(240,96,90,.5); }

  .drill-source {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }
  .drill-q-text {
    font-size: calc(17px * var(--font-scale));
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 24px;
  }
  .drill-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 500px) { .drill-options { grid-template-columns: 1fr; } }

  .drill-opt {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: calc(15px * var(--font-scale));
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    text-align: left;
    display: flex; align-items: flex-start; gap: 10px;
    line-height: 1.5;
    transition: all .15s;
  }
  .drill-opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,200,74,.08);
  }
  .drill-opt .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: calc(13px * var(--font-scale));
    color: var(--text-muted);
    flex-shrink: 0; margin-top: 1px;
  }
  .drill-opt.correct { border-color: var(--correct); background: rgba(62,207,142,.12); color: var(--correct); }
  .drill-opt.correct .opt-letter { color: var(--correct); }
  .drill-opt.wrong { border-color: var(--wrong); background: rgba(240,96,90,.12); color: var(--wrong); }
  .drill-opt.wrong .opt-letter { color: var(--wrong); }

  .drill-result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    gap: 12px;
  }
  .drill-result-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
  }
  .drill-result-badge.correct { background: rgba(62,207,142,.15); color: var(--correct); }
  .drill-result-badge.wrong { background: rgba(240,96,90,.15); color: var(--wrong); }
  .drill-next-btn {
    background: var(--accent);
    border: none;
    color: #111;
    padding: 10px 24px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    transition: opacity .15s;
  }
  .drill-next-btn:hover { opacity: .85; }
  .drill-next-btn.wrong-variant {
    background: transparent;
    border: 1.5px solid var(--wrong);
    color: var(--wrong);
  }

  .drill-done {
    text-align: center;
    padding: 40px 20px;
  }
  .drill-done-icon { font-size: 64px; margin-bottom: 20px; }
  .drill-done h2 { font-size: 24px; color: var(--correct); margin-bottom: 12px; }
  .drill-done p { font-size: 15px; color: var(--text-dim); line-height: 1.6; }
  .drill-done-btns { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }


  /* ══ MOBILE (portrait ≤ 768px) ══ */

  /* Toggle button: hidden on desktop, shown on mobile */
  .sidebar-toggle {
    display: none;
    width: 100%;
    background: var(--surface2);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    padding: 11px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky;
    top: 57px;
    z-index: 50;
  }

  @media (max-width: 768px) {

    /* Header */
    .header {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 10px 12px;
    }
    .header h1 { font-size: 14px; }
    .header-right {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .header-settings {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
      padding-left: 0;
      padding-top: 6px;
      border-left: none;
      border-top: 1px solid var(--border);
    }
    .mode-btn {
      font-size: 11px;
      padding: 7px 4px;
      text-align: center;
      border-radius: 8px;
    }

    /* Layout: stack sidebar toggle above main content */
    .layout {
      flex-direction: column;
      height: auto;
      overflow: visible;
      min-height: calc(100vh - 90px);
    }

    /* Toggle button: show on mobile */
    .sidebar-toggle {
      display: flex;
    }

    /* Sidebar: collapsible, full width */
    .sidebar {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      border-right: none;
      border-bottom: none;
      transition: max-height .3s ease;
      flex-shrink: 0;
    }
    .sidebar.open {
      max-height: 50vh;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
    }

    /* Main: full width, less padding */
    .main {
      padding: 14px 12px;
      gap: 14px;
    }

    /* Summary panel */
    .summary-panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px;
      flex-wrap: wrap;
    }
    .divider { display: none; }
    .stat-num { font-size: 20px; }
    .stat-label { font-size: 10px; }

    /* Toolbar */
    .toolbar { gap: 6px; flex-wrap: wrap; }
    .tool-btn { font-size: 12px; padding: 6px 10px; }

    /* Chapter header */
    .chapter-title { font-size: 15px; }
    .chapter-stats { font-size: 12px; }

    /* Question cards */
    .q-header { padding: 14px 12px 0; gap: 8px; }
    .q-text { font-size: calc(14px * var(--font-scale)); line-height: 1.65; }
    .q-num { font-size: 11px; padding: 2px 6px; }
    .q-options {
      grid-template-columns: 1fr;
      padding: 10px 12px 12px;
      gap: 8px;
    }
    .opt-btn { font-size: calc(13px * var(--font-scale)); padding: 10px 12px; }
    .q-result { padding: 0 12px 12px; }

    /* Drill mode */
    .drill-header { padding: 12px 14px; }
    .drill-body { padding: 14px 12px; gap: 14px; }
    .drill-card { padding: 18px 14px; }
    .drill-q-text { font-size: calc(14px * var(--font-scale)); margin-bottom: 16px; }
    .drill-options {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .drill-opt { font-size: calc(13px * var(--font-scale)); padding: 11px 12px; }
    .drill-remain { font-size: 26px; }
    .drill-result-row {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      margin-top: 14px;
    }
    .drill-next-btn { width: 100%; text-align: center; padding: 11px; }
    .drill-result-badge { font-size: 13px; }
  }

  @media (max-width: 390px) {
    .summary-panel { grid-template-columns: repeat(2, 1fr); }
    .mode-btn { font-size: 10px; }
  }

  /* Mix chapter checkbox */
  .mix-ch-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all .15s;
    user-select: none;
  }
  .mix-ch-item:hover { border-color: var(--accent2); }
  .mix-ch-item.selected { border-color: var(--accent2); background: rgba(74,232,192,.08); }
  .mix-ch-item input[type=checkbox] { accent-color: var(--accent2); width: 15px; height: 15px; cursor: pointer; flex-shrink:0; }
  .mix-ch-name { font-size: 13px; color: var(--text); flex: 1; }
  .mix-ch-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

  /* Mix quiz progress */
  .mix-progress-row {
    display: flex; align-items: center; gap: 12px; width: 100%;
  }
  .mix-q-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text-muted); white-space: nowrap;
  }

  /* Mix result screen */
  .mix-score-ring {
    width: 110px; height: 110px;

<script>
const QUESTIONS = [{"chapter":"公司治理基本構面與內涵","questions":[{"num":1,"question":"「公司治理觀察報告」由下列何單位所發布？","options":{"A":"OECD","B":"ACGA","C":"金管會","D":"金融總會"},"answer":"B","explain":"ACGA（亞洲公司治理協會）發布「公司治理觀察報告（CG Watch）」；OECD發布「公司治理原則」，兩者職能不同應加以區別。"},{"num":2,"question":"公司治理3.0-永續發展藍圖共有幾項具體推動措施？","options":{"A":"29項","B":"35項","C":"39項","D":"45項"},"answer":"C","explain":"公司治理3.0-永續發展藍圖以5大主軸為中心，合計「39項」具體推動措施，旨在提升企業永續價值。"},{"num":3,"question":"「公司治理原則」由下列何單位所發布？","options":{"A":"OECD","B":"ACGA","C":"金管會","D":"金融總會"},"answer":"A","explain":"OECD（經濟合作發展組織）於1999年發布「公司治理原則」，為各國公司治理之重要依據。"},{"num":4,"question":"台灣自哪一年起規劃強化公司治理藍圖，為期幾年？","options":{"A":"2013年5年期","B":"2013年3年期","C":"2018年5年期","D":"2018年3年期"},"answer":"A","explain":"台灣自2013年起規劃為期「五年」的強化公司治理藍圖；2020年再規劃公司治理3.0，為期三年。"},{"num":5,"question":"下列哪一國家於2014年10月宣布，將強制要求上市公司發布永續報告書？","options":{"A":"日本","B":"韓國","C":"新加坡","D":"菲律賓"},"answer":"C","explain":"新加坡證交所於2014年10月宣布，強制要求上市公司發布永續報告書，為亞洲最早強制推動的市場之一。"},{"num":6,"question":"公司治理3.0-永續發展藍圖係自哪一年起規劃，為期幾年？","options":{"A":"2018年3年期","B":"2020年3年期","C":"2020年5年期","D":"2022年3年期"},"answer":"B","explain":"公司治理3.0-永續發展藍圖自「2020年起」規劃，以三年為期，以5大主軸39項具體措施推動。"},{"num":7,"question":"下列哪一機關於2003年成立「改革公司治理專案小組」？","options":{"A":"行政院","B":"司法院","C":"法務部","D":"金管會"},"answer":"A","explain":"行政院於2003年成立「改革公司治理專案小組」，提出強化公司治理政策綱領暨行動方案，為台灣公司治理改革起點。"},{"num":8,"question":"公司治理主管除初任者應於一年內進修幾小時外，每年應至少進修幾小時？","options":{"A":"12小時；6小時","B":"18小時；6小時","C":"18小時；12小時","D":"12小時；12小時"},"answer":"C","explain":"依規定，公司治理主管每年至少應進修特定時數；正確答案為C（18小時；12小時），初任者應於一年內完成特定進修時數。"},{"num":9,"question":"自2025年起，資本額新臺幣多少億元以上之上市櫃公司應編製申報永續報告書？","options":{"A":"5億元","B":"10億元","C":"20億元","D":"30億元"},"answer":"C","explain":"自2025年起，實收資本額達新臺幣「20億元以上」之上市（櫃）公司應強制編製申報永續報告書。"},{"num":10,"question":"上市上櫃公司董事新任者，於就任次年度起每年至少宜進修幾小時？","options":{"A":"3小時","B":"6小時","C":"12小時","D":"18小時"},"answer":"B","explain":"依治理實務守則，上市上櫃公司董事新任者，於就任「次年度起」每年至少宜進修「6小時」，持續維持董事之專業能力。"},{"num":11,"question":"2016年「機構投資人盡職治理守則」由下列何單位所發布？","options":{"A":"證交所","B":"投信投顧公會","C":"金融總會","D":"由(A)(B)(C)等單位共同發布"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）由(A)(B)(C)等單位共同發布。其餘選項所述與法規不符，應加以辨別。"},{"num":12,"question":"上市上櫃公司董事新任者，於就任當年度至少宜進修幾小時？","options":{"A":"6小時","B":"8小時","C":"12小時","D":"18小時"},"answer":"C","explain":"依規定，公司治理主管每年至少應進修特定時數；正確答案為C（12小時），初任者應於一年內完成特定進修時數。"},{"num":13,"question":"目前由下列哪一機關籌劃設置商業法院？","options":{"A":"行政院","B":"司法院","C":"立法院","D":"法務部"},"answer":"B","explain":"依公司治理前瞻規劃，由「司法院」籌劃設置商業法院，使商業紛爭之裁判更加專業迅速。"},{"num":14,"question":"公司治理主管辭職或解任者，上市公司應自事實發生之日起幾個月內補行委任？","options":{"A":"1個月","B":"2個月","C":"3個月","D":"6個月"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1個月。其餘選項所述與法規不符，應加以辨別。"},{"num":15,"question":"2018年「新版公司治理藍圖」為了增加董事支援，引進下列何種制度？","options":{"A":"公司治理主管","B":"推動設置商業法院","C":"董事會績效評估制度","D":"董事多元化制度"},"answer":"A","explain":"2018年新版公司治理藍圖引進「公司治理主管制度」，為董事提供更多支援，強化董事會職能。"},{"num":16,"question":"上市公司實收資本額未達幾億元的非金融保險業者，得延至112年6月30日前完成設置公司治理主管？","options":{"A":"10億元","B":"20億元","C":"30億元","D":"50億元"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）20億元。其餘選項所述與法規不符，應加以辨別。"},{"num":17,"question":"自何年起，上市櫃公司應依董事屆期完成委任至少一名女性董事？","options":{"A":"2023年","B":"2024年","C":"2025年","D":"2026年"},"answer":"B","explain":"自「2024年」起，上市櫃公司應依董事屆期完成委任至少一名女性董事，以促進董事會成員多元化。"},{"num":18,"question":"公司治理主管應取得律師會計師執業資格，或於相關機構從事主管職務達幾年以上？","options":{"A":"1年","B":"2年","C":"3年","D":"5年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3年。其餘選項所述與法規不符，應加以辨別。"},{"num":19,"question":"股東會場地若屆時未能繼續使用，得決議在幾日內延期或續行集會？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"B","explain":"依規定，股東會場地若屆時未能繼續使用，得決議在「5日內」延期或續行集會，以保障股東會之正常進行。"}]},{"chapter":"股東會相關規定","questions":[{"num":1,"question":"每會計年度終了後，應於幾個月內召開股東常會？","options":{"A":"3個月","B":"6個月","C":"9個月","D":"無限制"},"answer":"B","explain":"依《公司法》第170條，股東常會應於每會計年度終了後「六個月內」召開（即6月30日前），遲延召開主管機關得裁處。"},{"num":2,"question":"公開發行公司召集股東常會，停止過戶應於幾日前辦理？","options":{"A":"30日前","B":"45日前","C":"60日前","D":"90日前"},"answer":"C","explain":"公開發行公司召集股東常會，應於停止股票過戶日「60日前」辦理，以確保股東名簿之確定。"},{"num":3,"question":"股東臨時會召集頻率應為下列何者？","options":{"A":"每月1次","B":"每季1次","C":"每年1次","D":"必要時"},"answer":"D","explain":"依《公司法》，股東臨時會於「必要時」召集之，無固定次數限制，由董事會依實際需要決定是否召集。"},{"num":4,"question":"非公開發行公司召集股東臨時會，停止過戶應於幾日前辦理？","options":{"A":"7日前","B":"10日前","C":"15日前","D":"30日前"},"answer":"C","explain":"非公開發行公司召集股東臨時會，應於「15日前」辦理停止過戶；公開發行公司臨時會則為30日前。"},{"num":5,"question":"召集股東常會，應於幾日前通知股東？","options":{"A":"10日","B":"15日","C":"20日","D":"30日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":6,"question":"公開發行公司召集股東常會，應於幾日前公告董事候選人名單？","options":{"A":"25日前","B":"30日前","C":"40日前","D":"60日前"},"answer":"C","explain":"公開發行公司召集股東常會，應於開會「40日前」公告董事候選人名單及學經歷，使股東有充分時間評估候選人。"},{"num":7,"question":"公開發行股票之公司召集股東常會，應於幾日前通知股東？","options":{"A":"10日","B":"15日","C":"20日","D":"30日"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）30日。其餘選項所述與法規不符，應加以辨別。"},{"num":8,"question":"公開發行公司召集股東臨時會，應於幾日前公告董事候選人名單？","options":{"A":"10日前","B":"15日前","C":"20日前","D":"25日前"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）25日前。其餘選項所述與法規不符，應加以辨別。"},{"num":9,"question":"金管會規定自何年起，所有上市(櫃)公司召開股東會時，應將電子方式列為表決權行使管道之一？","options":{"A":"112年","B":"109年","C":"107年","D":"105年"},"answer":"C","explain":"107年（2018年）起，金管會要求所有上市（櫃）公司召開股東會時，應將「電子方式」列為表決權行使管道之一，以提高股東參與便利性。"},{"num":10,"question":"股東常會召開前，受理股東提案的期間不得少於幾日？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）10日。其餘選項所述與法規不符，應加以辨別。"},{"num":11,"question":"股東會決議內容若違反法令或章程，則法律效果為何？","options":{"A":"效力未定","B":"無效","C":"得撤銷","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）無效。其餘選項所述與法規不符，應加以辨別。"},{"num":12,"question":"股東提出股東常會議案，提案以多少字為限？","options":{"A":"100字","B":"200字","C":"300字","D":"500字"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）300字。其餘選項所述與法規不符，應加以辨別。"},{"num":13,"question":"請問下列何種事項，不得以臨時動議提出？","options":{"A":"減資","B":"變更章程","C":"選任或解任董事、監察人","D":"以上皆是"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）以上皆是。其餘選項所述與法規不符，應加以辨別。"},{"num":14,"question":"股東常會開會時，出席股東就議案每次發言不得超過幾分鐘？","options":{"A":"3分鐘","B": 案為（C）24萬元以上480萬元以下。其餘選項所述與法規不符，應加以辨別。"},{"num":16,"question":"非金融業實收資本額達20億元以上的上市(櫃)公司，應於幾年底前完成審計委員會設置？","options":{"A":"107年底","B":"108年底","C":"109年底","D":"110年底"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）108年底。其餘選項所述與法規不符，應加以辨別。"},{"num":17,"question":"設置審計委員會，若相關事項未經審計委員會半數以上同意，得由幾分之幾以上全體董事同意行之？","options":{"A":"二分之一","B":"三分之二","C":"四分之三","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二。其餘選項所述與法規不符，應加以辨別。"},{"num":18,"question":"審計委員會議事錄的保存年限規定為何？","options":{"A":"至少1年","B":"至少3年","C":"至少5年","D":"永久"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）永久。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"薪酬委員會","questions":[{"num":1,"question":"薪資報酬委員會之設置義務，適用於何種公司？","options":{"A":"僅上市公司","B":"僅上櫃公司","C":"上市、上櫃與興櫃公司均須設置","D":"實收資本額逾10億元之公開發行公司"},"answer":"C","explain":"依《薪資報酬委員會辦法》第2條，股票已在證券交易所上市或於證券商營業處所買賣之公司（含上市、上櫃及興櫃）均須設置薪資報酬委員會。"},{"num":2,"question":"申請初次上市（櫃）及登錄興櫃之公司，應於何時完成薪資報酬委員會設置？","options":{"A":"上市後一年內","B":"送件申請前","C":"上市後三個月內","D":"無時間限制"},"answer":"B","explain":"依規定，申請初次上市（櫃）及登錄興櫃之公司，應於送件申請前完成薪資報酬委員會之設置，確保治理架構完整。"},{"num":3,"question":"薪資報酬委員會成員係由下列何者決議委任？","options":{"A":"股東會","B":"董事長","C":"董事會","D":"審計委員會"},"answer":"C","explain":"依《薪資報酬委員會辦法》第4條，薪資報酬委員會成員由董事會決議委任之，委任關係並非公司受雇人。"},{"num":4,"question":"公司已設立獨立董事者，薪資報酬委員會之召集人應由何人擔任？","options":{"A":"由全體成員選舉","B":"由董事長指定","C":"由全體成員推舉獨立董事擔任","D":"由主管機關指定"},"answer":"C","explain":"依《薪資報酬委員會辦法》第8條，公司已設立獨立董事者，應由全體成員推舉獨立董事擔任召集人及會議主席。"},{"num":5,"question":"下列關於薪資報酬委員會成員資格之敘述，何者正確？","options":{"A":"應為自然人且至少應有一名獨立董事參與","B":"可以是法人代表","C":"無須具備專業資格","D":"成員須全數為獨立董事"},"answer":"A","explain":"依《薪資報酬委員會辦法》，成員應為自然人，且至少應有獨立董事一人參與，確保一定程度之獨立性。"},{"num":6,"question":"薪資報酬委員會成員應具備之工作年資下限為幾年？","options":{"A":"3年","B":"5年","C":"7年","D":"10年"},"answer":"B","explain":"依《薪資報酬委員會辦法》，成員應取得商務、法務、財務、會計等相關專業資格之一，並具備五年以上工作經驗。"},{"num":7,"question":"薪資報酬委員會成員因故解任致人數不足時，應於多久內補行委任？","options":{"A":"一個月內","B":"二個月內","C":"三個月內","D":"六個月內"},"answer":"C","explain":"依《薪資報酬委員會辦法》第4條，成員因故解任致人數不足時，應自事實發生之即日起算三個月內召開董事會補行委任。"},{"num":8,"question":"董事會通過之薪資報酬如「優於」薪資報酬委員會建議，應於幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依《薪資報酬委員會辦法》，董事會通過薪資報酬優於委員會建議時，應於董事會通過之即日起算二日內辦理公告申報。"},{"num":9,"question":"薪資報酬委員會之議事錄應保存幾年？","options":{"A":"三年","B":"五年","C":"七年","D":"永久保存"},"answer":"B","explain":"依《薪資報酬委員會辦法》第10條，議事錄應保存五年；若保存期限內發生訴訟，應保存至訴訟終結止。"},{"num":10,"question":"薪資報酬委員會成員有反對或保留意見，應於事實發生幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依《薪資報酬委員會辦法》第10條，成員有反對或保留意見且有紀錄或書面聲明者，應於事實發生之即日起算二日內於公開資訊觀測站辦理公告申報。"},{"num":11,"question":"薪資報酬委員會執行職務時，應盡何種注意義務？","options":{"A":"普通人之注意義務","B":"善良管理人之注意義務","C":"重大過失注意義務","D":"無特定義務要求"},"answer":"B","explain":"依《薪資報酬委員會辦法》第7條，委員會應以善良管理人之注意，忠實履行職權，此為較高標準之注意義務。"},{"num":12,"question":"薪資報酬委員會組織規程之訂定及修正，應經何者通過？","options":{"A":"股東會決議","B":"審計委員會決議","C":"董事會決議","D":"全體薪酬委員會成員同意"},"answer":"C","explain":"依《薪資報酬委員會辦法》第3條，組織規程之訂定應經董事會決議通過；修正時，亦同。"},{"num":13,"question":"薪資報酬委員會成員委任及異動訊息，應於何處即時公告？","options":{"A":"公司官方網站","B":"主管機關指定之公開資訊觀測站","C":"聯合報或工商時報","D":"僅需於年報揭露"},"answer":"B","explain":"依《薪資報酬委員會辦法》第4條，成員之委任及異動訊息應即時於主管機關指定之公開資訊觀測站公告。"},{"num":14,"question":"董事會不採納薪資報酬委員會建議時，所需決議門檻為何？","options":{"A":"全體董事2/3以上出席，出席2/3同意","B":"全體董事2/3以上出席，出席1/2以上同意","C":"全體董事1/2以上出席，出席2/3同意","D":"全體董事1/2以上出席，出席1/2同意"},"answer":"B","explain":"依《薪資報酬委員會辦法》，董事會不採納委員會建議時，應有全體董事三分之二以上出席，及出席董事過半數同意。"},{"num":15,"question":"薪資報酬委員會成員得否委託他人代理出席？","options":{"A":"不得委託，應親自出席","B":"得委託其他成員代理，每次出具委託書，代理人以受一人委託為限","C":"得委託任何人代理出席","D":"以視訊參與不算出席"},"answer":"B","explain":"依《薪資報酬委員會辦法》第9條，成員不能親自出席時，得委託其他成員代理，須每次出具委託書，且代理人以受一人委託為限；視訊參與視為親自出席。"},{"num":16,"question":"薪資報酬委員會成員應至少為幾位？","options":{"A":"2位","B":"3位","C":"4位","D":"5位"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）3位。其餘選項所述與法規不符，應加以辨別。"},{"num":17,"question":"薪資報酬委員會成員因故解任致人數不足，應於事實發生之日起算幾個月內召開董事會補行委任？","options":{"A":"1個月","B":"2個月","C":"3個月","D":"6個月"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3個月。其餘選項所述與法規不符，應加以辨別。"},{"num":18,"question":"甲為會計師，工作年資應至少滿幾年，才符合擔任薪資報酬委員會成員之資格？","options":{"A":"1年","B":"2年","C":"3年","D":"5年"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）5年。其餘選項所述與法規不符，應加以辨別。"},{"num":19,"question":"薪資報酬委員會成員於委任及異動時，應於幾日內辦理公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":20,"question":"下列何者不得擔任公司薪資報酬委員會成員？","options":{"A":"公司或其關係企業受僱人","B":"公司或其關係企業董事、監察人","C":"持有公司已發行股份總數百分之一以上","D":"以上皆是"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）以上皆是。其餘選項所述與法規不符，應加以辨別。"},{"num":21,"question":"董事會通過之薪資報酬如優於薪酬委員會建議，應於董事會通過之即日起算幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":22,"question":"薪資報酬委員會之成員若於任職期間直接持有公司已發行股份總數百分之二，下列敘述何者正確？","options":{"A":"應由股東會決議解任","B":"應由董事會決議解任","C":"該成員停職處分","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）應由董事會決議解任。其餘選項所述與法規不符，應加以辨別。"},{"num":23,"question":"薪資報酬委員會每年至少應召開幾次？","options":{"A":"1次","B":"2次","C":"3次","D":"4次"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2次。其餘選項所述與法規不符，應加以辨別。"},{"num":24,"question":"董事會若不採納或修正薪資報酬委員會之建議時，董事會決議程序為何？","options":{"A":"全體董事2/3以上出席，及出席董事2/3以上同意","B":"全體董事2/3以上出席，及出席董事1/2以上同意","C":"全體董事1/2以上出席，及出席董事2/3以上同意","D":"全體董事1/2以上出席，及出席董事1/2以上同意"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）全體董事2/3以上出席，及出席董事1/2以上同意。其餘選項所述與法規不符，應加以辨別。"},{"num":25,"question":"薪資報酬委員會的召集通知，應於幾日前通知成員？","options":{"A":"3日前","B":"5日前","C":"7日前","D":"10日前"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）7日前。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"董事會通過之薪資報酬如優於薪資報酬委員會之建議，應於董事會通過之即日起算幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"薪資報酬委員會議事錄應於會後幾日內分送委員會成員？","options":{"A":"5日","B":"10日","C":"15日","D":"20日"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"薪資報酬委員會會議次數，應每年至少幾次？","options":{"A":"1次","B":"2次","C":"3次","D":"無限制"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2次。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"薪資報酬委員會議事錄及相關資料，應至少保存幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"永久"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）5年。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"召集薪資報酬委員會，應於幾日前通知成員？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）7日。其餘選項所述與法規不符，應加以辨別。"},{"num":31,"question":"薪酬委員會成員若為公司提供審計，且最近幾年累計報酬逾50萬元，即不得充任成員？","options":{"A":"1年","B":"2年","C":"3年","D":"5年"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2年。其餘選項所述與法規不符，應加以辨別。"},{"num":32,"question":"薪資報酬委員會之決議程序應為下列何者？","options":{"A":"全體成員1/2以上同意","B":"全體成員1/3以上同意","C":"全體成員2/3以上同意","D":"全體成員同意"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）全體成員1/2以上同意。其餘選項所述與法規不符，應加以辨別。"},{"num":33,"question":"董事會不採納薪酬委員會建議，應由幾分之幾以上全體董事出席，及出席董事過半數同意？","options":{"A":"二分之一","B":"三分之二","C":"四分之三","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二。其餘選項所述與法規不符，應加以辨別。"},{"num":34,"question":"薪資報酬委員會之議事錄應於會後幾日內分送委員會成員？","options":{"A":"10日","B":"15日","C":"20日","D":"21日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":35,"question":"薪酬委員會召集人因故不能召集，若委員會無其他獨立董事時，由誰代理召集？","options":{"A":"董事長代理","B":"召集人指定之其他委員會成員","C":"由董事會決定","D":"由全體委員互推"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）召集人指定之其他委員會成員。其餘選項所述與法規不符，應加以辨別。"},{"num":36,"question":"薪資報酬委員會之視訊影音資料，應保存期限為？","options":{"A":"至少一年","B":"至少三年","C":"至少五年","D":"永久保存"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）至少五年。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"併購委員會","questions":[{"num":1,"question":"公開發行公司於召開董事會決議併購事項前，應設置何種委員會？","options":{"A":"審計委員會","B":"薪酬委員會","C":"併購特別委員會","D":"提名委員會"},"answer":"C","explain":"依《公開發行公司併購特別委員會設置及相關事項辦法》第2條，應於召開董事會決議併購事項前，依法設置併購特別委員會。"},{"num":2,"question":"已設有審計委員會之公開發行公司進行併購，特別委員會職權由何者行使？","options":{"A":"另設獨立之特別委員會","B":"由審計委員會行之","C":"由薪酬委員會","D":"由全體董事會"},"answer":"B","explain":"依《併購特別委員會辦法》第2條，已設審計委員會者，特別委員會職權由審計委員會行之，避免重複設置。"},{"num":3,"question":"特別委員會組織規程之訂定及修正應經何者通過？","options":{"A":"股東會","B":"董事會","C":"全體特別委員會成員","D":"主管機關核准"},"answer":"B","explain":"依《併購特別委員會辦法》第3條，特別委員會組織規程之訂定應經董事會決議通過；修正時，亦同。"},{"num":4,"question":"特別委員會組織規程至少應記載幾項內容？","options":{"A":"1項","B":"2項","C":"3項","D":"4項"},"answer":"D","explain":"依《併購特別委員會辦法》第3條，組織規程至少應記載：成員組成及人數、職權事項、議事規則、公司應提供之資源，共四項。"},{"num":5,"question":"特別委員會成員之人數不得少於幾人？","options":{"A":"1人","B":"2人","C":"3人","D":"5人"},"answer":"C","explain":"依《併購特別委員會辦法》第4條，特別委員會成員之人數不得少於三人，其中一人為召集人。"},{"num":6,"question":"公開發行公司設有5名獨立董事、未設審計委員會，特別委員會成員最少應為幾人？","options":{"A":"1人","B":"3人","C":"4人","D":"5人"},"answer":"D","explain":"依《併購特別委員會辦法》第4條，設有獨立董事者，應由獨立董事組成特別委員會，故5名獨立董事均應組成，最少為5人。"},{"num":7,"question":"特別委員會應委請獨立專家協助之主要事項為何？","options":{"A":"評估管理層能力","B":"就換股比例或配發股東之現金或其他財產之合理性提供意見","C":"決定併購時程","D":"負責公告申報作業"},"answer":"B","explain":"依《併購特別委員會辦法》第6條，獨立專家應就換股比例或配發股東之現金或其他財產之合理性提供意見，保護股東利益。"},{"num":8,"question":"下列何者不符合擔任特別委員會獨立專家之資格？","options":{"A":"會計師","B":"律師","C":"證券承銷商","D":"資產估價師"},"answer":"D","explain":"依《併購特別委員會辦法》第6條，獨立專家係指會計師、律師或證券承銷商；資產估價師不在列舉範圍內，故不符資格。"},{"num":9,"question":"特別委員會之決議門檻為何？","options":{"A":"全體成員同意","B":"全體成員1/2以上同意","C":"出席成員2/3以上同意","D":"2/3成員出席，出席1/2同意"},"answer":"B","explain":"依《併購特別委員會辦法》，特別委員會決議應有全體成員二分之一以上同意；注意是「全體成員」非「出席成員」。"},{"num":10,"question":"特別委員會成員是否可委託他人代理出席？","options":{"A":"得委託其他成員代理","B":"得委託任何人代理","C":"應親自出席，不得委託代理","D":"以視訊參與不算出席"},"answer":"C","explain":"依《併購特別委員會辦法》，特別委員會成員應親自出席，不得委託他人代理，確保成員盡職參與審議。"},{"num":11,"question":"特別委員會之議事錄保存期限為何？","options":{"A":"3年","B":"5年","C":"10年","D":"永久保存"},"answer":"D","explain":"依《併購特別委員會辦法》第10條，特別委員會之議事錄應永久妥善保存，備供查核，與錄音錄影之5年保存不同。"},{"num":12,"question":"特別委員會開會過程錄音錄影存證，至少應保存幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"永久"},"answer":"C","explain":"依《併購特別委員會辦法》第10條，公司應將特別委員會開會過程全程錄音或錄影存證，並至少保存五年。"},{"num":13,"question":"以視訊會議召開特別委員會，其視訊影音資料之保存規定為何？","options":{"A":"至少保存3年","B":"至少保存5年","C":"視為議事錄一部分，應永久妥善保存","D":"無需特別保存"},"answer":"C","explain":"依《併購特別委員會辦法》第10條，視訊會議之視訊影音資料為議事錄之一部分，應永久妥善保存。"},{"num":14,"question":"董事會決議併購事項後，應於幾日內將決議及特別委員會審議結果公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依《併購特別委員會辦法》第7條，公司應於董事會決議之日起算二日內，將決議及特別委員會審議結果辦理公告申報。"},{"num":15,"question":"特別委員會成員具有利害關係時，應如何處理？","options":{"A":"可照常參與決議","B":"應迴避，不得參與決議","C":"僅不得擔任召集人","D":"由主管機關決定"},"answer":"B","explain":"依《併購特別委員會辦法》，成員不得與併購交易相對人為關係人或有足以影響獨立性之利害關係，有利害關係者應迴避。"},{"num":16,"question":"特別委員會得請哪些人員列席會議？","options":{"A":"僅獨立專家","B":"獨立專家、公司相關部門經理人、內部稽核人員、會計師、律師等","C":"任何人均可","D":"僅公司內部人員"},"answer":"B","explain":"依《併購特別委員會辦法》第8條，特別委員會得請獨立專家、公司相關部門經理人、內部稽核人員、會計師、律師或其他必要人員列席。"},{"num":17,"question":"下列何者屬於企業併購法所定之「併購」類型？","options":{"A":"僅有合併","B":"合併、收購及分割","C":"僅有股份收購","D":"合併與股份交換"},"answer":"B","explain":"依《企業併購法》，「併購」係指公司之合併、收購及分割，三種類型均在規範範圍內。"},{"num":18,"question":"特別委員會公告申報時，持反對意見之成員應如何揭露？","options":{"A":"不需揭露","B":"僅揭露反對票數","C":"載明反對成員姓名及其所持理由","D":"由公司決定是否揭露"},"answer":"C","explain":"依《併購特別委員會辦法》第7條，公告申報應載明任何持反對意見之董事及特別委員會成員之姓名及其所持理由，保障資訊透明。"},{"num":19,"question":"獨立專家與併購交易當事人之關係，應符合何種條件？","options":{"A":"得為關係人但須申報","B":"不得與併購交易當事人為關係人或有足以影響獨立性之利害關係","C":"持股未達5%即可","D":"無特別限制"},"answer":"B","explain":"依《併購特別委員會辦法》第6條，獨立專家不得與併購交易當事人為關係人，或有足以影響獨立性之利害關係，確保意見客觀公正。"},{"num":20,"question":"依併購資訊揭露自律規範，公司每年應至少辦理幾次相關法令教育宣導？","options":{"A":"一次","B":"二次","C":"三次","D":"無規定"},"answer":"A","explain":"依「○○股份有限公司併購資訊揭露自律規範」參考範例第15條，公司每年至少一次對董事、監察人、經理人及受僱人辦理本規範及相關法令之教育宣導。"},{"num":21,"question":"併購消息公開前，參與人員可否買賣與併購案相關之股票？","options":{"A":"可以，但須申報","B":"不得對外洩露訊息，亦不得自行或利用他人名義買賣相關有價證券","C":"得向法人機構透露","D":"僅不得公開發布"},"answer":"B","explain":"依「併購資訊揭露自律規範」第5條，所有參與人員在併購消息公開前，不得對外洩露任何訊息，亦不得買賣與併購案相關之有價證券。"},{"num":22,"question":"有關公司併購議題對外發言，應由何人負責？","options":{"A":"任何員工均可","B":"公司負責人、發言人或代理發言人","C":"財務長","D":"投資人關係主管"},"answer":"B","explain":"依「併購資訊揭露自律規範」，面對外界詢問有關公司併購議題，統一由公司負責人、發言人或代理發言人負責處理。"},{"num":23,"question":"依治理實務守則，特別委員會等功能性委員會對誰負責？","options":{"A":"對董事長負責","B":"對董事會負責","C":"對股東會負責","D":"對主管機關負責"},"answer":"B","explain":"依《上市上櫃公司治理實務守則》，功能性委員會應對董事會負責，其決議與建議最終交由董事會討論決策。"},{"num":24,"question":"特別委員會議事錄之記載，應包含何種重要內容？","options":{"A":"僅記載決議結果","B":"議決事項應將成員同意或反對之明確意見及反對之理由列入","C":"僅記載出席人員","D":"由召集人自行決定"},"answer":"B","explain":"依《併購特別委員會辦法》第7條，議事錄應將成員同意或反對之明確意見及反對之理由列入，確保決策過程透明。"},{"num":25,"question":"特別委員會錄音錄影存證，若保存期限內發生訴訟，應如何處理？","options":{"A":"依原定五年期限保存即可","B":"申請主管機關延長","C":"應續予保存至訴訟終結止","D":"由法院決定"},"answer":"C","explain":"依《併購特別委員會辦法》第10條，保存期限未屆滿前發生訴訟時，相關錄音或錄影存證資料應續予保存至訴訟終結止。"},{"num":26,"question":"依併購資訊揭露自律規範，辦理資訊揭露應秉持之原則，不包含下列何者？","options":{"A":"公平對待原則","B":"審慎負責之態度","C":"利益最大化原則","D":"資訊透明化"},"answer":"C","explain":"依「併購資訊揭露自律規範」第4條，揭露原則包括公平對待、審慎負責、不得虛偽隱匿、資訊透明化；「利益最大化」並非法定揭露原則。"},{"num":27,"question":"特別委員會召集人由何者擔任？","options":{"A":"董事長指定","B":"主管機關指定","C":"由全體成員互推，其中一人為召集人","D":"資深成員自動擔任"},"answer":"C","explain":"依《併購特別委員會辦法》第4條，特別委員會成員之人數不得少於三人，其中一人為召集人；召集人由全體成員推選產生。"},{"num":28,"question":"特別委員會成員至少應有幾名具會計或財務專長？","options":{"A":"無特定要求","B":"至少一名","C":"至少二名","D":"全體成員均需具備"},"answer":"B","explain":"依《併購特別委員會辦法》，特別委員會成員資格參照獨立董事辦法，且至少應有一名具會計或財務專長，確保審議能力。"},{"num":29,"question":"特別委員會錄音錄影得以何種方式保存？","options":{"A":"僅限實體媒體","B":"得以電子方式為之","C":"僅限雲端儲存","D":"須交由主管機關保管"},"answer":"B","explain":"依《併購特別委員會辦法》第10條，錄音或錄影存證資料之保存得以電子方式為之，提供保存彈性。"},{"num":30,"question":"特別委員會成員不符合獨立性要求時，由何人補足？","options":{"A":"由主管機關指派","B":"由股東會選任","C":"由董事會遴選之成員組成","D":"由其他公司成員遞補"},"answer":"C","explain":"依《併購特別委員會辦法》第4條，獨立董事未符合資格或人數不足之部分，由董事會遴選之成員組成，確保委員會正常運作。"},{"num":31,"question":"關於併購特別委員會設置情形，下列何者正確？","options":{"A":"屬公開發行公司併購特別委員會設置及應遵循事項辦法明訂應於公司章程載明事項","B":"屬公司法明訂應於公司章程載明事項","C":"屬企業併購法明訂應於公司章程載明事項","D":"屬公司自治事項"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）屬公司自治事項。其餘選項所述與法規不符，應加以辨別。"},{"num":32,"question":"併購特別委員會成員應至少幾人，其中一人為召集人？","options":{"A":"2人","B":"3人","C":"5人","D":"7人"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）3人。其餘選項所述與法規不符，應加以辨別。"},{"num":33,"question":"特別委員會組織規程應明訂事項，不包含下列何者？","options":{"A":"職權事項","B":"議事規則","C":"議事錄應記載事項","D":"成員組成及人數"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）議事錄應記載事項。其餘選項所述與法規不符，應加以辨別。"},{"num":34,"question":"特別委員會的決議門檻為全體成員幾分之幾以上同意？","options":{"A":"三分之一","B":"二分之一","C":"三分之二","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）二分之一。其餘選項所述與法規不符，應加以辨別。"},{"num":35,"question":"併購特別委員會成員應至少有幾人？","options":{"A":"3人","B":"5人","C":"7人","D":"無限制"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）3人。其餘選項所述與法規不符，應加以辨別。"},{"num":36,"question":"董事會決議通過併購案後，應於幾日內將相關資訊公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":37,"question":"某公開發行公司之獨立董事為5人，未設立審計委員會，則併購委員會成員最少應為幾人？","options":{"A":"1人","B":"2人","C":"3人","D":"5人"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）5人。其餘選項所述與法規不符，應加以辨別。"},{"num":38,"question":"特別委員會之議事錄保存年限為何？","options":{"A":"至少3年","B":"至少5年","C":"至少10年","D":"永久"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）永久。其餘選項所述與法規不符，應加以辨別。"},{"num":39,"question":"併購特別委員會成員應至少一席具有下列何種資格：","options":{"A":"產業經驗","B":"管理專長","C":"會計或財務專長","D":"律師資格"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）會計或財務專長。其餘選項所述與法規不符，應加以辨別。"},{"num":40,"question":"特別委員會開會過程的錄音錄影存證，至少應保存幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"10年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）5年。其餘選項所述與法規不符，應加以辨別。"},{"num":41,"question":"下列何者非併購特別委員會成員之資格限制？","options":{"A":"不得為公司或其關係企業之受僱人","B":"不得為公司或其關係企業之董事、監察人之三親等以內親屬關係","C":"不得為公司或其關係企業之董事、監察人","D":"不得為公司或其關係企業之董事之配偶"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）不得為公司或其關係企業之受僱人。其餘選項所述與法規不符，應加以辨別。"},{"num":42,"question":"依規定，公開收購期間不得少於幾日？","options":{"A":"10日","B":"20日","C":"30日","D":"50日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":43,"question":"特別委員會進行審議時，應委請獨立專家協助，下列何者不符獨立專家的資格？","options":{"A":"律師","B":"資產合估價師","C":"證券承銷商","D":"會計師"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）資產合估價師。其餘選項所述與法規不符，應加以辨別。"},{"num":44,"question":"依企業併購法，採簡易合併程序時，消滅公司被持有股份須達幾%以上？","options":{"A":"70%","B":"80%","C":"90%","D":"95%"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）90%。其餘選項所述與法規不符，應加以辨別。"},{"num":45,"question":"下列何者為併購特別委員會決議門檻？","options":{"A":"全體成員1/2以上同意","B":"全體成員同意","C":"1/2以上成員出席，出席成員2/3以上同意","D":"2/3以上成員出席，出席成員1/2以上同意"},"answer":"A" ":"2,000萬元","C":"3,000萬元","D":"5,000萬元"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3,000萬元。其餘選項所述與法規不符，應加以辨別。"},{"num":24,"question":"公開發行公司直接及間接持有90%以上股份之子公司，在為背書保證前，應提報公開發行公司董事會決議；若持有100%，是否有例外？","options":{"A":"沒有例外，仍須提報","B":"有例外，100%持股公司間不需提報","C":"視金額決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）有例外，100%持股公司間不需提報。其餘選項所述與法規不符，應加以辨別。"},{"num":25,"question":"依規定，資金貸與他人，各公開發行公司應訂定資金貸與他人「作業程序」，此程序應如何決定？","options":{"A":"由總經理決定","B":"依處理準則規定訂定","C":"由主管機關統一規定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）依處理準則規定訂定。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"依資金貸與準則，公司間業務往來所進行的資金貸與，是否受40%淨值上限的限制？","options":{"A":"受限","B":"不受限，此為例外情形之一","C":"視金額決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不受限，此為例外情形之一。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"公開發行公司對背書保證的監控，應於每月幾日前公告上月份資金貸與「及背書保證」餘額？","options":{"A":"5日","B":"10日","C":"15日","D":"20日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）10日。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"依規定，公開發行公司設有審計委員會者，訂定或修正資金貸與及背書保證處理程序，應經審計委員會全體成員幾分之幾以上同意？","options":{"A":"三分之一","B":"二分之一","C":"三分之二","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）二分之一。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"若資金貸與及背書保證處理程序未經審計委員會二分之一以上同意，可由全體董事幾分之幾以上同意行之？","options":{"A":"二分之一","B":"三分之二","C":"四分之三","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"依規定，母子公司間或子公司彼此間之資金貸與，得授權董事長對同一貸與對象於不超過幾年之期間內分次撥貸或循環動用？","options":{"A":"半年","B":"1年","C":"2年","D":"3年"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）1年。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"關係人交易","questions":[{"num":1,"question":"依關係人相互間財務業務相關作業規範，關係企業係指具有哪種關係的企業？","options":{"A":"僅指有控制與從屬關係之公司","B":"有控制與從屬關係或相互投資之公司","C":"僅指相互投資之公司","D":"所有有業務往來之公司"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）有控制與從屬關係或相互投資之公司。其餘選項所述與法規不符，應加以辨別。"},{"num":2,"question":"依關係人規範，公司經理人原則上不得與關係企業之經理人互為兼任，但有何例外？","options":{"A":"薪資相同時","B":"經董事會決議行之者","C":"主管機關核准時","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）經董事會決議行之者。其餘選項所述與法 規定，正確答案為（B）董事會。其餘選項所述與法規不符，應加以辨別。"},{"num":22,"question":"依關係人規範，公司直接及間接持有表決權100%之公司間背書保證，是否有金額上限限制？","options":{"A":"有，不得超過淨值10%","B":"有，不得超過淨值20%","C":"無限制","D":"視金額決定"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）無限制。其餘選項所述與法規不符，應加以辨別。"},{"num":23,"question":"依關係人規範，公司母公司如為外國公司，應於知悉特定事實發生後，在次一營業日交易時間開始前代為申報，下列何者屬於需申報的事項？","options":{"A":"母公司的重大財務訊息","B":"母公司的一般業務往來","C":"員工招募資訊","D":"以上皆非"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）母公司的重大財務訊息。其餘選項所述與法規不符，應加以辨別。"},{"num":24,"question":"依關係人交易相關規範，「非常規交易」是指什麼？","options":{"A":"金額超過一定門檻的交易","B":"不符合市場公平合理條件的交易，可能有不當利益輸送","C":"未事先披露的交易","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不符合市場公平合理條件的交易，可能有不當利益輸送。其餘選項所述與法規不符，應加以辨別。"},{"num":25,"question":"依關係人規範，公司向關係人取得或處分不動產，應將相關資料提交董事會通過及哪個機關承認後，始得簽訂交易契約？","options":{"A":"股東會","B":"監察人","C":"主管機關","D":"審計委員會"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）監察人。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"依關係人規範，公司與關係人間之財務業務往來或交易，應本於何種原則？","options":{"A":"最大利潤原則","B":"公平合理原則","C":"節省成本原則","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）公平合理原則。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"依關係人規範，公司取得以關係企業為標的之有價證券（如股票），應視為關係人交易，是否須依規定辦理？","options":{"A":"否","B":"是，需依關係人交易相關規定辦理","C":"視金額而定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）是，需依關係人交易相關規定辦理。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"依關係人規範，「關係人相互間財務業務相關作業規範」的訂定依據為哪一守則？","options":{"A":"上市上櫃公司治理實務守則第17條","B":"誠信經營守則","C":"永續發展實務守則","D":"以上皆非"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）上市上櫃公司治理實務守則第17條。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"依關係人規範，公司應於書面規範中訂定進銷貨交易、取得或處分資產、資金貸與及背書保證等事項的哪種內容？","options":{"A":"僅報告流程","B":"管理程序，且相關重大交易應提董事會決議通過、提股東會同意或報告","C":"僅財務報表揭露","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）管理程序，且相關重大交易應提董事會決議通過、提股東會同意或報告。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"依規定，公司之直接及間接持有表決權股份百分之百之國外公司間的資金貸與，融資金額是否受貸與企業淨值40%限制？","options":{"A":"受限制","B":"不受40%限制","C":"視金額決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不受40%限制。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"綜合觀念","questions":[{"num":1,"question":"依公司法，股東會議事錄在公司存續期間應如何保存？","options":{"A":"至少保存5年","B":"至少保存10年","C":"永久保存","D":"至少保存3年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）永久保存。其餘選項所述與法規不符，應加以辨別。"},{"num":2,"question":"董事會議事錄與股東會議事錄，在保存年限上有何差異？","options":{"A":"董事會5年、股東會永久","B":"兩者均為永久保存","C":"董事會永久、股東會5年","D":"兩者均至少5年"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）兩者均為永久保存。其餘選項所述與法規不符，應加以辨別。"},{"num":3,"question":"依公司法，出席股東之簽名簿及代理出席之委託書，其保存期限至少為幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"永久"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1年。其餘選項所述與法規不符，應加以辨別。"},{"num":4,"question":"公司治理3.0永續發展藍圖的5大主軸，不包含下列何者？","options":{"A":"強化董事會職能，提升企業永續價值","B":"提高資訊透明度，促進永續經營","C":"推動商業法院設立，強化爭議解決","D":"接軌國際規範，引導盡職治理"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）推動商業法院設立，強化爭議解決。其餘選項所述與法規不符，應加以辨別。"},{"num":5,"question":"依治理實務守則，功能性委員會應對誰負責？","options":{"A":"股東會","B":"董事會","C":"主管機關","D":"審計委員會"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）董事會。其餘選項所述與法規不符，應加以辨別。"},{"num":6,"question":"依上市上櫃公司治理實務守則，上市上櫃公司宜設置提名委員會，其過半數成員宜由何人擔任，並由何人擔任主席？","options":{"A":"一般董事；董事長","B":"獨立董事；獨立董事","C":"外部專家；董事長","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）獨立董事；獨立董事。其餘選項所述與法規不符，應加以辨別。"},{"num":7,"question":"依財務報告編製準則，上市(櫃)、興櫃公司應自哪一年起依IFRS編製財務報告？","options":{"A":"2011年","B":"2012年","C":"2013年","D":"2015年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）2013年。其餘選項所述與法規不符，應加以辨別。"},{"num":8,"question":"公開發行公司年報中，若最近年度非擔任主管職務之全時員工年度薪資平均數未達多少元，應揭露個別董監酬金？","options":{"A":"30萬元","B":"40萬元","C":"50萬元","D":"60萬元"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）50萬元。其餘選項所述與法規不符，應加以辨別。"},{"num":9,"question":"依公司法，繼續一年以上持有已發行股份3%以上之股東，得以書面請求董事會召集股東臨時會，董事長如在幾日內不召集，股東得自行召集？","options":{"A":"7日","B":"10日","C":"15日","D":"30日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）15日。其餘選項所述與法規不符，應加以辨別。"},{"num":10,"question":"依證交法，公開發行公司的法律責任中，發行人對財務報告不實應負哪種責任？","options":{"A":"推定過失責任","B":"故意責任","C":"無過失責任","D":"嚴格責任"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）無過失責任。其餘選項所述與法規不符，應加以辨別。"},{"num":11,"question":"依公司法第185條，公司為重大行為（如讓與全部或主要部分營業），應有已發行股份總數幾分之幾以上股東出席，以出席股東表決權過半數同意行之？","options":{"A":"過半數","B":"三分之二以上","C":"四分之三以上","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二以上。其餘選項所述與法規不符，應加以辨別。"},{"num":12,"question":"董事競業禁止義務所得之利益，公司得請求歸入，此請求權自公司知悉後幾個月不行使則消滅？","options":{"A":"1個月","B":"3個月","C":"6個月","D":"1年"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1個月。其餘選項所述與法規不符，應加以辨別。"},{"num":13,"question":"依規定，公司治理評鑑每年由哪個單位辦理？","options":{"A":"金管會","B":"證交所及櫃買中心","C":"公司治理中心","D":"投信投顧公會"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）證交所及櫃買中心。其餘選項所述與法規不符，應加以辨別。"},{"num":14,"question":"依上市上櫃公司治理實務守則，上市上櫃公司宜避免於股東會提出哪種議案？","options":{"A":"重大資產交易","B":"臨時動議及原議案之修正","C":"選任董事","D":"章程修訂"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）臨時動議及原議案之修正。其餘選項所述與法規不符，應加以辨別。"},{"num":15,"question":"依規定，上市上櫃公司應設有幾人以上之代理發言人，且任一代理發言人均應能單獨代理發言人對外發言？","options":{"A":"1人","B":"2人","C":"3人","D":"無限制"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1人。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"委託書規則","questions":[{"num":1,"question":"委託書規則之法源依據為下列何者？","options":{"A":"公司法第177條","B":"證券交易法第25條之1","C":"證券交易法第14條之4","D":"公司治理實務守則"},"answer":"B","explain":"依《委託書規則》第1條，本規則依《證券交易法》第25條之1規定訂定，非依公司法。"},{"num":2,"question":"下列何者屬於委託書規則所稱之「徵求」行為？","options":{"A":"股東主動委託他人代理","B":"以廣告方式主動取得委託書","C":"繼承取得委託書","D":"以上皆非"},"answer":"B","explain":"依《委託書規則》第3條，「徵求」指以廣告、信函等方式主動取得委託書；股東主動委託屬「非屬徵求」。"},{"num":3,"question":"委託書用紙應由誰印發？","options":{"A":"股東自行印製","B":"公司印發","C":"受託代理人印製","D":"集保結算所印製"},"answer":"B","explain":"依《委託書規則》第2條，公開發行公司出席股東會使用委託書之用紙，以公司印發者為限。"},{"num":4,"question":"公司寄發委託書用紙予所有股東，應如何辦理？","options":{"A":"按持股多寡分批寄發","B":"召集通知後三日內寄發","C":"應於同日為之","D":"由股東自行至公司領取"},"answer":"C","explain":"依《委託書規則》第2條，公司寄發或以電子文件傳送委託書用紙予所有股東，應於同日為之，確保平等對待。"},{"num":5,"question":"一般徵求人（股東會無選舉議案）之基本持股門檻為何？","options":{"A":"持有已發行股份1萬股以上","B":"持有已發行股份5萬股以上","C":"持有已發行股份10萬股以上","D":"持有已發行股份100萬股以上"},"answer":"B","explain":"依《委託書規則》第5條，除有選舉議案另有規定外，一般徵求人應為持有公司已發行股份五萬股以上之股東。"},{"num":6,"question":"非金融機構股東會「有」選舉議案，一般徵求人持股期間要求為何？","options":{"A":"繼續3個月以上","B":"繼續6個月以上","C":"繼續1年以上","D":"無持股期間限制"},"answer":"B","explain":"依《委託書規則》第5條，非金融機構有選舉議案時，徵求人應繼續六個月以上持有已發行股份八十萬股或千分之二以上且不低於十萬股。"},{"num":7,"question":"金融控股公司股東會「有」選舉議案，一般徵求人持股數量門檻為何？","options":{"A":"80萬股或千分之二以上","B":"200萬股或千分之五以上","C":"500萬股以上","D":"持有股份總數10%以上"},"answer":"B","explain":"依《委託書規則》第5條，金控、銀行、保險公司股東會有選舉議案時，徵求人應繼續一年以上持有二百萬股或千分之五以上。"},{"num":8,"question":"無限徵求人委託信託事業擔任徵求人，委任股東持股需符合哪些條件？","options":{"A":"繼續6個月以上，持股達千分之二","B":"繼續1年以上，持股達10%以上且符合申報規定","C":"繼續1年以上，持股達200萬股","D":"繼續3個月以上，持股達5萬股"},"answer":"B","explain":"依《委託書規則》第6條，無限徵求委任股東應繼續一年以上持有已發行股份總數10%以上，並依相關規定申報或核准。"},{"num":9,"question":"非屬徵求之受託代理人，可代理之股東人數上限為何？","options":{"A":"10人","B":"20人","C":"30人","D":"無人數限制"},"answer":"C","explain":"依《委託書規則》，非屬徵求之受託代理人，所受委託人數不得超過三十人，超過者其代理之表決權不予計算。"},{"num":10,"question":"徵求書面及廣告中，擬支持之董事被選舉人經營理念以幾字為限？","options":{"A":"100字","B":"200字","C":"300字","D":"500字"},"answer":"C","explain":"依《委託書規則》，徵求書面及廣告中，擬支持之董事被選舉人之經營理念以三百字為限，超過者公司得拒絕刊登。"},{"num":11,"question":"下列何者可以金錢或其他財產上利益價購委託書？","options":{"A":"持股逾5%之大股東","B":"公司派董事","C":"任何人均不得為之","D":"信託事業"},"answer":"C","explain":"依《委託書規則》，任何人均不得以金錢或其他財產上利益約使股東出具委託書，此為強制禁止規定。"},{"num":12,"question":"公開發行公司寄發股東會召集通知時，應同時附送何種文件？","options":{"A":"財務報告","B":"委託書用紙","C":"董事候選人資料","D":"議事手冊"},"answer":"B","explain":"依《委託書規則》第2條，公司寄發股東會召集通知時，應同時附送委託書用紙予股東。"},{"num":13,"question":"集中市場買賣之股票，徵求人持有期間應以何日起算？","options":{"A":"成交日","B":"完成交割之日","C":"申報日","D":"停止過戶次日"},"answer":"B","explain":"依金管會解釋，集中市場買賣之股票，持有期間以完成交割之日起算，而非成交日，徵求人應特別注意。"},{"num":14,"question":"違反徵求資格規定經主管機關處分者，不得辦理代為處理徵求事務之期限為何？","options":{"A":"6個月","B":"1年","C":"2年","D":"永久禁止"},"answer":"B","explain":"依《委託書規則》（111年修正），對違規受處分者，限制其於一年內不得辦理代為處理徵求事務。"},{"num":15,"question":"「非屬徵求」與「徵求」最根本的區別在於：","options":{"A":"持股數量不同","B":"是否由股東主動委託","C":"代理股數多寡","D":"是否為金融機構股東"},"answer":"B","explain":"依《委託書規則》第3條，「非屬徵求」係受股東之主動委託取得委託書；「徵求」則係以廣告等方式主動取得，核心差異在委託之主動方。"},{"num":16,"question":"依委託書規則，一般徵求人（非金融機構、股東會有選舉議案）持股資格需繼續幾個月以上？","options":{"A":"3個月","B":"6個月","C":"1年","D":"2年"},"answer":"B","explain":"依委託書規則，一般公司（非金融機構）股東會有選舉議案時，一般徵求人須繼續持股「六個月以上」，且持有80萬股或已發行股份千分之二以上且不低於10萬股。"},{"num":17,"question":"依委託書規則，徵求人與非屬徵求，最根本的區別是什麼？","options":{"A":"持股比例不同","B":"主動取得委託書（徵求）vs受股東主動委託（非屬徵求）","C":"代理股數上限不同","D":"通知時間不同"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）主動取得委託書（徵求）vs受股東主動委託（非屬徵求）。其餘選項所述與法規不符，應加以辨別。"},{"num":18,"question":"依委託書規則，無限徵求人委託信託事業擔任徵求人，委任股東持股需繼續幾年以上？","options":{"A":"半年","B":"1年","C":"2年","D":"3年"},"answer":"B","explain":"依委託書規則，委託信託事業擔任徵求人（無限徵求）者，委任股東持股須繼續「一年以上」，且持有公司已發行股份總數10%以上。"},{"num":19,"question":"金融機構（金控、銀行、保險）股東會「無」選舉議案時，一般徵求人持股門檻為何？","options":{"A":"持有5萬股以上","B":"持有80萬股或2‰以上","C":"持有200萬股或5‰以上","D":"持有10%以上"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）持有5萬股以上。其餘選項所述與法規不符，應加以辨別。"},{"num":20,"question":"非屬徵求之受託代理人，所受委託人數不得超過幾人？","options":{"A":"10人","B":"20人","C":"30人","D":"50人"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）30人。其餘選項所述與法規不符，應加以辨別。"},{"num":21,"question":"金融機構股東會「有」選舉議案，一般徵求人持股條件為何？","options":{"A":"持有5萬股以上","B":"持有80萬股或2‰以上且不低於10萬股","C":"持有200萬股或5‰以上，且持股6個月以上","D":"持有10%以上，且持股1年以上"},"answer":"C","explain":"依委託書規則，一般公司（非金融機構）股東會有選舉議案時，一般徵求人須繼續持股「六個月以上」，且持有80萬股或已發行股份千分之二以上且不低於10萬股。"},{"num":22,"question":"非屬徵求之受託代理人代理股數，不得超過代理人本身持股的幾倍，且不得超過已發行股份幾%？","options":{"A":"3倍；2%","B":"4倍；3%","C":"5倍；5%","D":"無限制；3%"},"answer":"B","explain":"依委託書規則，非屬徵求之受託代理人代理股數，不得超過代理人本身持股的「4倍」，且不得超過已發行股份「3%」，以防止非徵求名義大量徵集委託書。"},{"num":23,"question":"非金融機構股東會「有」選舉議案，一般徵求人持股條件為何？","options":{"A":"持有5萬股以上","B":"持有80萬股或2‰以上且不低於10萬股，持股6個月以上","C":"持有10%以上持股1年以上","D":"持有1%以上"},"answer":"B","explain":"依委託書規則，一般公司（非金融機構）股東會有選舉議案時，一般徵求人須繼續持股「六個月以上」，且持有80萬股或已發行股份千分之二以上且不低於10萬股。"},{"num":24,"question":"徵求委託書的一般徵求人（非金融機構），股東會有選舉議案時，持股需達已發行股份多少股以上或幾‰以上且不低於10萬股？","options":{"A":"50萬股或1‰","B":"80萬股或2‰","C":"100萬股或3‰","D":"200萬股或5‰"},"answer":"B","explain":"依委託書規則，一般公司（非金融機構）有選舉議案時，一般徵求人須繼續持股六個月以上，且持有「80萬股或千分之二以上且不低於10萬股」。"},{"num":25,"question":"依委託書規則，徵求委託書之書面及廣告中，擬支持董事被選舉人的經營理念以幾字為限，超過則公司對該徵求資料不予受理？","options":{"A":"100字","B":"150字","C":"200字","D":"300字"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）200字。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"委託書的取得，下列何者不受委託書規則限制，屬非屬徵求？","options":{"A":"以廣告方式徵求","B":"受股東主動委託","C":"以電話方式徵求","D":"以拜訪方式徵求"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）受股東主動委託。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"徵求人代理之股數上限為已發行股份總數的幾%（一般情況）？","options":{"A":"1%","B":"2%","C":"3%","D":"5%"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3%。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"違反委託書規則時，其代理之表決權效果為何？","options":{"A":"效力未定","B":"不予計算","C":"得撤銷","D":"無效"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不予計算。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"非屬徵求之受託代理人受三人以上股東委託，應於股東會開會幾日前檢附聲明書及委託書明細表送達公司？","options":{"A":"2日前","B":"3日前","C":"5日前","D":"7日前"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）5日前。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"委任人得於股東會後幾日內，查閱委託書的使用情形？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）7日。其餘選項所述與法規不符，應加以辨別。"},{"num":31,"question":"委託書應由委託人親自簽名或蓋章，委託人親自填具徵求人或受託代理人姓名。哪種情況下得以當場蓋章方式代替？","options":{"A":"徵求人持股超過10%","B":"信託事業或股務代理機構受委託擔任徵求人，或股務代理機構受委任為受託代理人","C":"委託人本人親自到場","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）信託事業或股務代理機構受委託擔任徵求人，或股務代理機構受委任為受託代理人。其餘選項所述與法規不符，應加以辨別。"},{"num":32,"question":"無限徵求中，非金融機構的委任股東持股需達發行股份總數幾%以上，才能委託信託事業擔任徵求人（無選舉議案）？","options":{"A":"10%","B":"8%","C":"5%","D":"1%"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）10%。其餘選項所述與法規不符，應加以辨別。"},{"num":33,"question":"徵求人若違反「不得於徵求場所外徵求委託書」的規定，其代理之表決權效果為何？","options":{"A":"縮減代理股數","B":"不予計算","C":"得撤銷","D":"無效"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不予計算。其餘選項所述與法規不符，應加以辨別。"},{"num":34,"question":"徵求委託書之書面中，董事被選舉人的經營理念以幾字為限？","options":{"A":"100字","B":"200字","C":"300字","D":"500字"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）200字。其餘選項所述與法規不符，應加以辨別。"},{"num":35,"question":"股務代理機構擔任委託書之受託代理人，其所代理股數是否受已發行股份總數3%的限制？","options":{"A":"受限制","B":"不受限制","C":"視委託股東人數決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不受限制。其餘選項所述與法規不符，應加以辨別。 // State
let state = {
  answers: {},  // key: "chIdx-qIdx" -> selected letter
  stars: {},    // key: "chIdx-qIdx" -> true/false
  mode: 'all',  // all | starred | wrong
  currentChapter: 0
};

function stateKey(chIdx, qIdx) { return `${chIdx}-${qIdx}`; }

// Shuffle options, return [{origLetter, text}] array and the new letter for the correct answer
function shuffleOptions(q) {
  const entries = Object.entries(q.options).filter(([l, t]) => t);
  // Fisher-Yates
  for (let i = entries.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [entries[i], entries[j]] = [entries[j], entries[i]];
  }
  const labels = ['A','B','C','D'];
  const shuffled = entries.map(([origLetter, text], i) => ({
    label: labels[i],
    origLetter,
    text,
    isCorrect: origLetter === q.answer
  }));
  const newCorrect = shuffled.find(o => o.isCorrect).label;
  return { shuffled, newCorrect };
}

async function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('cg-quiz-state') || '{}');
    state.answers = saved.answers || {};
    state.stars = saved.stars || {};
  } catch(e) {}
}

async function saveState() {
  try {
    localStorage.setItem('cg-quiz-state', JSON.stringify({ answers: state.answers, stars: state.stars }));
  } catch(e) {}
  cloudSave();
}

function getFilteredChapters() {
  if (state.mode === 'all') return QUESTIONS;
  return QUESTIONS.map((ch, ci) => ({
    ...ch,
    questions: ch.questions.filter((_, qi) => {
      const k = stateKey(ci, qi);
      if (state.mode === 'starred') return state.stars[k];
      if (state.mode === 'wrong') {
        const ans = state.answers[k];
        return ans && ans !== ch.questions[qi].answer;
      }
      return true;
    })
  })).filter(ch => ch.questions.length > 0);
}

function renderSidebar() {
  const filtered = getFilteredChapters();
  const list = document.getElementById('chapterList');
  list.innerHTML = '';

  // "全部" button
  const allBtn = document.createElement('div');
  allBtn.className = 'chapter-item' + (state.currentChapter === -1 ? ' active' : '');
  allBtn.innerHTML = `<span>📚 全部章節</span><span class="ch-count">${filtered.reduce((s,c)=>s+c.questions.length,0)}</span>`;
  allBtn.onclick = () => { state.currentChapter = -1; render(); closeSidebarOnMobile(); };
  list.appendChild(allBtn);

  filtered.forEach((ch, i) => {
    const origIdx = QUESTIONS.findIndex(c => c.chapter === ch.chapter);
    const total = ch.questions.length;
    const answered = ch.questions.filter((_, qi) => {
      const qiOrig = QUESTIONS[origIdx].questions.indexOf(ch.questions[qi]);
      return state.answers[stateKey(origIdx, qiOrig !== -1 ? qiOrig : qi)];
    }).length;
    const stars = ch.questions.filter((_, qi) => {
      const qiOrig = QUESTIONS[origIdx].questions.indexOf(ch.questions[qi]);
      return state.stars[stateKey(origIdx, qiOrig !== -1 ? qiOrig : qi)];
    }).length;

    const div = document.createElement('div');
    div.className = 'chapter-item' + (state.currentChapter === origIdx ? ' active' : '');
    div.innerHTML = `
      <span style="font-size:12px">${ch.chapter}</span>
      <span style="display:flex;gap:4px;align-items:center">
        ${stars ? `<span style="color:var(--accent);font-size:10px">⭐${stars}</span>` : ''}
        <span class="ch-count">${total}</span>
      </span>`;
    div.onclick = () => { state.currentChapter = origIdx; render(); closeSidebarOnMobile(); };
    list.appendChild(div);
  });
}

function getDisplayData() {
  const filtered = getFilteredChapters();
  if (state.currentChapter === -1) {
    return filtered.map(ch => ({
      ...ch,
      origIdx: QUESTIONS.findIndex(c => c.chapter === ch.chapter)
    }));
  }
  const ch = QUESTIONS[state.currentChapter];
  if (!ch) return [];
  const filtered_ch = filtered.find(c => c.chapter === ch.chapter);
  if (!filtered_ch) return [];
  return [{ ...filtered_ch, origIdx: state.currentChapter }];
}

function renderSummary() {
  const totalQ = QUESTIONS.reduce((s,c)=>s+c.questions.length,0);
  const answeredCount = Object.keys(state.answers).length;

    const [ci,qi] = k.split('-').map(Number);
    return QUESTIONS[ci] && QUESTIONS[ci].questions[qi] && v === QUESTIONS[ci].questions[qi].answer;

  const starCount = Object.values(state.stars).filter(Boolean).length;

  document.getElementById('summaryArea').innerHTML = `

// ── Drill mode ──────────────────────────────────────────────
let drill = {
  queue: [],       // array of {ci, qi} wrong questions
  current: 0,
  sessionCorrect: 0,
  totalStart: 0,
  answered: false
};

function startDrill() {
  // Build queue from all current wrong answers
  const wrongKeys = Object.entries(state.answers)
    .filter(([k, v]) => {
      const [ci, qi] = k.split('-').map(Number);
      return QUESTIONS[ci] && QUESTIONS[ci].questions[qi] && v !== QUESTIONS[ci].questions[qi].answer;
    })
    .map(([k]) => { const [ci,qi] = k.split('-').map(Number); return {ci, qi}; });

  if (wrongKeys.length === 0) return;

  // Shuffle
  for (let i = wrongKeys.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongKeys[i], wrongKeys[j]] = [wrongKeys[j], wrongKeys[i]];
  }

  drill.queue = wrongKeys;
  drill.current = 0;
  drill.sessionCorrect = 0;
  drill.totalStart = wrongKeys.length;
  drill.answered = false;

  document.getElementById('drillOverlay').style.display = 'flex';
  renderDrillCard();
}

function closeDrill() {
  document.getElementById('drillOverlay').style.display = 'none';
  render();
}

function renderDrillCard() {
  const body = document.getElementById('drillBody');

  if (drill.queue.length === 0) {
    // All cleared!
    body.innerHTML = `
      <div class="drill-done">
        <div class="drill-done-icon">🎉</div>
        <h2>全部刷完了！</h2>
        <p>本輪共答對 <strong style="color:var(--correct)">${drill.sessionCorrect}</strong> 題<br>原有 ${drill.totalStart} 道錯題，已全數清零</p>
        <div class="drill-done-btns">
          <button class="drill-next-btn" onclick="restartDrill()">再刷一輪</button>
          <button class="drill-next-btn wrong-variant" onclick="closeDrill()">返回</button>
        </div>
      </div>`;
    return;
  }

  const {ci, qi} = drill.queue[drill.current];
  const q = QUESTIONS[ci].questions[qi];
  const ch = QUESTIONS[ci].chapter;
  const remain = drill.queue.length;
  const pct = Math.round((1 - remain / drill.totalStart) * 100);

  const {shuffled: drillShuffled, newCorrect: drillNewCorrect} = shuffleOptions(q);
  // Store on drill object so drillAnswer can reference
  drill.currentOptMap = {};
  drillShuffled.forEach(o => { drill.currentOptMap[o.label] = o.origLetter; });
  drill.currentNewCorrect = drillNewCorrect;

  let optsHTML = '';
  drillShuffled.forEach(({label, text}) => {
    optsHTML += `<button class="drill-opt" id="dopt-${label}" onclick="drillAnswer('${label}')">
      <span class="opt-letter">${label}</span>
      <span>${text}</span>
    </button>`;
  });

  body.innerHTML = `
    <div class="drill-counter">
      <div>
        <div class="drill-remain">${remain}</div>
        <div class="drill-remain-label">剩餘錯題</div>
      </div>
      <div class="drill-sep"></div>
      <div>
        <div class="drill-correct-count">+${drill.sessionCorrect}</div>
        <div class="drill-correct-label">本輪答對</div>
      </div>
    </div>
    <div class="drill-progress-wrap">
      <div class="drill-progress-bar">
        <div class="drill-progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="drill-card-wrap">
      <div class="drill-card" id="drillCard">
        <div class="drill-source">${ch}</div>
        <div class="drill-q-text">${q.question}</div>
        <div class="drill-options" id="drillOpts">${optsHTML}</div>
        <div id="drillResult"></div>
      </div>
    </div>`;
  drill.answered = false;
}

function drillAnswer(selectedLabel) {
  if (drill.answered) return;
  drill.answered = true;

  const {ci, qi} = drill.queue[drill.current];
  const q = QUESTIONS[ci].questions[qi];
  const k = stateKey(ci, qi);

  // Map display label back to original answer letter
  const selectedOrig = drill.currentOptMap[selectedLabel];
  const isCorrect = selectedOrig === q.answer;
  const correctLabel = drill.currentNewCorrect;

  // Update stored answer
  state.answers[k] = selectedOrig;
  saveState();

  if (isCorrect) {
    drill.sessionCorrect++;
    drill.queue.splice(drill.current, 1);
    if (drill.current >= drill.queue.length) drill.current = 0;
  } else {
    // Move to random later position
    const item = drill.queue.splice(drill.current, 1)[0];
    const insertAt = drill.current + Math.floor(Math.random() * Math.max(1, drill.queue.length - drill.current)) + 1;
    drill.queue.splice(Math.min(insertAt, drill.queue.length), 0, item);
    if (drill.current >= drill.queue.length) drill.current = 0;
  }

  // Update UI
  document.querySelectorAll('.drill-opt').forEach(btn => {
    btn.disabled = true;
    const label = btn.querySelector('.opt-letter').textContent;
    btn.classList.remove('correct','wrong');
    if (label === correctLabel) btn.classList.add('correct');
    else if (label === selectedLabel && !isCorrect) btn.classList.add('wrong');
  });

  const card = document.getElementById('drillCard');
  if (card) card.className = 'drill-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong');

  const resultDiv = document.getElementById('drillResult');
  if (resultDiv) {
    const correctText = q.options[q.answer];
    resultDiv.innerHTML = `
      <div class="drill-result-row">
        <span class="drill-result-badge ${isCorrect?'correct':'wrong'}">${isCorrect ? '✓ 答對了！' : `✗ 答錯　正確：${correctLabel}（${correctText}）`}</span>
        <button class="drill-next-btn ${isCorrect?'':'wrong-variant'}" onclick="drillNext()">
          ${drill.queue.length === 0 ? '查看結果 →' : isCorrect ? '下一題 →' : '繼續刷 →'}
        </button>
      </div>`;
  }
}

function drillNext() {
  renderDrillCard();
}

function restartDrill() {
  // Rebuild queue from remaining wrong answers
  const wrongKeys = Object.entries(state.answers)
    .filter(([k, v]) => {
      const [ci, qi] = k.split('-').map(Number);
      return QUESTIONS[ci] && QUESTIONS[ci].questions[qi] && v !== QUESTIONS[ci].questions[qi].answer;
    })
    .map(([k]) => { const [ci,qi] = k.split('-').map(Number); return {ci, qi}; });

  if (wrongKeys.length === 0) {
    closeDrill();
    return;
  }

  for (let i = wrongKeys.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongKeys[i], wrongKeys[j]] = [wrongKeys[j], wrongKeys[i]];
  }

  drill.queue = wrongKeys;
  drill.current = 0;
  drill.sessionCorrect = 0;
  drill.totalStart = wrongKeys.length;
  drill.answered = false;
  renderDrillCard();
}

function setMode(m) {
  state.mode = m;
  ['modeAll','modeStar','modeWrong'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(m === 'all' ? 'modeAll' : m === 'starred' ? 'modeStar' : 'modeWrong').classList.add('active');
  state.currentChapter = -1;
  render();
}

function renderQuestions() {
  const data = getDisplayData();
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';

  if (data.length === 0) {
    area.innerHTML = `<div class="empty-state">
      <div class="icon">${state.mode === 'starred' ? '⭐' : '✅'}</div>
      <p>${state.mode === 'starred' ? '尚無星號題目<br>在題目右上角點擊 ☆ 加入星號' : '沒有答錯的題目！'}</p>
    </div>`;
    return;
  }

  data.forEach(({ chapter, questions, origIdx }) => {
    // Chapter title
    const chTitle = document.createElement('div');
    chTitle.className = 'chapter-header';
    chTitle.innerHTML = `
      <div class="chapter-title">${chapter}</div>
      <div class="chapter-stats">${questions.length} 題</div>`;
    area.appendChild(chTitle);

    // Progress
    const qiOrig = questions.map(q => QUESTIONS[origIdx].questions.findIndex(oq => oq.num === q.num));
    const answered = qiOrig.filter(qi => qi !== -1 && state.answers[stateKey(origIdx, qi)]).length;
    const prog = document.createElement('div');
    prog.className = 'progress-row';
    prog.innerHTML = `
      <div class="progress-bar"><div class="progress-fill" style="width:${questions.length?answered/questions.length*100:0}%"></div></div>
      <div class="progress-text">${answered}/${questions.length}</div>`;
    area.appendChild(prog);

    // Questions
    questions.forEach((q, localIdx) => {
      const qi = QUESTIONS[origIdx].questions.findIndex(oq => oq.num === q.num);
      const k = stateKey(origIdx, qi);
      const selectedAns = state.answers[k];
      const isStarred = state.stars[k];
      const answered_q = !!selectedAns;
      const isCorrect = selectedAns === q.answer;

      const card = document.createElement('div');
      card.className = 'q-card' + (answered_q ? (isCorrect ? ' answered-correct' : ' answered-wrong') : '') + (isStarred ? ' starred' : '');
      card.id = `card-${k}`;

      // Shuffle options; once answered keep the same order by seeding off the key
      const {shuffled: shuffledOpts, newCorrect} = shuffleOptions(q);
      // Store mapping so answer() knows which original letter was picked
      const optMap = {};
      shuffledOpts.forEach(o => { optMap[o.label] = o.origLetter; });

      let optHTML = '';
      shuffledOpts.forEach(({label, text, isCorrect: isAns}) => {
        let cls = '';
        if (answered_q) {
          const origSelected = optMap[label];
          if (isAns) cls = 'correct';
          else if (origSelected === selectedAns && !isCorrect) cls = 'wrong';
        }
        optHTML += `<button class="opt-btn ${cls}" data-orig="${optMap[label]}" ${answered_q?'disabled':''} onclick="answer('${k}','${optMap[label]}','${q.answer}')">
          <span class="opt-letter">${label}</span>
          <span>${text}</span>
        </button>`;
      });

      let resultHTML = '';
      if (answered_q) {
        // Find new display label for correct answer
        const correctDisplayLabel = shuffledOpts.find(o => o.isCorrect)?.label || q.answer;
        resultHTML = `<div class="q-result">
          <span class="result-badge ${isCorrect?'correct':'wrong'}">${isCorrect?'✓ 正確':'✗ 錯誤'}</span>
          ${!isCorrect ? `<span class="result-text">正確答案：<strong style="color:var(--correct)">${correctDisplayLabel}（${q.options[q.answer]}）</strong></span>` : ''}
          ${q.explain ? `<div class="q-explain">💡 ${q.explain}</div>` : ''}
        </div>`;
      }

      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">Q${q.num}</span>
          <span class="q-text">${q.question}</span>
          <button class="star-btn ${isStarred?'starred':''}" onclick="toggleStar('${k}')">${isStarred?'⭐':'☆'}</button>
        </div>
        <div class="q-options">${optHTML}</div>
        ${resultHTML}`;
      area.appendChild(card);
    });
  });
}

function answer(k, selected, correct) {
  state.answers[k] = selected;
  saveState();
  const [ci, qi] = k.split('-').map(Number);
  const q = QUESTIONS[ci].questions[qi];
  const isCorrect = selected === correct;
  const isStarred = state.stars[k];

  const card = document.getElementById(`card-${k}`);
  if (!card) return;

  card.className = 'q-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong') + (isStarred ? ' starred' : '');

  // Use data-orig to compare with original answer letters (not shuffled display labels)
  card.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const origLetter = btn.dataset.orig;
    btn.classList.remove('correct','wrong');
    if (origLetter === correct) btn.classList.add('correct');
    else if (origLetter === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Add result - show correct answer text
  let existing = card.querySelector('.q-result');
  if (existing) existing.remove();
  const result = document.createElement('div');
  result.className = 'q-result';
  result.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <span class="result-badge ${isCorrect?'correct':'wrong'}">${isCorrect?'✓ 正確':'✗ 錯誤'}</span>
      ${!isCorrect ? `<span class="result-text">正確答案：<strong style="color:var(--correct)">${correct}（${q.options[correct]}）</strong></span>` : ''}
    </div>
    ${q.explain ? `<div class="q-explain">💡 ${q.explain}</div>` : ''}`;
  card.appendChild(result);

  renderSummary();
  renderSidebar();
}

function toggleStar(k) {
  state.stars[k] = !state.stars[k];
  saveState();
  const btn = document.querySelector(`#card-${k} .star-btn`);
  const card = document.getElementById(`card-${k}`);
  if (btn) {
    btn.textContent = state.stars[k] ? '⭐' : '☆';
    btn.classList.toggle('starred', state.stars[k]);
  }
  if (card) card.classList.toggle('starred', state.stars[k]);
  renderSidebar();
}

function render() {
  renderSidebar();
  renderSummary();
  renderToolbar();
  renderQuestions();
}

const FONT_SCALES = [1.0, 1.15, 1.3, 1.5, 1.75];
const STAGE_NAMES = ['一', '二', '三', '四', '五'];
function applyFontScale(stage) {
  stage = Math.max(1, Math.min(5, parseInt(stage, 10) || 1));
  document.documentElement.style.setProperty('--font-scale', FONT_SCALES[stage - 1]);
  const btn = document.getElementById('fontSizeBtn');
  if (btn) btn.textContent = `${STAGE_NAMES[stage - 1]}級字`;
  localStorage.setItem('cg-font-stage', stage);
}
function cycleFontSize() {
  let stage = parseInt(localStorage.getItem('cg-font-stage') || '1', 10);
  stage = stage >= 5 ? 1 : stage + 1;
  applyFontScale(stage);
}
applyFontScale(localStorage.getItem('cg-font-stage') || '1');

// Init — 先用 localStorage 立刻 render，再 async 從雲端拉資料蓋上去
async function bootApp() {
  await loadState();
  state.currentChapter = -1;
  render();
  try {
    await initFirebase();
    currentUserId = 'main';
    syncEnabled = true;
    let doc = await db.collection('quiz_progress').doc('main').get();
    if (!doc.exists) {
      const legacyUid = localStorage.getItem('cg-uid');
      if (legacyUid && legacyUid.startsWith('u_')) {
        const legacyDoc = await db.collection('quiz_progress').doc(legacyUid).get();
        if (legacyDoc.exists) {
          await db.collection('quiz_progress').doc('main').set(legacyDoc.data());
          doc = legacyDoc;
        }
      }
    }
    if (doc.exists) {
      const d = doc.data();
      state.answers     = d.answers     || {};
      state.stars       = d.stars       || {};
      huntData          = d.huntData    || {};
      wrongDrillData    = d.wrongDrillData || {};
      localStorage.setItem('cg-quiz-state', JSON.stringify({ answers: state.answers, stars: state.stars }));
      localStorage.setItem('cg-hunt', JSON.stringify(huntData));
      localStorage.setItem('cg-wrong-drill', JSON.stringify(wrongDrillData));
      render();
    }
    updateSyncStatus('synced');
  } catch(e) {
    console.error('Auto-sync failed:', e);
    updateSyncStatus('error');
  }
}
bootApp();
