  list.appendChild(allBtn);

  filtered.forEach((ch, i) => {
    const origIdx = QUESTIONS.findIndex(c => c.chapter === ch.chapter);
    const total = ch.questions.length;
    const answered = ch.questions.filter((_, qi) => {
      const qiOrig = QUESTIONS[origIdx].questions.indexOf(ch.questions[qi]);
      return state.answers[stateKey(origIdx, qiOrig !== -1 ? qiOrig : qi)];
    }).length;
    const stars = ch.questions.filter((_, qi) => {
      const qiOrig = QUESTIONS[origIdx].questions.indexOf(ch.questions[qi]);
      return state.stars[stateKey(origIdx, qiOrig !== -1 ? qiOrig : qi)];
    }).length;

    const div = document.createElement('div');
    div.className = 'chapter-item' + (state.currentChapter === origIdx ? ' active' : '');
    div.innerHTML = `
      <span style="font-size:12px">${ch.chapter}</span>
      <span style="display:flex;gap:4px;align-items:center">
        ${stars ? `<span style="color:var(--accent);font-size:10px">⭐${stars}</span>` : ''}
        <span class="ch-count">${total}</span>
      </span>`;
    div.onclick = () => { state.currentChapter = origIdx; render(); closeSidebarOnMobile(); };
    list.appendChild(div);
  });
}

function getDisplayData() {
  const filtered = getFilteredChapters();
  if (state.currentChapter === -1) {
    return filtered.map(ch => ({
      ...ch,
      origIdx: QUESTIONS.findIndex(c => c.chapter === ch.chapter)
    }));
  }
  const ch = QUESTIONS[state.currentChapter];
  if (!ch) return [];
  const filtered_ch = filtered.find(c => c.chapter === ch.chapter);
  if (!filtered_ch) return [];
  return [{ ...filtered_ch, origIdx: state.currentChapter }];
}

function renderSummary() {
  const totalQ = QUESTIONS.reduce((s,c)=>s+c.questions.length,0);
  const answeredCount = Object.keys(state.answers).length;
  const correctCount = Object.entries(state.answers).filter(([k,v]) => {
    const [ci,qi] = k.split('-').map(Number);
    return QUESTIONS[ci] && QUESTIONS[ci].questions[qi] && v === QUESTIONS[ci].questions[qi].answer;
  }).length;
  const starCount = Object.values(state.stars).filter(Boolean).length;
  const wrongCount = answeredCount - correctCount;

  document.getElementById('summaryArea').innerHTML = `
    <div class="summary-panel">
      <div class="stat-block">
        <div class="stat-num">${totalQ}</div>
        <div class="stat-label">總題數</div>
      </div>
      <div class="divider"></div>
      <div class="stat-block">
        <div class="stat-num" style="color:var(--accent2)">${answeredCount}</div>
        <div class="stat-label">已作答</div>
      </div>
      <div class="divider"></div>
      <div class="stat-block">
        <div class="stat-num" style="color:var(--correct)">${correctCount}</div>
        <div class="stat-label">答對</div>
      </div>
      <div class="divider"></div>
      <div class="stat-block">
        <div class="stat-num" style="color:var(--wrong)">${wrongCount}</div>
        <div class="stat-label">答錯</div>
      </div>
      <div class="divider"></div>
      <div class="stat-block">
        <div class="stat-num" style="color:var(--accent)">⭐ ${starCount}</div>
        <div class="stat-label">星號題</div>
      </div>
      <div class="divider"></div>
      <div class="stat-block">
        <div class="stat-num">${answeredCount > 0 ? Math.round(correctCount/answeredCount*100) : 0}%</div>
        <div class="stat-label">正確率</div>
      </div>
    </div>`;
}

function renderToolbar() {
  const wrongCount = Object.entries(state.answers).filter(([k,v]) => {
    const [ci,qi] = k.split('-').map(Number);
    return QUESTIONS[ci] && QUESTIONS[ci].questions[qi] && v !== QUESTIONS[ci].questions[qi].answer;
  }).length;

  const drillDisabled = wrongCount === 0;
  document.getElementById('toolbar').innerHTML = `
    <button class="tool-btn" style="${drillDisabled ? 'opacity:.4;cursor:not-allowed' : 'border-color:var(--wrong);color:var(--wrong);font-weight:700'}"
      onclick="${drillDisabled ? '' : 'startDrill()'}">
      🔁 錯題重刷${wrongCount > 0 ? ' <span style=\'background:rgba(240,96,90,.2);padding:1px 7px;border-radius:10px;font-family:monospace;font-size:12px\'>' + wrongCount + '</span>' : ''}
    </button>
    <button class="tool-btn" onclick="resetAnswers()">🗑 清除答題記錄</button>
    <button class="tool-btn danger" onclick="resetAll()">⚠️ 全部重置</button>
  `;
}

function resetAnswers() {
  if (!confirm('清除所有答題記錄？（星號會保留）')) return;
  state.answers = {};
  saveState(); render();
}
function resetAll() {
  if (!confirm('清除答題記錄、錯題本及獵殺進度？（星號收藏保留）')) return;
  state.answers = {};
  wrongDrillData = {}; huntData = {};
  saveState(); saveWrongDrill(); saveHunt(); render();
}
function resetChapter(origIdx) {
  const ch = QUESTIONS[origIdx];
  if (!ch) return;
  const qCount = ch.questions.length;
  let answered = 0;
  for (let qi = 0; qi < qCount; qi++) if (state.answers[stateKey(origIdx, qi)]) answered++;
  if (answered === 0) { alert(`「${ch.chapter}」沒有答題記錄可重設`); return; }
  if (!confirm(`重設「${ch.chapter}」之答題記錄？\n\n已答 ${answered}/${qCount} 題之作答將清除（星號收藏保留）；其他章節不受影響。`)) return;
  for (let qi = 0; qi < qCount; qi++) {
    const k = stateKey(origIdx, qi);
    delete state.answers[k];
    // 星號（state.stars）保留 — 跟全局 resetAnswers 行為一致
    // 錯題本/獵殺進度也保留（與 answers 同步邏輯由各模式自行管理）
  }
  saveState(); render();
}

// ── Drill mode ──────────────────────────────────────────────
let drill = {
  queue: [],       // array of {ci, qi} wrong questions
  current: 0,
  sessionCorrect: 0,
  totalStart: 0,
  answered: false
};

function startDrill() {
  // Build queue from all current wrong answers
  const wrongKeys = Object.entries(state.answers)
    .filter(([k, v]) => {
      const [ci, qi] = k.split('-').map(Number);
      return QUESTIONS[ci] && QUESTIONS[ci].questions[qi] && v !== QUESTIONS[ci].questions[qi].answer;
    })
    .map(([k]) => { const [ci,qi] = k.split('-').map(Number); return {ci, qi}; });

  if (wrongKeys.length === 0) return;

  // Shuffle
  for (let i = wrongKeys.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongKeys[i], wrongKeys[j]] = [wrongKeys[j], wrongKeys[i]];
  }

  drill.queue = wrongKeys;
  drill.current = 0;
  drill.sessionCorrect = 0;
  drill.totalStart = wrongKeys.length;
  drill.answered = false;

  document.getElementById('drillOverlay').style.display = 'flex';
  renderDrillCard();
}

function closeDrill() {
  document.getElementById('drillOverlay').style.display = 'none';
  render();
}

function renderDrillCard() {
  const body = document.getElementById('drillBody');

  if (drill.queue.length === 0) {
    // All cleared!
    body.innerHTML = `
      <div class="drill-done">
        <div class="drill-done-icon">🎉</div>
        <h2>全部刷完了！</h2>
        <p>本輪共答對 <strong style="color:var(--correct)">${drill.sessionCorrect}</strong> 題<br>原有 ${drill.totalStart} 道錯題，已全數清零</p>
        <div class="drill-done-btns">
          <button class="drill-next-btn" onclick="restartDrill()">再刷一輪</button>
          <button class="drill-next-btn wrong-variant" onclick="closeDrill()">返回</button>
        </div>
      </div>`;
    return;
  }

  const {ci, qi} = drill.queue[drill.current];
  const q = QUESTIONS[ci].questions[qi];
  const ch = QUESTIONS[ci].chapter;
  const remain = drill.queue.length;
  const pct = Math.round((1 - remain / drill.totalStart) * 100);

  const {shuffled: drillShuffled, newCorrect: drillNewCorrect} = shuffleOptions(q);
  // Store on drill object so drillAnswer can reference
  drill.currentOptMap = {};
  drillShuffled.forEach(o => { drill.currentOptMap[o.label] = o.origLetter; });
  drill.currentNewCorrect = drillNewCorrect;

  let optsHTML = '';
  drillShuffled.forEach(({label, text}) => {
    optsHTML += `<button class="drill-opt" id="dopt-${label}" onclick="drillAnswer('${label}')">
      <span class="opt-letter">${label}</span>
      <span>${text}</span>
    </button>`;
  });

  body.innerHTML = `
    <div class="drill-counter">
      <div>
        <div class="drill-remain">${remain}</div>
        <div class="drill-remain-label">剩餘錯題</div>
      </div>
      <div class="drill-sep"></div>
      <div>
        <div class="drill-correct-count">+${drill.sessionCorrect}</div>
        <div class="drill-correct-label">本輪答對</div>
      </div>
    </div>
    <div class="drill-progress-wrap">
      <div class="drill-progress-bar">
        <div class="drill-progress-fill" style="width:${pct}%"></div>
      </div>
    </div>
    <div class="drill-card-wrap">
      <div class="drill-card" id="drillCard">
        <div class="drill-source">${ch}</div>
        <div class="drill-q-text">${q.question}</div>
        <div class="drill-options" id="drillOpts">${optsHTML}</div>
        <div id="drillResult"></div>
      </div>
    </div>`;
  drill.answered = false;
}

function drillAnswer(selectedLabel) {
  if (drill.answered) return;
  drill.answered = true;

  const {ci, qi} = drill.queue[drill.current];
  const q = QUESTIONS[ci].questions[qi];
  const k = stateKey(ci, qi);

  // Map display label back to original answer letter
  const selectedOrig = drill.currentOptMap[selectedLabel];
  const isCorrect = selectedOrig === q.answer;
  const correctLabel = drill.currentNewCorrect;

  // Update stored answer
  state.answers[k] = selectedOrig;
  saveState();

  if (isCorrect) {
    drill.sessionCorrect++;
    drill.queue.splice(drill.current, 1);
    if (drill.current >= drill.queue.length) drill.current = 0;
  } else {
    // Move to random later position
    const item = drill.queue.splice(drill.current, 1)[0];
    const insertAt = drill.current + Math.floor(Math.random() * Math.max(1, drill.queue.length - drill.current)) + 1;
    drill.queue.splice(Math.min(insertAt, drill.queue.length), 0, item);
    if (drill.current >= drill.queue.length) drill.current = 0;
  }

  // Update UI
  document.querySelectorAll('.drill-opt').forEach(btn => {
    btn.disabled = true;
    const label = btn.querySelector('.opt-letter').textContent;
    btn.classList.remove('correct','wrong');
    if (label === correctLabel) btn.classList.add('correct');
    else if (label === selectedLabel && !isCorrect) btn.classList.add('wrong');
  });

  const card = document.getElementById('drillCard');
  if (card) card.className = 'drill-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong');

  const resultDiv = document.getElementById('drillResult');
  if (resultDiv) {
    const correctText = q.options[q.answer];
    resultDiv.innerHTML = `
      <div class="drill-result-row">
        <span class="drill-result-badge ${isCorrect?'correct':'wrong'}">${isCorrect ? '✓ 答對了！' : `✗ 答錯　正確：${correctLabel}（${correctText}）`}</span>
        <button class="drill-next-btn ${isCorrect?'':'wrong-variant'}" onclick="drillNext()">
          ${drill.queue.length === 0 ? '查看結果 →' : isCorrect ? '下一題 →' : '繼續刷 →'}
        </button>
      </div>`;
  }
}

function drillNext() {
  renderDrillCard();
}

function restartDrill() {
  // Rebuild queue from remaining wrong answers
  const wrongKeys = Object.entries(state.answers)
    .filter(([k, v]) => {
      const [ci, qi] = k.split('-').map(Number);
      return QUESTIONS[ci] && QUESTIONS[ci].questions[qi] && v !== QUESTIONS[ci].questions[qi].answer;
    })
    .map(([k]) => { const [ci,qi] = k.split('-').map(Number); return {ci, qi}; });

  if (wrongKeys.length === 0) {
    closeDrill();
    return;
  }

  for (let i = wrongKeys.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongKeys[i], wrongKeys[j]] = [wrongKeys[j], wrongKeys[i]];
  }

  drill.queue = wrongKeys;
  drill.current = 0;
  drill.sessionCorrect = 0;
  drill.totalStart = wrongKeys.length;
  drill.answered = false;
  renderDrillCard();
}

function setMode(m) {
  state.mode = m;
  ['modeAll','modeStar','modeWrong'].forEach(id => {
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById(m === 'all' ? 'modeAll' : m === 'starred' ? 'modeStar' : 'modeWrong').classList.add('active');
  state.currentChapter = -1;
  render();
}

function renderQuestions() {
  const data = getDisplayData();
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';

  if (data.length === 0) {
    area.innerHTML = `<div class="empty-state">
      <div class="icon">${state.mode === 'starred' ? '⭐' : '✅'}</div>
      <p>${state.mode === 'starred' ? '尚無星號題目<br>在題目右上角點擊 ☆ 加入星號' : '沒有答錯的題目！'}</p>
    </div>`;
    return;
  }

  data.forEach(({ chapter, questions, origIdx }) => {
    // Chapter title
    const chTitle = document.createElement('div');
    chTitle.className = 'chapter-header';
    chTitle.innerHTML = `
      <div class="chapter-title">${chapter}</div>
      <div class="chapter-stats">${questions.length} 題</div>
      <button onclick="resetChapter(${origIdx})" title="重設本章答題記錄" style="background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;margin-left:8px">🔄 重設本章</button>`;
    area.appendChild(chTitle);

    // Progress
    const qiOrig = questions.map(q => QUESTIONS[origIdx].questions.findIndex(oq => oq.num === q.num));
    const answered = qiOrig.filter(qi => qi !== -1 && state.answers[stateKey(origIdx, qi)]).length;
    const prog = document.createElement('div');
    prog.className = 'progress-row';
    prog.innerHTML = `
      <div class="progress-bar"><div class="progress-fill" style="width:${questions.length?answered/questions.length*100:0}%"></div></div>
      <div class="progress-text">${answered}/${questions.length}</div>`;
    area.appendChild(prog);

    // Questions
    questions.forEach((q, localIdx) => {
      const qi = QUESTIONS[origIdx].questions.findIndex(oq => oq.num === q.num);
      const k = stateKey(origIdx, qi);
      const selectedAns = state.answers[k];
      const isStarred = state.stars[k];
      const answered_q = !!selectedAns;
      const isCorrect = selectedAns === q.answer;

      const card = document.createElement('div');
      card.className = 'q-card' + (answered_q ? (isCorrect ? ' answered-correct' : ' answered-wrong') : '') + (isStarred ? ' starred' : '');
      card.id = `card-${k}`;

      // Shuffle options; once answered keep the same order by seeding off the key
      const {shuffled: shuffledOpts, newCorrect} = shuffleOptions(q);
      // Store mapping so answer() knows which original letter was picked
      const optMap = {};
      shuffledOpts.forEach(o => { optMap[o.label] = o.origLetter; });

      let optHTML = '';
      shuffledOpts.forEach(({label, text, isCorrect: isAns}) => {
        let cls = '';
        if (answered_q) {
          const origSelected = optMap[label];
          if (isAns) cls = 'correct';
          else if (origSelected === selectedAns && !isCorrect) cls = 'wrong';
        }
        optHTML += `<button class="opt-btn ${cls}" data-orig="${optMap[label]}" ${answered_q?'disabled':''} onclick="answer('${k}','${optMap[label]}','${q.answer}')">
          <span class="opt-letter">${label}</span>
          <span>${text}</span>
        </button>`;
      });

      let resultHTML = '';
      if (answered_q) {
        // Find new display label for correct answer
        const correctDisplayLabel = shuffledOpts.find(o => o.isCorrect)?.label || q.answer;
        resultHTML = `<div class="q-result">
          <span class="result-badge ${isCorrect?'correct':'wrong'}">${isCorrect?'✓ 正確':'✗ 錯誤'}</span>
          ${!isCorrect ? `<span class="result-text">正確答案：<strong style="color:var(--correct)">${correctDisplayLabel}（${q.options[q.answer]}）</strong></span>` : ''}
          ${q.explain ? `<div class="q-explain">💡 ${q.explain}</div>` : ''}
        </div>`;
      }

      card.innerHTML = `
        <div class="q-header">
          <span class="q-num">Q${q.num}</span>
          <span class="q-text">${q.question}</span>
          <button class="star-btn ${isStarred?'starred':''}" onclick="toggleStar('${k}')">${isStarred?'⭐':'☆'}</button>
        </div>
        <div class="q-options">${optHTML}</div>
        ${resultHTML}`;
      area.appendChild(card);
    });
  });
}

function answer(k, selected, correct) {
  state.answers[k] = selected;
  saveState();
  const [ci, qi] = k.split('-').map(Number);
  const q = QUESTIONS[ci].questions[qi];
  const isCorrect = selected === correct;
  const isStarred = state.stars[k];

  const card = document.getElementById(`card-${k}`);
  if (!card) return;

  card.className = 'q-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong') + (isStarred ? ' starred' : '');

  // Use data-orig to compare with original answer letters (not shuffled display labels)
  card.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const origLetter = btn.dataset.orig;
    btn.classList.remove('correct','wrong');
    if (origLetter === correct) btn.classList.add('correct');
    else if (origLetter === selected && !isCorrect) btn.classList.add('wrong');
  });

  // Add result - show correct answer text
  let existing = card.querySelector('.q-result');
  if (existing) existing.remove();
  const result = document.createElement('div');
  result.className = 'q-result';
  result.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px">
      <span class="result-badge ${isCorrect?'correct':'wrong'}">${isCorrect?'✓ 正確':'✗ 錯誤'}</span>
      ${!isCorrect ? `<span class="result-text">正確答案：<strong style="color:var(--correct)">${correct}（${q.options[correct]}）</strong></span>` : ''}
    </div>
    ${q.explain ? `<div class="q-explain">💡 ${q.explain}</div>` : ''}`;
  card.appendChild(result);

  renderSummary();
  renderSidebar();
}

function toggleStar(k) {
  state.stars[k] = !state.stars[k];
  saveState();
  const btn = document.querySelector(`#card-${k} .star-btn`);
  const card = document.getElementById(`card-${k}`);
  if (btn) {
    btn.textContent = state.stars[k] ? '⭐' : '☆';
    btn.classList.toggle('starred', state.stars[k]);
  }
  if (card) card.classList.toggle('starred', state.stars[k]);
  renderSidebar();
}

  renderSidebar();
  renderSummary();
  renderToolbar();
  renderQuestions();
}

const FONT_SCALES = [1.0, 1.15, 1.3, 1.5, 1.75];
const STAGE_NAMES = ['一', '二', '三', '四', '五'];
function applyFontScale(stage) {
  stage = Math.max(1, Math.min(5, parseInt(stage, 10) || 1));

}

// Init — 先用 localStorage 立刻 render，再 async 從雲端拉資料蓋上去
async function bootApp() {
  await loadState();
  state.currentChapter = -1;
  render();
  try {
    await initFirebase();
    currentUserId = 'main';
    syncEnabled = true;
    let doc = await db.collection('quiz_progress').doc('main').get();
    if (!doc.exists) {
      const legacyUid = localStorage.getItem('cg-uid');
      if (legacyUid && legacyUid.startsWith('u_')) {
        const legacyDoc = await db.collection('quiz_progress').doc(legacyUid).get();
        if (legacyDoc.exists) {
          await db.collection('quiz_progress').doc('main').set(legacyDoc.data());
          doc = legacyDoc;
        }
      }
    }
    if (doc.exists) {
      const d = doc.data();
      state.answers     = d.answers     || {};
      state.stars       = d.stars       || {};
      huntData          = d.huntData    || {};
      wrongDrillData    = d.wrongDrillData || {};
      localStorage.setItem('cg-quiz-state', JSON.stringify({ answers: state.answers, stars: state.stars }));
      localStorage.setItem('cg-hunt', JSON.stringify(huntData));
      localStorage.setItem('cg-wrong-drill', JSON.stringify(wrongDrillData));
      render();
    }
    updateSyncStatus('synced');
  } catch(e) {
    console.error('Auto-sync failed:', e);
    updateSyncStatus('error');
  }
}
bootApp();

let mixState = {
  selectedChapters: new Set(),   // chapter indices
  queue: [],    // [{ci, qi, shuffledOpts, newCorrect}]
  current: 0,
  answers: [],  // {ci, qi, selected(orig), correct(orig), isCorrect}
  done: false
};

function openMixSetup() {
  // Render chapter list
  const list = document.getElementById('mixChapterList');
  list.innerHTML = '';
  QUESTIONS.forEach((ch, ci) => {
    const checked = mixState.selectedChapters.has(ci);

      <input type="checkbox" ${checked ? 'checked' : ''} onchange="mixToggleChapter(${ci}, this.checked, this.closest('label'))">

function closeMixSetup() {

}

function mixToggleChapter(ci, checked, el) {

  else mixState.selectedChapters.delete(ci);

}

function mixSelectAll() {

    el.classList.add('selected');

function mixSelectNone() {

  document.querySelectorAll('#mixChapterList .mix-ch-item').forEach(el => {
    el.classList.remove('selected');
    el.querySelector('input').checked = false;
  });
  updateMixInfo();
}

function updateMixInfo() {
  const total = [...mixState.selectedChapters].reduce((s, ci) => s + QUESTIONS[ci].questions.length, 0);
  const info = document.getElementById('mixSelectionInfo');
  const btn = document.getElementById('mixStartBtn');
  if (mixState.selectedChapters.size === 0) {
    info.textContent = '請選擇至少一個章節';
    btn.disabled = true; btn.style.opacity = '.4';
  } else {
    const draw = Math.min(10, total);
    info.textContent = `共 ${total} 題可選，本次抽 ${draw} 題`;
    btn.disabled = false; btn.style.opacity = '1';
  }
}

function startMix() {
  closeMixSetup();

  // Collect all questions from selected chapters
  let pool = [];
  mixState.selectedChapters.forEach(ci => {
    QUESTIONS[ci].questions.forEach((q, qi) => pool.push({ci, qi}));
  });

  // Fisher-Yates shuffle pool
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  // Take up to 10
  pool = pool.slice(0, 10);

  // Pre-shuffle options for each question
  mixState.queue = pool.map(({ci, qi}) => {
    const q = QUESTIONS[ci].questions[qi];
    const {shuffled, newCorrect} = shuffleOptions(q);
    const optMap = {};
    shuffled.forEach(o => { optMap[o.label] = o.origLetter; });
    return {ci, qi, shuffled, newCorrect, optMap};
  });

  mixState.current = 0;
  mixState.answers = [];
  mixState.done = false;

  document.getElementById('mixOverlay').style.display = 'flex';
  renderMixCard();
}

function closeMix() {
  document.getElementById('mixOverlay').style.display = 'none';
  render(); // refresh wrong count etc
}

function renderMixCard() {
  const body = document.getElementById('mixBody');

  if (mixState.current >= mixState.queue.length) {
    renderMixResult();
    return;
  }

  const total = mixState.queue.length;
  const idx = mixState.current;
  const {ci, qi, shuffled, newCorrect, optMap} = mixState.queue[idx];
  const q = QUESTIONS[ci].questions[qi];
  const ch = QUESTIONS[ci].chapter;
  const pct = Math.round(idx / total * 100);

  let optsHTML = '';
  shuffled.forEach(({label, text}) => {
    optsHTML += `<button class="drill-opt" id="mopt-${label}" onclick="mixAnswer('${label}')">
      <span class="opt-letter">${label}</span>
      <span>${text}</span>
    </button>`;
  });

  body.innerHTML = `
    <div class="mix-progress-row">
      <div class="drill-progress-bar" style="flex:1">
        <div class="drill-progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent2),var(--accent))"></div>
      </div>
      <div class="mix-q-label">${idx + 1} / ${total}</div>
    </div>
    <div class="drill-card-wrap" style="width:100%">
      <div class="drill-card" id="mixCard">
        <div class="drill-source">${ch}</div>
        <div class="drill-q-text">${q.question}</div>
        <div class="drill-options" id="mixOpts">${optsHTML}</div>
        <div id="mixResult"></div>
      </div>
    </div>`;
  mixState._answered = false;
}

function mixAnswer(selectedLabel) {
  if (mixState._answered) return;
  mixState._answered = true;
  const {ci, qi, newCorrect, optMap} = mixState.queue[mixState.current];
  const q = QUESTIONS[ci].questions[qi];
  const selectedOrig = optMap[selectedLabel];
  const isCorrect = selectedOrig === q.answer;
  const k = stateKey(ci, qi);

  // Only record wrong answers into global state (correct in mix doesn't clear wrong history)
  if (!isCorrect) {
    state.answers[k] = selectedOrig;
    saveState();
  }

  // Record in mix session
  mixState.answers.push({ci, qi, selectedOrig, isCorrect});

  // Highlight options
  document.querySelectorAll('.drill-opt').forEach(btn => {
    btn.disabled = true;
    const label = btn.querySelector('.opt-letter').textContent;

  const card = document.getElementById('mixCard');
  if (card) card.className = 'drill-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong');

  const resultDiv = document.getElementById('mixResult');
  const isLast = mixState.current >= mixState.queue.length - 1;

    resultDiv.innerHTML = `

  }
}

// ═══════════════════════════════════════════════════════════════════
// HUNT MODE  🎯 終極獵殺測驗
// Data model per question:
//   huntData[key] = { wins: 0-3, losses: 0, pendingRound: null }
//   wins: consecutive correct answers (need 3 to "kill")
//   pendingRound: which round# to re-show after a wrong answer
// ═══════════════════════════════════════════════════════════════════

const HUNT_WINS_NEEDED = 3;     // correct answers to eliminate
const HUNT_BATCH      = 50;     // questions per session
const HUNT_REINSERT   = 5;      // re-show wrong q after N questions

let huntData   = {};   // persistent, keyed by stateKey
let huntQueue  = [];   // current session queue: [{ci, qi, shuffled, newCorrect, optMap}]
let huntPos    = 0;    // current position in queue
let huntAnswered = false;
let huntRound  = 0;    // global counter of questions shown

// ── Storage ──────────────────────────────────────────────────────────
function saveHunt() {
  try { localStorage.setItem('cg-hunt', JSON.stringify(huntData)); } catch(e) {}
  cloudSave();
}
function loadHunt() {
  try { huntData = JSON.parse(localStorage.getItem('cg-hunt') || '{}'); } catch(e) { huntData = {}; }
}

function huntKey(ci, qi) { return `${ci}-${qi}`; }

// ── Derived stats ─────────────────────────────────────────────────────
function huntStats() {
  const total = QUESTIONS.reduce((s,c) => s + c.questions.length, 0);
  const killed = Object.values(huntData).filter(d => d.wins >= HUNT_WINS_NEEDED).length;
  const inProgress = Object.entries(huntData).filter(([k,d]) => d.wins > 0 && d.wins < HUNT_WINS_NEEDED).length;
  return { total, killed, inProgress, remaining: total - killed };
}

// ── Build session queue ───────────────────────────────────────────────
function buildHuntQueue() {
  // Collect all "alive" questions (wins < 3)
  let pool = [];
  QUESTIONS.forEach((ch, ci) => {
    ch.questions.forEach((q, qi) => {
      const k = huntKey(ci, qi);
      const d = huntData[k] || { wins: 0 };
      if (d.wins < HUNT_WINS_NEEDED) pool.push({ ci, qi });
    });
  });

  if (pool.length === 0) return [];   // all killed!

  // Prioritise questions with pendingRound <= huntRound (due for retry)
  const due = pool.filter(({ci,qi}) => {
    const d = huntData[huntKey(ci,qi)];
    return d && d.pendingRound != null && d.pendingRound <= huntRound;
  });
  const fresh = pool.filter(({ci,qi}) => {
    const d = huntData[huntKey(ci,qi)];
    return !d || d.pendingRound == null;
  });
  const later = pool.filter(({ci,qi}) => {
    const d = huntData[huntKey(ci,qi)];
    return d && d.pendingRound != null && d.pendingRound > huntRound;
  });

  // Shuffle each bucket
  [due, fresh, later].forEach(arr => {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  });

  // Build up to HUNT_BATCH: prioritize due, then fresh, then later
  let selected = [...due, ...fresh, ...later].slice(0, HUNT_BATCH);

  // Pre-shuffle options
  return selected.map(({ci, qi}) => {
    const q = QUESTIONS[ci].questions[qi];
    const {shuffled, newCorrect} = shuffleOptions(q);
    const optMap = {};
    shuffled.forEach(o => { optMap[o.label] = o.origLetter; });
    return {ci, qi, shuffled, newCorrect, optMap};
  });
}

// ── Open Hunt ─────────────────────────────────────────────────────────
function openHunt() {
  loadHunt();
  const stats = huntStats();

  if (stats.remaining === 0) {
    // Champion!
    renderHuntChampion();
    document.getElementById('huntOverlay').style.display = 'flex';
    return;
  }

  huntQueue = buildHuntQueue();
  huntPos   = 0;
  huntAnswered = false;

  document.getElementById('huntOverlay').style.display = 'flex';
  renderHuntCard();
  updateHuntHeader();
}

function closeHunt() {
  saveHunt();
  document.getElementById('huntOverlay').style.display = 'none';
  render();
}

// ── Header stats ──────────────────────────────────────────────────────
function updateHuntHeader() {
  const {total, killed, remaining} = huntStats();
  const pct = Math.round(killed / total * 100);
  document.getElementById('huntHeaderStats').innerHTML = `
    <span class="hunt-stat-pill" style="color:var(--correct)">🗡 已獵殺 ${killed}</span>
    <span class="hunt-stat-pill" style="color:var(--wrong)">⚡ 剩餘 ${remaining}</span>
    <span class="hunt-stat-pill" style="color:var(--accent)">${pct}% 制霸</span>`;
}

// ── Render card ───────────────────────────────────────────────────────
function renderHuntCard() {
  const body = document.getElementById('huntBody');

  if (huntPos >= huntQueue.length) {
    renderHuntSessionEnd();
    return;
  }

  const {ci, qi, shuffled, newCorrect, optMap} = huntQueue[huntPos];
  const q  = QUESTIONS[ci].questions[qi];
  const ch = QUESTIONS[ci].chapter;
  const k  = huntKey(ci, qi);
  const d  = huntData[k] || { wins: 0 };
  const progress = huntPos + 1;
  const total    = huntQueue.length;

  // Win progress dots
  let dots = '';
  for (let i = 0; i < HUNT_WINS_NEEDED; i++) {
    dots += `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;margin:0 2px;
      background:${i < d.wins ? 'var(--correct)' : 'var(--border)'}"></span>`;
  }

  let optsHTML = '';
  shuffled.forEach(({label, text}) => {
    optsHTML += `<button class="drill-opt" id="hopt-${label}" onclick="huntAnswer('${label}')">
      <span class="opt-letter">${label}</span><span>${text}</span>
    </button>`;
  });

  const stats = huntStats();
  const barPct = Math.round(stats.killed / stats.total * 100);

  body.innerHTML = `
    <div style="width:100%;display:flex;flex-direction:column;gap:6px">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="drill-progress-bar" style="flex:1">
          <div class="drill-progress-fill" style="width:${barPct}%;background:linear-gradient(90deg,var(--wrong),var(--accent))"></div>
        </div>
        <div class="mix-q-label">${progress}/${total}</div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted)">
        <span>制霸進度：</span>${dots}
        <span style="color:${d.wins>0?'var(--correct)':'var(--text-muted)'}">已答對 ${d.wins}/${HUNT_WINS_NEEDED} 次</span>
      </div>
    </div>
    <div class="drill-card-wrap" style="width:100%">
      <div class="drill-card" id="huntCard">
        <div class="drill-source">${ch}</div>
        <div class="drill-q-text">${q.question}</div>
        <div class="drill-options" id="huntOpts">${optsHTML}</div>
        <div id="huntResult"></div>
      </div>
    </div>`;

  huntAnswered = false;
}

// ── Answer ────────────────────────────────────────────────────────────
function huntAnswer(selectedLabel) {
  if (huntAnswered) return;
  huntAnswered = true;
  huntRound++;

  const {ci, qi, newCorrect, optMap} = huntQueue[huntPos];
  const q = QUESTIONS[ci].questions[qi];
  const k = huntKey(ci, qi);
  const selectedOrig = optMap[selectedLabel];
  const isCorrect    = selectedOrig === q.answer;

  // Update huntData
  if (!huntData[k]) huntData[k] = { wins: 0, losses: 0 };
  const d = huntData[k];

  if (isCorrect) {
    d.wins++;
    d.pendingRound = null;   // clear retry flag
    if (d.wins >= HUNT_WINS_NEEDED) {
      // Fully killed — remove from future queue
      d.pendingRound = null;
    }
  } else {
    d.losses = (d.losses || 0) + 1;
    d.wins = 0;              // reset streak — must get 3 consecutive
    d.pendingRound = huntRound + HUNT_REINSERT;
    // Also record into global wrong answers
    state.answers[stateKey(ci, qi)] = selectedOrig;
    saveState();
  }
  saveHunt();

  // Highlight options
  document.querySelectorAll('.drill-opt').forEach(btn => {
    btn.disabled = true;
    const lbl = btn.querySelector('.opt-letter').textContent;
    btn.classList.remove('correct','wrong');
    if (lbl === newCorrect) btn.classList.add('correct');
    else if (lbl === selectedLabel && !isCorrect) btn.classList.add('wrong');
  });

  const card = document.getElementById('huntCard');
  if (card) card.className = 'drill-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong');

  updateHuntHeader();

  const killed = isCorrect && d.wins >= HUNT_WINS_NEEDED;
  const stats  = huntStats();
  const isLast = huntPos >= huntQueue.length - 1;

  let killBadge = '';
  if (killed) killBadge = `<span style="background:rgba(232,200,74,.2);color:var(--accent);font-size:11px;padding:2px 8px;border-radius:10px;font-family:monospace">🗡 獵殺成功！</span>`;
  else if (isCorrect) killBadge = `<span style="font-size:11px;color:var(--text-muted);font-family:monospace">連勝 ${d.wins}/${HUNT_WINS_NEEDED}</span>`;

  const resultDiv = document.getElementById('huntResult');
  if (resultDiv) {
    resultDiv.innerHTML = `
      <div class="drill-result-row">
        <div style="display:flex;flex-direction:column;gap:4px">
          <span class="drill-result-badge ${isCorrect?'correct':'wrong'}">${isCorrect ? '✓ 正確' : `✗ 答錯　正確：${newCorrect}（${q.options[q.answer]}）`}</span>
          ${killBadge}
          ${!isCorrect ? `<span style="font-size:11px;color:var(--wrong);font-family:monospace">⚡ 此題將在第 ${HUNT_REINSERT} 題後重新出現</span>` : ''}
          ${q.explain ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.5">💡 ${q.explain}</div>` : ''}
        </div>
        <button class="drill-next-btn ${isCorrect?'':'wrong-variant'}" onclick="huntNext()">
          ${stats.remaining === 0 ? '🏆 查看結果' : isLast ? '本輪結束 →' : '下一題 →'}
        </button>
      </div>`;
  }
}

function huntNext() {
  const stats = huntStats();
  if (stats.remaining === 0) {
    renderHuntChampion();
    return;
  }
  huntPos++;
  renderHuntCard();
}

// ── Session end (50題跑完但還有存活題目) ────────────────────────────
function renderHuntSessionEnd() {
  const body  = document.getElementById('huntBody');
  const stats = huntStats();
  const sessionCorrect = huntQueue.filter(({ci,qi}) => {
    const d = huntData[huntKey(ci,qi)];
    return d && d.wins > 0;
  }).length;

  // Count newly killed this session
  const killed = huntQueue.filter(({ci,qi}) => {
    const d = huntData[huntKey(ci,qi)];
    return d && d.wins >= HUNT_WINS_NEEDED;
  }).length;

  body.innerHTML = `
    <div style="width:100%;max-width:520px;text-align:center">

      <div style="font-size:13px;color:var(--text-muted);margin-bottom:20px">進度已儲存，下次繼續從未獵殺的題目出發</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap">
        <div class="hunt-stat-pill" style="color:var(--correct)">🗡 本輪獵殺 ${killed} 題</div>
        <div class="hunt-stat-pill" style="color:var(--wrong)">剩餘 ${stats.remaining} 題</div>
        <div class="hunt-stat-pill" style="color:var(--accent)">${Math.round(stats.killed/stats.total*100)}% 制霸</div>
      </div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:20px">
        <div style="height:8px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px">
          <div style="height:100%;background:linear-gradient(90deg,var(--wrong),var(--accent));border-radius:4px;width:${Math.round(stats.killed/stats.total*100)}%"></div>
        </div>
        <div style="font-size:12px;color:var(--text-muted);font-family:monospace">已獵殺 ${stats.killed} / ${stats.total} 題</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="drill-next-btn" onclick="continueHunt()">繼續獵殺</button>
        <button class="drill-next-btn wrong-variant" onclick="closeHunt()">暫停離開</button>
      </div>
    </div>`;
}

function continueHunt() {
  huntQueue  = buildHuntQueue();
  huntPos    = 0;
  huntAnswered = false;

  updateHuntHeader();
}

// ── Champion screen ───────────────────────────────────────────────────

// ═══════════════════════════════════════════════════════════════════
// ENHANCED WRONG DRILL (錯題本) — 答對3次才清除，可手動清除
// ═══════════════════════════════════════════════════════════════════

// wrongDrillData[key] = { wins: 0 }  (need WRONG_WINS_NEEDED to clear)
const WRONG_WINS_NEEDED = 3;
let wrongDrillData = {};

function saveWrongDrill() {
  try { localStorage.setItem('cg-wrong-drill', JSON.stringify(wrongDrillData)); } catch(e) {}
  cloudSave();
}
function loadWrongDrill() {
  try { wrongDrillData = JSON.parse(localStorage.getItem('cg-wrong-drill') || '{}'); } catch(e) { wrongDrillData = {}; }
}

// ── Override startDrill to use enhanced mode ──────────────────────────
function startDrill() {
  loadWrongDrill();

  // Sync wrong answers from state into wrongDrillData
  Object.entries(state.answers).forEach(([k, v]) => {
    const [ci, qi] = k.split('-').map(Number);
    if (!QUESTIONS[ci] || !QUESTIONS[ci].questions[qi]) return;
    const isWrong = v !== QUESTIONS[ci].questions[qi].answer;
    if (isWrong) {
      if (!wrongDrillData[k]) wrongDrillData[k] = { wins: 0 };
    }
    // If answered correctly in main view AND not yet in wrongDrillData, don't add
    // (If it IS in wrongDrillData, keep it there — must earn 3 wins to truly clear)
  });

  const wrongKeys = Object.entries(wrongDrillData)
    .filter(([k, d]) => d.wins < WRONG_WINS_NEEDED)
    .map(([k]) => { const [ci,qi] = k.split('-').map(Number); return {ci, qi}; })
    .filter(({ci,qi}) => QUESTIONS[ci] && QUESTIONS[ci].questions[qi]);

  if (wrongKeys.length === 0) {
    alert('錯題本是空的！');
    return;
  }

  // Shuffle
  for (let i = wrongKeys.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [wrongKeys[i], wrongKeys[j]] = [wrongKeys[j], wrongKeys[i]];
  }

  drill.queue = wrongKeys;
  drill.current = 0;
  drill.sessionCorrect = 0;
  drill.totalStart = wrongKeys.length;
  drill.answered = false;

  document.getElementById('drillOverlay').style.display = 'flex';
  // Update drill title
  const titleEl = document.querySelector('#drillOverlay .drill-title');
  if (titleEl) titleEl.innerHTML = '🔁 錯題重刷 <span style="font-size:11px;font-weight:400;color:var(--text-muted)">（答對3次清除）</span>';
  renderDrillCard();
}

// ── Override drillAnswer to track wins ────────────────────────────────
function drillAnswer(selectedLabel) {
  if (drill.answered) return;
  drill.answered = true;

  const {ci, qi} = drill.queue[drill.current];
  const q = QUESTIONS[ci].questions[qi];
  const k = stateKey(ci, qi);

  const selectedOrig  = drill.currentOptMap[selectedLabel];
  const isCorrect     = selectedOrig === q.answer;
  const correctLabel  = drill.currentNewCorrect;

  // Update global answer state
  state.answers[k] = selectedOrig;
  saveState();

  // Update wrongDrillData
  if (!wrongDrillData[k]) wrongDrillData[k] = { wins: 0 };
  if (isCorrect) {
    wrongDrillData[k].wins++;
  } else {
    wrongDrillData[k].wins = 0;  // reset streak
  }
  saveWrongDrill();

  const cleared = wrongDrillData[k].wins >= WRONG_WINS_NEEDED;

  if (isCorrect) {
    drill.sessionCorrect++;
    if (cleared) {
      // Remove from queue — cleared!
      drill.queue.splice(drill.current, 1);
      if (drill.current >= drill.queue.length) drill.current = 0;
    } else {
      // Still needs more wins — keep in queue, move to end
      const item = drill.queue.splice(drill.current, 1)[0];
      drill.queue.push(item);
      if (drill.current >= drill.queue.length) drill.current = 0;
    }
  } else {
    // Wrong: move to random later position
    const item = drill.queue.splice(drill.current, 1)[0];
    const insertAt = drill.current + Math.floor(Math.random() * Math.max(1, drill.queue.length - drill.current)) + 1;
    drill.queue.splice(Math.min(insertAt, drill.queue.length), 0, item);
    if (drill.current >= drill.queue.length) drill.current = 0;
  }

  // UI highlight
  document.querySelectorAll('.drill-opt').forEach(btn => {
    btn.disabled = true;
    const label = btn.querySelector('.opt-letter').textContent;
    btn.classList.remove('correct','wrong');
    if (label === correctLabel) btn.classList.add('correct');
    else if (label === selectedLabel && !isCorrect) btn.classList.add('wrong');
  });

  const card = document.getElementById('drillCard');
  if (card) card.className = 'drill-card ' + (isCorrect ? 'answered-correct' : 'answered-wrong');

  const winsNow = wrongDrillData[k]?.wins || 0;
  let statusMsg = '';
  if (cleared) statusMsg = `<span style="color:var(--accent);font-size:11px;font-family:monospace">🗑 已從錯題本清除！</span>`;
  else if (isCorrect) statusMsg = `<span style="font-size:11px;color:var(--text-muted);font-family:monospace">連勝 ${winsNow}/${WRONG_WINS_NEEDED}，還差 ${WRONG_WINS_NEEDED - winsNow} 次</span>`;
  else statusMsg = `<span style="font-size:11px;color:var(--wrong);font-family:monospace">連勝歸零，重新計數</span>`;

  const correctText = q.options[q.answer];
  const resultDiv = document.getElementById('drillResult');
  if (resultDiv) {
    resultDiv.innerHTML = `
      <div class="drill-result-row">
        <div style="display:flex;flex-direction:column;gap:4px">
          <span class="drill-result-badge ${isCorrect?'correct':'wrong'}">${isCorrect ? '✓ 正確' : `✗ 答錯　正確：${correctLabel}（${correctText}）`}</span>
          ${statusMsg}
          ${q.explain ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.5">💡 ${q.explain}</div>` : ''}
        </div>
        <button class="drill-next-btn ${isCorrect?'':'wrong-variant'}" onclick="drillNext()">
          ${drill.queue.length === 0 ? '查看結果 →' : isCorrect ? '下一題 →' : '繼續刷 →'}
        </button>
      </div>`;
  }
}

// ── Override renderDrillCard to show win progress ─────────────────────
function renderDrillCard() {
  const body = document.getElementById('drillBody');
  loadWrongDrill();

  const remaining = drill.queue.length;

  if (remaining === 0) {
    body.innerHTML = `
      <div class="drill-done">
        <div class="drill-done-icon">🎉</div>
        <h2>全部清除！</h2>
        <p>本輪共答對 <strong style="color:var(--correct)">${drill.sessionCorrect}</strong> 題<br>錯題本已清空</p>
        <div class="drill-done-btns">
          <button class="drill-next-btn wrong-variant" onclick="closeDrill()">返回</button>
        </div>
      </div>`;
    return;
  }

  if (drill.current >= drill.queue.length) drill.current = 0;
  const {ci, qi} = drill.queue[drill.current];
  const q = QUESTIONS[ci].questions[qi];
  const ch = QUESTIONS[ci].chapter;
  const k  = stateKey(ci, qi);
  const d  = wrongDrillData[k] || { wins: 0 };

  const {shuffled, newCorrect} = shuffleOptions(q);
  drill.currentOptMap = {};
  shuffled.forEach(o => { drill.currentOptMap[o.label] = o.origLetter; });
  drill.currentNewCorrect = newCorrect;

  let dots = '';
  for (let i = 0; i < WRONG_WINS_NEEDED; i++) {
    dots += `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 2px;
      background:${i < d.wins ? 'var(--correct)' : 'var(--border)'}"></span>`;
  }

  let optsHTML = '';
  shuffled.forEach(({label, text}) => {
    optsHTML += `<button class="drill-opt" onclick="drillAnswer('${label}')">
      <span class="opt-letter">${label}</span><span>${text}</span>
    </button>`;
  });

  body.innerHTML = `
    <div class="drill-counter">
      <div>
        <div class="drill-remain">${remaining}</div>
        <div class="drill-remain-label">剩餘錯題</div>
      </div>
      <div class="drill-sep"></div>
      <div>
        <div class="drill-correct-count">+${drill.sessionCorrect}</div>
        <div class="drill-correct-label">本輪答對</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)">
      清除進度：${dots} <span style="color:${d.wins>0?'var(--correct)':'var(--text-muted)'}">${d.wins}/${WRONG_WINS_NEEDED} 連勝</span>
    </div>
    <div class="drill-card-wrap">
      <div class="drill-card" id="drillCard">
        <div class="drill-source">${ch}</div>
        <div class="drill-q-text">${q.question}</div>
        <div class="drill-options" id="drillOpts">${optsHTML}</div>
        <div id="drillResult"></div>
      </div>
    </div>`;
  drill.answered = false;
}

// ── Manual clear of wrong drill ───────────────────────────────────────
function manualClearWrongDrill() {
  if (!confirm('手動清空所有錯題記錄（包含連勝紀錄）？')) return;
  wrongDrillData = {};
  state.answers = {};
  saveWrongDrill();
  saveState();
  render();
}

// Patch renderToolbar to add manual clear and show wins info
const _origRenderToolbar = renderToolbar;
renderToolbar = function() {
  loadWrongDrill();
  const wrongCount = Object.entries(wrongDrillData)
    .filter(([k,d]) => d.wins < WRONG_WINS_NEEDED)
    .filter(([k]) => { const [ci,qi] = k.split('-').map(Number); return QUESTIONS[ci]&&QUESTIONS[ci].questions[qi]; })
    .length;

  const drillDisabled = wrongCount === 0;
  document.getElementById('toolbar').innerHTML = `
    <button class="tool-btn" style="${drillDisabled ? 'opacity:.4;cursor:not-allowed' : 'border-color:var(--wrong);color:var(--wrong);font-weight:700'}"
      onclick="${drillDisabled ? '' : 'startDrill()'}">
      🔁 錯題重刷${wrongCount > 0 ? ` <span style='background:rgba(240,96,90,.2);padding:1px 7px;border-radius:10px;font-family:monospace;font-size:12px'>${wrongCount}</span>` : ''}
    </button>
    <button class="tool-btn" onclick="resetAnswers()">🗑 清除答題記錄</button>
    <button class="tool-btn danger" onclick="manualClearWrongDrill()" style="color:var(--wrong)">✕ 清空錯題本</button>
    <button class="tool-btn danger" onclick="resetAll()">⚠️ 全部重置</button>
  `;
};

// Load hunt + wrongDrill on init
const _origLoadState = loadState;
loadState = async function() {
  await _origLoadState();
  loadHunt();
  loadWrongDrill();
};

// FIREBASE SYNC  ☁️ 跨裝置同步
// ═══════════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBY6buMKXTVhExH8bnicq9qmVRWbHYSMwk",
  authDomain: "companyexam-89ac8.firebaseapp.com",
  projectId: "companyexam-89ac8",
  storageBucket: "companyexam-89ac8.firebasestorage.app",
  messagingSenderId: "829358157405",
  appId: "1:829358157405:web:f870924489c862bbf5e7b4"
};

// Load Firebase SDK dynamically
let db = null;
let currentUserId = null;
let syncEnabled = false;
let syncPending = false;
let syncTimer = null;

function initFirebase() {
  return new Promise((resolve) => {
    if (db) { resolve(); return; }
    const script1 = document.createElement('script');
    script1.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js';
    script1.onload = () => {
      const script2 = document.createElement('script');
      script2.src = 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js';
      script2.onload = () => {
        firebase.initializeApp(FIREBASE_CONFIG);
        db = firebase.firestore();
        resolve();
      };
      document.head.appendChild(script2);
    };
    document.head.appendChild(script1);
  });
}

// ── User ID management ────────────────────────────────────────────
function getUserId() {
  let uid = localStorage.getItem('cg-uid');
  if (!uid) {
    uid = 'u_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('cg-uid', uid);
  }
  return uid;
}

// ── Cloud save (debounced 2s) ─────────────────────────────────────
function cloudSave() {
  if (!db) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      const payload = {
        answers: state.answers,
        stars: state.stars,
        huntData: huntData,
        wrongDrillData: wrongDrillData,
        updatedAt: Date.now()
      };
      await db.collection('quiz_progress').doc(currentUserId).set(payload);
      updateSyncStatus('synced');
    } catch(e) {
      updateSyncStatus('error');
      console.error('Cloud save error:', e);
    }
  }, 2000);
}

// ── Cloud load ────────────────────────────────────────────────────
async function cloudLoad() {
  if (!db) return false;
  try {
    const doc = await db.collection('quiz_progress').doc(currentUserId).get();
    if (doc.exists) {
      const d = doc.data();
      state.answers     = d.answers     || {};
      state.stars       = d.stars       || {};
      huntData          = d.huntData    || {};
      wrongDrillData    = d.wrongDrillData || {};
      // Also persist locally
      localStorage.setItem('cg-quiz-state', JSON.stringify({ answers: state.answers, stars: state.stars }));
      localStorage.setItem('cg-hunt', JSON.stringify(huntData));
      localStorage.setItem('cg-wrong-drill', JSON.stringify(wrongDrillData));
      return true;
    }
    return false;
  } catch(e) {
    console.error('Cloud load error:', e);
    return false;
  }
}

// ── Status indicator ──────────────────────────────────────────────
function updateSyncStatus(status) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  const map = {
    off:     { icon: '☁️', text: '未連線', color: 'var(--text-muted)' },
    loading: { icon: '⟳',  text: '同步中…', color: 'var(--accent2)' },
    synced:  { icon: '✓',  text: '已同步', color: 'var(--correct)' },
    error:   { icon: '✗',  text: '同步失敗', color: 'var(--wrong)' }
  };
  const s = map[status] || map.off;
  el.innerHTML = `<span style="color:${s.color};font-family:monospace;font-size:12px">${s.icon} ${s.text}</span>`;
}

// ── Enable / disable sync (toggle) ───────────────────────────────
async function toggleSync() {
  const btn = document.getElementById('syncToggleBtn');
  if (syncEnabled) {
    syncEnabled = false;
    updateSyncStatus('off');
    if (btn) { btn.textContent = '☁️ 開啟同步'; btn.style.borderColor = ''; btn.style.color = ''; }
    return;
  }

  updateSyncStatus('loading');
  if (btn) btn.textContent = '連線中…';

  await initFirebase();
  currentUserId = getUserId();
  syncEnabled = true;

  // Show user ID for cross-device import
  const loaded = await cloudLoad();
  if (loaded) {
    render();
    alert('✓ 雲端進度載入成功！');
  } else {
    // First time — push local to cloud
    cloudSave();
  }

  updateSyncStatus('synced');
  if (btn) {
    btn.textContent = '☁️ 同步中';
    btn.style.borderColor = 'var(--correct)';
    btn.style.color = 'var(--correct)';
  }

  // Show device ID
  showDeviceId();
}

function showDeviceId() {
  const el = document.getElementById('deviceIdRow');
  if (el) {
    el.style.display = 'flex';
    el.querySelector('#deviceIdText').textContent = currentUserId;
  }
}

async function importDeviceId() {
  const input = document.getElementById('importIdInput');
  const id = input ? input.value.trim() : '';
  if (!id || !id.startsWith('u_')) {
    alert('請輸入有效的裝置 ID（以 u_ 開頭）');
    return;
  }
  if (!db) { await initFirebase(); }
  currentUserId = id;
  localStorage.setItem('cg-uid', id);
  updateSyncStatus('loading');
  const loaded = await cloudLoad();
  if (loaded) {
    syncEnabled = true;
    render();
    updateSyncStatus('synced');
    const btn = document.getElementById('syncToggleBtn');
    if (btn) { btn.textContent = '☁️ 同步中'; btn.style.borderColor = 'var(--correct)'; btn.style.color = 'var(--correct)'; }
    showDeviceId();
    alert('✓ 成功匯入另一台裝置的進度！');
  } else {
    alert('找不到這個 ID 的資料，請確認 ID 是否正確');
    currentUserId = getUserId();
    localStorage.setItem('cg-uid', currentUserId);
    updateSyncStatus('off');
  }
}
