<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公司治理刷題</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: #2e2e3a;
    --accent: #e8c84a;
    --accent2: #4ae8c0;
    --correct: #3ecf8e;
    --wrong: #f0605a;
    --text: #e8e8f0;
    --text-dim: #888899;
    --text-muted: #555568;
    --radius: 12px;
    --font-scale: 1;
  }

  /* 淺色配色：抄 GitHub Primer Light（對比度高、學術感） */
  :root.theme-light {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --surface2: #eaeef2;
    --border: #d0d7de;
    --accent: #d97706;     /* amber-600，對應原黃；淺底 + 黑字 contrast 6.5 達 WCAG AA */
    --accent2: #0d7e6c;    /* 深青綠，對應原淺青 */
    --correct: #1a7f37;    /* GitHub success */
    --wrong: #cf222e;      /* GitHub danger */
    --text: #1f2328;       /* 主字色，#000 太硬 */
    --text-dim: #59636e;
    --text-muted: #818b98;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 600;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: .04em;
    color: var(--accent);
  }
  .header-right {
    display: flex; gap: 12px; align-items: center;
  }
  .header-settings {
    display: flex;
    gap: 10px;
    align-items: center;
    padding-left: 14px;
    border-left: 1px solid var(--border);
  }
  .mode-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all .2s;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 57px);
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }
  .sidebar-title {
    padding: 14px 16px 10px;
    font-size: 11px;
    letter-spacing: .1em;
    color: var(--text-muted);
    text-transform: uppercase;
  }
  .chapter-item {
    padding: 10px 16px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    border-left: 3px solid transparent;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    line-height: 1.4;
  }
  .chapter-item:hover { background: var(--surface2); color: var(--text); }
  .chapter-item.active {
    border-left-color: var(--accent);
    color: var(--accent);
    background: rgba(232,200,74,.07);
  }
  .chapter-item .ch-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .chapter-item .ch-stars {
    font-size: 10px;
    flex-shrink: 0;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Chapter header ── */
  .chapter-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .chapter-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
  }
  .chapter-stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
  }

  /* ── Progress bar ── */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width .4s ease;
  }
  .progress-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ── Question card ── */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .2s;
  }
  .q-card.answered-correct { border-color: rgba(62,207,142,.35); }
  .q-card.answered-wrong { border-color: rgba(240,96,90,.35); }
  .q-card.starred { border-color: rgba(232,200,74,.4); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 20px 20px 0;
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-text {
    font-size: calc(15px * var(--font-scale));
    line-height: 1.75;
    color: var(--text);
    flex: 1;
  }
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--text-muted);
    padding: 0 4px;
    flex-shrink: 0;
    transition: all .15s;
    line-height: 1;
  }
  .star-btn.starred { color: var(--accent); }
  .star-btn:hover { transform: scale(1.2); }

  .q-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 16px 20px 20px;
  }
  @media (max-width: 600px) {
    .q-options { grid-template-columns: 1fr; }
  }

  .opt-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: calc(14px * var(--font-scale));
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    text-align: left;
    transition: all .15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,200,74,.08);
  }
  .opt-btn .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: calc(13px * var(--font-scale));
    color: var(--text-muted);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .opt-btn.correct {
    border-color: var(--correct);
    background: rgba(62,207,142,.12);
    color: var(--correct);
  }
  .opt-btn.correct .opt-letter { color: var(--correct); }
  .opt-btn.wrong {
    border-color: var(--wrong);
    background: rgba(240,96,90,.12);
    color: var(--wrong);
  }
  .opt-btn.wrong .opt-letter { color: var(--wrong); }
  .opt-btn:disabled { cursor: default; }

  .q-result {
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .q-result > *:first-child {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .q-explain {
    font-size: calc(12px * var(--font-scale));
    color: var(--text-dim);
    line-height: 1.65;
    padding: 8px 12px;
    background: rgba(74,232,192,.06);
    border-left: 2px solid rgba(74,232,192,.4);
    border-radius: 0 6px 6px 0;
  }
  .result-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 4px;
  }
  .result-badge.correct { background: rgba(62,207,142,.15); color: var(--correct); }
  .result-badge.wrong { background: rgba(240,96,90,.15); color: var(--wrong); }
  .result-text { font-size: calc(13px * var(--font-scale)); color: var(--text-dim); }

  /* ── Summary panel ── */
  .summary-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stat-block { text-align: center; }
  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .divider { width: 1px; height: 48px; background: var(--border); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tool-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 7px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all .2s;
    display: flex; align-items: center; gap: 6px;
  }
  .tool-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tool-btn.danger:hover { border-color: var(--wrong); color: var(--wrong); }

  /* ── Starred mode empty ── */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; line-height: 1.6; }

  /* ── Drill mode overlay ── */
  .drill-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0;
    overflow: hidden;
  }
  .drill-header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .drill-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--wrong);
    display: flex; align-items: center; gap: 8px;
  }
  .drill-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
  }
  .drill-close:hover { border-color: var(--wrong); color: var(--wrong); }

  .drill-body {
    flex: 1;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 24px;
    overflow: hidden;
  }

  .drill-counter {
    display: flex;
    align-items: center;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
  }
  .drill-remain {
    font-size: 36px;
    font-weight: 600;
    color: var(--wrong);
    line-height: 1;
  }
  .drill-remain-label {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .drill-sep { width: 1px; height: 40px; background: var(--border); }
  .drill-correct-count {
    font-size: 22px;
    font-weight: 600;
    color: var(--correct);
  }
  .drill-correct-label {
    font-size: 12px;
    color: var(--text-muted);
  }

  .drill-progress-wrap {
    width: 100%;
  }
  .drill-progress-bar {
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .drill-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--wrong), var(--accent));
    border-radius: 3px;
    transition: width .5s ease;
  }

  .drill-card-wrap {
    width: 100%;
    position: relative;
  }
  .drill-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    transition: border-color .2s;
  }
  .drill-card.answered-correct { border-color: rgba(62,207,142,.5); }
  .drill-card.answered-wrong { border-color: rgba(240,96,90,.5); }

  .drill-source {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 14px;
  }
  .drill-q-text {
    font-size: calc(17px * var(--font-scale));
    line-height: 1.8;
    color: var(--text);
    margin-bottom: 24px;
  }
  .drill-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 500px) { .drill-options { grid-template-columns: 1fr; } }

  .drill-opt {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-size: calc(15px * var(--font-scale));
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    text-align: left;
    display: flex; align-items: flex-start; gap: 10px;
    line-height: 1.5;
    transition: all .15s;
  }
  .drill-opt:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(232,200,74,.08);
  }
  .drill-opt .opt-letter {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: calc(13px * var(--font-scale));
    color: var(--text-muted);
    flex-shrink: 0; margin-top: 1px;
  }
  .drill-opt.correct { border-color: var(--correct); background: rgba(62,207,142,.12); color: var(--correct); }
  .drill-opt.correct .opt-letter { color: var(--correct); }
  .drill-opt.wrong { border-color: var(--wrong); background: rgba(240,96,90,.12); color: var(--wrong); }
  .drill-opt.wrong .opt-letter { color: var(--wrong); }

  .drill-result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 20px;
    gap: 12px;
  }
  .drill-result-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
  }
  .drill-result-badge.correct { background: rgba(62,207,142,.15); color: var(--correct); }
  .drill-result-badge.wrong { background: rgba(240,96,90,.15); color: var(--wrong); }
  .drill-next-btn {
    background: var(--accent);
    border: none;
    color: #111;
    padding: 10px 24px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    transition: opacity .15s;
  }
  .drill-next-btn:hover { opacity: .85; }
  .drill-next-btn.wrong-variant {
    background: transparent;
    border: 1.5px solid var(--wrong);
    color: var(--wrong);
  }

  .drill-done {
    text-align: center;
    padding: 40px 20px;
  }
  .drill-done-icon { font-size: 64px; margin-bottom: 20px; }
  .drill-done h2 { font-size: 24px; color: var(--correct); margin-bottom: 12px; }
  .drill-done p { font-size: 15px; color: var(--text-dim); line-height: 1.6; }
  .drill-done-btns { display: flex; gap: 12px; justify-content: center; margin-top: 24px; flex-wrap: wrap; }


  /* ══ MOBILE (portrait ≤ 768px) ══ */

  /* Toggle button: hidden on desktop, shown on mobile */
  .sidebar-toggle {
    display: none;
    width: 100%;
    background: var(--surface2);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    padding: 11px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    position: sticky;
    top: 57px;
    z-index: 50;
  }

  @media (max-width: 768px) {

    /* Header */
    .header {
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      padding: 10px 12px;
    }
    .header h1 { font-size: 14px; }
    .header-right {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .header-settings {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: flex-end;
      padding-left: 0;
      padding-top: 6px;
      border-left: none;
      border-top: 1px solid var(--border);
    }
    .mode-btn {
      font-size: 11px;
      padding: 7px 4px;
      text-align: center;
      border-radius: 8px;
    }

    /* Layout: stack sidebar toggle above main content */
    .layout {
      flex-direction: column;
      height: auto;
      overflow: visible;
      min-height: calc(100vh - 90px);
    }

    /* Toggle button: show on mobile */
    .sidebar-toggle {
      display: flex;
    }

    /* Sidebar: collapsible, full width */
    .sidebar {
      width: 100%;
      max-height: 0;
      overflow: hidden;
      border-right: none;
      border-bottom: none;
      transition: max-height .3s ease;
      flex-shrink: 0;
    }
    .sidebar.open {
      max-height: 50vh;
      overflow-y: auto;
      border-bottom: 1px solid var(--border);
    }

    /* Main: full width, less padding */
    .main {
      padding: 14px 12px;
      gap: 14px;
    }

    /* Summary panel */
    .summary-panel {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px;
      flex-wrap: wrap;
    }
    .divider { display: none; }
    .stat-num { font-size: 20px; }
    .stat-label { font-size: 10px; }

    /* Toolbar */
    .toolbar { gap: 6px; flex-wrap: wrap; }
    .tool-btn { font-size: 12px; padding: 6px 10px; }

    /* Chapter header */
    .chapter-title { font-size: 15px; }
    .chapter-stats { font-size: 12px; }

    /* Question cards */
    .q-header { padding: 14px 12px 0; gap: 8px; }
    .q-text { font-size: calc(14px * var(--font-scale)); line-height: 1.65; }
    .q-num { font-size: 11px; padding: 2px 6px; }
    .q-options {
      grid-template-columns: 1fr;
      padding: 10px 12px 12px;
      gap: 8px;
    }
    .opt-btn { font-size: calc(13px * var(--font-scale)); padding: 10px 12px; }
    .q-result { padding: 0 12px 12px; }

    /* Drill mode */
    .drill-header { padding: 12px 14px; }
    .drill-body { padding: 14px 12px; gap: 14px; }
    .drill-card { padding: 18px 14px; }
    .drill-q-text { font-size: calc(14px * var(--font-scale)); margin-bottom: 16px; }
    .drill-options {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .drill-opt { font-size: calc(13px * var(--font-scale)); padding: 11px 12px; }
    .drill-remain { font-size: 26px; }
    .drill-result-row {
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
      margin-top: 14px;
    }
    .drill-next-btn { width: 100%; text-align: center; padding: 11px; }
    .drill-result-badge { font-size: 13px; }
  }

  @media (max-width: 390px) {
    .summary-panel { grid-template-columns: repeat(2, 1fr); }
    .mode-btn { font-size: 10px; }
  }

  /* Mix chapter checkbox */
  .mix-ch-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: all .15s;
    user-select: none;
  }
  .mix-ch-item:hover { border-color: var(--accent2); }
  .mix-ch-item.selected { border-color: var(--accent2); background: rgba(74,232,192,.08); }
  .mix-ch-item input[type=checkbox] { accent-color: var(--accent2); width: 15px; height: 15px; cursor: pointer; flex-shrink:0; }
  .mix-ch-name { font-size: 13px; color: var(--text); flex: 1; }
  .mix-ch-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }

  /* Mix quiz progress */
  .mix-progress-row {
    display: flex; align-items: center; gap: 12px; width: 100%;
  }
  .mix-q-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px; color: var(--text-muted); white-space: nowrap;
  }

  /* Mix result screen */
  .mix-score-ring {
    width: 110px; height: 110px;

<script>
const QUESTIONS = [{"chapter":"公司治理基本構面與內涵","questions":[{"num":1,"question":"「公司治理觀察報告」由下列何單位所發布？","options":{"A":"OECD","B":"ACGA","C":"金管會","D":"金融總會"},"answer":"B","explain":"ACGA（亞洲公司治理協會）發布「公司治理觀察報告（CG Watch）」；OECD發布「公司治理原則」，兩者職能不同應加以區別。"},{"num":2,"question":"公司治理3.0-永續發展藍圖共有幾項具體推動措施？","options":{"A":"29項","B":"35項","C":"39項","D":"45項"},"answer":"C","explain":"公司治理3.0-永續發展藍圖以5大主軸為中心，合計「39項」具體推動措施，旨在提升企業永續價值。"},{"num":3,"question":"「公司治理原則」由下列何單位所發布？","options":{"A":"OECD","B":"ACGA","C":"金管會","D":"金融總會"},"answer":"A","explain":"OECD（經濟合作發展組織）於1999年發布「公司治理原則」，為各國公司治理之重要依據。"},{"num":4,"question":"台灣自哪一年起規劃強化公司治理藍圖，為期幾年？","options":{"A":"2013年5年期","B":"2013年3年期","C":"2018年5年期","D":"2018年3年期"},"answer":"A","explain":"台灣自2013年起規劃為期「五年」的強化公司治理藍圖；2020年再規劃公司治理3.0，為期三年。"},{"num":5,"question":"下列哪一國家於2014年10月宣布，將強制要求上市公司發布永續報告書？","options":{"A":"日本","B":"韓國","C":"新加坡","D":"菲律賓"},"answer":"C","explain":"新加坡證交所於2014年10月宣布，強制要求上市公司發布永續報告書，為亞洲最早強制推動的市場之一。"},{"num":6,"question":"公司治理3.0-永續發展藍圖係自哪一年起規劃，為期幾年？","options":{"A":"2018年3年期","B":"2020年3年期","C":"2020年5年期","D":"2022年3年期"},"answer":"B","explain":"公司治理3.0-永續發展藍圖自「2020年起」規劃，以三年為期，以5大主軸39項具體措施推動。"},{"num":7,"question":"下列哪一機關於2003年成立「改革公司治理專案小組」？","options":{"A":"行政院","B":"司法院","C":"法務部","D":"金管會"},"answer":"A","explain":"行政院於2003年成立「改革公司治理專案小組」，提出強化公司治理政策綱領暨行動方案，為台灣公司治理改革起點。"},{"num":8,"question":"公司治理主管除初任者應於一年內進修幾小時外，每年應至少進修幾小時？","options":{"A":"12小時；6小時","B":"18小時；6小時","C":"18小時；12小時","D":"12小時；12小時"},"answer":"C","explain":"依規定，公司治理主管每年至少應進修特定時數；正確答案為C（18小時；12小時），初任者應於一年內完成特定進修時數。"},{"num":9,"question":"自2025年起，資本額新臺幣多少億元以上之上市櫃公司應編製申報永續報告書？","options":{"A":"5億元","B":"10億元","C":"20億元","D":"30億元"},"answer":"C","explain":"自2025年起，實收資本額達新臺幣「20億元以上」之上市（櫃）公司應強制編製申報永續報告書。"},{"num":10,"question":"上市上櫃公司董事新任者，於就任次年度起每年至少宜進修幾小時？","options":{"A":"3小時","B":"6小時","C":"12小時","D":"18小時"},"answer":"B","explain":"依治理實務守則，上市上櫃公司董事新任者，於就任「次年度起」每年至少宜進修「6小時」，持續維持董事之專業能力。"},{"num":11,"question":"2016年「機構投資人盡職治理守則」由下列何單位所發布？","options":{"A":"證交所","B":"投信投顧公會","C":"金融總會","D":"由(A)(B)(C)等單位共同發布"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）由(A)(B)(C)等單位共同發布。其餘選項所述與法規不符，應加以辨別。"},{"num":12,"question":"上市上櫃公司董事新任者，於就任當年度至少宜進修幾小時？","options":{"A":"6小時","B":"8小時","C":"12小時","D":"18小時"},"answer":"C","explain":"依規定，公司治理主管每年至少應進修特定時數；正確答案為C（12小時），初任者應於一年內完成特定進修時數。"},{"num":13,"question":"目前由下列哪一機關籌劃設置商業法院？","options":{"A":"行政院","B":"司法院","C":"立法院","D":"法務部"},"answer":"B","explain":"依公司治理前瞻規劃，由「司法院」籌劃設置商業法院，使商業紛爭之裁判更加專業迅速。"},{"num":14,"question":"公司治理主管辭職或解任者，上市公司應自事實發生之日起幾個月內補行委任？","options":{"A":"1個月","B":"2個月","C":"3個月","D":"6個月"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1個月。其餘選項所述與法規不符，應加以辨別。"},{"num":15,"question":"2018年「新版公司治理藍圖」為了增加董事支援，引進下列何種制度？","options":{"A":"公司治理主管","B":"推動設置商業法院","C":"董事會績效評估制度","D":"董事多元化制度"},"answer":"A","explain":"2018年新版公司治理藍圖引進「公司治理主管制度」，為董事提供更多支援，強化董事會職能。"},{"num":16,"question":"上市公司實收資本額未達幾億元的非金融保險業者，得延至112年6月30日前完成設置公司治理主管？","options":{"A":"10億元","B":"20億元","C":"30億元","D":"50億元"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）20億元。其餘選項所述與法規不符，應加以辨別。"},{"num":17,"question":"自何年起，上市櫃公司應依董事屆期完成委任至少一名女性董事？","options":{"A":"2023年","B":"2024年","C":"2025年","D":"2026年"},"answer":"B","explain":"自「2024年」起，上市櫃公司應依董事屆期完成委任至少一名女性董事，以促進董事會成員多元化。"},{"num":18,"question":"公司治理主管應取得律師會計師執業資格，或於相關機構從事主管職務達幾年以上？","options":{"A":"1年","B":"2年","C":"3年","D":"5年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3年。其餘選項所述與法規不符，應加以辨別。"},{"num":19,"question":"股東會場地若屆時未能繼續使用，得決議在幾日內延期或續行集會？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"B","explain":"依規定，股東會場地若屆時未能繼續使用，得決議在「5日內」延期或續行集會，以保障股東會之正常進行。"}]},{"chapter":"股東會相關規定","questions":[{"num":1,"question":"每會計年度終了後，應於幾個月內召開股東常會？","options":{"A":"3個月","B":"6個月","C":"9個月","D":"無限制"},"answer":"B","explain":"依《公司法》第170條，股東常會應於每會計年度終了後「六個月內」召開（即6月30日前），遲延召開主管機關得裁處。"},{"num":2,"question":"公開發行公司召集股東常會，停止過戶應於幾日前辦理？","options":{"A":"30日前","B":"45日前","C":"60日前","D":"90日前"},"answer":"C","explain":"公開發行公司召集股東常會，應於停止股票過戶日「60日前」辦理，以確保股東名簿之確定。"},{"num":3,"question":"股東臨時會召集頻率應為下列何者？","options":{"A":"每月1次","B":"每季1次","C":"每年1次","D":"必要時"},"answer":"D","explain":"依《公司法》，股東臨時會於「必要時」召集之，無固定次數限制，由董事會依實際需要決定是否召集。"},{"num":4,"question":"非公開發行公司召集股東臨時會，停止過戶應於幾日前辦理？","options":{"A":"7日前","B":"10日前","C":"15日前","D":"30日前"},"answer":"C","explain":"非公開發行公司召集股東臨時會，應於「15日前」辦理停止過戶；公開發行公司臨時會則為30日前。"},{"num":5,"question":"召集股東常會，應於幾日前通知股東？","options":{"A":"10日","B":"15日","C":"20日","D":"30日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":6,"question":"公開發行公司召集股東常會，應於幾日前公告董事候選人名單？","options":{"A":"25日前","B":"30日前","C":"40日前","D":"60日前"},"answer":"C","explain":"公開發行公司召集股東常會，應於開會「40日前」公告董事候選人名單及學經歷，使股東有充分時間評估候選人。"},{"num":7,"question":"公開發行股票之公司召集股東常會，應於幾日前通知股東？","options":{"A":"10日","B":"15日","C":"20日","D":"30日"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）30日。其餘選項所述與法規不符，應加以辨別。"},{"num":8,"question":"公開發行公司召集股東臨時會，應於幾日前公告董事候選人名單？","options":{"A":"10日前","B":"15日前","C":"20日前","D":"25日前"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）25日前。其餘選項所述與法規不符，應加以辨別。"},{"num":9,"question":"金管會規定自何年起，所有上市(櫃)公司召開股東會時，應將電子方式列為表決權行使管道之一？","options":{"A":"112年","B":"109年","C":"107年","D":"105年"},"answer":"C","explain":"107年（2018年）起，金管會要求所有上市（櫃）公司召開股東會時，應將「電子方式」列為表決權行使管道之一，以提高股東參與便利性。"},{"num":10,"question":"股東常會召開前，受理股東提案的期間不得少於幾日？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）10日。其餘選項所述與法規不符，應加以辨別。"},{"num":11,"question":"股東會決議內容若違反法令或章程，則法律效果為何？","options":{"A":"效力未定","B":"無效","C":"得撤銷","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）無效。其餘選項所述與法規不符，應加以辨別。"},{"num":12,"question":"股東提出股東常會議案，提案以多少字為限？","options":{"A":"100字","B":"200字","C":"300字","D":"500字"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）300字。其餘選項所述與法規不符，應加以辨別。"},{"num":13,"question":"請問下列何種事項，不得以臨時動議提出？","options":{"A":"減資","B":"變更章程","C":"選任或解任董事、監察人","D":"以上皆是"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）以上皆是。其餘選項所述與法規不符，應加以辨別。"},{"num":14,"question":"股東常會開會時，出席股東就議案每次發言不得超過幾分鐘？","options":{"A":"3分鐘","B": 案為（C）24萬元以上480萬元以下。其餘選項所述與法規不符，應加以辨別。"},{"num":16,"question":"非金融業實收資本額達20億元以上的上市(櫃)公司，應於幾年底前完成審計委員會設置？","options":{"A":"107年底","B":"108年底","C":"109年底","D":"110年底"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）108年底。其餘選項所述與法規不符，應加以辨別。"},{"num":17,"question":"設置審計委員會，若相關事項未經審計委員會半數以上同意，得由幾分之幾以上全體董事同意行之？","options":{"A":"二分之一","B":"三分之二","C":"四分之三","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二。其餘選項所述與法規不符，應加以辨別。"},{"num":18,"question":"審計委員會議事錄的保存年限規定為何？","options":{"A":"至少1年","B":"至少3年","C":"至少5年","D":"永久"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）永久。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"薪酬委員會","questions":[{"num":1,"question":"薪資報酬委員會之設置義務，適用於何種公司？","options":{"A":"僅上市公司","B":"僅上櫃公司","C":"上市、上櫃與興櫃公司均須設置","D":"實收資本額逾10億元之公開發行公司"},"answer":"C","explain":"依《薪資報酬委員會辦法》第2條，股票已在證券交易所上市或於證券商營業處所買賣之公司（含上市、上櫃及興櫃）均須設置薪資報酬委員會。"},{"num":2,"question":"申請初次上市（櫃）及登錄興櫃之公司，應於何時完成薪資報酬委員會設置？","options":{"A":"上市後一年內","B":"送件申請前","C":"上市後三個月內","D":"無時間限制"},"answer":"B","explain":"依規定，申請初次上市（櫃）及登錄興櫃之公司，應於送件申請前完成薪資報酬委員會之設置，確保治理架構完整。"},{"num":3,"question":"薪資報酬委員會成員係由下列何者決議委任？","options":{"A":"股東會","B":"董事長","C":"董事會","D":"審計委員會"},"answer":"C","explain":"依《薪資報酬委員會辦法》第4條，薪資報酬委員會成員由董事會決議委任之，委任關係並非公司受雇人。"},{"num":4,"question":"公司已設立獨立董事者，薪資報酬委員會之召集人應由何人擔任？","options":{"A":"由全體成員選舉","B":"由董事長指定","C":"由全體成員推舉獨立董事擔任","D":"由主管機關指定"},"answer":"C","explain":"依《薪資報酬委員會辦法》第8條，公司已設立獨立董事者，應由全體成員推舉獨立董事擔任召集人及會議主席。"},{"num":5,"question":"下列關於薪資報酬委員會成員資格之敘述，何者正確？","options":{"A":"應為自然人且至少應有一名獨立董事參與","B":"可以是法人代表","C":"無須具備專業資格","D":"成員須全數為獨立董事"},"answer":"A","explain":"依《薪資報酬委員會辦法》，成員應為自然人，且至少應有獨立董事一人參與，確保一定程度之獨立性。"},{"num":6,"question":"薪資報酬委員會成員應具備之工作年資下限為幾年？","options":{"A":"3年","B":"5年","C":"7年","D":"10年"},"answer":"B","explain":"依《薪資報酬委員會辦法》，成員應取得商務、法務、財務、會計等相關專業資格之一，並具備五年以上工作經驗。"},{"num":7,"question":"薪資報酬委員會成員因故解任致人數不足時，應於多久內補行委任？","options":{"A":"一個月內","B":"二個月內","C":"三個月內","D":"六個月內"},"answer":"C","explain":"依《薪資報酬委員會辦法》第4條，成員因故解任致人數不足時，應自事實發生之即日起算三個月內召開董事會補行委任。"},{"num":8,"question":"董事會通過之薪資報酬如「優於」薪資報酬委員會建議，應於幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依《薪資報酬委員會辦法》，董事會通過薪資報酬優於委員會建議時，應於董事會通過之即日起算二日內辦理公告申報。"},{"num":9,"question":"薪資報酬委員會之議事錄應保存幾年？","options":{"A":"三年","B":"五年","C":"七年","D":"永久保存"},"answer":"B","explain":"依《薪資報酬委員會辦法》第10條，議事錄應保存五年；若保存期限內發生訴訟，應保存至訴訟終結止。"},{"num":10,"question":"薪資報酬委員會成員有反對或保留意見，應於事實發生幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依《薪資報酬委員會辦法》第10條，成員有反對或保留意見且有紀錄或書面聲明者，應於事實發生之即日起算二日內於公開資訊觀測站辦理公告申報。"},{"num":11,"question":"薪資報酬委員會執行職務時，應盡何種注意義務？","options":{"A":"普通人之注意義務","B":"善良管理人之注意義務","C":"重大過失注意義務","D":"無特定義務要求"},"answer":"B","explain":"依《薪資報酬委員會辦法》第7條，委員會應以善良管理人之注意，忠實履行職權，此為較高標準之注意義務。"},{"num":12,"question":"薪資報酬委員會組織規程之訂定及修正，應經何者通過？","options":{"A":"股東會決議","B":"審計委員會決議","C":"董事會決議","D":"全體薪酬委員會成員同意"},"answer":"C","explain":"依《薪資報酬委員會辦法》第3條，組織規程之訂定應經董事會決議通過；修正時，亦同。"},{"num":13,"question":"薪資報酬委員會成員委任及異動訊息，應於何處即時公告？","options":{"A":"公司官方網站","B":"主管機關指定之公開資訊觀測站","C":"聯合報或工商時報","D":"僅需於年報揭露"},"answer":"B","explain":"依《薪資報酬委員會辦法》第4條，成員之委任及異動訊息應即時於主管機關指定之公開資訊觀測站公告。"},{"num":14,"question":"董事會不採納薪資報酬委員會建議時，所需決議門檻為何？","options":{"A":"全體董事2/3以上出席，出席2/3同意","B":"全體董事2/3以上出席，出席1/2以上同意","C":"全體董事1/2以上出席，出席2/3同意","D":"全體董事1/2以上出席，出席1/2同意"},"answer":"B","explain":"依《薪資報酬委員會辦法》，董事會不採納委員會建議時，應有全體董事三分之二以上出席，及出席董事過半數同意。"},{"num":15,"question":"薪資報酬委員會成員得否委託他人代理出席？","options":{"A":"不得委託，應親自出席","B":"得委託其他成員代理，每次出具委託書，代理人以受一人委託為限","C":"得委託任何人代理出席","D":"以視訊參與不算出席"},"answer":"B","explain":"依《薪資報酬委員會辦法》第9條，成員不能親自出席時，得委託其他成員代理，須每次出具委託書，且代理人以受一人委託為限；視訊參與視為親自出席。"},{"num":16,"question":"薪資報酬委員會成員應至少為幾位？","options":{"A":"2位","B":"3位","C":"4位","D":"5位"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）3位。其餘選項所述與法規不符，應加以辨別。"},{"num":17,"question":"薪資報酬委員會成員因故解任致人數不足，應於事實發生之日起算幾個月內召開董事會補行委任？","options":{"A":"1個月","B":"2個月","C":"3個月","D":"6個月"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3個月。其餘選項所述與法規不符，應加以辨別。"},{"num":18,"question":"甲為會計師，工作年資應至少滿幾年，才符合擔任薪資報酬委員會成員之資格？","options":{"A":"1年","B":"2年","C":"3年","D":"5年"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）5年。其餘選項所述與法規不符，應加以辨別。"},{"num":19,"question":"薪資報酬委員會成員於委任及異動時，應於幾日內辦理公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":20,"question":"下列何者不得擔任公司薪資報酬委員會成員？","options":{"A":"公司或其關係企業受僱人","B":"公司或其關係企業董事、監察人","C":"持有公司已發行股份總數百分之一以上","D":"以上皆是"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）以上皆是。其餘選項所述與法規不符，應加以辨別。"},{"num":21,"question":"董事會通過之薪資報酬如優於薪酬委員會建議，應於董事會通過之即日起算幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":22,"question":"薪資報酬委員會之成員若於任職期間直接持有公司已發行股份總數百分之二，下列敘述何者正確？","options":{"A":"應由股東會決議解任","B":"應由董事會決議解任","C":"該成員停職處分","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）應由董事會決議解任。其餘選項所述與法規不符，應加以辨別。"},{"num":23,"question":"薪資報酬委員會每年至少應召開幾次？","options":{"A":"1次","B":"2次","C":"3次","D":"4次"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2次。其餘選項所述與法規不符，應加以辨別。"},{"num":24,"question":"董事會若不採納或修正薪資報酬委員會之建議時，董事會決議程序為何？","options":{"A":"全體董事2/3以上出席，及出席董事2/3以上同意","B":"全體董事2/3以上出席，及出席董事1/2以上同意","C":"全體董事1/2以上出席，及出席董事2/3以上同意","D":"全體董事1/2以上出席，及出席董事1/2以上同意"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）全體董事2/3以上出席，及出席董事1/2以上同意。其餘選項所述與法規不符，應加以辨別。"},{"num":25,"question":"薪資報酬委員會的召集通知，應於幾日前通知成員？","options":{"A":"3日前","B":"5日前","C":"7日前","D":"10日前"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）7日前。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"董事會通過之薪資報酬如優於薪資報酬委員會之建議，應於董事會通過之即日起算幾日內公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"薪資報酬委員會議事錄應於會後幾日內分送委員會成員？","options":{"A":"5日","B":"10日","C":"15日","D":"20日"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"薪資報酬委員會會議次數，應每年至少幾次？","options":{"A":"1次","B":"2次","C":"3次","D":"無限制"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2次。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"薪資報酬委員會議事錄及相關資料，應至少保存幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"永久"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）5年。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"召集薪資報酬委員會，應於幾日前通知成員？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）7日。其餘選項所述與法規不符，應加以辨別。"},{"num":31,"question":"薪酬委員會成員若為公司提供審計，且最近幾年累計報酬逾50萬元，即不得充任成員？","options":{"A":"1年","B":"2年","C":"3年","D":"5年"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2年。其餘選項所述與法規不符，應加以辨別。"},{"num":32,"question":"薪資報酬委員會之決議程序應為下列何者？","options":{"A":"全體成員1/2以上同意","B":"全體成員1/3以上同意","C":"全體成員2/3以上同意","D":"全體成員同意"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）全體成員1/2以上同意。其餘選項所述與法規不符，應加以辨別。"},{"num":33,"question":"董事會不採納薪酬委員會建議，應由幾分之幾以上全體董事出席，及出席董事過半數同意？","options":{"A":"二分之一","B":"三分之二","C":"四分之三","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二。其餘選項所述與法規不符，應加以辨別。"},{"num":34,"question":"薪資報酬委員會之議事錄應於會後幾日內分送委員會成員？","options":{"A":"10日","B":"15日","C":"20日","D":"21日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":35,"question":"薪酬委員會召集人因故不能召集，若委員會無其他獨立董事時，由誰代理召集？","options":{"A":"董事長代理","B":"召集人指定之其他委員會成員","C":"由董事會決定","D":"由全體委員互推"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）召集人指定之其他委員會成員。其餘選項所述與法規不符，應加以辨別。"},{"num":36,"question":"薪資報酬委員會之視訊影音資料，應保存期限為？","options":{"A":"至少一年","B":"至少三年","C":"至少五年","D":"永久保存"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）至少五年。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"併購委員會","questions":[{"num":1,"question":"公開發行公司於召開董事會決議併購事項前，應設置何種委員會？","options":{"A":"審計委員會","B":"薪酬委員會","C":"併購特別委員會","D":"提名委員會"},"answer":"C","explain":"依《公開發行公司併購特別委員會設置及相關事項辦法》第2條，應於召開董事會決議併購事項前，依法設置併購特別委員會。"},{"num":2,"question":"已設有審計委員會之公開發行公司進行併購，特別委員會職權由何者行使？","options":{"A":"另設獨立之特別委員會","B":"由審計委員會行之","C":"由薪酬委員會","D":"由全體董事會"},"answer":"B","explain":"依《併購特別委員會辦法》第2條，已設審計委員會者，特別委員會職權由審計委員會行之，避免重複設置。"},{"num":3,"question":"特別委員會組織規程之訂定及修正應經何者通過？","options":{"A":"股東會","B":"董事會","C":"全體特別委員會成員","D":"主管機關核准"},"answer":"B","explain":"依《併購特別委員會辦法》第3條，特別委員會組織規程之訂定應經董事會決議通過；修正時，亦同。"},{"num":4,"question":"特別委員會組織規程至少應記載幾項內容？","options":{"A":"1項","B":"2項","C":"3項","D":"4項"},"answer":"D","explain":"依《併購特別委員會辦法》第3條，組織規程至少應記載：成員組成及人數、職權事項、議事規則、公司應提供之資源，共四項。"},{"num":5,"question":"特別委員會成員之人數不得少於幾人？","options":{"A":"1人","B":"2人","C":"3人","D":"5人"},"answer":"C","explain":"依《併購特別委員會辦法》第4條，特別委員會成員之人數不得少於三人，其中一人為召集人。"},{"num":6,"question":"公開發行公司設有5名獨立董事、未設審計委員會，特別委員會成員最少應為幾人？","options":{"A":"1人","B":"3人","C":"4人","D":"5人"},"answer":"D","explain":"依《併購特別委員會辦法》第4條，設有獨立董事者，應由獨立董事組成特別委員會，故5名獨立董事均應組成，最少為5人。"},{"num":7,"question":"特別委員會應委請獨立專家協助之主要事項為何？","options":{"A":"評估管理層能力","B":"就換股比例或配發股東之現金或其他財產之合理性提供意見","C":"決定併購時程","D":"負責公告申報作業"},"answer":"B","explain":"依《併購特別委員會辦法》第6條，獨立專家應就換股比例或配發股東之現金或其他財產之合理性提供意見，保護股東利益。"},{"num":8,"question":"下列何者不符合擔任特別委員會獨立專家之資格？","options":{"A":"會計師","B":"律師","C":"證券承銷商","D":"資產估價師"},"answer":"D","explain":"依《併購特別委員會辦法》第6條，獨立專家係指會計師、律師或證券承銷商；資產估價師不在列舉範圍內，故不符資格。"},{"num":9,"question":"特別委員會之決議門檻為何？","options":{"A":"全體成員同意","B":"全體成員1/2以上同意","C":"出席成員2/3以上同意","D":"2/3成員出席，出席1/2同意"},"answer":"B","explain":"依《併購特別委員會辦法》，特別委員會決議應有全體成員二分之一以上同意；注意是「全體成員」非「出席成員」。"},{"num":10,"question":"特別委員會成員是否可委託他人代理出席？","options":{"A":"得委託其他成員代理","B":"得委託任何人代理","C":"應親自出席，不得委託代理","D":"以視訊參與不算出席"},"answer":"C","explain":"依《併購特別委員會辦法》，特別委員會成員應親自出席，不得委託他人代理，確保成員盡職參與審議。"},{"num":11,"question":"特別委員會之議事錄保存期限為何？","options":{"A":"3年","B":"5年","C":"10年","D":"永久保存"},"answer":"D","explain":"依《併購特別委員會辦法》第10條，特別委員會之議事錄應永久妥善保存，備供查核，與錄音錄影之5年保存不同。"},{"num":12,"question":"特別委員會開會過程錄音錄影存證，至少應保存幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"永久"},"answer":"C","explain":"依《併購特別委員會辦法》第10條，公司應將特別委員會開會過程全程錄音或錄影存證，並至少保存五年。"},{"num":13,"question":"以視訊會議召開特別委員會，其視訊影音資料之保存規定為何？","options":{"A":"至少保存3年","B":"至少保存5年","C":"視為議事錄一部分，應永久妥善保存","D":"無需特別保存"},"answer":"C","explain":"依《併購特別委員會辦法》第10條，視訊會議之視訊影音資料為議事錄之一部分，應永久妥善保存。"},{"num":14,"question":"董事會決議併購事項後，應於幾日內將決議及特別委員會審議結果公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依《併購特別委員會辦法》第7條，公司應於董事會決議之日起算二日內，將決議及特別委員會審議結果辦理公告申報。"},{"num":15,"question":"特別委員會成員具有利害關係時，應如何處理？","options":{"A":"可照常參與決議","B":"應迴避，不得參與決議","C":"僅不得擔任召集人","D":"由主管機關決定"},"answer":"B","explain":"依《併購特別委員會辦法》，成員不得與併購交易相對人為關係人或有足以影響獨立性之利害關係，有利害關係者應迴避。"},{"num":16,"question":"特別委員會得請哪些人員列席會議？","options":{"A":"僅獨立專家","B":"獨立專家、公司相關部門經理人、內部稽核人員、會計師、律師等","C":"任何人均可","D":"僅公司內部人員"},"answer":"B","explain":"依《併購特別委員會辦法》第8條，特別委員會得請獨立專家、公司相關部門經理人、內部稽核人員、會計師、律師或其他必要人員列席。"},{"num":17,"question":"下列何者屬於企業併購法所定之「併購」類型？","options":{"A":"僅有合併","B":"合併、收購及分割","C":"僅有股份收購","D":"合併與股份交換"},"answer":"B","explain":"依《企業併購法》，「併購」係指公司之合併、收購及分割，三種類型均在規範範圍內。"},{"num":18,"question":"特別委員會公告申報時，持反對意見之成員應如何揭露？","options":{"A":"不需揭露","B":"僅揭露反對票數","C":"載明反對成員姓名及其所持理由","D":"由公司決定是否揭露"},"answer":"C","explain":"依《併購特別委員會辦法》第7條，公告申報應載明任何持反對意見之董事及特別委員會成員之姓名及其所持理由，保障資訊透明。"},{"num":19,"question":"獨立專家與併購交易當事人之關係，應符合何種條件？","options":{"A":"得為關係人但須申報","B":"不得與併購交易當事人為關係人或有足以影響獨立性之利害關係","C":"持股未達5%即可","D":"無特別限制"},"answer":"B","explain":"依《併購特別委員會辦法》第6條，獨立專家不得與併購交易當事人為關係人，或有足以影響獨立性之利害關係，確保意見客觀公正。"},{"num":20,"question":"依併購資訊揭露自律規範，公司每年應至少辦理幾次相關法令教育宣導？","options":{"A":"一次","B":"二次","C":"三次","D":"無規定"},"answer":"A","explain":"依「○○股份有限公司併購資訊揭露自律規範」參考範例第15條，公司每年至少一次對董事、監察人、經理人及受僱人辦理本規範及相關法令之教育宣導。"},{"num":21,"question":"併購消息公開前，參與人員可否買賣與併購案相關之股票？","options":{"A":"可以，但須申報","B":"不得對外洩露訊息，亦不得自行或利用他人名義買賣相關有價證券","C":"得向法人機構透露","D":"僅不得公開發布"},"answer":"B","explain":"依「併購資訊揭露自律規範」第5條，所有參與人員在併購消息公開前，不得對外洩露任何訊息，亦不得買賣與併購案相關之有價證券。"},{"num":22,"question":"有關公司併購議題對外發言，應由何人負責？","options":{"A":"任何員工均可","B":"公司負責人、發言人或代理發言人","C":"財務長","D":"投資人關係主管"},"answer":"B","explain":"依「併購資訊揭露自律規範」，面對外界詢問有關公司併購議題，統一由公司負責人、發言人或代理發言人負責處理。"},{"num":23,"question":"依治理實務守則，特別委員會等功能性委員會對誰負責？","options":{"A":"對董事長負責","B":"對董事會負責","C":"對股東會負責","D":"對主管機關負責"},"answer":"B","explain":"依《上市上櫃公司治理實務守則》，功能性委員會應對董事會負責，其決議與建議最終交由董事會討論決策。"},{"num":24,"question":"特別委員會議事錄之記載，應包含何種重要內容？","options":{"A":"僅記載決議結果","B":"議決事項應將成員同意或反對之明確意見及反對之理由列入","C":"僅記載出席人員","D":"由召集人自行決定"},"answer":"B","explain":"依《併購特別委員會辦法》第7條，議事錄應將成員同意或反對之明確意見及反對之理由列入，確保決策過程透明。"},{"num":25,"question":"特別委員會錄音錄影存證，若保存期限內發生訴訟，應如何處理？","options":{"A":"依原定五年期限保存即可","B":"申請主管機關延長","C":"應續予保存至訴訟終結止","D":"由法院決定"},"answer":"C","explain":"依《併購特別委員會辦法》第10條，保存期限未屆滿前發生訴訟時，相關錄音或錄影存證資料應續予保存至訴訟終結止。"},{"num":26,"question":"依併購資訊揭露自律規範，辦理資訊揭露應秉持之原則，不包含下列何者？","options":{"A":"公平對待原則","B":"審慎負責之態度","C":"利益最大化原則","D":"資訊透明化"},"answer":"C","explain":"依「併購資訊揭露自律規範」第4條，揭露原則包括公平對待、審慎負責、不得虛偽隱匿、資訊透明化；「利益最大化」並非法定揭露原則。"},{"num":27,"question":"特別委員會召集人由何者擔任？","options":{"A":"董事長指定","B":"主管機關指定","C":"由全體成員互推，其中一人為召集人","D":"資深成員自動擔任"},"answer":"C","explain":"依《併購特別委員會辦法》第4條，特別委員會成員之人數不得少於三人，其中一人為召集人；召集人由全體成員推選產生。"},{"num":28,"question":"特別委員會成員至少應有幾名具會計或財務專長？","options":{"A":"無特定要求","B":"至少一名","C":"至少二名","D":"全體成員均需具備"},"answer":"B","explain":"依《併購特別委員會辦法》，特別委員會成員資格參照獨立董事辦法，且至少應有一名具會計或財務專長，確保審議能力。"},{"num":29,"question":"特別委員會錄音錄影得以何種方式保存？","options":{"A":"僅限實體媒體","B":"得以電子方式為之","C":"僅限雲端儲存","D":"須交由主管機關保管"},"answer":"B","explain":"依《併購特別委員會辦法》第10條，錄音或錄影存證資料之保存得以電子方式為之，提供保存彈性。"},{"num":30,"question":"特別委員會成員不符合獨立性要求時，由何人補足？","options":{"A":"由主管機關指派","B":"由股東會選任","C":"由董事會遴選之成員組成","D":"由其他公司成員遞補"},"answer":"C","explain":"依《併購特別委員會辦法》第4條，獨立董事未符合資格或人數不足之部分，由董事會遴選之成員組成，確保委員會正常運作。"},{"num":31,"question":"關於併購特別委員會設置情形，下列何者正確？","options":{"A":"屬公開發行公司併購特別委員會設置及應遵循事項辦法明訂應於公司章程載明事項","B":"屬公司法明訂應於公司章程載明事項","C":"屬企業併購法明訂應於公司章程載明事項","D":"屬公司自治事項"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）屬公司自治事項。其餘選項所述與法規不符，應加以辨別。"},{"num":32,"question":"併購特別委員會成員應至少幾人，其中一人為召集人？","options":{"A":"2人","B":"3人","C":"5人","D":"7人"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）3人。其餘選項所述與法規不符，應加以辨別。"},{"num":33,"question":"特別委員會組織規程應明訂事項，不包含下列何者？","options":{"A":"職權事項","B":"議事規則","C":"議事錄應記載事項","D":"成員組成及人數"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）議事錄應記載事項。其餘選項所述與法規不符，應加以辨別。"},{"num":34,"question":"特別委員會的決議門檻為全體成員幾分之幾以上同意？","options":{"A":"三分之一","B":"二分之一","C":"三分之二","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）二分之一。其餘選項所述與法規不符，應加以辨別。"},{"num":35,"question":"併購特別委員會成員應至少有幾人？","options":{"A":"3人","B":"5人","C":"7人","D":"無限制"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）3人。其餘選項所述與法規不符，應加以辨別。"},{"num":36,"question":"董事會決議通過併購案後，應於幾日內將相關資訊公告申報？","options":{"A":"1日","B":"2日","C":"3日","D":"5日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）2日。其餘選項所述與法規不符，應加以辨別。"},{"num":37,"question":"某公開發行公司之獨立董事為5人，未設立審計委員會，則併購委員會成員最少應為幾人？","options":{"A":"1人","B":"2人","C":"3人","D":"5人"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）5人。其餘選項所述與法規不符，應加以辨別。"},{"num":38,"question":"特別委員會之議事錄保存年限為何？","options":{"A":"至少3年","B":"至少5年","C":"至少10年","D":"永久"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）永久。其餘選項所述與法規不符，應加以辨別。"},{"num":39,"question":"併購特別委員會成員應至少一席具有下列何種資格：","options":{"A":"產業經驗","B":"管理專長","C":"會計或財務專長","D":"律師資格"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）會計或財務專長。其餘選項所述與法規不符，應加以辨別。"},{"num":40,"question":"特別委員會開會過程的錄音錄影存證，至少應保存幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"10年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）5年。其餘選項所述與法規不符，應加以辨別。"},{"num":41,"question":"下列何者非併購特別委員會成員之資格限制？","options":{"A":"不得為公司或其關係企業之受僱人","B":"不得為公司或其關係企業之董事、監察人之三親等以內親屬關係","C":"不得為公司或其關係企業之董事、監察人","D":"不得為公司或其關係企業之董事之配偶"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）不得為公司或其關係企業之受僱人。其餘選項所述與法規不符，應加以辨別。"},{"num":42,"question":"依規定，公開收購期間不得少於幾日？","options":{"A":"10日","B":"20日","C":"30日","D":"50日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）20日。其餘選項所述與法規不符，應加以辨別。"},{"num":43,"question":"特別委員會進行審議時，應委請獨立專家協助，下列何者不符獨立專家的資格？","options":{"A":"律師","B":"資產合估價師","C":"證券承銷商","D":"會計師"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）資產合估價師。其餘選項所述與法規不符，應加以辨別。"},{"num":44,"question":"依企業併購法，採簡易合併程序時，消滅公司被持有股份須達幾%以上？","options":{"A":"70%","B":"80%","C":"90%","D":"95%"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）90%。其餘選項所述與法規不符，應加以辨別。"},{"num":45,"question":"下列何者為併購特別委員會決議門檻？","options":{"A":"全體成員1/2以上同意","B":"全體成員同意","C":"1/2以上成員出席，出席成員2/3以上同意","D":"2/3以上成員出席，出席成員1/2以上同意"},"answer":"A" ":"2,000萬元","C":"3,000萬元","D":"5,000萬元"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3,000萬元。其餘選項所述與法規不符，應加以辨別。"},{"num":24,"question":"公開發行公司直接及間接持有90%以上股份之子公司，在為背書保證前，應提報公開發行公司董事會決議；若持有100%，是否有例外？","options":{"A":"沒有例外，仍須提報","B":"有例外，100%持股公司間不需提報","C":"視金額決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）有例外，100%持股公司間不需提報。其餘選項所述與法規不符，應加以辨別。"},{"num":25,"question":"依規定，資金貸與他人，各公開發行公司應訂定資金貸與他人「作業程序」，此程序應如何決定？","options":{"A":"由總經理決定","B":"依處理準則規定訂定","C":"由主管機關統一規定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）依處理準則規定訂定。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"依資金貸與準則，公司間業務往來所進行的資金貸與，是否受40%淨值上限的限制？","options":{"A":"受限","B":"不受限，此為例外情形之一","C":"視金額決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不受限，此為例外情形之一。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"公開發行公司對背書保證的監控，應於每月幾日前公告上月份資金貸與「及背書保證」餘額？","options":{"A":"5日","B":"10日","C":"15日","D":"20日"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）10日。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"依規定，公開發行公司設有審計委員會者，訂定或修正資金貸與及背書保證處理程序，應經審計委員會全體成員幾分之幾以上同意？","options":{"A":"三分之一","B":"二分之一","C":"三分之二","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）二分之一。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"若資金貸與及背書保證處理程序未經審計委員會二分之一以上同意，可由全體董事幾分之幾以上同意行之？","options":{"A":"二分之一","B":"三分之二","C":"四分之三","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"依規定，母子公司間或子公司彼此間之資金貸與，得授權董事長對同一貸與對象於不超過幾年之期間內分次撥貸或循環動用？","options":{"A":"半年","B":"1年","C":"2年","D":"3年"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）1年。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"關係人交易","questions":[{"num":1,"question":"依關係人相互間財務業務相關作業規範，關係企業係指具有哪種關係的企業？","options":{"A":"僅指有控制與從屬關係之公司","B":"有控制與從屬關係或相互投資之公司","C":"僅指相互投資之公司","D":"所有有業務往來之公司"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）有控制與從屬關係或相互投資之公司。其餘選項所述與法規不符，應加以辨別。"},{"num":2,"question":"依關係人規範，公司經理人原則上不得與關係企業之經理人互為兼任，但有何例外？","options":{"A":"薪資相同時","B":"經董事會決議行之者","C":"主管機關核准時","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）經董事會決議行之者。其餘選項所述與法 規定，正確答案為（B）董事會。其餘選項所述與法規不符，應加以辨別。"},{"num":22,"question":"依關係人規範，公司直接及間接持有表決權100%之公司間背書保證，是否有金額上限限制？","options":{"A":"有，不得超過淨值10%","B":"有，不得超過淨值20%","C":"無限制","D":"視金額決定"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）無限制。其餘選項所述與法規不符，應加以辨別。"},{"num":23,"question":"依關係人規範，公司母公司如為外國公司，應於知悉特定事實發生後，在次一營業日交易時間開始前代為申報，下列何者屬於需申報的事項？","options":{"A":"母公司的重大財務訊息","B":"母公司的一般業務往來","C":"員工招募資訊","D":"以上皆非"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）母公司的重大財務訊息。其餘選項所述與法規不符，應加以辨別。"},{"num":24,"question":"依關係人交易相關規範，「非常規交易」是指什麼？","options":{"A":"金額超過一定門檻的交易","B":"不符合市場公平合理條件的交易，可能有不當利益輸送","C":"未事先披露的交易","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不符合市場公平合理條件的交易，可能有不當利益輸送。其餘選項所述與法規不符，應加以辨別。"},{"num":25,"question":"依關係人規範，公司向關係人取得或處分不動產，應將相關資料提交董事會通過及哪個機關承認後，始得簽訂交易契約？","options":{"A":"股東會","B":"監察人","C":"主管機關","D":"審計委員會"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）監察人。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"依關係人規範，公司與關係人間之財務業務往來或交易，應本於何種原則？","options":{"A":"最大利潤原則","B":"公平合理原則","C":"節省成本原則","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）公平合理原則。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"依關係人規範，公司取得以關係企業為標的之有價證券（如股票），應視為關係人交易，是否須依規定辦理？","options":{"A":"否","B":"是，需依關係人交易相關規定辦理","C":"視金額而定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）是，需依關係人交易相關規定辦理。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"依關係人規範，「關係人相互間財務業務相關作業規範」的訂定依據為哪一守則？","options":{"A":"上市上櫃公司治理實務守則第17條","B":"誠信經營守則","C":"永續發展實務守則","D":"以上皆非"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）上市上櫃公司治理實務守則第17條。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"依關係人規範，公司應於書面規範中訂定進銷貨交易、取得或處分資產、資金貸與及背書保證等事項的哪種內容？","options":{"A":"僅報告流程","B":"管理程序，且相關重大交易應提董事會決議通過、提股東會同意或報告","C":"僅財務報表揭露","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）管理程序，且相關重大交易應提董事會決議通過、提股東會同意或報告。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"依規定，公司之直接及間接持有表決權股份百分之百之國外公司間的資金貸與，融資金額是否受貸與企業淨值40%限制？","options":{"A":"受限制","B":"不受40%限制","C":"視金額決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不受40%限制。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"綜合觀念","questions":[{"num":1,"question":"依公司法，股東會議事錄在公司存續期間應如何保存？","options":{"A":"至少保存5年","B":"至少保存10年","C":"永久保存","D":"至少保存3年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）永久保存。其餘選項所述與法規不符，應加以辨別。"},{"num":2,"question":"董事會議事錄與股東會議事錄，在保存年限上有何差異？","options":{"A":"董事會5年、股東會永久","B":"兩者均為永久保存","C":"董事會永久、股東會5年","D":"兩者均至少5年"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）兩者均為永久保存。其餘選項所述與法規不符，應加以辨別。"},{"num":3,"question":"依公司法，出席股東之簽名簿及代理出席之委託書，其保存期限至少為幾年？","options":{"A":"1年","B":"3年","C":"5年","D":"永久"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1年。其餘選項所述與法規不符，應加以辨別。"},{"num":4,"question":"公司治理3.0永續發展藍圖的5大主軸，不包含下列何者？","options":{"A":"強化董事會職能，提升企業永續價值","B":"提高資訊透明度，促進永續經營","C":"推動商業法院設立，強化爭議解決","D":"接軌國際規範，引導盡職治理"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）推動商業法院設立，強化爭議解決。其餘選項所述與法規不符，應加以辨別。"},{"num":5,"question":"依治理實務守則，功能性委員會應對誰負責？","options":{"A":"股東會","B":"董事會","C":"主管機關","D":"審計委員會"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）董事會。其餘選項所述與法規不符，應加以辨別。"},{"num":6,"question":"依上市上櫃公司治理實務守則，上市上櫃公司宜設置提名委員會，其過半數成員宜由何人擔任，並由何人擔任主席？","options":{"A":"一般董事；董事長","B":"獨立董事；獨立董事","C":"外部專家；董事長","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）獨立董事；獨立董事。其餘選項所述與法規不符，應加以辨別。"},{"num":7,"question":"依財務報告編製準則，上市(櫃)、興櫃公司應自哪一年起依IFRS編製財務報告？","options":{"A":"2011年","B":"2012年","C":"2013年","D":"2015年"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）2013年。其餘選項所述與法規不符，應加以辨別。"},{"num":8,"question":"公開發行公司年報中，若最近年度非擔任主管職務之全時員工年度薪資平均數未達多少元，應揭露個別董監酬金？","options":{"A":"30萬元","B":"40萬元","C":"50萬元","D":"60萬元"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）50萬元。其餘選項所述與法規不符，應加以辨別。"},{"num":9,"question":"依公司法，繼續一年以上持有已發行股份3%以上之股東，得以書面請求董事會召集股東臨時會，董事長如在幾日內不召集，股東得自行召集？","options":{"A":"7日","B":"10日","C":"15日","D":"30日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）15日。其餘選項所述與法規不符，應加以辨別。"},{"num":10,"question":"依證交法，公開發行公司的法律責任中，發行人對財務報告不實應負哪種責任？","options":{"A":"推定過失責任","B":"故意責任","C":"無過失責任","D":"嚴格責任"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）無過失責任。其餘選項所述與法規不符，應加以辨別。"},{"num":11,"question":"依公司法第185條，公司為重大行為（如讓與全部或主要部分營業），應有已發行股份總數幾分之幾以上股東出席，以出席股東表決權過半數同意行之？","options":{"A":"過半數","B":"三分之二以上","C":"四分之三以上","D":"全體"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）三分之二以上。其餘選項所述與法規不符，應加以辨別。"},{"num":12,"question":"董事競業禁止義務所得之利益，公司得請求歸入，此請求權自公司知悉後幾個月不行使則消滅？","options":{"A":"1個月","B":"3個月","C":"6個月","D":"1年"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1個月。其餘選項所述與法規不符，應加以辨別。"},{"num":13,"question":"依規定，公司治理評鑑每年由哪個單位辦理？","options":{"A":"金管會","B":"證交所及櫃買中心","C":"公司治理中心","D":"投信投顧公會"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）證交所及櫃買中心。其餘選項所述與法規不符，應加以辨別。"},{"num":14,"question":"依上市上櫃公司治理實務守則，上市上櫃公司宜避免於股東會提出哪種議案？","options":{"A":"重大資產交易","B":"臨時動議及原議案之修正","C":"選任董事","D":"章程修訂"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）臨時動議及原議案之修正。其餘選項所述與法規不符，應加以辨別。"},{"num":15,"question":"依規定，上市上櫃公司應設有幾人以上之代理發言人，且任一代理發言人均應能單獨代理發言人對外發言？","options":{"A":"1人","B":"2人","C":"3人","D":"無限制"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）1人。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"委託書規則","questions":[{"num":1,"question":"委託書規則之法源依據為下列何者？","options":{"A":"公司法第177條","B":"證券交易法第25條之1","C":"證券交易法第14條之4","D":"公司治理實務守則"},"answer":"B","explain":"依《委託書規則》第1條，本規則依《證券交易法》第25條之1規定訂定，非依公司法。"},{"num":2,"question":"下列何者屬於委託書規則所稱之「徵求」行為？","options":{"A":"股東主動委託他人代理","B":"以廣告方式主動取得委託書","C":"繼承取得委託書","D":"以上皆非"},"answer":"B","explain":"依《委託書規則》第3條，「徵求」指以廣告、信函等方式主動取得委託書；股東主動委託屬「非屬徵求」。"},{"num":3,"question":"委託書用紙應由誰印發？","options":{"A":"股東自行印製","B":"公司印發","C":"受託代理人印製","D":"集保結算所印製"},"answer":"B","explain":"依《委託書規則》第2條，公開發行公司出席股東會使用委託書之用紙，以公司印發者為限。"},{"num":4,"question":"公司寄發委託書用紙予所有股東，應如何辦理？","options":{"A":"按持股多寡分批寄發","B":"召集通知後三日內寄發","C":"應於同日為之","D":"由股東自行至公司領取"},"answer":"C","explain":"依《委託書規則》第2條，公司寄發或以電子文件傳送委託書用紙予所有股東，應於同日為之，確保平等對待。"},{"num":5,"question":"一般徵求人（股東會無選舉議案）之基本持股門檻為何？","options":{"A":"持有已發行股份1萬股以上","B":"持有已發行股份5萬股以上","C":"持有已發行股份10萬股以上","D":"持有已發行股份100萬股以上"},"answer":"B","explain":"依《委託書規則》第5條，除有選舉議案另有規定外，一般徵求人應為持有公司已發行股份五萬股以上之股東。"},{"num":6,"question":"非金融機構股東會「有」選舉議案，一般徵求人持股期間要求為何？","options":{"A":"繼續3個月以上","B":"繼續6個月以上","C":"繼續1年以上","D":"無持股期間限制"},"answer":"B","explain":"依《委託書規則》第5條，非金融機構有選舉議案時，徵求人應繼續六個月以上持有已發行股份八十萬股或千分之二以上且不低於十萬股。"},{"num":7,"question":"金融控股公司股東會「有」選舉議案，一般徵求人持股數量門檻為何？","options":{"A":"80萬股或千分之二以上","B":"200萬股或千分之五以上","C":"500萬股以上","D":"持有股份總數10%以上"},"answer":"B","explain":"依《委託書規則》第5條，金控、銀行、保險公司股東會有選舉議案時，徵求人應繼續一年以上持有二百萬股或千分之五以上。"},{"num":8,"question":"無限徵求人委託信託事業擔任徵求人，委任股東持股需符合哪些條件？","options":{"A":"繼續6個月以上，持股達千分之二","B":"繼續1年以上，持股達10%以上且符合申報規定","C":"繼續1年以上，持股達200萬股","D":"繼續3個月以上，持股達5萬股"},"answer":"B","explain":"依《委託書規則》第6條，無限徵求委任股東應繼續一年以上持有已發行股份總數10%以上，並依相關規定申報或核准。"},{"num":9,"question":"非屬徵求之受託代理人，可代理之股東人數上限為何？","options":{"A":"10人","B":"20人","C":"30人","D":"無人數限制"},"answer":"C","explain":"依《委託書規則》，非屬徵求之受託代理人，所受委託人數不得超過三十人，超過者其代理之表決權不予計算。"},{"num":10,"question":"徵求書面及廣告中，擬支持之董事被選舉人經營理念以幾字為限？","options":{"A":"100字","B":"200字","C":"300字","D":"500字"},"answer":"C","explain":"依《委託書規則》，徵求書面及廣告中，擬支持之董事被選舉人之經營理念以三百字為限，超過者公司得拒絕刊登。"},{"num":11,"question":"下列何者可以金錢或其他財產上利益價購委託書？","options":{"A":"持股逾5%之大股東","B":"公司派董事","C":"任何人均不得為之","D":"信託事業"},"answer":"C","explain":"依《委託書規則》，任何人均不得以金錢或其他財產上利益約使股東出具委託書，此為強制禁止規定。"},{"num":12,"question":"公開發行公司寄發股東會召集通知時，應同時附送何種文件？","options":{"A":"財務報告","B":"委託書用紙","C":"董事候選人資料","D":"議事手冊"},"answer":"B","explain":"依《委託書規則》第2條，公司寄發股東會召集通知時，應同時附送委託書用紙予股東。"},{"num":13,"question":"集中市場買賣之股票，徵求人持有期間應以何日起算？","options":{"A":"成交日","B":"完成交割之日","C":"申報日","D":"停止過戶次日"},"answer":"B","explain":"依金管會解釋，集中市場買賣之股票，持有期間以完成交割之日起算，而非成交日，徵求人應特別注意。"},{"num":14,"question":"違反徵求資格規定經主管機關處分者，不得辦理代為處理徵求事務之期限為何？","options":{"A":"6個月","B":"1年","C":"2年","D":"永久禁止"},"answer":"B","explain":"依《委託書規則》（111年修正），對違規受處分者，限制其於一年內不得辦理代為處理徵求事務。"},{"num":15,"question":"「非屬徵求」與「徵求」最根本的區別在於：","options":{"A":"持股數量不同","B":"是否由股東主動委託","C":"代理股數多寡","D":"是否為金融機構股東"},"answer":"B","explain":"依《委託書規則》第3條，「非屬徵求」係受股東之主動委託取得委託書；「徵求」則係以廣告等方式主動取得，核心差異在委託之主動方。"},{"num":16,"question":"依委託書規則，一般徵求人（非金融機構、股東會有選舉議案）持股資格需繼續幾個月以上？","options":{"A":"3個月","B":"6個月","C":"1年","D":"2年"},"answer":"B","explain":"依委託書規則，一般公司（非金融機構）股東會有選舉議案時，一般徵求人須繼續持股「六個月以上」，且持有80萬股或已發行股份千分之二以上且不低於10萬股。"},{"num":17,"question":"依委託書規則，徵求人與非屬徵求，最根本的區別是什麼？","options":{"A":"持股比例不同","B":"主動取得委託書（徵求）vs受股東主動委託（非屬徵求）","C":"代理股數上限不同","D":"通知時間不同"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）主動取得委託書（徵求）vs受股東主動委託（非屬徵求）。其餘選項所述與法規不符，應加以辨別。"},{"num":18,"question":"依委託書規則，無限徵求人委託信託事業擔任徵求人，委任股東持股需繼續幾年以上？","options":{"A":"半年","B":"1年","C":"2年","D":"3年"},"answer":"B","explain":"依委託書規則，委託信託事業擔任徵求人（無限徵求）者，委任股東持股須繼續「一年以上」，且持有公司已發行股份總數10%以上。"},{"num":19,"question":"金融機構（金控、銀行、保險）股東會「無」選舉議案時，一般徵求人持股門檻為何？","options":{"A":"持有5萬股以上","B":"持有80萬股或2‰以上","C":"持有200萬股或5‰以上","D":"持有10%以上"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）持有5萬股以上。其餘選項所述與法規不符，應加以辨別。"},{"num":20,"question":"非屬徵求之受託代理人，所受委託人數不得超過幾人？","options":{"A":"10人","B":"20人","C":"30人","D":"50人"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）30人。其餘選項所述與法規不符，應加以辨別。"},{"num":21,"question":"金融機構股東會「有」選舉議案，一般徵求人持股條件為何？","options":{"A":"持有5萬股以上","B":"持有80萬股或2‰以上且不低於10萬股","C":"持有200萬股或5‰以上，且持股6個月以上","D":"持有10%以上，且持股1年以上"},"answer":"C","explain":"依委託書規則，一般公司（非金融機構）股東會有選舉議案時，一般徵求人須繼續持股「六個月以上」，且持有80萬股或已發行股份千分之二以上且不低於10萬股。"},{"num":22,"question":"非屬徵求之受託代理人代理股數，不得超過代理人本身持股的幾倍，且不得超過已發行股份幾%？","options":{"A":"3倍；2%","B":"4倍；3%","C":"5倍；5%","D":"無限制；3%"},"answer":"B","explain":"依委託書規則，非屬徵求之受託代理人代理股數，不得超過代理人本身持股的「4倍」，且不得超過已發行股份「3%」，以防止非徵求名義大量徵集委託書。"},{"num":23,"question":"非金融機構股東會「有」選舉議案，一般徵求人持股條件為何？","options":{"A":"持有5萬股以上","B":"持有80萬股或2‰以上且不低於10萬股，持股6個月以上","C":"持有10%以上持股1年以上","D":"持有1%以上"},"answer":"B","explain":"依委託書規則，一般公司（非金融機構）股東會有選舉議案時，一般徵求人須繼續持股「六個月以上」，且持有80萬股或已發行股份千分之二以上且不低於10萬股。"},{"num":24,"question":"徵求委託書的一般徵求人（非金融機構），股東會有選舉議案時，持股需達已發行股份多少股以上或幾‰以上且不低於10萬股？","options":{"A":"50萬股或1‰","B":"80萬股或2‰","C":"100萬股或3‰","D":"200萬股或5‰"},"answer":"B","explain":"依委託書規則，一般公司（非金融機構）有選舉議案時，一般徵求人須繼續持股六個月以上，且持有「80萬股或千分之二以上且不低於10萬股」。"},{"num":25,"question":"依委託書規則，徵求委託書之書面及廣告中，擬支持董事被選舉人的經營理念以幾字為限，超過則公司對該徵求資料不予受理？","options":{"A":"100字","B":"150字","C":"200字","D":"300字"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）200字。其餘選項所述與法規不符，應加以辨別。"},{"num":26,"question":"委託書的取得，下列何者不受委託書規則限制，屬非屬徵求？","options":{"A":"以廣告方式徵求","B":"受股東主動委託","C":"以電話方式徵求","D":"以拜訪方式徵求"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）受股東主動委託。其餘選項所述與法規不符，應加以辨別。"},{"num":27,"question":"徵求人代理之股數上限為已發行股份總數的幾%（一般情況）？","options":{"A":"1%","B":"2%","C":"3%","D":"5%"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）3%。其餘選項所述與法規不符，應加以辨別。"},{"num":28,"question":"違反委託書規則時，其代理之表決權效果為何？","options":{"A":"效力未定","B":"不予計算","C":"得撤銷","D":"無效"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不予計算。其餘選項所述與法規不符，應加以辨別。"},{"num":29,"question":"非屬徵求之受託代理人受三人以上股東委託，應於股東會開會幾日前檢附聲明書及委託書明細表送達公司？","options":{"A":"2日前","B":"3日前","C":"5日前","D":"7日前"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）5日前。其餘選項所述與法規不符，應加以辨別。"},{"num":30,"question":"委任人得於股東會後幾日內，查閱委託書的使用情形？","options":{"A":"3日","B":"5日","C":"7日","D":"10日"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）7日。其餘選項所述與法規不符，應加以辨別。"},{"num":31,"question":"委託書應由委託人親自簽名或蓋章，委託人親自填具徵求人或受託代理人姓名。哪種情況下得以當場蓋章方式代替？","options":{"A":"徵求人持股超過10%","B":"信託事業或股務代理機構受委託擔任徵求人，或股務代理機構受委任為受託代理人","C":"委託人本人親自到場","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）信託事業或股務代理機構受委託擔任徵求人，或股務代理機構受委任為受託代理人。其餘選項所述與法規不符，應加以辨別。"},{"num":32,"question":"無限徵求中，非金融機構的委任股東持股需達發行股份總數幾%以上，才能委託信託事業擔任徵求人（無選舉議案）？","options":{"A":"10%","B":"8%","C":"5%","D":"1%"},"answer":"A","explain":"依相關公司治理法規規定，正確答案為（A）10%。其餘選項所述與法規不符，應加以辨別。"},{"num":33,"question":"徵求人若違反「不得於徵求場所外徵求委託書」的規定，其代理之表決權效果為何？","options":{"A":"縮減代理股數","B":"不予計算","C":"得撤銷","D":"無效"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不予計算。其餘選項所述與法規不符，應加以辨別。"},{"num":34,"question":"徵求委託書之書面中，董事被選舉人的經營理念以幾字為限？","options":{"A":"100字","B":"200字","C":"300字","D":"500字"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）200字。其餘選項所述與法規不符，應加以辨別。"},{"num":35,"question":"股務代理機構擔任委託書之受託代理人，其所代理股數是否受已發行股份總數3%的限制？","options":{"A":"受限制","B":"不受限制","C":"視委託股東人數決定","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）不受限制。其餘選項所述與法規不符，應加以辨別。"},{"num":36,"question":"依委託書規則，徵求人不得將徵求之委託書作為何種用途？","options":{"A":"不得作為非屬徵求之委託書出席股東會","B":"不得轉讓他人使用","C":"以上皆是","D":"以上皆非"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）以上皆是。其餘選項所述與法規不符，應加以辨別。"},{"num":37,"question":"「非」金融控股、銀行及保險公司，股東會「有」選舉議案時，有限徵求人之資格何者正確？","options":{"A":"持有該公司已發行股份八十萬股","B":"持有已發行股份總數千分之二以上且不低於十萬股","C":"持有該公司已發行股份八十萬股，或持有已發行股份總數千分之二以上且不低於十萬股，且持續6個月以上","D":"以上皆非"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）持有該公司已發行股份八十萬股，或持有已發行股份總數千分之二以上且不低於十萬股，且持續6個月以上。其餘選項所述與法規不符，應加以辨別。"},{"num":38,"question":"委託書的取得，不得以給付金錢或其他利益為條件，但下列何者為例外？","options":{"A":"代為發放股東會紀念品","B":"支付代為處理徵求事務者的合理費用","C":"以上皆是","D":"以上皆非"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）以上皆是。其餘選項所述與法規不符，應加以辨別。"},{"num":39,"question":"金融機構股東若採「無限徵求」，委託信託事業或股務代理機構擔任徵求人，則委任股東的資格應為下列何者？","options":{"A":"繼續1年以上持有","B":"持有公司已發行股份總數10%以上","C":"符合金融控股公司法、銀行法、保險法之規定","D":"以上皆是"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）以上皆是。其餘選項所述與法規不符，應加以辨別。"},{"num":40,"question":"依委託書規則，金融機構無限徵求的委任股東，持股需達已發行股份總數幾%以上，且持股1年以上？","options":{"A":"5%","B":"8%","C":"10%","D":"15%"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）10%。其餘選項所述與法規不符，應加以辨別。"},{"num":41,"question":"依委託書規則，徵求人應於股東常會開會幾日前將委託書徵求資料送達公司及副知證基會？","options":{"A":"23日前","B":"30日前","C":"38日前","D":"45日前"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）38日前。其餘選項所述與法規不符，應加以辨別。"},{"num":42,"question":"公司應於股東常會開會幾日前，製作徵求人徵求資料彙總表冊傳至證基會揭露？","options":{"A":"15日前","B":"21日前","C":"30日前","D":"38日前"},"answer":"C","explain":"依相關公司治理法規規定，正確答案為（C）30日前。其餘選項所述與法規不符，應加以辨別。"},{"num":43,"question":"依委託書規則，違反特定情事（如違反徵求場所限制）者，其代理表決權「不予計算」，若徵求人代理股數超過上限，如何處理？","options":{"A":"全部不予計算","B":"超過部分不予計算","C":"降為3%上限","D":"以上皆非"},"answer":"B","explain":"依相關公司治理法規規定，正確答案為（B）超過部分不予計算。其餘選項所述與法規不符，應加以辨別。"},{"num":44,"question":"依委託書規則，股東臨時會的徵求人應於開會幾日前將委託書徵求資料送達公司？","options":{"A":"10日前","B":"15日前","C":"20日前","D":"23日前"},"answer":"D","explain":"依相關公司治理法規規定，正確答案為（D）23日前。其餘選項所述與法規不符，應加以辨別。"}]},{"chapter":"誠信經營","questions":[{"num":1,"question":"上市上櫃公司誠信經營守則之主要目的為何？","options":{"A":"規範員工薪酬標準","B":"協助上市上櫃公司建立誠信經營之企業文化及健全發展","C":"規定公司財務報告格式","D":"限制公司對外捐贈"},"answer":"B","explain":"依《上市上櫃公司誠信經營守則》第1條，訂定目的為協助上市上櫃公司建立誠信經營企業文化及健全發展，提供良好商業運作之參考架構。"},{"num":2,"question":"依誠信經營守則，「利益」之定義為何？","options":{"A":"僅指金錢","B":"指金錢與有形物品","C":"指任何有價值之事物，包括金錢、餽贈、佣金、職位等","D":"指超過新臺幣一萬元以上之財物"},"answer":"C","explain":"依《誠信經營守則》第3條，「利益」係指任何有價值之事物，包括任何形式之金錢、餽贈、佣金、職位、服務、優待、回扣等。"},{"num":3,"question":"依誠信經營守則，下列何種情形屬於可接受利益之例外？","options":{"A":"業務往來對象贈送之高價禮品","B":"基於正常社交禮俗且係偶發而無影響特定權利義務之虞","C":"任何來自供應商之餽贈","D":"超過新臺幣五千元之禮品"},"answer":"B","explain":"依《誠信經營守則》第3條，屬正常社交禮俗，且係偶發而無影響特定權利義務之虞時，不在不得收受利益之限制範圍。"},{"num":4,"question":"依誠信經營守則，不得提供不正當利益之禁止對象，不包含下列何者？","options":{"A":"客戶","B":"供應商","C":"公職人員","D":"公司所有股東"},"answer":"D","explain":"依《誠信經營守則》第10條，禁止對象為客戶、代理商、承包商、供應商、公職人員或其他利害關係人；「所有股東」並非本條禁止對象。"},{"num":5,"question":"依誠信經營守則，公司應將誠信經營政策與下列何者結合？","options":{"A":"股東股利政策","B":"員工績效考核及人力資源政策","C":"財務預算編製","D":"董事薪酬標準"},"answer":"B","explain":"依《誠信經營守則》第22條，公司應將誠信經營政策與員工績效考核及人力資源政策結合，設立明確有效之獎懲制度。"},{"num":6,"question":"依誠信經營守則，公司應於哪些管道揭露誠信經營採行措施？","options":{"A":"僅需在年報揭露","B":"公司網站、年報及公開說明書，並於公開資訊觀測站揭露守則內容","C":"僅需在公開資訊觀測站揭露","D":"向主管機關提交報告即可"},"answer":"B","explain":"依《誠信經營守則》第25條，公司應於公司網站、年報及公開說明書揭露誠信經營措施及量化數據，並於公開資訊觀測站揭露守則內容。"},{"num":7,"question":"與他人建立商業關係前，依誠信守則應先評估對方，下列何者非必要評估項目？","options":{"A":"是否訂定誠信經營政策","B":"該企業之財務績效","C":"所屬國別及業務是否屬賄賂高風險行業","D":"合法性"},"answer":"B","explain":"依《誠信經營守則》，建立商業關係前應評估合法性、誠信政策、國別及高風險行業等；「財務績效」並非本守則規定之必要評估項目。"},{"num":8,"question":"依誠信經營守則，公司應訂定具體檢舉制度並確實執行，其意涵為：","options":{"A":"只需設立匿名信箱","B":"制度應具體且確實執行，不得流於形式","C":"僅規定檢舉人獎勵金額","D":"每半年公告一次檢舉情形"},"answer":"B","explain":"依《誠信經營守則》第23條，公司應訂定具體檢舉制度並應確實執行，制度不得流於形式，應確保可落實運作。"},{"num":9,"question":"依誠信經營守則，適用範圍不包含下列何者？","options":{"A":"子公司","B":"直接捐助基金超過50%之財團法人","C":"具實質控制能力之機構","D":"持股未達控制標準之關聯公司"},"answer":"D","explain":"依《誠信經營守則》第1條，適用範圍及於子公司、捐助超過50%之財團法人及具實質控制能力之機構；未達控制標準之關聯公司不在適用範圍。"},{"num":10,"question":"依治理實務守則，兼任公司經理人之董事，不宜超過董事席次之幾分之幾？","options":{"A":"1/2","B":"1/3","C":"1/4","D":"1/5"},"answer":"B","explain":"依《上市上櫃公司治理實務守則》，兼任公司經理人之董事不宜逾董事席次三分之一，以確保董事會獨立性。"},{"num":11,"question":"依治理實務守則，公司連續幾年未更換會計師，應評估有無更換必要並提報董事會？","options":{"A":"3年","B":"5年","C":"7年","D":"10年"},"answer":"C","explain":"依《上市上櫃公司治理實務守則》，公司連續七年未更換會計師，或其受有處分或有損及獨立性情事者，應評估更換必要性並提報董事會。"},{"num":12,"question":"依治理實務守則，獨立董事不宜同時擔任超過幾家上市上櫃公司之董事（含獨立董事）或監察人？","options":{"A":"3家","B":"4家","C":"5家","D":"7家"},"answer":"C","explain":"依《上市上櫃公司治理實務守則》，獨立董事不宜同時擔任超過五家上市上櫃公司之董事（含獨立董事）或監察人。"},{"num":13,"question":"依「公開發行公司獨立董事設置及應遵循事項辦法」，獨立董事兼任其他公開發行公司獨立董事不得逾幾家？","options":{"A":"2家","B":"3家","C":"4家","D":"5家"},"answer":"B","explain":"依「公開發行公司獨立董事設置及應遵循事項辦法」，獨立董事兼任其他公開發行公司獨立董事不得逾三家（即含本公司最多四家）。"},{"num":14,"question":"依治理實務守則，公司參考AQIs評估聘任會計師獨立性及適任性，應多久辦理一次？","options":{"A":"每半年","B":"每年","C":"每兩年","D":"每三年"},"answer":"B","explain":"依《上市上櫃公司治理實務守則》，公司應每年至少一次參考審計品質指標（AQIs）評估聘任會計師之獨立性及適任性。"},{"num":15,"question":"依上市上櫃公司董事進修推行要點，新任董事於就任當年度應至少進修幾小時？","options":{"A":"6小時","B":"9小時","C":"12小時","D":"18小時"},"answer":"C","explain":"依《上市上櫃公司董事、監察人進修推行要點》，新任者於就任當年度至少宜進修12小時；續任者每年至少宜進修6小時。"}]},{"chapter":"獨立董事","questions":[{"num":1,"question":"下列關於「強制設置獨立董事」之公司範圍，何者正確？","options":{"A":"僅金融控股公司、銀行、保險公司強制設置","B":"所有公開發行公司均強制設置","C":"已依證交法發行股票之金控、銀行、票券、保險、證投信、綜合證券、上市櫃期貨商等金融業公發公司，及非屬金融業之所有上市櫃公司均強制設置；非屬金融業之興櫃公司自 109/1/1 起強制設置（任期未屆滿者得自任期屆滿時始適用）","D":"僅實收資本額 20 億元以上之公發公司強制設置"},"answer":"C","explain":"依金管會 107/12/19 金管證發字第 1070345233 號令，採分階段推動：（一）金融業公發公司及非金融業上市櫃公司均應於章程設置；（二）非金融業興櫃公司自 109/1/1 起設置，依§181-2 任期未屆滿者得自屆滿時始適用。"},{"num":2,"question":"依企業併購法§31 進行股份轉換而上市櫃之新設公司，應於何時完成獨立董事之設置？","options":{"A":"上市掛牌前一個月","B":"股份轉換基準日當日","C":"上市掛牌之同時","D":"得自新設公司現任董事、監察人任期屆滿當年始適用"},"answer":"D","explain":"因股份轉換新設公司於股份轉讓日即上市櫃，設立當時無法符合獨董候選人提名制；金管會 103/4/1 金管證發字第 10300058811 號令給予緩衝期，得自現任董監任期屆滿當年始適用。"},{"num":3,"question":"興櫃公司現任董事任期於 110 年屆滿，應於何時辦理獨立董事選舉？若於現任董監任期屆滿前提前全面改選並未決議任期屆滿始為解任，應如何處理？","options":{"A":"一律必為 110 年股東會","B":"110 年屆滿改選之股東會應辦理；若 109 年提前全面改選且未決議任期屆滿始為解任，視為提前解任，應於改選時即設置獨立董事","C":"必為 109 年股東會","D":"由公司自行決定"},"answer":"B","explain":"金管證發字第 1070345233 號令：109/1/1 起興櫃公司應設獨董，但 109 年任期未屆滿者得自任期屆滿時始適用。然依公司法§199-1，提前全面改選且未決議任期屆滿始為解任者，視為提前解任，非屬延後適用情形，應於改選時即設置獨董。"},{"num":4,"question":"公司於未公開發行時設置之獨立董事，公開發行後是否得被選任為獨立董事？","options":{"A":"一律不得續任","B":"獨董允屬證交法規定，屬公發公司始有適用；未公發公司可修章程訂「於公發後始適用」設置獨董，於股東會決議後 15 日內辦理變更登記，公發後始得依章程選任獨董","C":"自動續任，無須審查","D":"須由主管機關個別核准"},"answer":"B","explain":"獨董為證交法之制度，未公發階段尚無設置獨董之法源；惟公司得於章程明訂「於公發後始適用」，公發後依§14-2 及獨董辦法選任獨董；未公發時所謂「設置之獨董」並非當然延續，須於公發後依規定重新選任。"},{"num":5,"question":"公司自願設置獨立董事，其設置人數是否應依§14-2 第 1 項但書（不得少於 2 人且不得少於董事席次 1/5）辦理？","options":{"A":"必須依該但書辦理","B":"對自願設置者並未強制規範人數及比例，公司得依需要自行訂定其獨董人數或比例並載明章程","C":"須少於 2 人","D":"由主管機關核定"},"answer":"B","explain":"§14-2 第 1 項但書之強制人數規範僅適用於主管機關要求設置獨董之公司；自願設置者不受該人數及比例拘束，公司可自訂並載明章程。"},{"num":6,"question":"公開發行公司自願設置獨立董事者，是否仍受證交法及相關授權子法關於獨立董事之規範約束？","options":{"A":"完全不受規範","B":"除無需符合§14-2 第 1 項但書「人數不少於 2 人且不少於 1/5」外，餘仍應受證交法及相關授權子法之約束","C":"全部規範包括人數比例均須遵守","D":"由公司章程訂定遵循標準"},"answer":"B","explain":"自願設置者排除的僅為人數比例之強制要求；獨立性、提名制、兼任、利益迴避等實質規範仍一體適用。"},{"num":7,"question":"依§14-2 設置獨立董事之公司，獨董名額應如何載明於公司章程？","options":{"A":"必須載明確定人數","B":"章程得選擇下列方式之一載明：（一）獨董人數不得少於 2 人，且不得少於董事席次 1/5；（二）獨董名額 X 人；（三）獨董名額 X 人至 X 人。但依§14-2 第 2 項提名公告獨董應選名額時，名額應確定，不得仍依（一）（三）方式公告","C":"由董事會決議即可，無須載章程","D":"由主管機關核定"},"answer":"B","explain":"§14-2 第 1 項但書允章程以三種方式載明獨董名額，提供公司彈性；惟提名公告階段為利股東認知，應選名額應為確定值，不得使用範圍式表述。"},{"num":8,"question":"公司自願設置之獨立董事全數辭任時，是否得排除§14-2 第 6 項補選之規定？","options":{"A":"得排除補選規定","B":"仍應依§14-2 第 6 項辦理補選，自願設置者無例外","C":"由公司股東會決定","D":"須報主管機關核准"},"answer":"B","explain":"一旦設置獨董即受§14-2 全部規範，包括第 6 項補選義務；自願設置不構成排除事由。"},{"num":9,"question":"依§14-2 設獨董且採候選人提名制，或依§14-4 設審計委員會之公司，章程應如何載明？","options":{"A":"章程僅須載明董事人數，獨董及審委事項由董事會訂定","B":"章程應載明（含但不限）：設置獨董人數及採候選人提名制之選舉程序；如設審委應載明依§14-4 設置、由含至少 1 名具會計或財務專長之獨董若干人組成、決議應有全體成員 1/2 以上同意等","C":"僅須股東會決議即可","D":"由主管機關核定範本"},"answer":"B","explain":"金管會公布之章程範例涵蓋：（1）獨董與非獨董一併進行選舉、分別計算當選名額；（2）採候選人提名制；（3）設審委時規範組成、會計／財務專長獨董、召集人、決議成數。"},{"num":10,"question":"獨立董事之名額與提名方式是否應載明於公司章程？非獨立董事之選舉方式是否亦應改為候選人提名制？","options":{"A":"獨董採提名制，非獨董無提名制要求","B":"獨董與非獨董均應採候選人提名制度，並載明於章程；獨董提名方式依獨董辦法§5 及公司法§192-1，非獨董部分依金管會 108/4/25 金管證交字第 1080311451 號函，上市櫃公司之董監選舉自 110 年起均應採提名制","C":"由公司章程自由訂定，無強制","D":"由董事會決議"},"answer":"B","explain":"獨董本須提名制；非獨董於 110 年起亦全面採提名制（金管證交字第 1080311451 號函），均應載明章程，股東應就候選人名單中選任。"},{"num":11,"question":"獨立董事之獨立性規範中，同一集團之關係企業子公司之職員或董事監察人可否擔任獨立董事？外國人是否可擔任獨立董事？","options":{"A":"同一集團關係企業子公司職員或董監均得擔任獨董；外國人不得擔任","B":"除母公司、子公司或屬同一母公司之子公司之獨董得相互兼任外，同一集團關係企業子公司職員或董監皆不得擔任獨董；國籍非為獨立性之判斷標準（即外國人得擔任）","C":"由主管機關個案核准","D":"由公司章程訂定"},"answer":"B","explain":"獨董辦法§3 第 2 項僅放寬母子公司或同一母公司之子公司獨董相互兼任；其他關係企業子公司人員仍不得擔任獨董。國籍不影響獨立性判斷。"},{"num":12,"question":"獨董辦法§3 所稱「選任前二年」之起算時點為何？","options":{"A":"董事會提名日","B":"股東會選任日","C":"提名公告日","D":"主管機關核准日"},"answer":"B","explain":"獨董辦法§3 第 1 項所稱選任前二年，以股東會選任日為評估基礎。"},{"num":13,"question":"獨董辦法§3 第 1 項所稱「關係企業」之定義為何？","options":{"A":"僅限公司法§369-1 至§369-3 所定之關係企業","B":"公司法第六章之一之關係企業，或依「關係企業合併營業報告書、合併財務報表及關係報告書編製準則」、IFRS 第 10 號規定應編製合併財務報告之公司","C":"由公司自行定義","D":"由商業會計法定義"},"answer":"B","explain":"獨董辦法§3 第 6 項明定關係企業範圍，除公司法第六章之一外，亦涵括依編製準則或 IFRS 10 應編合併財報之公司，較公司法為廣。"},{"num":14,"question":"獨立董事在選任前二年及任職期間不得為公司或關係企業之董事、監察人，但母子公司或屬同一母公司之子公司之獨董相互兼任者不在此限。該等子公司是否必須為公開發行公司？","options":{"A":"子公司即使非公開發行亦可兼任","B":"子公司必須為公開發行公司。獨董兼任之規定僅適用於依§14-2 設置獨董之公發公司","C":"須報主管機關核准","D":"由獨董本人同意即可"},"answer":"B","explain":"獨董為證交法制度，僅公發公司有適用；母子公司獨董兼任之放寬亦以「依§14-2 設獨董」為前提，子公司須為公發公司方有獨董得兼任之問題。"},{"num":15,"question":"獨立董事兼任其他公司獨董家數之限制，是否包含外國公司？","options":{"A":"包含外國公司","B":"限於依證交法辦理股票公開發行之國內公司，不含外國公司","C":"視該外國公司是否在台上市而定","D":"由公司認定"},"answer":"B","explain":"獨董辦法§4 兼任家數限制以「依證交法公開發行之公司（國內）」為限，外國公司獨董兼任不計入。"},{"num":16,"question":"獨立董事是否得兼任其他公司之董事、監察人或其他職務？","options":{"A":"不得兼任任何他公司董監或職務","B":"依獨董辦法§4，兼任其他公發公司獨董不得逾 3 家；又依「上市上櫃公司治理實務守則」§24 第 3 項，集團企業互提獨董候選人時，應於受理時揭露候選人適任性、當選權數、兼職情形","C":"兼任無任何限制","D":"由公司章程訂定"},"answer":"B","explain":"兼任他公發公司獨董上限 3 家；其他董監或職務無絕對禁止，但集團互提情形須於公開資訊觀測站揭露適任性與當選權數。"},{"num":17,"question":"甲君擔任某金融控股公司之獨立董事，同時兼任 3 家該金控 100% 持有之公開發行子公司獨立董事。依獨董辦法§4，甲君尚可再兼任幾家「其他」公開發行公司之獨立董事？","options":{"A":"0 家","B":"1 家","C":"2 家","D":"3 家"},"answer":"B","explain":"獨董辦法§4：（1）兼任「他公發公司」獨董不得逾 3 家。（2）金控／投控之獨董兼其 100% 持有公發子公司獨董，「超過 1 家者，超過部分計入兼任家數」。甲君兼 3 家子公司，超過 1 家即超出 2 家，已用 2 家配額；3-2=尚可再兼 1 家。"},{"num":18,"question":"「非屬」金融控股或投資控股公司之上市櫃公司，其獨立董事兼任該公司 100% 持有之公發子公司獨立董事，是否計入「其他」公發公司獨董家數計算？","options":{"A":"不計入","B":"仍須計入「其他」公發公司獨董之兼任家數計算","C":"視子公司資本額而定","D":"須報主管機關核定"},"answer":"B","explain":"獨董辦法§4 第 2 項對「金控／投控」之 100% 子公司有「超過 1 家計入」之特別規定；非金控／投控之上市櫃公司「無此放寬」，其獨董兼任 100% 子公司獨董仍全數計入家數計算。"},{"num":19,"question":"為公司提供存款、放款、融資等業務之金融機構，其董事等相關人是否得擔任公司之獨立董事？","options":{"A":"一律不得擔任","B":"金融機構提供有公開價格之一般性服務，或日常性之交易或服務（如信用卡、銀行、經紀、抵押貸款、保險），且該交易無特殊優惠條件者，非屬獨董辦法§3 第 1 項第 9 款規定範圍，得擔任獨董","C":"得擔任，無任何條件","D":"須報主管機關核准"},"answer":"B","explain":"§3 第 1 項第 9 款規範對象係「為公司或關係企業提供商務／法務／財務／會計等服務之專業人士、機構之有給職董監經理人」；惟金管會明示金融機構日常性、有公開價格、無特殊優惠之服務不在此款範圍內。"},{"num":20,"question":"公司辦理合併，因合併消滅公司之董事長是否得擔任存續公司之獨立董事？","options":{"A":"一律得擔任","B":"不得擔任存續公司之獨立董事；惟仍可依相關規定被選任為一般董事","C":"須俟選任前二年屆滿後始可","D":"須報主管機關核准"},"answer":"B","explain":"依獨董辦法§3 第 1 項第 2 款，獨董於選任前 2 年及任職期間不得任公司或關係企業之董監。消滅公司之董事長對承受其業務之存續公司獨立行使職權有疑慮，故不得任存續公司獨董，惟可任一般董事。"},{"num":21,"question":"金融控股公司持有發行全部股份之子公司，或政府／法人股東一人組織之股份有限公司，依公司法§128-1 由法人股東指派之獨立董事，可否隨時任意改派？","options":{"A":"得隨時任意改派","B":"為確保獨董效能與中立執行職務之精神，獨董之任期宜具備安定性，於任職期間「無正當理由不宜隨時改派」","C":"須俟任期屆滿始得改派","D":"須報主管機關核准"},"answer":"B","explain":"金管會見解：雖法源允法人股東指派董監，獨董仍應維持任期安定性，無正當理由不宜任意改派，避免損及獨立性。"},{"num":22,"question":"獨董辦法§3 第 3 項所稱「現已解任」之時點，係指：","options":{"A":"解任事由發生日","B":"股東會選任日","C":"主管機關核准日","D":"公司公告日"},"answer":"B","explain":"獨董辦法§3 第 3 項所稱「現已解任」以股東會選任日為評估基礎；提名股東及董事會於提供推薦名單時，並應檢附被提名人於股東會選任日前辭任獨董之承諾書。"},{"num":23,"question":"參與特別股認購而未參與公司營運之持股 5% 以上、或持股前 5 名之法人股東，其董事、監察人或受僱人是否得選任為獨立董事？","options":{"A":"得選任，特別股不計入","B":"不得選任。獨董辦法§3 第 1 項第 5 款並未排除特別股，故持有特別股 5% 以上或前 5 名法人股東之董監受僱人均不得擔任獨董","C":"須持股 10% 以上始受限","D":"由公司章程訂定"},"answer":"B","explain":"§3 第 1 項第 5 款禁止持股 5% 以上或前 5 名法人股東之董監受僱人擔任獨董；該款未排除特別股，故特別股持股仍計入該比例認定。"},{"num":24,"question":"獨立董事如有不得充任之情事而當然解任，下列何者正確？","options":{"A":"解任時點為股東會決議解任日；解任後一律得遞補","B":"解任時點為「解任事由發生時」；解任後參與之決議，扣除其票數仍符成數者決議有效，否則無效；證交法及獨董辦法無遞補規定，回歸公司法處理（依經濟部 96/7/13 經商字第 09602083170 號函，準用§197 第 3 項，當選失效，名額即缺額，無遞補規定）","C":"須報主管機關核准始能解任","D":"由公司章程訂定遞補機制"},"answer":"B","explain":"金管會與經濟部見解一致：解任時點為事由發生時；事後參與之決議效力依扣除其票數後是否仍符成數決定；無遞補機制，名額即為缺額。爭議事項屬司法認事範疇。"},{"num":25,"question":"公司辦理獨立董事選舉若採通訊投票方式（書面或電子方式行使表決權）且擔心無法順利選出獨立董事，應如何處理？","options":{"A":"視為流會，須召集臨時股東會","B":"由董事會直接指派","C":"依公司法§177-1，書面或電子方式行使表決權之股東視為親自出席；且依獨董辦法§5，獨董與非獨董應一併進行選舉、分別計算當選名額，故公司應可選出獨董，是否選出與投票方式無涉","D":"由主管機關代為核派"},"answer":"C","explain":"通訊投票結果視同親自出席；獨董提名制下與非獨董一併選舉、分別計票，並非分次投票，公司應能順利選出獨董。"},{"num":26,"question":"公開發行公司獨立董事之選舉，若提名人數超過獨立董事應選名額時，獨董被提名人之效力為何？","options":{"A":"僅超過部分無效，前面依序提名者仍有效","B":"依獨董辦法§5 第 3 項規定，所提全部獨立董事候選人名單皆屬無效","C":"由董事會決定保留哪些","D":"由提名股東自行刪減"},"answer":"B","explain":"獨董辦法§5 第 3 項明定：提名人數超過應選名額時，「全部獨董候選人名單皆屬無效」。此為較重之法律效果，目的在約束提名股東及董事會審慎控管提名數量。"},{"num":27,"question":"關於獨立董事候選人之列入規定，下列敘述何者正確？","options":{"A":"董事會主觀認為提名人不適合者，得不列入候選人","B":"董事會應形式審查：是否於公告受理期間內提出、提名股東持股是否達 1%、提名人數是否超過應選名額、是否敘明被提名人姓名／學歷／經歷並檢附符合§2 第 1 項專業資格、§3 獨立性、§4 兼職限制等文件（公立大專專任教師另檢附學校核准兼職文件）；無發現不符合條件即應列入","C":"任何提名一律列入","D":"由主管機關核定列入名單"},"answer":"B","explain":"獨董辦法§5 第 3、4、5 項採形式審查制；公立大專專任教師另依金管證發字第 10803619347 號令檢附學校核准兼職文件。董事會無實質否決裁量權，文件齊備且形式合規即應列入。"},{"num":28,"question":"證交法§14-3 第 1 項第 4、5 款及§14-5 第 1 項第 5、6 款所稱「重大之資產或衍生性商品交易」「重大之資金貸與、背書或提供保證」之定義範圍為何？","options":{"A":"由公司章程訂定金額門檻","B":"係指公開發行公司從事該等交易，依公司所訂處理程序或其他法令規定應經董事會通過者；公司並應依規定審慎訂定合理之決策層級及作業程序，充分考量獨董意見，並提報股東會同意","C":"由獨董逐案認定","D":"由主管機關核定金額門檻"},"answer":"B","explain":"「重大」之認定係依公司處理程序或法令規定應經董事會通過之金額門檻為界；處理程序之訂定／修正應提股東會同意並輸入主管機關指定資訊申報網站。"},{"num":29,"question":"對於§14-3 應提董事會事項，獨立董事不能親自出席時得否委由他人代理？","options":{"A":"不得委由任何人代理","B":"應親自出席；如不能親自出席得「委由其他獨立董事」代理；惟對議案有反對或保留意見時，仍應事先出具書面意見，並載明於董事會議事錄","C":"得委由非獨董代理","D":"由董事長指派代理人"},"answer":"B","explain":"依董事會議事辦法，§14-3 應提事項獨董應親自出席，不得由非獨董代理；不能親自出席時限委由其他獨董代理，並要求對反對／保留意見事先書面表達。"},{"num":30,"question":"獨立董事因旅居國外無法親自出席董事會，能否由非獨立董事代理出席？","options":{"A":"得，因屬不可抗力","B":"不得委由非獨董代理；如不能親自出席而對議案有反對或保留意見，除有正當理由外應事先出具書面意見並載明於議事錄","C":"須報董事會核備","D":"由公司章程規定"},"answer":"B","explain":"獨董代理人限於其他獨董，旅居國外不構成例外；對議案有反對／保留意見者，仍須以書面表達以維護議事完整性。"},{"num":31,"question":"公開發行公司是否可因設置獨立董事享有持股成數之優惠獎勵？","options":{"A":"設置獨董即享八折，無人數要求","B":"依「公發公司董事監察人股權成數及查核實施規則」§2，公發公司「選任獨董 2 人以上者」，全體董監得享持股成數八折優惠","C":"須報主管機關核准","D":"由公司章程訂定"},"answer":"B","explain":"持股成數規則§2 設有「選任獨董 2 人以上」之門檻；不僅是「設置」即可，須實際選任達 2 人以上方享八折優惠。"},{"num":32,"question":"設置審計委員會之公司不得設置監察人，是否仍須遵守董事、監察人持股成數規定？","options":{"A":"完全免除持股成數規定","B":"因審委由全體獨董組成，無監察人，故無監察人持股成數適用；僅有「公司全體董事」持股須符合法定持股成數規定","C":"由獨董集體持股取代","D":"改由審委集體持股"},"answer":"B","explain":"設審委之公司不再設監察人，故監察人持股義務不適用；惟全體董事（含獨董）持股仍應符合規定（已享八折優惠者依其規定計）。"},{"num":33,"question":"獨立董事就任時持股偏低（符合獨立性持股上限），於任期中轉讓持股超過 1/2 時，是否適用公司法§197 關於董事持股轉讓超過 1/2 當然解任之規定？","options":{"A":"仍適用§197 當然解任","B":"證交法§14-2 第 5 項已排除公司法§197 之適用；因獨董持股偏低或免持股，避免小額持股轉讓而當然解任","C":"須由股東會決議解任","D":"僅須申報，不影響任期"},"answer":"B","explain":"獨董持股本就有上限規定且金額偏低，若仍受§197「轉讓 1/2 當然解任」拘束，可能因小額轉讓即解任，不符制度設計；§14-2 第 5 項明文排除§197 適用。"},{"num":34,"question":"公司所選任之獨立董事可否於任期中轉換身分為非獨立董事？或非獨立董事於任期中轉換身分為獨立董事？","options":{"A":"得任意轉換身分","B":"依獨董辦法§6，獨董於任期中如有違反獨立性致應予解任時不得變更身分為非獨董；非獨董於任期中亦不得逕行轉任獨董","C":"經董事會決議即可","D":"須報主管機關核准"},"answer":"B","explain":"獨董辦法§6 嚴禁任期中身分轉換，避免規避獨立性要件或解任程序；如欲變更身分須俟任期屆滿改選時辦理。"},{"num":35,"question":"公司是否得對獨立董事之酬勞另予計算（與非獨董分別訂定）？","options":{"A":"獨董與非獨董酬勞應一致","B":"獨董亦屬公司法之董事，依公司法§196 應於章程訂明或股東會決議；對獨董得酌訂與非獨董不同之合理報酬","C":"由董事會自行決定","D":"由主管機關核定"},"answer":"B","explain":"公司法§196 為董事報酬之一般規範，獨董亦適用；考量獨董之獨立審查職責，實務上多酌訂較高或不同之合理報酬，並於章程或股東會明定。"},{"num":36,"question":"上市櫃公司選任公立各級學校專任教師擔任獨立董事，公司董事會討論與該教師服務學校簽訂產學合作及學術回饋機制契約，該次董事會之召集是否得「併」股東會改選董事後當日召開該屆首次董事會（推選董事長之會議）討論？","options":{"A":"不合規，因產學合作須提前 7 日通知","B":"合規。教育部處理原則§12 點第 2 項要求股東會後首次董事會作成自選任日起 3 個月內與學校完成簽約之決議；又依公司法§203 及董事會議事辦法§3 第 2 項，於改選後當日召開首次董事會推選董事長並併同討論該事項，尚不違反相關規範","C":"須報教育部核准","D":"須另行召集臨時董事會"},"answer":"B","explain":"教育部處理原則要求 3 個月內完成簽約之決議須於股東會後首次董事會作成；公司法§203 及議事辦法§3 第 2 項之 7 日前通知有「緊急情事得隨時召集」之例外。經商字第 10502428560 號函肯認此安排合規。"},{"num":37,"question":"獨立董事為公司或關係企業提供商務、法務、財務、會計等相關服務取得報酬，其累計金額之計算方式為何？","options":{"A":"個別公司分別計算","B":"以最近二年提供「公司及其關係企業」前開相關服務「合計取得」之報酬累計金額認定（合併計算）；依§3 第 1 項第 9 款，逾新台幣 50 萬元即構成禁止情形（且「審計服務」直接禁止）","C":"由獨董自行選擇計算方式","D":"由公司章程訂定計算方式"},"answer":"B","explain":"為防拆單規避，§3 第 9 款採合併計算：公司及關係企業合計報酬累計逾 50 萬元即落入禁止情形。另審計服務不論金額一律禁止。"},{"num":38,"question":"公司與他公司之董事席次或有表決權之股份超過半數係由「同一人」控制，他公司之董事、監察人或受僱人不得擔任公司獨董。所稱「同一人」係指何者？控制關係如何認定？","options":{"A":"限同一自然人","B":"限同一法人","C":"「同一人」包括同一自然人或同一法人；控制係指該自然人或法人「直接或間接持有」公司與他公司已發行有表決權股份總數超過半數，或公司與他公司過半數董事「直接或間接指派」（並併計利用他人名義持股、依公司法§369-1、2、3、9、11 之關係企業及 IFRS 10 控制與從屬關係）","D":"由公司認定"},"answer":"C","explain":"獨董辦法§3 第 1 項第 6 款採實質認定，「同一人」涵括自然人及法人；控制範圍包含直接及間接持股、指派董事，並依公司法關係企業章及 IFRS 10 計算，以杜規避。"}]},{"chapter":"董監獨立性","questions":[{"num":1,"question":"公司申報補辦公開發行時，其董事、監察人之人數及資格規定，下列何者正確？","options":{"A":"董事 3 人、監察人 1 人，符合證交法§26-3 即可","B":"董事人數應達 5 人、監察人應達 2 人，且應符合證交法§26-3 第 2 至 4 項獨立性規定","C":"董事 7 人、監察人 3 人，且應符合證交法§14-2 獨立董事規定","D":"於申報補辦公開發行階段尚不需符合§26-3，俟正式上市時再符合即可"},"answer":"B","explain":"依證交法§26-3 及公司法§216 第 2 項，公司於申報補辦公開發行時，董事人數應達 5 人、監察人應達 2 人，且董事、監察人應符合§26-3 第 2 項至第 4 項有關獨立性規定（不得由同一法人股東代表人同時當選董監、董事間超過半數不得有親屬關係、監察人間或與董事間至少 1 席不得有親屬關係）。"},{"num":2,"question":"違反證交法§26-3 第 2 項（政府或法人股東由其代表人同時當選或擔任董事及監察人）之法律效果為何？","options":{"A":"由公司股東會自行決議處理","B":"全體董監選舉自始無效，須重新選舉","C":"類推適用§26-3 第 5、6 項規定，該政府或法人所派代表人當選之監察人無效","D":"類推適用§26-3 第 5、6 項規定，該政府或法人所派代表人當選之董事無效"},"answer":"C","explain":"依 99 年 2 月 6 日金管證發字第 0990005875 號解釋令，違反§26-3 第 2 項者類推適用同條第 5、6 項規定，使該代表人當選之「監察人」（非董事）無效；理由為維持董事會運作穩定，並貫徹監察制度之獨立性。"},{"num":3,"question":"董事或監察人選任時或就任後始發現違反§26-3 第 3 項及第 4 項規定（親屬關係限制），應如何處理？","options":{"A":"選任時：由得票較少者失其效力；就任後：準用§26-3 第 5 項當然解任","B":"一律由股東會決議解任","C":"選任時：合議重選；就任後：自動由次順位遞補","D":"須報主管機關核准後始得解任"},"answer":"A","explain":"依§26-3 第 5 項，選任時不符獨立性規定者失其效力（如兄弟分別為最高、次高票時，弟之當選失效）；就任後始違反者準用同項規定當然解任。本題為金管會 96 年 1 月 1 日證交法修正後之釋例。"},{"num":4,"question":"公司為單一法人股東所組織（如金融控股公司持股 100% 之子公司），其董事、監察人之派任是否適用§26-3 第 2 項規定？","options":{"A":"適用，仍應遵守§26-3 第 2 項代表人不得同時當選董監之規定","B":"不適用。屬公司法§128-1「政府或法人股東一人公司」，董監由法人股東依§128-1 第 2 項指派，非適用公司法§27 第 2 項，故無§26-3 第 2 項適用","C":"由主管機關依個案核定是否適用","D":"須報金管會核准後始可指派"},"answer":"B","explain":"證交法§26-3 第 2 項排除的是公司法§27 第 2 項之代表人當選機制。單一法人股東公司依公司法§128-1 第 2 項由法人指派董監，並非依§27 第 2 項當選，故不生§26-3 第 2 項之適用問題。"},{"num":5,"question":"法人股東 A 及其子公司或關係企業，可否由各自之代表人分別當選為他公司之董事及監察人（即 A 派代表擔任董事、A 之子公司派代表擔任監察人）？","options":{"A":"可以，因為是不同法人股東","B":"可以，但須報主管機關核准","C":"不可。依金管證發字第 0990005875 號令，§26-3 第 2 項所稱「代表人」包括法人股東或與其有控制或從屬關係者（含財團法人、社團法人）指派之代表人，視同同一法人之代表人","D":"由公司章程訂定"},"answer":"C","explain":"金管證發字第 0990005875 號令明確擴張§26-3 第 2 項「代表人」之範圍，包括法人股東之控制或從屬公司（含關係企業及財團、社團法人）指派之代表人，避免透過子公司或關係企業迂迴規避規定。"},{"num":6,"question":"若法人股東「並非依公司法§27 第 2 項」當選或擔任公司董事、監察人時（例如依§27 第 1 項法人本身當選），是否仍適用§26-3 第 2 項規範？","options":{"A":"仍適用§26-3 第 2 項","B":"須先辦理改派程序","C":"不適用§26-3 第 2 項；該規定排除者僅為公司法§27 第 2 項之代表人當選機制","D":"由公司章程訂定"},"answer":"C","explain":"§26-3 第 2 項明文「不適用公司法第 27 條第 2 項規定」，即僅針對§27 第 2 項代表人當選之情形；若法人股東係依§27 第 1 項以法人本身當選（再指派代表行使職務），則無§26-3 第 2 項之適用問題。"},{"num":7,"question":"公開發行公司原由不同法人股東分別指派代表人擔任董事及監察人，因法人股東合併致存續法人同時持有兩席代表人位（一董一監），可否自任期屆滿後始適用§26-3 第 2 項規定？","options":{"A":"可，得自任期屆滿後始調整","B":"不可。為落實公司治理精神，應立即適用§26-3 第 2 項，不待任期屆滿","C":"由公司章程訂定過渡期間","D":"須報主管機關核定過渡安排"},"answer":"B","explain":"為避免合併後產生「同一法人代表同時擔任董監」之違規狀態延續至任期屆滿，金管會明確採立即適用立場，公司應即時調整代表人派任以符合§26-3 第 2 項。"},{"num":8,"question":"法人股東 X 為某公開發行公司之股東，可否由其代表人當選公司「全數」董事席次？","options":{"A":"可以，無任何限制","B":"完全不可，明文禁止由單一法人代表人當選全數董事","C":"原則上可，但仍應符合§26-3 第 2 項（不得同時當選董監）、第 3 項（董事間超過半數不得有親屬關係）、第 4 項（監察人間或與董事間至少 1 席不得有親屬關係）等規定","D":"須報主管機關核准"},"answer":"C","explain":"金管會見解：法人代表人當選董事並無「不得當選全部席次」之絕對禁止，但仍應符合§26-3 第 2、3、4 項各項獨立性要求。實務上若代表人之間有親屬關係或同時涉及監察人席次，將受其他項次拘束。"},{"num":9,"question":"A 公司有 7 席董事，其中 3 席（甲、乙、丙）相互間具配偶或二親等以內親屬關係；另 2 席（X、Y）相互間具配偶或二親等以內親屬關係；甲乙丙與 X、Y 之間及其餘董事間並無親屬關係。是否違反§26-3 第 3 項「董事間應有超過半數不得有親屬關係」之規定？","options":{"A":"違反，因合計已有 5 席董事涉及親屬關係，超過半數","B":"未違反。具親屬關係之最大組僅 3 席，仍未達超過半數（即超過 3.5 席，須至少 4 席之同一組親屬關係）","C":"違反，只要任二董事間有親屬關係即構成違反","D":"由公司章程規定認定方式"},"answer":"B","explain":"§26-3 第 3 項要求超過半數之董事間不得有親屬關係，係以「同一組親屬關係」之席次計算，而非合計各組。本題甲乙丙 3 席與 X、Y 2 席屬不同組，最大組僅 3 席（未達 7 席之過半數 4 席），尚未違反規定。此為金管會問答集釋例。"},{"num":10,"question":"§26-3 第 3、4 項對於董事間、監察人間、董事及監察人間應超過一定比例不得具親屬關係之規定，其規範對象是否及於法人股東之代表人？","options":{"A":"僅自然人董監受規範，法人代表不受拘束","B":"僅法人代表人受規範","C":"包括自然人董監及法人董監之代表人","D":"由公司章程訂定"},"answer":"C","explain":"§26-3 第 3、4 項立法意旨在強化董事會與監察人獨立性，依公司法§27 第 1 項法人為股東當選董監時須指定自然人代表行使職務，故規範對象應涵括法人董監之代表人，俾杜代表人迂迴規避親屬限制。"},{"num":11,"question":"公司之監察人由法人 Y 名義當選，Y 派任之代表人甲，係另一席自然人董事乙之配偶。此情形是否違反§26-3 第 4 項？","options":{"A":"違反，因法人代表人為董事配偶","B":"違反，全體監察人皆須與全體董事無親屬關係","C":"未必違反。§26-3 第 4 項僅要求監察人間或與董事間「至少 1 席」不得有親屬關係；只要其餘監察人中有任 1 席與董監間不具親屬關係，即未違反","D":"由主管機關個案認定"},"answer":"C","explain":"§26-3 第 4 項規定監察人間或與董事間至少 1 席不得具親屬關係，並非禁止任何親屬關係。只要存在 1 席監察人（不論自然人或法人代表人）與其餘監察人及董事間皆無配偶／二親等以內親屬關係，即合規。"},{"num":12,"question":"證交法§14-2 第 5 項及§26-3 第 7 項所稱「最近一次股東會」應如何認定？","options":{"A":"解任後立即召開之臨時股東會","B":"若獨董或董事解任時點未逾董事會訂定股東會日期及議案內容之決議日（或章程有候選人提名制度時之提名受理期間及應選名額決議日），即為原訂股東會；若已逾，則為下次股東會","C":"一律以解任後 90 日內召開之股東會","D":"由公司章程自由訂定"},"answer":"B","explain":"依 96 年 8 月 6 日金管證一字第 0960042004 號令，「最近一次股東會」之認定以獨董或董事解任時點是否已逾董事會關於股東會召開及議案內容（或候選人提名）之決議日為斷：未逾者為原訂股東會、已逾者為其下次股東會。此認定避免公司因急迫無法依原議程處理補選。"},{"num":13,"question":"公司原已設置獨立監察人，現有缺額時應如何處理？","options":{"A":"應依原制度補選獨立監察人","B":"獨立監察人自 96 年 1 月 1 日起已無法源（前財政部證期會 92 年函令於 96 年廢止），現有缺額之補選回歸公司法一般監察人規定辦理；不再補設「獨立」監察人","C":"由主管機關核定是否補選","D":"不必補選，待全部任期屆滿時再行改選"},"answer":"B","explain":"前財政部證期會 92 年 4 月 8 日台財證一字第 0920001468 號、92 年 9 月 23 日台財證一字第 0920003896 號函令所定獨立監察人資格條件，自 96 年 1 月 1 日起廢止，公司無設置獨立監察人之法源；如已上市櫃公司原所設之獨立監察人有缺額，應依公司法之一般監察人規定辦理補選。"}]},{"chapter":"併購特委會","questions":[{"num":1,"question":"依企業併購法規定，下列何者為特別委員會之強制設置對象？","options":{"A":"全體公開發行公司，無論是否進行併購","B":"公開發行股票之公司於召開董事會決議併購事項前應設置；公司依證交法設有審計委員會者，由審計委員會行之","C":"僅上市櫃公司於併購時須設置","D":"由主管機關核定個案"},"answer":"B","explain":"依企併法§6 第 1、2 項，公開發行股票之公司於董事會決議併購事項前，應設置特別委員會；設有審計委員會者由審計委員會行之，並依證交法有關審計委員會決議事項規定辦理。"},{"num":2,"question":"公開發行公司已設置審計委員會者，行使企併法§6 職權時，證交法／審計委員會辦法／特別委員會辦法之優先順序為何？","options":{"A":"特別委員會辦法絕對優先","B":"依企併法§2「本法未規定者，依其他法律之規定」，設審計委員會者依證交法及審計委員會辦法辦理；惟非屬證交法決議事項者（如資訊揭露、保密承諾），仍應依特別委員會辦法之規定辦理","C":"由公司自行選擇","D":"由主管機關個案核定"},"answer":"B","explain":"依企併法§2、§6 第 2 項，設審計委員會者由其行職權，依證交法及審計委員會辦法；惟特委辦法§7 第 4 項等資訊揭露、保密事項仍應遵循。"},{"num":3,"question":"審計委員會辦法§11 規定「得」委任專業人員提供諮詢，與企併法§6 及特別委員會辦法§6 規定「應」委請專家表示意見，發生競合時應如何適用？","options":{"A":"從寬解釋，採「得」即可","B":"依法律優位（位階）原則，企業併購法及其授權之特別委員會辦法位階高於審計委員會辦法；又企併法§6 第 3 項已明文規定「應」委請專家，自應依企併法及特委辦法辦理（即必須委請）","C":"由獨立董事個案決定","D":"由主管機關核定"},"answer":"B","explain":"審計委員會辦法§2 規定其他法律另有規定者從其規定；企併法§6 第 3 項明定「應」委請專家，且企併法位階高於審計委員會辦法，故於併購審議事項採「應」之強制標準。"},{"num":4,"question":"關於併購特別委員會之組織性質、設置時點、與董事會任期之關聯，下列敘述何者正確？","options":{"A":"必為常設組織；應於併購基準日後成立；任期與董事會一致","B":"公司得自行決定為常設或臨時組織；應於董事會決議併購相關案件「前」設置並進行審議；與董事會任期無關聯","C":"必為臨時任務編組；任期須與董事會一致","D":"由主管機關認定"},"answer":"B","explain":"依企併法§6，特委係為因應併購案而設置，公司得自行決定為常設或臨時；應於董事會決議併購案前即設置並進行審議；與董事會任期無關聯。但仍應依企併法及子法儘速訂定組織規程。"},{"num":5,"question":"審計委員會或特別委員會成員依企併法§6 行使職權時，若其中之獨立董事為併購相對公司之關係人，應如何處理？","options":{"A":"由該獨董自行決定是否參與","B":"應利益迴避；如致審計委員會人數不足無法召集會議者，依證交法§14-5、審計委員會辦法§8 第 5 項，由全體董事 2/3 以上同意行之（包含獨立專家委任）；尚未設審計委員會但已設獨董者，與相對公司有利害關係之獨董應排除納入特別委員會","C":"由公司董事長決定","D":"由主管機關核定"},"answer":"B","explain":"利益衝突獨董應迴避；致無法召集會議時依§14-5 之 2/3 機制行之；尚未設審計委員會時，相對公司關係人獨董不得納入特委。"},{"num":6,"question":"公司有 4 位以上獨立董事時，是否應全員納入特別委員會？可否只選擇其中 3 位？","options":{"A":"全部獨董必須納入特委","B":"依特委辦法§4，特委成員不得少於 3 人，公司設有獨董者由獨董組成；獨董人數超過組織章程所訂之成員人數者，公司得依專業需求及權責衡平考量，選擇符合組織章程規範之獨董人數組成（不必全員納入）","C":"由獨董自選","D":"由董事會決定"},"answer":"B","explain":"特委辦法§3、§4 允許公司彈性運用：成員人數依組織章程訂定（≥3），獨董超出該人數時可選擇符合章程之人數，便於因應出席考量。"},{"num":7,"question":"特別委員會召集會議時，成員可否代理出席？表決時可否棄權？","options":{"A":"可代理且可棄權","B":"成員應親自出席特別委員會（得以視訊方式進行），不得代理出席，且表決時不得棄權；應明確表示同意或反對","C":"可代理但不得棄權","D":"可棄權但不得代理"},"answer":"B","explain":"特委辦法§7 第 2 項明定成員應親自出席（含視訊），不得代理且不得棄權，目的在強化審議結果之資訊價值與責任明確性。"},{"num":8,"question":"特別委員會之審議結果應何時公告？反對意見之揭露要求為何？","options":{"A":"於董事會決議當日，僅公告審議結論","B":"公司應於第 1 項董事會決議之日起算「2 日內」於主管機關指定網站（公開資訊觀測站）辦理公告申報；並應載明任何持反對意見之董事及特委成員之姓名及其所持理由","C":"於股東會召開前 7 日公告即可","D":"由公司自行決定揭露時點"},"answer":"B","explain":"特委辦法§7 第 4 項：董事會決議
