之日起 2 日內公告董事會決議及特委審議結果；持反對意見者之姓名及理由應併揭露，以利投資人判斷。"},{"num":9,"question":"獨立專家之委任經特別委員會議決議同意後，是否應再提報董事會決議？","options":{"A":"須再提董事會決議","B":"不須再提董事會決議。特委辦法§6 第 3 項明定獨立專家之委任由特委全體成員 1/2 以上同意行之即可（特委為合議制，且企併法§6 第 4 項授權主管機關訂定）","C":"須報主管機關核准","D":"由公司章程訂定"},"answer":"B","explain":"特委辦法§6 第 3 項採 1/2 同意門檻，無須再提董事會決議；此係企併法§6 第 4 項授權主管機關訂定之程序事項。"},{"num":10,"question":"特別委員會除取得獨立專家之價格合理意見書外，可否要求公司提供其他額外資訊？","options":{"A":"不可，僅以價格合理意見書為限","B":"可。特委辦法§3 規定組織規程應記載「行使職權時公司應提供之資源」事項；特委可依組織規程要求公司提供所有併購相關之資訊，俾供進行公平性、合理性審議","C":"須報主管機關核准","D":"由獨立專家代為要求"},"answer":"B","explain":"特委辦法§3 預留資訊取得彈性；組織規程應明定行使職權之資源，公司應配合提供併購相關資訊。"},{"num":11,"question":"特別委員會「視訊會議影音」資料與「錄音或錄影」存證資料之保存期限及性質，下列何者正確？","options":{"A":"兩者均保存 5 年","B":"視訊會議影音資料屬議事錄之一部分，應「永久保存」；錄音或錄影屬輔助資料，保存期限為 5 年。合併消滅公司之議事錄等資料應由存續公司概括承受並依相關保存期限辦理（不因公司消滅而免保存）","C":"兩者均永久保存","D":"由公司自定"},"answer":"B","explain":"特委辦法§10 第 4 項：視訊影音為議事錄一部分永久保存；錄音/錄影為輔助資料保存 5 年。又依企併法§4，存續公司概括承受消滅公司權利義務，相關資料須概括承受並依規保存。"},{"num":12,"question":"公司於公開收購期間已依「公開收購公開發行公司有價證券管理辦法」設置「審議委員會」者，可否免再設置「特別委員會」？其成員組成可否相同？","options":{"A":"得免再設置特委","B":"公開收購之審議委員會（依證交法§43-1 第 4 項及公開收購辦法§14-1）與企併法之特別委員會（依企併法§6 第 1 項及特委辦法）法規適用不同，二者不互相替代；惟若審議委員會成員同時符合特委資格及獨立性規範，其成員組成是否相同得由公司自行決定","C":"成員必須完全不同","D":"由主管機關核定"},"answer":"B","explain":"二者制度法源不同，職能各別；惟組成上若符合雙重資格要件，公司得自行決定是否使其成員相同。"},{"num":13,"question":"特別委員會之組織規程應至少記載哪些事項？","options":{"A":"由公司章程個別訂定，無強制記載事項","B":"依特委辦法§3，至少應記載：（一）成員組成及人數；（二）職權事項；（三）議事規則；（四）行使職權時公司應提供之資源。臺灣證券交易所已發布「○○股份有限公司併購特別委員會組織規程」參考範例供遵循","C":"由獨立董事訂定","D":"由主管機關制定範本後一體適用"},"answer":"B","explain":"特委辦法§3 列舉組織規程 4 項必載事項；證交所提供參考範例，公司可至證券期貨局網站／法規資訊／證期法令查詢取得。"},{"num":14,"question":"公司是否「必須」將併購特別委員會明定於公司章程後方可設置？","options":{"A":"必須先修章程載明，否則不得設置","B":"企業併購法並無明文規定須訂明於章程；惟公司如為明確規範以利遵循，於章程中訂明設置併購特別委員會之規定，尚無不可","C":"須報主管機關核准","D":"由公司股東會決議是否載明"},"answer":"B","explain":"企併法未強制章程載明特別委員會之設置；章程訂明屬公司自治、有助遵循，但非設置之要件。"},{"num":15,"question":"董事會得否經決議而不參採（或反對）特別委員會之審議結果？","options":{"A":"不可，特委審議結果具最終拘束力","B":"依經濟部 103/1/14 經商字第 10200738140 號函釋，特委審議結果僅為董事會及股東會之「先行程序」，最終決定權仍在董事會及股東會；如董事會決議不參採，是否違反企併法§5 第 1 項（善良管理人注意義務）屬個案認定，有爭執循司法途徑解決；又董事會決議（依公司法§206）應依特委辦法§7 第 4 項辦理公告申報，並載明反對意見之姓名及理由","C":"須經主管機關核准始可不採","D":"由特委自行同意後始可"},"answer":"B","explain":"特委審議結果非終局決定，最終仍由董事會及股東會議決；惟董事會不參採時須踐行善良管理人義務並依規公告反對意見，俾股東知悉。"}]},{"chapter":"董事會議事","questions":[{"num":1,"question":"董事會議事辦法§3 第 2 項「董事會召集應於 7 日前通知各董事、監察人」之「7 日前」起算日期為何？","options":{"A":"自寄發通知日起算","B":"依經濟部 95/7/14 經商字第 09502101500 號函釋，自通知之翌日起算至開會「前 1 日」，算足公司法所定期間","C":"自開會日當日起算","D":"由公司章程訂定"},"answer":"B","explain":"公司法§204 之「7 日前」採通知翌日為起算點、開會前 1 日為終止點，須算足 7 日；不含通知當日及開會當日。"},{"num":2,"question":"董事會 7 日前召集通知寄發後至開會前期間，可否臨時加入議案併入該次董事會？","options":{"A":"一律不得加入任何議案","B":"如於該期間發生緊急情事急待董事會討論，可臨時加入「討論議案」；報告案因不涉表決影響較小，亦得臨時加入","C":"僅得加入報告案，不得加入討論議案","D":"由董事長一人決定"},"answer":"B","explain":"依公司法§204 及董事會議事辦法§3 第 2 項立法意旨，緊急情事下得臨時加入討論議案；報告案因不涉表決，亦得臨時併入。"},{"num":3,"question":"董事會討論員工績效獎金案時，有利害關係之董事（如勞工董事等）是否應利益迴避？","options":{"A":"一律強制迴避","B":"依董事會議事辦法§16 第 1 項，若係討論「全體員工」紅利或績效獎金，未涉董事自身或其代表法人之利害關係者，兼具員工身分董事尚無須迴避；惟如涉及董事自身或其代表法人之利害關係，且有害公司利益之虞時，應予迴避","C":"由董事長決定","D":"由公司章程訂定"},"answer":"B","explain":"§16 第 1 項採「實質利害關係 + 害於公司利益之虞」之雙重標準。全員性給付不必然構成利害關係，應視議題涉及範圍個別判斷。"},{"num":4,"question":"「定期性董事會」與因「緊急情事」召集之董事會如何區分？","options":{"A":"由公司章程任意訂定","B":"依董事會議事辦法§3 第 1、2 項，董事會應至少每季召開 1 次，公司於議事規範明定召開頻率且符合此規定者為「定期性」；「緊急情事」係指事出突然且急待商決之情事，由公司自行審酌；如有爭議屬司法認事範疇","C":"僅由主管機關認定","D":"由董事長個人裁量"},"answer":"B","explain":"§3 第 1 項「至少每季召開」+ 議事規範明定者屬定期；緊急情事採公司自審 + 司法認事為終局判斷。"},{"num":5,"question":"臨時性（緊急情事）董事會是否仍須通知各董事及監察人？其議事程序是否仍應符合董事會議事辦法？","options":{"A":"緊急情事召集者免通知、議事程序不受拘束","B":"緊急情事召集之董事會仍應通知各董事及監察人；議事內容雖無§6（定期性議事內容）之適用，但其餘議事規範（如§2、§3、§16、§17 等）仍應依董事會議事辦法辦理","C":"僅須通知獨立董事即可","D":"由公司自行決定"},"answer":"B","explain":"§3 即使「緊急情事得隨時召集」仍需通知；§2、§6 區分定期/臨時：定期須含§6 議事內容，臨時無此要求，但其他議事規範仍適用。"},{"num":6,"question":"公司召開董事會，可否未實際召開而由董事以書面核准方式進行？董事可否以「電話會議」出席？","options":{"A":"書面核准與電話會議均可","B":"公司法§205 及董事會議事辦法§9 第 2 項：董事應親自出席或依章程委託其他董事代理；以視訊會議參與者視為親自出席。「紙上董事會」（書面核准代開會）不被允許；「電話討論」（無視訊面對面）依經濟部 92 年函釋不視為親自出席。視訊會議方為合法替代方式","C":"只要董事全員同意即可採書面核准","D":"由公司章程訂定"},"answer":"B","explain":"視訊會議係實務上之有效替代；電話通話因無視覺面對面討論，不符「親自出席」之要件；書面核准則完全違反董事會召集制度。"},{"num":7,"question":"臨時性或定期性董事會內部稽核主管是否皆應列席？議事事務單位是否應設置簽名簿供列席者簽到？","options":{"A":"無論是否緊急情事，內部稽核主管均應列席；簽名簿強制設置","B":"公司法§204「緊急情事得隨時召集」之董事會，內部稽核主管列席與否得由董事會自行斟酌；其餘董事會應依規定列席報告。簽名簿雖非強制，惟議事錄應詳實記載列席者姓名及職稱（依§17 第 1 項第 4 款），辦理單位仍宜設置簽名簿以供查考","C":"僅獨立董事可列席，內部稽核主管不得列席","D":"由內部稽核主管自行決定"},"answer":"B","explain":"緊急情事下放寬列席彈性，其餘情形維持強制列席；簽名簿屬最佳實務，便於日後爭議查考。"},{"num":8,"question":"以視訊會議進行董事會時，是否需同時錄音及錄影？影音資料如何呈現？","options":{"A":"僅需錄音即可","B":"依董事會議事辦法§18 第 3 項，以視訊會議進行者，視訊影音資料屬議事錄之一部分，應同時錄音與錄影；其影音應能清楚呈現各董事與會情形、發言內容及會議完整過程","C":"由公司章程訂定是否錄影","D":"由董事會決議要不要錄影"},"answer":"B","explain":"§18 第 3 項視訊影音為議事錄之一部分；錄音、錄影同時為之，且應呈現完整會議過程，以利後續查考及確認決議形成。"},{"num":9,"question":"公司依證交法§26-3 第 8 項訂定董事會議事規範，是否應提董事會及股東會決議通過？","options":{"A":"必須提股東會通過","B":"證交法§26-3 第 8 項授權主管機關訂定董事會議事辦法；公司所訂議事規範內容應符合該辦法，「宜提董事會決議通過」；至於是否須經股東會通過，屬公司自治事項，由公司自行決定","C":"由獨立董事決議通過即可","D":"由主管機關核准"},"answer":"B","explain":"議事規範屬內部規章，須符合主管機關訂定之辦法；經董事會決議為實務做法，股東會通過與否屬公司自治。"},{"num":10,"question":"董事會議事辦法§7 第 1 項第 1 款所稱「公司之營運計畫」之內容範圍為何？","options":{"A":"僅指年度預算","B":"包括公司年度之經營方針、預期銷售數量及其依據、重要之產銷政策等財務業務計畫；應提報董事會討論","C":"由總經理另行擬定，無須董事會審查","D":"由主管機關核定範本"},"answer":"B","explain":"§7 第 1 項第 1 款之營運計畫含經營方針、銷售數量及依據、產銷政策等綜合財務業務計畫，屬董事會應提討論事項。"},{"num":11,"question":"董事會如「無異議照案通過」，議事錄是否需記載董事、監察人、專家及其他人員發言摘要？","options":{"A":"無異議通過時免記載發言摘要","B":"依§17 第 1 項第 7、8 款，議事錄應詳實記載討論事項、臨時動議各議案，及董事、監察人、專家及其他人員之發言摘要；非僅記載「有反對或保留意見之人」之發言","C":"僅須記載決議結果","D":"由主席決定要否記載"},"answer":"B","explain":"§17 規定發言摘要記載為「全面性」要求，無論最終是否異議通過；確保議事過程透明，便於日後查考。"},{"num":12,"question":"董事會議案如有「撤案或暫不討論」之情形，會議紀錄應如何表達？","options":{"A":"不必記載於議事錄","B":"依§6、§17 規定，議案經決議撤案或暫不討論者，應將其決議方法與結果詳實記載於議事錄；並均應於下次董事會報告之；惟如無附帶決議事項須執行者，因無執行情形，得免於下次董事會報告及記載","C":"由主席口頭說明即可","D":"由公司章程訂定"},"answer":"B","explain":"撤案/暫不討論仍屬決議結果，須記載；下次董事會原則上應報告執行情形，惟無執行內容時得免記。"},{"num":13,"question":"董事會議事辦法§10 第 1 項規定每屆第 1 次董事會「召集權人有 2 人以上時應互推一人擔任」會議主席，係指：","options":{"A":"由所有董事於有召集權人之中推選 1 人","B":"由「有召集權人」（即股東會所獲選票代表選舉權最多之董事）相互推舉 1 人擔任會議主席","C":"由獨立董事推選 1 人","D":"由監察人指定 1 人"},"answer":"B","explain":"§10 第 1 項之「召集權人」限於股東會選票代表選舉權最多之董事；「應互推」之主體限於該等召集權人，非全體董事。"},{"num":14,"question":"董事會議中議案如經董事「全數同意變更」，議事錄上是否僅需記載新議案之案由及決議？","options":{"A":"是，僅記載新議案","B":"依§17 第 1 項規定，議事錄應詳實記載各議案之決議與結果；議案如經董事全數同意變更，議事錄仍應記載「變更前議案」及「新議案」之決議與結果","C":"由主席決定簡略或詳記","D":"由公司章程訂定"},"answer":"B","explain":"原議案及變更後議案均屬「議事過程」之一部分，§17 採全面記載原則，避免議事歷程不完整。"},{"num":15,"question":"董事會得否決議「概括授權」董事長於董事會休會期間代表董事會為一切行為？","options":{"A":"得概括授權，由董事長全權代表","B":"依董事會議事辦法§8，董事會休會期間之授權，其授權層級、內容或事項應「具體明確」，不得概括授權；公司依法令或章程決議授權行使董事會職權之層級、內容或事項應具體明確","C":"由公司章程訂定可否概括授權","D":"由獨立董事同意即可"},"answer":"B","explain":"§8 明文禁止概括授權，避免董事長獨大、削弱董事會合議制；授權範圍須有清楚邊界。"},{"num":16,"question":"董事會議事程序無論是否變動，董事會結束前是否皆必須經出席董事過半數同意，主席始可宣布散會？議事錄是否須記載「經出席董事過半數同意散會」？","options":{"A":"是，無論是否完成議事程序皆須過半同意才能散會","B":"若董事會依會議通知所排定之議事程序「進行完竣」，主席即得宣布散會；惟若於議事「進行中」非經出席董事過半數同意，主席不得逕行宣布散會（§13），該事項並應記載於議事錄","C":"主席可隨時宣布散會","D":"由獨立董事決定"},"answer":"B","explain":"§13 採「程序完竣」與「中途散會」分流：完竣可逕散會，中途須過半同意並載入議事錄，避免主席逕行打斷議事。"},{"num":17,"question":"董事會開會日遇縣市政府宣布停班停課，如需延期召開，應如何召集？","options":{"A":"公告延期即可，無須再次通知","B":"依董事會議事辦法§3 第 2 項及經商字第 09802122460 號函釋，原訂董事會如已完成召集通知，後因故需要延期召開，其延期召集通知仍應依公司法§204 規定辦理（即仍應於 7 日前通知各董事、監察人）","C":"緊急情事得隨時召集，無須 7 日前通知","D":"由董事長口頭通知即可"},"answer":"B","explain":"停班停課致延期召開不當然構成「緊急情事」，故仍須踐行 7 日前通知程序，以保障董事知悉與準備。"},{"num":18,"question":"以 LINE 等通訊軟體發出董事會召集通知並檢送會議資料，是否符合董事會議事辦法§3 第 3 項「電子方式通知」之規定？","options":{"A":"一律不得以通訊軟體通知","B":"依公司法§204 第 4 項及經商字第 10202097590 號函釋，董事會召集通知（含會議資料）經相對人同意者得以電子方式為之；以 LINE 等通訊軟體發出召集通知並檢送會議資料，倘符合上開規定（取得相對人同意），尚無不可；惟應留存寄送軌跡並確認董事確實收訖","C":"僅限以電子郵件，不得用 LINE","D":"須報主管機關核准"},"answer":"B","explain":"電子方式通知強調「相對人同意」+「軌跡留存」，平台不限於 email；LINE 通訊軟體只要符合此二要件即合規。"},{"num":19,"question":"董事會議事辦法§7 第 1 項第 3 款所稱「內部控制制度有效性之考核」係指何意？","options":{"A":"由稽核單位獨立執行不需董事會參與","B":"公司於依證交法§14-1 第 3 項申報內部控制制度聲明書，係公司董事會及總經理依據各單位及子公司之自行評估報告、稽核單位所發現之內控缺失及異常事項改善情形及其他來源資訊，評估整體內控制度有效性後出具；上述判斷整體內控有效性之過程即為「內部控制制度有效性考核」","C":"僅指外部會計師之查核","D":"由主管機關直接考核"},"answer":"B","explain":"內部控制制度聲明書係董事會與總經理整合各方資訊出具；其形成過程即為有效性考核。"},{"num":20,"question":"董事會§11 第 1 項規定董事會得通知相關部門或子公司人員列席，如該等列席人員與議案有利害關係，於討論及表決時應否迴避？","options":{"A":"列席人員一律不必迴避","B":"列席人員應說明其利害關係並使董事會知悉；惟列席人員與董事會具上下隸屬關係，討論及表決仍屬董事會權責；如董事會認列席人員之利害關係程度重大、有害公司利益之虞時，得要求列席人員迴避，或於董事會議規範中明定","C":"只要不是董事就不必迴避","D":"由獨立董事決定"},"answer":"B","explain":"§11 第 1 項採「揭露 + 董事會裁量迴避」模式：列席者隸屬董事會指揮，揭露為基礎，迴避由董事會評斷或議事規範預先規範。"},{"num":21,"question":"董事會議事辦法§17 規定董事會之「議決事項」應於主管機關指定資訊申報網站辦理公告申報，所謂「議決事項」是否指所有經董事會決議通過之事項？","options":{"A":"是，所有決議事項一律須公告申報","B":"§17 規定之公告申報「議決事項」係指有下列情事之一者：（一）獨立董事有反對或保留意見且有紀錄或書面聲明；（二）設置審計委員會之公司，未經審計委員會通過而經全體董事 2/3 以上同意通過。即指董事會決議結果與獨董或審計委員會所提意見「不一致」者","C":"僅限財務報告類議決","D":"由公司章程訂定範圍"},"answer":"B","explain":"§17 公告申報事項聚焦於「決議與獨董/審委意見不一致」之爭議性事項，目的在保障少數意見揭露，非全部決議事項。"},{"num":23,"question":"金管會整理之「董事會議事運作常見缺失」涵蓋多大類型？下列何者不屬於常見缺失類型？","options":{"A":"董事會議事規範內容不全（如未明訂議事單位、議事內容、應提討論事項等）","B":"作業程序不完備（如未於 7 日前寄送通知或會議資料、未保留寄送軌跡、未完成錄音錄影、議事錄寄送憑證未妥存）","C":"獨立董事兼職家數過多","D":"議事錄記載不全（會議屆次、出席狀況、列席者姓名職稱、發言摘要、反對或保留意見記載不完整）"},"answer":"C","explain":"金管會整理常見缺失共 5 大類：議事規範內容不全、作業程序不完備、議事內容不完整（定期董事會缺重要財務業務報告、內部稽核業務報告等）、議事錄記載不全、其他（董事委託書未列日期、利害關係未說明等）。獨董兼職家數限制屬獨董辦法§4 之規範範疇，非董事會議事運作之常見缺失類型。"}]},{"chapter":"薪酬委員會","questions":[{"num":1,"question":"依證券交易法規定，下列何者為強制設置薪資報酬委員會之公司？","options":{"A":"僅上市公司","B":"股票已在證券交易所上市或於證券商營業處所買賣之公司，即「上市、上櫃及興櫃」公司均須設置","C":"所有公開發行公司","D":"由主管機關核定個案"},"answer":"B","explain":"證交法§14-6 第 1 項明定上市、上櫃公司應設置薪酬委員會；而「於證券商營業處所買賣」涵蓋上櫃及興櫃公司，故上市、上櫃、興櫃皆強制設置。"},{"num":2,"question":"新上市（櫃）與興櫃公司是否須於送件前即完成薪酬委員會之設置？","options":{"A":"可俟正式上市後再設置","B":"依台證所、櫃買中心之有價證券上市/上櫃審查準則及興櫃股票審查準則，公司應於送件申請前即依§14-6 規定完成薪酬委員會之設置","C":"由主管機關決定設置時點","D":"由公司章程訂定"},"answer":"B","explain":"申請初次上市（櫃）及登錄興櫃前須先完成薪酬委員會設置，否則送件不予受理；屬上市/上櫃/興櫃前的合規前提。"},{"num":3,"question":"公司設置薪資報酬委員會，關於委員會職權、成員資格條件等，是否有相關規定可資遵循？","options":{"A":"尚無具體規範，由公司自行訂定","B":"金管會依證交法§14-6 第 1 項授權訂定「股票上市或於證券商營業處所買賣公司薪資報酬委員會設置及行使職權辦法」（簡稱薪酬委員會職權辦法），規範成員專業資格、職權行使及應遵循事項，並於 100/3/18 發布施行","C":"由臺灣證交所訂定","D":"由公司章程任意訂定"},"answer":"B","explain":"薪酬委員會職權辦法（100/3/18 發布）為薪酬委員會運作之主要法源，包括成員資格、職權範圍、議事規則等。"},{"num":4,"question":"薪資報酬委員會之組織規程應至少訂定哪些事項？","options":{"A":"由公司章程個別訂定，無強制記載事項","B":"依薪酬委員會職權辦法§3，至少應記載：（一）成員組成、人數及任期；（二）職權；（三）議事規則；（四）行使職權時公司應提供之資源。臺灣證交所及櫃買中心已發布「○○股份有限公司薪資報酬委員會組織規程」參考範例","C":"由獨立董事訂定","D":"由主管機關制定範本一體適用"},"answer":"B","explain":"辦法§3 列舉組織規程 4 項必載事項；證交所及櫃買中心提供範例供遵循，公司可至證券期貨局網站／法規資訊／證期法令查詢取得。"},{"num":5,"question":"公司是否須於董事會通過薪資報酬委員會組織規程時，「一併」通過選任薪酬委員會委員之成員名單？","options":{"A":"必須同次董事會一併通過","B":"辦法§3 規定組織規程應經董事會通過；§4 規定成員由董事會決議委任。但「未規定」公司須於同次董事會通過此二議案，前揭二議案是否於同次董事會通過，由公司自行決定","C":"須報主管機關核准","D":"由獨立董事決定"},"answer":"B","explain":"組織規程通過與成員委任屬不同議案，得分次或同次董事會處理；薪酬辦法保留公司彈性。"},{"num":6,"question":"公司是否「必須」將薪資報酬委員會明定於公司章程後方可設置？","options":{"A":"必須先修章程載明","B":"薪酬委員會職權辦法並未規定公司須將設置薪酬委員會明定於公司章程；惟公司如為明確規範以利遵循，得於章程中訂明設置之規定","C":"須報主管機關核准","D":"由公司股東會決議是否載明"},"answer":"B","explain":"薪酬辦法未強制章程載明；章程訂明屬公司自治、有助遵循，但非設置之要件。"},{"num":7,"question":"公司董事任期屆滿後，是否得於董事改選之股東會「當日」以「緊急事由」召開董事會選任薪酬委員會成員？","options":{"A":"可任意以緊急事由召開","B":"薪酬委員會成員任期與當屆董事會相同（§4 第 2 項），董事改選時薪酬委員會成員亦應重新委任，但「並未規定」須與董事同日選/委任，公司應於改選後儘速召集董事會委任；另依經商字第 09502145290 號函釋，「緊急情事」係指事出突然急待商決事項，公司如欲以緊急事由召開仍應符合該函釋規定","C":"由主管機關核准始可","D":"由公司章程訂定"},"answer":"B","explain":"薪酬辦法不要求同日選/委任；緊急事由召開仍須符合「事出突然且急待商決」之認定標準，避免濫用。"},{"num":8,"question":"薪資報酬委員會成員是否「需」由獨立董事組成？","options":{"A":"全員必須為獨立董事","B":"成員不得少於 3 人，符合辦法§5、§6 資格條件即可。未依§14-2 設獨董之公司，無強制獨董組成；已依§14-2 設獨董之公司，依辦法§8 第 3 項，至少應有獨董 1 人參與，並由獨董擔任召集人及會議主席","C":"完全由監察人組成","D":"由公司自由決定"},"answer":"B","explain":"薪酬委員會成員資格採「不少於 3 人 + 專業性與獨立性」原則；獨董強制要件視公司是否依§14-2 設獨董而定。"},{"num":9,"question":"薪資報酬委員會成員是否以「自然人」為限？","options":{"A":"得由法人擔任","B":"依辦法§5、§6 有關薪酬委員會成員應具備專業性及獨立性資格之規定，薪酬委員會成員應為「自然人」","C":"可為自然人或法人","D":"由公司章程訂定"},"answer":"B","explain":"因專業性與獨立性要求須個人具體判斷，薪酬委員會成員限自然人擔任。"},{"num":10,"question":"薪資報酬委員會成員人數於部分成員解任後仍有 3 人以上，是否仍須自事實發生即日起 3 個月內召開董事會補行委任？","options":{"A":"仍須補行委任","B":"辦法§4 第 3 項規定，因故解任「致人數不足 3 人」者，應自事實發生即日起算 3 個月內召開董事會補行委任。如解任後仍達 3 人以上，「不受」上開規範","C":"由獨立董事決定","D":"由主管機關核定"},"answer":"B","explain":"§4 第 3 項補行委任之觸發要件為「人數不足 3 人」；達 3 人以上者，公司無強制補行委任之義務。"},{"num":11,"question":"獨立職能監察人是否得擔任薪資報酬委員會成員？","options":{"A":"一律不得","B":"依金管會 103/4/1 金管證發字第 1030005881 號令，於 101/11/12 修正前認定標準擔任公司獨立職能監察人之經歷，「不視為違反」獨董辦法§3 第 1 項第 2 款；對應到薪酬委員會辦法§6 第 1 項第 2 款（薪酬委員會於選任前 2 年不得為公司之監察人）亦同——得擔任薪酬委員會成員","C":"須報主管機關核准","D":"由公司章程訂定"},"answer":"B","explain":"金管會放寬獨立職能監察人之經歷不構成獨董/薪酬委員之消極資格；目的在擴大人才基礎，減輕公司尋覓難度。"},{"num":12,"question":"薪酬委員會職權辦法§6 第 1 項第 1 款規定，公司或其關係企業之「受僱人」是否包含薪資報酬委員會成員本身？","options":{"A":"包含薪酬委員會成員","B":"薪酬委員會成員係由董事會決議委任，並依辦法§7 履行職權，與一般僱傭關係有所不同，故薪酬委員會成員「非」公司之受僱人","C":"由公司章程認定","D":"由主管機關認定"},"answer":"B","explain":"薪酬委員會成員為合議制機關之委員，非僱傭關係下之員工；故§6 第 1 項第 1 款之「受僱人」限制不適用於委員自身。"},{"num":13,"question":"薪酬委員會職權辦法§6 第 1 項第 2、3 款所稱之「關係企業」及「持股前 10 名之自然人股東」如何認定？","options":{"A":"「關係企業」依商業會計法定義；「前 10 名」含法人股東","B":"「持股前 10 名之自然人股東」係單就公司股東中屬「自然人身分」者計算其排名（不含法人股東）；計算其於選任前 2 年及任職期間持股是否達 1% 或前 10 名，應併計本人及配偶、未成年子女及以他人名義持有者；「關係企業」依公司法§369-1 至§369-3 認定","C":"由主管機關個案核定","D":"由公司章程訂定計算方式"},"answer":"B","explain":"「前 10 名自然人股東」排除法人股東；計算範圍含本人、配偶、未成年子女及借名持股，避免透過人頭規避；關係企業則沿用公司法第六章之一定義。"},{"num":14,"question":"董事會委任獨立董事為薪酬委員會成員，該獨董於董事會決議「獨立董事報酬」時是否應利益迴避？","options":{"A":"獨董不必迴避","B":"依董事會議事辦法§16 第 1 項，董事對於會議事項與其自身或其代表法人有利害關係致有害公司利益之虞時應利益迴避；董事會於決議董事報酬時，如討論內容涉及獨董個人事項，相關獨董即應利益迴避","C":"由獨董自行決定","D":"由主管機關核定"},"answer":"B","explain":"決議涉及獨董個人薪酬時，該獨董具利害關係，依§16 第 1 項應於討論及表決時迴避，避免自我交易疑慮。"},{"num":15,"question":"薪資報酬委員會成員（含獨董與非獨董成員）之薪資報酬應如何決定？","options":{"A":"由薪酬委員會自行決定","B":"薪酬委員會非董事成員之報酬屬公司自治事項，由董事會委任時建議於董事會通過後在委任契約中載明；獨董成員之薪酬則應綜合考量董事及兼任功能性委員會成員之個人表現，依公司法相關法令訂定","C":"一律由股東會決議","D":"由主管機關核定"},"answer":"B","explain":"非董事成員報酬屬僱傭契約／委任契約事項，公司自治；獨董成員則回歸公司法§196 + 兼任功能性委員會職務評估。"},{"num":16,"question":"公司新任用經理人之薪資報酬，是否「應」經薪酬委員會提出建議後始得任用？","options":{"A":"必須先經薪酬委員會建議後始可任用","B":"辦法§7 規定薪酬委員會應訂定並定期檢討董監經之績效評估與薪資報酬政策。新任經理人時，公司可「自行決定」是否先依薪酬委員會訂定之規定核定其薪資（嗣後再由薪酬委員會定期評估訂定），或須先經薪酬委員會建議後始任用","C":"一律須經股東會核准","D":"由獨立董事決定"},"answer":"B","explain":"新任時程序具彈性：可先核定再定期評估，亦可先請薪酬委員會建議。重點是事後由薪酬委員會定期檢討與訂定。"},{"num":17,"question":"薪酬委員會對於經理人薪資報酬建議，可否以「總額方式」為之？公司可否訂定經理人「薪資級距表」以取代個別經理人之審核？","options":{"A":"可以總額或級距表方式取代個別審核","B":"依辦法§7，薪酬委員會應依個人表現等定期評估並訂定經理人薪資報酬，「不宜」以薪資級距表取代個別經理人薪資報酬之審核；亦不宜以總額方式建議","C":"由公司章程訂定","D":"由主管機關核定"},"answer":"B","explain":"§7 強調「個人表現、公司績效、未來風險關連合理性」之個別判斷；級距表/總額化會稀釋責任認定，不符制度目的。"},{"num":18,"question":"薪酬委員會針對董監經薪資報酬建議，是否須為一「確定金額」？","options":{"A":"得以區間方式建議即可","B":"依辦法§7，薪酬委員會應依個人表現等定期評估董監經績效目標達成情形，並訂定其「個別薪資報酬之內容及數額」（即須為確定金額）","C":"由公司章程訂定","D":"由獨立董事決定"},"answer":"B","explain":"§7 要求個別內容及數額均應確定，確保責任明確、避免事後浮動爭議。"},{"num":19,"question":"薪酬委員會可否將「經理人薪資報酬」授權由公司執行長或董事長核定？","options":{"A":"得授權執行長或董事長核定","B":"依辦法§7，經理人薪資報酬「應經薪酬委員會提出建議」，「不得」授權執行長或董事長核定","C":"由獨立董事核定即可","D":"由公司章程訂定"},"answer":"B","explain":"經理人薪酬建議屬薪酬委員會之核心職權，不得轉授權；目的在維持獨立審查與制衡功能。"},{"num":20,"question":"薪資報酬委員會之成員應否「以開會方式」選任召集人及會議主席？","options":{"A":"必須以正式會議方式選任","B":"辦法§8 規定召集人及會議主席由全體成員推舉產生，未規範推舉程序，「屬公司自治事項」由公司自行決定","C":"由主管機關核定","D":"由董事長指定"},"answer":"B","explain":"推舉程序公司自治；可以開會方式或書面互推，由公司視實務需要決定。"},{"num":21,"question":"薪酬委員會成員以「開會方式」選任召集人及會議主席，該次會議是否視為薪酬委員會「正式會議」？","options":{"A":"是，即為正式委員會會議","B":"辦法§8、§9 規定，薪酬委員會會議議程由「召集人」訂定，召集應於 7 日前通知委員會成員。故應由全體成員先推舉出召集人及會議主席後，再由召集人依規定訂議程及通知召開正式委員會會議；推舉會議本身「非」正式委員會會議","C":"由公司章程訂定","D":"由獨立董事認定"},"answer":"B","explain":"正式會議須由召集人訂議程並依 7 日前通知程序召開；推舉召集人之會議僅為前置程序。"},{"num":22,"question":"薪酬委員會成員是否有兼任家數之限制？","options":{"A":"兼任不得逾 3 家","B":"薪酬委員會職權辦法「並未規範」薪酬委員會成員兼任家數，惟公司董事會於委任時應「衡酌」成員兼任情形對於公司薪酬委員會運作之影響","C":"兼任無任何限制","D":"由主管機關核定"},"answer":"B","explain":"兼任無硬性家數上限，但董事會於委任時負擔判斷義務，避免成員兼職過多影響職務品質。"},{"num":23,"question":"公司董事會委任「外部人士」擔任薪酬委員會成員，因其未參與公司經營，本身對行業特性未必熟悉，如何決定合理薪資及避免營業秘密外洩？","options":{"A":"外部人士不得擔任薪酬委員會成員","B":"（一）成員必須具專業性及獨立性，董事會委任時應衡酌其資格與經驗能否提出適當建議；公司並應建立保密機制（如簽訂保密協定）防止營業秘密外洩。（二）依辦法§8、§11，薪酬委員會運作可請董事及相關部門經理人員列席提供必要資訊；亦得委任專業人員提供意見或為查核，並由公司負擔費用","C":"外部人士須於主管機關備查","D":"由獨立董事代為決定"},"answer":"B","explain":"外部人士擔任成員之關鍵：資格審核 + 保密機制 + 資訊取得（列席與專業人員委任）。"},{"num":24,"question":"薪酬委員會成員任期與委任之董事會屆期相同。如當屆董事會任期屆滿不及改選而「延長執行職務」至改選時，當屆薪酬委員會成員之任期應至何時？","options":{"A":"至原董事會任期屆滿日為止","B":"依辦法§4 第 2 項，薪酬委員會成員任期應配合委任當屆董事會之任期；如當屆董事會任期屆滿不及改選而延長執行職務至改選董事就任，則當屆薪酬委員會成員之任期應「配合當屆董事會延長執行職務」","C":"由公司章程訂定","D":"由主管機關核定"},"answer":"B","explain":"任期完全配合當屆董事會：董事會延長則委員會延長，避免治理斷層。"},{"num":25,"question":"擔任薪酬委員會成員後，可否「即」被選任為公司獨立董事？","options":{"A":"因獨董於選任前 2 年不得提供商務/法務/財務/會計等服務，故一律不得","B":"獨董辦法§3 第 1 項第 7 款於 100/8/4 修正，但書「排除」依薪酬委員會職權辦法§7 履行職權之薪酬委員會成員（不含薪酬辦法施行之日起算 3 年內擔任薪酬委員會之董事成員），嗣得依規定選任為該公司獨董","C":"須經主管機關核准","D":"由公司章程訂定"},"answer":"B","explain":"獨董辦法§3 第 1 項第 7 款但書明文排除薪酬委員會成員之兼職限制；以利人才流通並承認薪酬委員會職權之獨立性。"},{"num":26,"question":"薪酬委員會成員於任期屆滿後得否「續任」？","options":{"A":"因辦法§6 禁止為公司提供商務/法務/財務/會計服務之人擔任，故不得續任","B":"辦法§6 第 1 項第 7 款係比照獨董辦法§3 規定；惟獨董辦法已於 100/8/4 修正第 3 條第 1 項第 7 款增列但書，將依薪酬辦法§7 履職權之薪酬委員會成員排除於該款規定之外；故依辦法§7 履職權之薪酬委員會成員不視為違反辦法§6 第 1 項第 7 款，得於任期屆滿後由公司董事會依規定再行委任續任","C":"須經股東會通過續任","D":"由主管機關核定"},"answer":"B","explain":"獨董辦法但書修正後，薪酬委員會成員履職本身不構成「提供諮詢服務之專業人士」之消極要件；故得續任。"},{"num":27,"question":"薪酬委員會職權辦法所稱「薪資報酬」之範圍為何？","options":{"A":"僅指現金報酬","B":"依辦法§7 第 3 項，包括「現金報酬、認股權、分紅入股、退休福利或離職給付、各項津貼及其他具有實質獎勵之措施」，且其範疇應與「公開發行公司年報應行記載事項準則」中董監經酬金之範圍一致","C":"包括退職金但不含分紅入股","D":"由公司章程訂定"},"answer":"B","explain":"薪資報酬採「綜合給付」概念，含直接與間接獎酬；範疇對齊年報揭露要求，便於資訊一致性。"},{"num":28,"question":"薪酬委員會評核對象可否「以公司組織規程訂定」擴及公司轉投資事業之派任人員？","options":{"A":"一律不得擴及","B":"（一）依辦法§7 第 7 項，子公司之董事及經理人薪資事項如依子公司分層負責決行事項須經母公司董事會核定者，應「先請母公司之薪酬委員會提出建議」後再提交董事會討論；（二）非§7 第 7 項規範之對象，公司可自行決定是否於組織規程訂定評核對象擴及派任轉投資公司有關人員","C":"須經主管機關核准","D":"由獨立董事決定"},"answer":"B","explain":"§7 第 7 項採「分層決行 → 母公司董事會核定 → 母公司薪酬委員會建議」之機制；其外則屬公司自治，可另定組織規程擴及範圍。"},{"num":29,"question":"證交法§14-6 所規範應經薪酬委員會提出薪資報酬建議之「經理人」範圍為何？","options":{"A":"僅指總經理","B":"可參照前財政部證期會 92/3/27 台財證三字第 0920001301 號令對證交法§22-2、§25、§28-2、§157、§157-1 之經理人定義：（一）總經理及相當等級者；（二）副總經理及相當等級者；（三）協理及相當等級者；（四）財務部門主管；（五）會計部門主管；（六）其他有為公司管理事務及簽名權利之人","C":"包括所有員工","D":"由公司章程訂定"},"answer":"B","explain":"經理人範圍採與證交法他項條款一致之認定，涵括 6 類具管理事務及簽名權之人員，避免規避。"},{"num":30,"question":"公司原已有相關人員「績效考核及薪酬辦法」，建置薪酬委員會後是否可繼續沿用？","options":{"A":"得直接沿用，無須重新審視","B":"依辦法§7，薪酬委員會應訂定並「定期檢討」董監經績效評估與薪資報酬之政策、制度、標準與結構。公司原有之相關績效考核及薪酬辦法，仍應經薪酬委員會「重新檢視檢討後」決定是否繼續沿用","C":"原辦法立即失效","D":"由主管機關核定"},"answer":"B","explain":"原辦法不當然失效，但需通過薪酬委員會檢視檢討，確認是否符合§7 之政策與制度要件。"},{"num":31,"question":"公司是否可將「一般員工調薪」等重大薪資政策列入薪酬委員會組織規程，先提薪酬委員會通過後再交由董事會審議？","options":{"A":"必須列入薪酬委員會組織規程","B":"薪酬委員會係針對「董事、監察人及經理人」之薪資報酬提出建議；至於一般員工調薪政策係屬公司自治事項，可由公司自行決定（不限於薪酬委員會）","C":"須報主管機關核准","D":"由獨立董事決定"},"answer":"B","explain":"薪酬委員會專管董監經；一般員工薪資政策屬人資/經營層次之公司自治事項，不強制納入。"},{"num":32,"question":"薪酬委員會開會通知是否得以電子方式為之？","options":{"A":"僅得書面寄送","B":"依辦法§8 第 2 項，薪酬委員會召集應載明召集事由於 7 日前通知委員會成員。可參照公司法§204 第 2 項，召集通知「經相對人同意者」，得以電子方式為之","C":"須經主管機關核准方可電子通知","D":"由公司章程訂定"},"answer":"B","explain":"電子方式通知須經相對人同意；準用公司法§204 第 2 項機制。"},{"num":33,"question":"薪酬委員會成員無法親自出席委員會時，是否得「委託」已擔任薪酬委員會成員之公司董事代理出席？","options":{"A":"不得委託他人代理","B":"依辦法§9，成員應親自出席，如不能親自出席得「委託其他成員」代理（代理人以受 1 人之委託為限）；應每次出具委託書並列舉召集事由之授權範圍。至於依辦法§6 第 5 項施行日起 3 年內擔任薪酬委員會成員之公司董事，無禁止其代理其他成員出席會議；惟其「不得擔任」召集人及會議主席","C":"可委託任何董事代理","D":"由公司章程訂定"},"answer":"B","explain":"代理規則：（1）僅可委託其他薪酬委員會成員；（2）一人僅得受 1 人委託；（3）每次出具委託書並列舉授權範圍。3 年過渡期之董事成員可代理但不得任主席。"},{"num":34,"question":"薪酬委員會「所有」決議均須提報董事會？","options":{"A":"所有決議一律提報董事會","B":"辦法§7 第 1 項規定，薪酬委員會應將所提建議「提交董事會討論」。準此，薪酬委員會決議須提董事會討論之事項，應為「依§7 履行職權事項」；至其他事項是否提董事會討論，則屬公司自治事項，可由公司自行決定","C":"由主管機關決定範圍","D":"由獨立董事決定"},"answer":"B","explain":"強制提董事會者限於§7 列舉之核心職權事項（董監經薪資、績效政策等）；其他事項屬公司治理自治。"},{"num":35,"question":"薪酬委員會成員審議之案件是否可提請「下屆」董事會決議？","options":{"A":"可任意提下屆董事會決議","B":"依辦法§4 第 2 項，薪酬委員會成員任期與委任之董事會屆期相同；公司董事會任期屆滿改選後，薪酬委員會成員亦須經董事會重行委任。如公司董事任期即將屆滿，即應「預先規劃相關開會時程」，避免薪酬委員會之提案無法由當屆董事會決議","C":"須報主管機關備查","D":"由公司章程訂定"},"answer":"B","explain":"成員任期與當屆董事會綁定，提案宜於當屆董事會決議；改選後需重新委任，故換屆前要預為安排會議時程。"},{"num":36,"question":"薪酬委員會會議議程是否得「比照董事會議案」呈董事長核閱後再送薪酬委員會審議？","options":{"A":"得比照董事會程序，呈董事長核閱","B":"依辦法§9 第 1 項，薪酬委員會會議議程「由召集人訂定」，其他成員亦得提供議案供委員會討論。準此，會議議程應由召集人訂定（或其他成員提供議案），議程「不得」先呈核至非薪酬委員會成員核閱（含董事長）","C":"由獨立董事決定","D":"由公司章程訂定"},"answer":"B","explain":"議程權限歸屬召集人（薪酬委員會內部），不得呈核至非委員會成員，避免外部干預破壞獨立性。"}]},{"chapter":"審計委員會","questions":[{"num":1,"question":"公開發行公司若自願設置審計委員會時，是否仍受證交法及相關授權子法之規範？","options":{"A":"因屬自願設置，不受證交法及子法拘束","B":"公開發行公司若自願設置審計委員會，自應依證交法及授權子法「公開發行公司審計委員會行使職權辦法」之規範辦理","C":"由公司章程任意訂定遵循標準","D":"由主管機關核定"},"answer":"B","explain":"自願設置審計委員會仍受證交法及審計委員會行使職權辦法之全面規範；自願與否不影響規範適用。"},{"num":2,"question":"證交法§14-4 規定審計委員會應由全體獨立董事組成、人數不得少於 3 人，是否得包括獨立董事以外之人員？","options":{"A":"得包括非獨董之專業人士","B":"依§14-4 第 2 項，審計委員會之成員「均為獨立董事」，且應由 3 名以上獨董組成，「不得」包括獨董以外之人員。例如某公司有 5 位獨董，則其審計委員會即由此 5 位獨董組成","C":"由公司章程訂定","D":"由董事會決議"},"answer":"B","explain":"§14-4 採全員獨董 + 不少於 3 人之嚴格組成規範；無例外允許納入非獨董。"},{"num":3,"question":"證交法§14-4 第 2 項所定審計委員會至少 1 人應具備「會計或財務專長」之認定標準為何？","options":{"A":"由主管機關個別認定","B":"證交法對此資格認定標準採彈性，公司可參考下列任一標準：（1）公發財務主管／會計主管／主辦會計／內部稽核主管之經驗；（2）直接督導上開職務之經驗；（3）取得會計師、證券投資分析人員等證書或相關國家考試 + 2 年實務；（4）大專校院修畢會計／財務／審計／稅務 12 學分以上 + 3 年實務；（5）高職同等校修畢前揭科目 12 學分以上 + 5 年實務。公司亦得自訂更高標準","C":"必須具備會計師資格","D":"由公司章程訂定"},"answer":"B","explain":"金管會列舉 5 種類型（管理經驗、督導經驗、證書 + 經驗、大專/高職修畢相關科目 + 經驗）作為認定參考；公司得自訂更高標準。"},{"num":4,"question":"審計委員會成員如何選出？是否有法令規定？","options":{"A":"由董事會直接指定","B":"依§14-4 第 2 項，審計委員會由全體獨董組成；獨董辦法§5 規定獨董與非獨董應一併進行選舉、分別計算當選名額。故審計委員會成員之選任應「回歸依獨立董事之選任規範」辦理","C":"由股東會單獨選舉審委成員","D":"由主管機關核定"},"answer":"B","explain":"審委成員身分即獨董，故選任程序與獨董相同（一併選舉、分別計票）；無另外之審委成員選任機制。"},{"num":5,"question":"公司有 4 名獨立董事，其中 3 名組成審計委員會，如嗣後該 3 名獨董全數解任時，是否需開股東臨時會補選？","options":{"A":"因尚有 1 名獨董，無須臨時會補選","B":"審計委員會成員即為獨立董事，獨董全數解任時應依§14-2 第 5 項及§14-2 第 6 項規定，於最近一次股東會補選；惟若致審計委員會無法運作（即剩餘獨董人數不足），應於事實發生日起 60 日內召開股東臨時會補選","C":"由董事會自行指派","D":"由主管機關核派"},"answer":"B","explain":"獨董解任致審委無法運作時，補選機制以「事實發生日起 60 日內股東臨時會補選」為原則；確保審委儘速恢復運作。"},{"num":6,"question":"獨立董事人數不足 2 人（僅剩 1 人或全解任）時，審計委員會應如何運作？","options":{"A":"由監察人代為行使職權","B":"依證交法§14-5 第 3 項及審計委員會辦法§8，審計委員會無法運作時，相關事項應由全體董事 2/3 以上同意行之；獨立董事 1 人或全解任時，§14-5 應審計委員會同意之事項，由全體董事 2/3 以上同意行之","C":"暫停所有應審委同意事項","D":"由主管機關核定"},"answer":"B","explain":"§14-5 第 3 項提供「全體董事 2/3 以上同意」之替代機制，避免審委無法組成時公司決策癱瘓。"},{"num":7,"question":"召開審計委員會之相關事宜是否有明確規範？","options":{"A":"依各公司章程自由訂定","B":"「公開發行公司審計委員會行使職權辦法」已明定審計委員會之職權行使事項、議事規範（會議召開次數、召集方式及得請相關人員提供必要資訊等）、代理出席會議及其表決方式等相關規範","C":"由獨董自行決定","D":"由主管機關個案核定"},"answer":"B","explain":"審計委員會行使職權辦法為審委運作之主要法源；含職權、議事、代理、表決等全套規範。"},{"num":8,"question":"設置審計委員會之公開發行公司，如發生「未經審計委員會決議」或議案「業經審委否決」，公司應如何處理？","options":{"A":"公司得自行決定執行與否","B":"依證交法§14-5 第 2、3 項，未經審委決議者，公司得由全體董事 2/3 以上同意行之，並於董事會議事錄載明；如業經審委否決，仍得由全體董事 2/3 以上同意行之，獨董之異議應載明","C":"一律不得執行","D":"由主管機關核准"},"answer":"B","explain":"§14-5 第 2、3 項提供「全體董事 2/3 以上同意」之替代機制；未經審委同意或被否決時，董事會仍可以提高門檻方式通過。"},{"num":9,"question":"證交法§14-5 規定應經審計委員會「全體成員 1/2 以上同意」之事項，是否需經審計委員會「開會決議」？","options":{"A":"得以書面個別徵詢同意，不必開會","B":"審計委員會為合議制，應召開審計委員會議作成決議；§14-4 第 5 項已授權主管機關訂定相關事項，依「公開發行公司審計委員會行使職權辦法」規定辦理","C":"由召集人個別決定","D":"由主管機關核定"},"answer":"B","explain":"合議制要求集體討論與決議，1/2 同意非個別徵詢可達成；須召開正式會議完成決議。"},{"num":10,"question":"證交法§14-5 規定「內部控制制度有效性之考核」應經審委全體成員 1/2 以上同意，所稱「內部控制制度有效性考核」為何？","options":{"A":"由外部會計師獨立執行之查核","B":"公司於依§14-1 第 3 項申報內部控制制度聲明書時，係由董事會及總經理依各單位、子公司之自行檢查報告、稽核單位所發現之內控缺失及異常事項改善情形等資訊，評估整體內控有效性後出具；此判斷整體內控有效性之過程，即為§14-5 所稱「內部控制制度有效性考核」","C":"僅指稽核單位之查核作業","D":"由主管機關直接考核"},"answer":"B","explain":"內控有效性考核屬「公司董事會及總經理整合各方資訊並做出整體有效性評估」之流程；非外部查核或稽核單體作業。"},{"num":11,"question":"年度財務報告及第二季（半年）財務報告，究應提董事會「討論」或「報告」？","options":{"A":"一律僅提報告事項","B":"依證交法§36 第 1 項第 2 款，第 2 季半年財報應於 45 日內公告申報並提報董事會；又依董事會議事辦法§7 第 1 項第 2 款，公司「年度財務報告及半年度財務報告應提董事會『討論』」（半年度財報依法令無須會計師查核簽證者除外）；設審委之公司並應經審委 1/2 以上同意","C":"由董事會自行決定討論或報告","D":"由獨董決定"},"answer":"B","explain":"年度財報及半年報屬重大財務事項，應「提董事會討論」（非僅報告）；半年報無須會計師簽證者得免提討論。設審委時須先經審委同意。"},{"num":12,"question":"證交法§14-3 及§14-5 規定簽證會計師之委任、解任或報酬應經董事會及審計委員會通過，所稱「簽證會計師」之定義為何？可否以追認通過方式辦理？","options":{"A":"簽證會計師不限於財報簽證；得以追認通過","B":"簽證會計師係指辦理證交法§36、§37 財務報告之簽證所委任之會計師。為強化董事會及審計委員會功能，§14-3、§14-5 所定事項「均不得」於事後以追認方式通過","C":"由公司章程訂定範圍","D":"由主管機關認定"},"answer":"B","explain":"簽證會計師範疇限於財報簽證委任；§14-3、§14-5 強制事前審議，事後追認違反監督本旨，不被允許。"},{"num":13,"question":"依證交法設置審計委員會之公司，董事會訂定「除權基準日」是否須先經審計委員會同意？","options":{"A":"必須經審計委員會同意","B":"依§14-5 第 1 項第 7 款，公發公司設審委者，「募集、發行或私募具有股權性質之有價證券」應經審委 1/2 同意並提董事會決議；至前揭事項之「執行細節事務」（如董事會決議除權基準日），是否需經審委同意，「屬公司自治事項」，由公司自行視需要決定","C":"由主管機關核定","D":"由獨董決定"},"answer":"B","explain":"強制事前審議者限於「募集、發行、私募」本身；其執行細節（除權基準日）屬公司自治。"},{"num":14,"question":"審計委員會會議召開及議事錄等文件應記載事項中，「會議屆次」應如何認定？","options":{"A":"沿用舊監察人會議屆次計算","B":"依證交法§14-4、§183 規定公司得設置審委替代監察人；依公開發行公司審計委員會行使職權辦法§10 第 1 項第 1 款，議事錄應記載會議屆次及時間地點。「審委議事錄屆次宜詳實載明公司審委實際成立及召開之屆次」（即從審委本身設立並召開的屆次計算）","C":"由董事會自行訂定","D":"由主管機關認定"},"answer":"B","explain":"屆次計算以審委自身成立並召開為起點，獨立於監察人或董事會屆次計算，便於審委歷程獨立呈現。"},{"num":15,"question":"公司設審計委員會者不得設監察人；獨立董事兼為審計委員會成員（董事兼委員會成員），其董事、監察人酬勞應如何分配，獨董是否即「分配兩倍」？","options":{"A":"獨董兼委員應分配兩倍酬勞","B":"依§14-4 公司應擇一設審委或監察人，「設審委之公司無分派監察人酬勞或給予報酬之問題」；獨董之報酬應綜合考量董事及兼任功能性委員會成員之個人表現訂定（不必然分配兩倍）","C":"獨董僅可領取董事酬勞，不得領取兼任酬勞","D":"由主管機關核定"},"answer":"B","explain":"設審委時無監察人酬勞概念；獨董兼委員之報酬應綜合考量本職及兼任功能性委員會職務表現，不存在「自動分兩倍」原則。"},{"num":16,"question":"董事薪酬係屬董事自身利害關係之議案，是否應「同時」送審計委員會及薪資報酬委員會審議？或僅送薪資報酬委員會即可？","options":{"A":"必須同時送審委及薪酬委員會審議","B":"公司依法設有審委及薪酬委員會者，「董事薪資報酬議案如已經薪酬委員會討論通過者，無須再依§14-5 第 1 項第 4 款規定經審計委員會同意，而得將所提建議逕提董事會討論」（薪酬委員會為董監經薪酬之專責單位，避免重複審議）","C":"僅須送審委審議","D":"由公司章程訂定"},"answer":"B","explain":"金管會明示董事薪酬已由薪酬委員會通過者，得逕提董事會，不必再經審委；避免功能性委員會重複審議降低效率。"},{"num":17,"question":"公司章程、董事會議事規範等議事規範之「訂定或修正」，是否須經審計委員會決議？","options":{"A":"公司章程、議事規範修正僅須提股東會即可，無須經審委","B":"依證交法§14-5 第 1 項規定，重大規章之訂定或修正屬應經審計委員會 1/2 以上同意並提董事會決議之事項；審計委員會行使職權辦法§3 亦規範審委職權含「公司內部控制制度、重要財務業務行為之處理程序、章程及董事會議事規範等之訂定或修正」（屬審計委員會應審議事項）","C":"由獨董個別審查","D":"由主管機關核定"},"answer":"B","explain":"公司章程、股東會、董事會、審計委員會及薪酬委員會等議事規範之訂定或修正，「如涉及內部控制制度或其他審計委員會職權事項時」，須依規定經審計委員會全體成員 1/2 以上同意，並提董事會決議。（Gemini 校對修正：須加條件前提，非任何議事規範修正均一律須經審委）"}]},{"chapter":"委託書·徵求人","questions":[{"num":1,"question":"依「公開發行公司出席股東會使用委託書規則」（以下簡稱委託書規則），何謂「徵求」？何謂「非屬徵求」？","options":{"A":"徵求係被動受股東委託；非屬徵求係主動向股東徵求","B":"徵求係指徵求人以公告、廣告、牌示、廣播、電傳視訊、信函、電話、發表會、說明會、拜訪、詢問等方式「主動」向股東徵求出席股東會委託書之行為；非屬徵求係指受託人因股東之委託而「被動」取得股東委託書代理出席之行為","C":"徵求僅限以書面方式為之","D":"由公司章程訂定徵求方式"},"answer":"B","explain":"委託書規則§3 區分「主動徵求」（多種主動方式取得委託書）與「被動受託」（受股東主動委託），係兩者規範強度不同之根本分野。"},{"num":2,"question":"公開發行公司出席股東會使用之委託書，是否有一定之格式？","options":{"A":"委託書格式由徵求人自由訂定","B":"委託書格式內容應包括填表須知、股東委託行使事項及股東、徵求人、受託代理人基本資料等項目；委託書之用紙「應以公司印發者為限」，違反者其代理之表決權不予計算","C":"由集保結算所統一印製","D":"由公司章程訂定格式"},"answer":"B","explain":"委託書格式三大要件 + 用紙限以公司印發者為限；違反「公司用紙」要件者表決權不予計算（§22 第 1 項第 1 款）。"},{"num":3,"question":"可否以「金錢」價購委託書？","options":{"A":"得以金錢購買委託書","B":"不可。委託書取得不得以「給付金錢或其他利益」為條件（但代為發放股東會紀念品或徵求人支付予代為處理徵求事務者之合理費用不在此限）。違反者除代理表決權不予計算外，並得依證交法§178 處 24 萬至 480 萬元罰鍰，並得命限期改善；屆期未改善者按次處罰","C":"經主管機關核准得購買","D":"由公司章程訂定金額上限"},"answer":"B","explain":"價購委託書屬重大違規：表決權不予計算 + 高額罰鍰 + 按次處罰。例外限於股東會紀念品代發及徵求事務合理費用。"},{"num":4,"question":"股東會「有」選舉董事或監察人議案時，「非」金融控股公司、銀行、保險公司之公開發行公司，徵求人之積極資格為何？","options":{"A":"持股 200 萬股或千分之五以上、繼續 1 年以上","B":"依股東名簿記載或集保證明，繼續 6 個月以上「持有公司已發行股份 80 萬股以上者」或「持有公司已發行股份總數千分之二以上且不低於 10 萬股者」","C":"持股 5 萬股以上即可","D":"由主管機關核定"},"answer":"B","explain":"委託書規則§5 對非金融業公司有選舉議案時之徵求人積極資格採「6 個月+ 80 萬股」或「6 個月 + 千分之二且不低於 10 萬股」二擇一。金融業則採 1 年 + 200 萬股或千分之五。無選舉議案時降為 5 萬股以上即可。"},{"num":5,"question":"委託書徵求人持股應繼續持有之期間，計算「持有期間」之推算時點為何？","options":{"A":"以股東會召開日為起日往後推算","B":"以「股票最後過戶日」為起日「往前推算」算滿 6 個月或 1 年以上；持有股票時點以取得股票所有權之時點為準（集中交易市場買賣以完成交割之日為準，非買賣成交日）；私人讓受、贈與、繼承等以股東名簿記載為準","C":"以股東會停止過戶日當日起算","D":"由公司章程訂定計算方式"},"answer":"B","explain":"起算點為「最後過戶日往前推算」；集中交易股票須注意 T+2 交割；非市場取得依股東名簿。期間中持股不得中斷低於應持股數，若先賣出再買進視為中斷。"},{"num":6,"question":"公司於股東會前一年度有現金增資、無償配股等致已發行股份總數變動時，應如何計算徵求人持股期間及持股數？","options":{"A":"僅以股東會當日已發行股份總數計算","B":"（1）依公司當年度股東會股票最後過戶日為起日往前推算 6 個月或 1 年以上期間；（2）公司已發行股份總數於該期間有增減變動時，應「分別依公司已發行股份總數變動之時點為基礎，分段計算其最低持股數及持股比例」，比較各階段最低值，「取其最低者認定為繼續持有期間之持股數及持股比例」","C":"以期間平均已發行股份總數計算","D":"由公司自行決定計算方式"},"answer":"B","explain":"採「分段計算 + 取最低」原則：每次股份變動為一新階段，最終以期間中最低持股 % 認定徵求人是否符合資格。確保徵求人持股比例自始至終達標。"},{"num":7,"question":"若股東之部分持股已辦理「信託」，則股東欲徵求委託書時，該信託之股份得否計入徵求人本身持股數計算？","options":{"A":"得計入","B":"股東若已將其部分股份辦理信託，則股東欲擔任徵求人時，於計算其本身持股數時，「自不得計入」已辦理信託之股份","C":"視信託契約是否保留運用決定權而定","D":"由主管機關核定"},"answer":"B","explain":"信託股份所有權移轉至受託人；股東於計算徵求人本身持股時不得納入此部分。出處：93 年 5 月 11 日台財證三字第 0930117411 號函。"},{"num":8,"question":"委託人保留運用決定權之信託股票，「委託人」可否指示受託人擔任股東會委託書之徵求人？所須符合之條件為何？","options":{"A":"委託人不得指示受託人擔任徵求人","B":"委託人指示受託人擔任徵求人屬雙方契約問題；惟受託人若以該信託股票之股東身分欲徵求委託書者，仍須符合委託書規則所定之徵求人「相關資格規定」；委託人及受託人本身皆須符合委託書規則所定之「消極資格條件」","C":"須報主管機關核准","D":"由公司章程規範"},"answer":"B","explain":"信託股票徵求 = 委託人指示權（契約） + 受託人積極／消極資格 + 委託人本身消極資格之三層審查。出處：93 年 7 月 19 日台財證三字第 0930127131 號函。"},{"num":9,"question":"若股東之持股係分別信託予「不同信託機構」，則各受託人於公司召開股東會時，可否同時個別擔任徵求人？其得徵求股數上限為何？","options":{"A":"僅一受託人得擔任徵求人","B":"各受託人仍得以信託股票之股東身分「分別擔任」股東會委託書之徵求人，而其得徵求股數限制仍應依委託書規則§21 第 2 項規定辦理","C":"代理股數無上限","D":"由委託人指定一受託人"},"answer":"B","explain":"分別信託之各受託人得各自擔任徵求人；徵求股數上限仍受§21 第 2 項拘束（不得超過已發行股份總數百分之三，依§6 之信託事業/股代不受限）。"},{"num":10,"question":"委託人保留運用決定權之信託股票，受託人依委託人指示為徵求委託書時，就委託書規則§5 或§6 之「持股期間」計算方式為何？","options":{"A":"受託人持股期間自信託成立日起算","B":"於股票信託，若委託人對信託股票保留運用決定權，則受託人之「持股期間」計算「得合併計算委託人原持股期間」","C":"兩者期間取最短者","D":"由信託契約自由約定"},"answer":"B","explain":"委託人保留運用決定權者，視為實質持有未間斷，故受託人持股期間得溯及合併計算委託人原持股期間，便利信託股票徵求合規。"},{"num":11,"question":"金融控股公司召開股東會時，下列何種公司不得擔任徵求人或委託信託事業、股務代理機構擔任徵求人？","options":{"A":"持股不足 1% 之一般股東","B":"（1）金融控股公司之子公司（依金控法§4）；（2）公司召開股東會時，依公司法§179 第 2 項規定無表決權之公司；二類公司均不得自行或委託他人擔任徵求人","C":"外國機構投資人","D":"持股 5% 以上之自然人股東"},"answer":"B","explain":"為落實公司治理及兼顧股東平等，委託書規則§6-1 排除金控子公司及§179 第 2 項無表決權公司擔任徵求人。"},{"num":12,"question":"保險業及其從屬公司，可否擔任被投資公司之委託書徵求人或委託他人擔任委託書徵求人？","options":{"A":"經主管機關核准得擔任","B":"「不可以」。依保險法§146-9 第 3 項規定","C":"無持股限制下得擔任","D":"限主管機關核准之保險公司得擔任"},"answer":"B","explain":"保險法§146-9 第 3 項明文禁止保險業及從屬公司擔任徵求人，避免保險資金影響被投資公司治理。"},{"num":13,"question":"「員工持股信託專戶」、「限制員工權利新股信託專戶」或「職工福利委員會」可否為徵求人或委託信託事業、股務代理機構擔任徵求人？","options":{"A":"一律不得","B":"如已依法登記為股東，且其資格條件「符合委託書規則§5 或§6 之規定」者，「應得」擔任徵求人或委託信託事業及股務代理機構擔任徵求人","C":"僅得以職工福利委員會名義擔任","D":"須經主管機關核准"},"answer":"B","explain":"員工信託專戶／福委會等，若依法登記為股東並符合§5、§6 資格條件（持股、期間等），即可擔任徵求人。出處：金管證交字第 1030013587 號函等。"},{"num":14,"question":"徵求人可徵得之委託書代理股數上限為何？","options":{"A":"不得超過公司已發行股份總數之 5%","B":"（1）徵求人得代理股數「不得超過公司已發行股份總數之百分之三」；（2）信託事業或股務代理機構依§6 受股東委託擔任徵求人者，其代理之股數「則不受限制」","C":"不得超過公司已發行股份總數之 10%","D":"由公司章程訂定上限"},"answer":"B","explain":"一般徵求人代理上限 3%；信託/股代依§6 受股東委託擔任者（即「無限徵求」機制）不受 3% 限制，便於大股東匯集股權。"},{"num":15,"question":"徵求人於徵求前後應注意事項及應檢附之徵求相關資料為何？","options":{"A":"於股東會開會前 7 日完成資料送達即可","B":"（1）徵求前：應於股東「常會」開會 38 日前（「臨時會」23 日前）將出席股東會委託書徵求資料表、持股證明文件、代為處理徵求事務者資格備查文件、擬刊登書面及廣告內容定稿等送達公司及副知證基會；公司有董事或監察人選任議案者，擬支持董事被選舉人經營理念以 200 字為限；非於規定期限內送達者「不得徵求」。（2）徵求後：應於股東會開會 5 日前將徵得之委託書明細表送達公司或股代；徵得之委託書應全數確實送交辦理統計驗證","C":"由公司決定徵求人應送達之文件","D":"僅須送達徵求書面及廣告即可"},"answer":"B","explain":"徵求程序兩階段：徵求前 38/23 日送達文件 + 200 字理念限制；徵求後 5 日前送明細表 + 全數送統計驗證。違反者影響表決權計算。"},{"num":16,"question":"甲公司為乙公司之從屬公司（乙持甲過半），又甲、乙合計持丙公司過半。下列何者「不得」擔任徵求人？","options":{"A":"乙公司召開股東會時，丙公司可擔任徵求人","B":"依公司法§179 第 2 項，下列公司無表決權：（1）公司依法持有自己股份；（2）被持有過半之從屬公司，所持有控制公司之股份；（3）控制公司及其從屬公司直接或間接合計持有他公司過半之他公司，所持有控制公司及其從屬公司之股份。又依委託書規則§6-1，§179 第 2 項無表決權公司不得擔任徵求人。故乙公司召開股東會，「甲及丙均不得」擔任徵求人；甲公司召開股東會，「丙不得」擔任徵求人","C":"甲公司召開股東會，丙得擔任徵求人","D":"三公司之間互相得擔任徵求人"},"answer":"B","explain":"公司法§179 第 2 項三種無表決權情形 + 委託書規則§6-1 排除無表決權公司擔任徵求人；母公司召開股東會時，含控制鏈下游全部公司均不得擔任徵求人。"},{"num":17,"question":"委託書徵求人及委託信託事業/股務代理機構擔任徵求人之委任股東，其本身持股是否「也要」支持其擬支持之董事、監察人被選舉人？","options":{"A":"強制必須以本身持股支持擬支持之被選舉人","B":"依委託書規則「並無強制規定」；惟徵求人及委任股東「應於徵求委託書之書面及廣告載明」其自有持股是否支持徵求委託書書面及廣告內容記載之被選舉人","C":"由徵求人於股東會當日決定","D":"由公司章程訂定"},"answer":"B","explain":"規則未強制本身持股投票方向，但要求「揭露透明」：徵求書面及廣告須載明自有持股是否同向支持，避免誤導股東。"},{"num":18,"question":"委託書徵求人於徵得委託書後，得否「不出席」股東會？或於徵求委託書之書面及廣告內容記載「徵求人得不出席股東會」等相關文字？","options":{"A":"徵求人得自行決定是否出席","B":"依委託書規則§10-1 第 1 項，公司依§7 第 1 項規定將徵求資料傳送至證基會或於日報公告後，徵求人「應依股東委託出席股東會」；又§10-1 第 2 項明定，徵求人「不得」於徵求委託書之書面及廣告內容記載徵求人得不出席股東會等相關文字","C":"由公司章程訂定","D":"經主管機關核准得不出席"},"answer":"B","explain":"§10-1 兩項：（1）徵求人應出席股東會；（2）廣告書面不得記載「得不出席」字樣。確保徵求人為股東代理出席表決權之實效。"}]},{"chapter":"委託書·徵求事務","questions":[{"num":19,"question":"徵求人或受其委託代為處理徵求事務者，向股東徵求委託書時，下列哪項「不」屬於應注意事項？","options":{"A":"不得委託公司代為寄發徵求信函或徵求資料予股東","B":"徵求人應於徵得之委託書上簽名或蓋章，並不得轉讓他人使用","C":"徵求人得自行決定徵求書面是否與送達公司之資料內容一致","D":"徵求委託書之取得不得以給付金錢或其他利益為條件（但代為發放紀念品或徵求事務合理費用不在此限）"},"answer":"C","explain":"徵求人自寄送或刊登之書面及廣告「應與送達公司之資料內容相同」，不得自行更動。其餘 A、B、D 均為應注意事項。"},{"num":20,"question":"徵求人與認購權證發行人約定，以「換取出席股東會委託書」作為購買認購權證之條件，其法律效力為何？","options":{"A":"完全合法","B":"涉嫌違反「取得委託書不得以給付金錢或其他利益為條件」之限制，故其代理之表決權不予計算","C":"經主管機關核准得為之","D":"由公司章程訂定"},"answer":"B","explain":"以認購權證購買權換取委託書屬「其他利益」之變相給付，違反§11 限制；§22 第 1 項第 5 款明定代理表決權不予計算。"},{"num":21,"question":"委託書得否由徵求人或受託代理人「代替委託人填寫」？","options":{"A":"一律得代填","B":"（1）原則上委託書應由委託人（即股東）親自填具徵求人或受託代理人姓名。但「信託事業或股務代理機構受委託擔任徵求人」，及「股務代理機構受委任擔任委託書之受託代理人」者，得以蓋章方式代替；（2）徵求人應於徵得委託書上簽名或蓋章，不得轉讓他人使用","C":"由公司決定填寫方式","D":"由委託人決定是否同意代填"},"answer":"B","explain":"原則親填、例外（信託事業/股代擔任徵求人或受託代理人）得以蓋章代替；徵求人本身則須在徵得委託書上簽蓋。"},{"num":22,"question":"領有「攤販許可證」之攤販，可否作為委託書徵求場所？","options":{"A":"得作為徵求場所","B":"「徵求場所」係指有戶政機關所編地址之「固定場所」，不包括攤販在內；徵求人或受其委託代為處理徵求事務者不得於徵求場所外徵求委託書","C":"經主管機關核准得作為徵求場所","D":"限於白天時段得作為徵求場所"},"answer":"B","explain":"徵求場所限於有政府編列地址之固定場所，攤販不符；且徵求行為限於徵求場所內，不得場外徵求。"},{"num":23,"question":"徵求人應將相關資料送達公司（副知證基會）之期限應如何計算？末日如遇星期日或其他休息日時，應如何辦理？","options":{"A":"末日遇休息日得順延至下一營業日","B":"（1）應於股東「常會」開會 38 日前（「臨時會」23 日前），將相關資料送達被徵求公司，股東會開會及送達當日均不算入；（2）若期限末日遇星期日或其他休息日時，徵求人「仍應於所定期限內」將相關資料送達被徵求公司（即不得順延）","C":"由公司決定送達方式","D":"末日遇休息日得寄電子郵件代替送達"},"answer":"B","explain":"送達期限不論末日是否遇休息日「不得順延」，徵求人須提前妥善安排；此規定避免徵求人以休息日為由規避時程。"},{"num":24,"question":"徵求人得否以「召開股東會之公司地址」作為徵求場所？","options":{"A":"得使用，便利股東索取資訊","B":"依委託書規則§7 第 5 項，徵求人或受其委託代為處理徵求事務者，「不得委託公司代為寄發徵求信函或徵求資料予股東」。違反者其代理之表決權不予計算。又召開股東會之公司應保持中立性，故股東會徵求人「不得」以公司地址作為徵求場所","C":"經公司同意得使用","D":"經主管機關核准得使用"},"answer":"B","explain":"公司中立性原則：徵求人不得以公司資源（含公司地址、公司寄發管道）進行徵求，避免影響股東獨立判斷。"},{"num":25,"question":"徵求人可否以「連鎖超商」作為徵求場所之據點？","options":{"A":"連鎖超商可任意作為徵求據點","B":"依委託書規則§7-1，除證券商或符合「股務處理準則§3 第 2 項」規定之公司外，代為處理徵求事務者應符合一定資格條件，並檢具相關資格證明文件送交集保結算所審核、轉報本會備查，「始得辦理代為處理徵求事務」。故連鎖超商須先符合並送審通過，始得作為徵求據點","C":"限於主管機關核可之超商","D":"由公司章程訂定可使用之徵求場所"},"answer":"B","explain":"代為處理徵求事務者須先符合§7-1 之資格 + 集保結算所審核 + 主管機關備查；連鎖超商不當然具備代為處理徵求事務之資格。"},{"num":26,"question":"徵求人可否透過「文件派送業者（含民營郵局）」向股東徵求委託書？","options":{"A":"得自由透過任何文件派送業者徵求","B":"（1）文件派送業者須符合§7-1 之代為處理徵求事務者資格條件；違反者除代理之表決權不予計算外，並得依證交法§178 處 24-480 萬元並按次處罰；（2）為避免角色衝突，徵求人欲委託之文件派送業者，「不得與公司或其股代寄發相關資料予股東之文件派送業者為同一家」","C":"限以中華郵政辦理","D":"由主管機關核可後始得透過任何業者"},"answer":"B","explain":"兩重限制：（1）派送業者本身須符合代為處理徵求事務者資格；（2）派送業者不得與公司之派送業者為同一家，避免角色衝突／中立性破壞。"},{"num":27,"question":"徵求人可否利用「公司寄發文件時夾帶徵求人之文宣資料予股東」？非屬徵求受託代理人或召開股東會之公司可否「寄發信函、打電話予股東表達受託出席之意思」？","options":{"A":"兩者均得自由為之","B":"（1）徵求人不得利用公司寄發文件時夾帶相關徵求資料予股東（§7 第 5 項）；（2）非屬徵求之受託代理人或召開股東會之公司亦不得有涉及公開徵求之相關行為（如主動寄信函或打電話勸誘委託），如有提及請股東以非屬徵求方式委託出席股東會之行為，可能涉及聲明書虛偽情事，且涉主動徵求委託書，其代理之表決權將不予計算","C":"經主管機關核准得為之","D":"由公司章程訂定"},"answer":"B","explain":"嚴禁兩種規避：（1）徵求人借公司管道發送文宣；（2）非屬徵求人主動勸誘（將徵求行為偽裝為非屬徵求）。違反者表決權不予計算。"},{"num":28,"question":"「價購」委託書之法律效力為何？","options":{"A":"僅構成行政罰款，表決權不受影響","B":"以價購方式取得之委託書，「除代理之表決權不予計算外」，並得依證交法§178 規定處以罰鍰 24 萬至 480 萬元，並得命其限期改善；屆期未改善者得按次處罰","C":"由公司決定是否計入表決權","D":"經主管機關核准得為之"},"answer":"B","explain":"價購委託書屬重大違規之三重後果：表決權不予計算 + 罰鍰 24-480 萬 + 按次處罰。"},{"num":29,"question":"違規價購委託書時，徵求人「所代理之全部表決權」是否均不予計算？","options":{"A":"全部表決權均不予計算","B":"不予計算者係指「違反規定以價購方式取得之委託書部分」之表決權；徵求人所代理之表決權應「扣除前揭違反規定部分之表決權」（其餘合法取得部分仍可計入）","C":"由公司自行認定","D":"由主管機關個案核定"},"answer":"B","explain":"「不予計算」採部分扣除原則，僅針對違規部分；其餘合法徵得之委託書仍可計入。避免懲罰過苛。"},{"num":30,"question":"委託書規則§5 及§6 規定之「已發行股份總數」，是否應扣除「無表決權股份」？","options":{"A":"不必扣除","B":"依公司法§180 第 1 項，股東會決議對無表決權股東之股份數不算入已發行股份之總數。故委託書規則§5、§6 之「已發行股份總數」「應扣除」公司法§157 第 1 項第 3 款無表決權之特別股及§179 第 2 項各款無表決權股份數，以計算徵求人之持股是否符合資格","C":"由公司章程訂定計算方式","D":"由徵求人選擇是否扣除"},"answer":"B","explain":"以可行使表決權之股份為計算基礎；無表決權股不算入已發行股份總數，故計算徵求人持股 % 時也應扣除。"},{"num":31,"question":"上市櫃公司依證交法§28-2 規定買回之「庫藏股」於公司召開股東會時，得否算入公司已發行股份總數？","options":{"A":"得算入","B":"不得。依公司法§180，股東會決議對無表決權股東之股份數，不算入已發行股份總數；經濟部亦曾函釋說明，依證交法§28-2 規定買回之庫藏股於公司召開股東會時，自不算入已發行股份總數","C":"由公司章程訂定","D":"經主管機關核定"},"answer":"B","explain":"庫藏股屬公司持有自己之股份（§179 第 2 項第 1 款）無表決權，故不算入已發行股份總數，亦不計入徵求人持股比例計算基數。"},{"num":32,"question":"徵求人事前「先行公布董監事分配席次」是否合法？","options":{"A":"違法","B":"依§7、§8，徵求人須於股東常會開會 38 日前（臨時會 23 日前）將擬支持之董監事被選舉人名稱記載於相關徵求資料並送達公司及副知證基會後，始能開始進行徵求；徵求人於徵求委託書前規劃分配董監事席次並對外宣佈，「並無違反委託書規則相關規定」；惟應注意擬支持董監被選舉人「不得超過該次股東會議案或章程所定董監應選任人數」","C":"經主管機關核准得宣布","D":"由公司章程訂定"},"answer":"B","explain":"事前公布席次不違規；但擬支持人數不得超過應選人數，否則違反規範。"},{"num":33,"question":"「股務代理機構」得否接受委託書徵求人之委託代為處理徵求事務？","options":{"A":"一律得接受","B":"原則上得接受；惟「於股東會有選舉董監議案時，被徵求公司之股務代理機構不得接受徵求人之委託代為處理徵求事務」（中立性原則）","C":"一律不得接受","D":"由主管機關核定"},"answer":"B","explain":"中立性原則：被徵求公司之股代於股東會有董監選舉議案時，不得同時為徵求人服務，避免角色衝突。其他情形得接受。"},{"num":34,"question":"金融機構或金融機構兼營股代業務者，可否接受委託書徵求人之委託代為處理徵求事務？","options":{"A":"一律得接受","B":"原則上「不得」（非金融機構營業項目）。但金融機構兼營股代業務，如經主管機關核准辦理「信託業法§17 第 1 項第 2 款提供有價證券發行、募集之顧問服務」業務，同時辦理「接受徵求人委託代為處理徵求事務」業務者，經集保結算所審核符合代為處理徵求事務者資格條件，於轉報本會備查後得接受","C":"經股東會通過得接受","D":"由主管機關核定個案"},"answer":"B","explain":"原則禁止 + 例外允許（信託業法§17 第 1 項第 2 款顧問業務 + 集保審核 + 主管機關備查）。"},{"num":35,"question":"徵求人徵求委託書時，可否「限制徵求對象」（如限持股一定股數以上股東）？","options":{"A":"不得限制","B":"委託書規則「並未明文限制」徵求人徵求之對象；故徵求人如擬以一定持股以上股東為徵求對象，「應於刊登徵求之書面及廣告等相關資料上予以載明」，以避免爭議","C":"須報主管機關核准","D":"由公司章程訂定"},"answer":"B","explain":"限制徵求對象屬徵求人自治；惟應於書面廣告載明該限制，避免後續爭議。"},{"num":36,"question":"公開發行公司股東辦理公開徵求，書面及廣告載明「限徵求 1,000 股以上之股數」，惟徵得之委託書中有「未滿 1,000 股」之委託書，該委託書可否計入徵求人徵得之股份總數？","options":{"A":"可全部計入","B":"依台財證三字第 113463 號函令，委託書規則並未明文限制徵求人徵求之對象，故徵求人如擬以一定持股以上股東作為徵求對象，「應於刊登之徵求書面及廣告等相關資料上予以載明」以避免爭議。「徵求人應確實依徵求委託書之書面及廣告內容進行委託書徵求」（即未滿 1,000 股之委託書不符書面公告之徵求對象，不應接受/計入）","C":"經股東同意得計入","D":"由公司決定"},"answer":"B","explain":"徵求人自我設限後須遵守；不符書面廣告之徵求對象之委託書不應計入，避免徵求過程不一致影響股東信賴。"},{"num":37,"question":"以「大股東名義」徵求委託書，相關徵求費用得否由「公司」支出？","options":{"A":"得由公司支出","B":"不得。發行公司經營階層或大股東於股東會有選舉董監議案時，為鞏固經營權而以大股東名義徵求委託書之徵求費用，係經營者或大股東為取得股東會委託書進而掌握公司經營權所需付出之成本，「並非公司營運所應負擔之費用」，故不得由公司支出，應由大股東自行負擔","C":"經股東會決議得由公司支出","D":"由主管機關核定"},"answer":"B","explain":"大股東鞏固經營權之徵求費用屬個人成本，不得由公司資金支應；維持公司中立性。"},{"num":38,"question":"徵求人徵求委託書之費用，可否由「公司支付」？","options":{"A":"得由公司支付","B":"公司係召開股東會之主體，對股東會事務自應嚴守中立性原則，故「不論」公司股東會是否有選舉董監議案，「徵求委託書之徵求費用均不得由公司支付」","C":"僅有選舉議案時不得由公司支付","D":"經主管機關核准得由公司支付"},"answer":"B","explain":"嚴格中立：無論有無選舉議案，徵求費用一律不得由公司支付，避免公司資金影響徵求結果。"},{"num":39,"question":"信託事業或股務代理機構所徵得之委託書，於分配選舉權時是否有特別限制？","options":{"A":"依股東指示自由分配","B":"信託事業或股務代理機構受股東委託擔任徵求人（不論股東持股 10% 以上或因擬支持被選舉人之一符合獨立董事資格而適用 8% 持股之情形），其徵得委託書於分配選舉權數時，「股東擬支持之獨立董事被選舉權數，應大於各非獨立董事被選舉人之選舉權數」","C":"獨董與非獨董權數應相等","D":"由公司章程訂定"},"answer":"B","explain":"「無限徵求」機制下強制獨董權數 > 任一非獨董權數，確保獨董優先當選；體現獨董強化制度之政策意旨。"},{"num":40,"question":"徵求人於徵求委託書之書面及廣告上，「僅載明擬支持之董事被選舉人名單」，而「未填列監察人被選舉人名單」，可否將徵得之委託書支持其他監察人被選舉人？","options":{"A":"可自由分配","B":"不可。如將徵得之委託書支持監察人被選舉人，「該徵得之委託書於監察人選舉議案，其代理之表決權不予計算」","C":"經股東同意得分配","D":"由公司認定"},"answer":"B","explain":"委託書徵求須誠信揭露：未於書面及廣告載明監察人被選舉人即不得徵後分配於監察人選舉；違反者表決權不予計算。"},{"num":"40-1","question":"徵求人於徵求委託書之書面及廣告上，載明擬支持之董事被選舉人「5 名」，其徵得之委託書於分配選舉權數時，可否「全數分配給其中之 3 名」董事被選舉人？","options":{"A":"可由徵求人自由集中分配","B":"不可。徵求人於徵求委託書之書面及廣告上載明擬支持之董事被選舉人名單後，其徵得之委託書於分配選舉權數時，「應分配予所擬支持之全部董事被選舉人」（即全部 5 名），不得僅集中分配於部分（如 3 名）。如有違反者，其代理之表決權不予計算","C":"得由委託人個別指定支持之被選舉人","D":"由主管機關認定"},"answer":"B","explain":"徵求人應「忠實依其書面及廣告所載」分配於全體擬支持之被選舉人，不得集中分配；違反者代理表決權不予計算。"}]},{"chapter":"委託書·受託代理","questions":[{"num":41,"question":"代為處理徵求事務者應具備哪些資格條件？","options":{"A":"由徵求人自行決定資格","B":"除證券商或符合「股務處理準則§3 第 2 項」規定之公司外，代為處理徵求事務者應符合：(1) 公司型態：股份有限公司；(2) 實收資本額：1,000 萬元以上；(3) 人員資格：含正副主管至少應有 5 人，並具備股務作業實務經驗 3 年以上、證券商高級業務員或業務員、或證基會股務作業測驗合格之資格之一；(4) 內控制度：應包括徵求作業程序，並訂定查核項目","C":"資本額 500 萬元以上即可","D":"由集保結算所指派"},"answer":"B","explain":"代為處理徵求事務者四大資格門檻：股份有限公司 + 資本額 1000 萬以上 + 至少 5 人具備特定資格 + 內控含徵求作業。"},{"num":42,"question":"代為處理徵求事務者欲辦理代為處理徵求事務應如何申請？","options":{"A":"直接向公司申請即可","B":"(1) 集保結算所業經主管機關指定為審核及查核之機構；(2) 應填具「受託代為處理徵求事務申請書」，並檢具經濟部最近核發之公司變更登記文件、正副主管及人員名冊、辦理代為處理徵求事務內部控制制度及內部稽核作業文件，送交集保結算所審核，且轉報主管機關備查","C":"由主管機關直接核可","D":"由公司股東會通過即可"},"answer":"B","explain":"申請流程：填申請書 + 公司登記文件 + 人員名冊 + 內控文件 → 集保審核 → 轉報主管機關備查。"},{"num":43,"question":"未經審核並報主管機關備查而辦理代為處理徵求事務者，其取得之委託書有何效力？","options":{"A":"經事後補備查仍有效","B":"代為處理徵求事務者應檢具相關資格證明文件送交集保結算所審核後，轉報主管機關備查，「始得」辦理代為處理徵求事務。違反者，「其代理之表決權不予計算」","C":"由徵求人之違規處罰","D":"由公司決定是否計入"},"answer":"B","explain":"未經審核備查之代為處理徵求事務者所取得之委託書，違反§7-1 第 2 項，依§22 規定代理表決權不予計算。"},{"num":44,"question":"代為處理徵求事務者「資格條件異動」時，是否須申報？","options":{"A":"無申報義務","B":"代為處理徵求事務者於「實收資本額、人員異動及內部控制制度之徵求作業程序修正」時，應於異動或修正後 5 日內向「集保結算所」申報","C":"於異動後 30 日內申報","D":"由公司代為申報"},"answer":"B","explain":"三類異動（資本額／人員／內控徵求程序）須於 5 日內向集保結算所申報，確保資格資訊持續維持。"},{"num":45,"question":"「非屬徵求受託代理人」是否有資格之限制？","options":{"A":"完全無資格限制","B":"除股代依§14 規定受公司之委任擔任受託代理人外，非屬徵求受託代理人之資格限制：(1) 受 3 人以上股東委託者：須具備該公司股東之身分（因其代理股數不得超過其本身持有股數之 4 倍）；(2) 受 1 或 2 人委託者：依公司法規定，受託代理人「得不」具股東之身分","C":"一律須具備股東身分","D":"限主管機關核准之自然人"},"answer":"B","explain":"受託人數決定資格門檻：受 3 人以上限股東；受 1-2 人不限股東。係因前者代理股數綁定本身持股 4 倍，必須有持股基數。"},{"num":46,"question":"非屬徵求受託代理人最多得接受多少股東委託代理出席股東會？","options":{"A":"10 人","B":"除股代依§14 受公司之委任擔任受託代理人外，非屬徵求委託書之受託代理人所受委託之人數「不得超過 30 人」（即最多僅能受 30 位股東之委託）","C":"50 人","D":"無人數上限"},"answer":"B","explain":"非屬徵求受託代理人受託人數上限 30 人；超過則屬徵求行為，須符合徵求人規範。"},{"num":47,"question":"非屬徵求受託代理人得代理多少股數？","options":{"A":"一律不得超過已發行股份總數之 3%","B":"依受託人數區分：(1) 受 3 人以上（含 3 人）股東委託者：除不得超過其本身持有股數之 4 倍外，亦不得超過公司已發行股份總數之 3%；(2) 受 2 人股東委託者：不得超過公司已發行股份總數之 3%；(3) 受單一股東委託者：其代理之表決權「不受限制」","C":"一律無代理股數限制","D":"由公司章程訂定"},"answer":"B","explain":"代理股數採三段式：3 人以上有 4 倍 + 3% 雙重限制；2 人為 3% 上限；1 人不受限。單一股東委託視為私法代理，不受公開徵求限制。"},{"num":48,"question":"徵求人是否可同時擔任「非屬徵求受託代理人」？代理之股數有何限制？","options":{"A":"徵求人不得兼任非屬徵求受託代理人","B":"徵求人可同時接受非屬徵求之股東委託代理出席股東會；惟其「累計代理股數」（包括徵求及非屬徵求取得之股數），仍「不得超過公司已發行股份總數之 3%」","C":"可兼任且代理股數合計可達 5%","D":"由徵求人自行決定"},"answer":"B","explain":"兼任合法但累計上限為 3%；防止透過雙重身分突破代理上限。"},{"num":49,"question":"非屬徵求受託代理人應檢附哪些資料向公司申報？","options":{"A":"一律無申報義務","B":"(1) 受 3 人以上股東委託者：應於股東會開會 5 日前檢附「聲明書」（聲明其受託代理之委託書非為自己或他人徵求而取得）及「委託書明細表」乙份，並於委託書上簽名或蓋章送達公司或其股代；(2) 受 1 或 2 人委託者：受託代理人無須向公司申報，惟委託書應於股東會開會 5 日前送達公司或其股代辦理出席事宜","C":"一律須申報","D":"由公司決定是否申報"},"answer":"B","explain":"受託 3 人以上者須申報（聲明書 + 明細表）防止偽裝徵求；受 1-2 人者僅須將委託書送達。"},{"num":50,"question":"委託人（即股東）如何知道有哪些人在徵求委託書，或公司是否有委任股代擔任股東之受託代理人？","options":{"A":"由徵求人主動通知股東","B":"股東可由公司寄發之「開會通知書」上得知：(1) 徵求人資訊：公司應於股東會召集通知上載明徵求人徵求資料之相關資訊取得方式；當次股東會有董監選舉議案時，公司並應彙總「徵求人名單」與「董事被選舉人之經營理念」併同股東會召集通知附送股東；(2) 公司委任股代為受託代理人資訊：當次股東會「無」董監選舉議案時，公司應於「委託書使用須知」上載明","C":"由集保結算所統一通知","D":"由主管機關通知"},"answer":"B","explain":"兩類資訊揭露：（1）有選舉議案時揭露徵求人名單與經營理念；（2）無選舉議案時揭露公司委任股代擔任受託代理人之資訊。"},{"num":51,"question":"委託人（即股東）於填寫委託書時，應注意哪些事項？","options":{"A":"由公司代為填寫","B":"股東於填寫委託書前應先詳閱「委託書使用須知」，並由股東於委託書上「親自填具」徵求人或受託代理人姓名；但 (1) 信託事業或股代受委託擔任徵求人者及 (2) 股代受委任擔任委託書之受託代理人者，得以「蓋章方式」代替","C":"由公司股代代簽","D":"可委託他人代填"},"answer":"B","explain":"原則親填，例外信託/股代蓋章；股東應先詳閱委託書使用須知瞭解委託對象與行使範圍。"},{"num":52,"question":"委託人如何瞭解自己委託書「被使用之情形」？","options":{"A":"無從查閱","B":"委託人可於股東會後「7 日內」，向公司或其股務代理機構查閱其委託書使用之情形","C":"於股東會後 30 日內查閱","D":"向集保結算所查閱"},"answer":"B","explain":"§18 提供 7 日查閱期間；股東得確認其表決權是否依其意思行使。"},{"num":53,"question":"委託人撤銷委託之期限為何？另委託人撤銷委託，但徵求人（受託代理人）「未退還」其委託書，其撤銷是否生效？","options":{"A":"撤銷無時限；徵求人不退還則不生效","B":"委託書送達公司後，股東欲親自出席或欲以書面/電子方式行使表決權者，應於股東會開會「2 日前」以書面向公司為撤銷之通知。撤銷之書面通知如已到達徵求人（受託代理人）及被徵求公司，依民法§95，「其已生撤銷之效力」，原委託書即已失效；公司應依股東之撤銷辦理，「不因徵求人是否退還委託書而有所影響」","C":"撤銷須經主管機關核准","D":"由公司章程訂定"},"answer":"B","explain":"撤銷期限：股東會開會 2 日前；撤銷生效時點為通知到達當事人時（民法§95 達到主義）；徵求人退還委託書與否不影響撤銷效力。"},{"num":54,"question":"公開發行公司股東委託徵求人或受託代理人出席股東會，股東於交付股東會委託書時，有何規定？","options":{"A":"由徵求人代為簽章即可","B":"股東應於委託書上「親自簽名或蓋章」，並應「親自填具」徵求人或受託代理人姓名；信託事業或股代受委託擔任徵求人，及股代受委任擔任委託書之受託代理人者，如採蓋章方式，「亦應於當場為之」。違反者依§22 第 1 項第 7 款，其代理之表決權不予計算","C":"由公司代為簽章","D":"由徵求人事後補正"},"answer":"B","explain":"親自簽蓋 + 親自填具姓名是有效要件；信託/股代之蓋章亦須「當場為之」。違反者代理表決權不予計算。"},{"num":55,"question":"委託人（股東）於委託書填寫徵求人或受託代理人姓名或名稱時，可否填寫「簡稱」？","options":{"A":"一律不得填寫簡稱","B":"若徵求人姓名或名稱過長，徵求人送交擬刊登之書面及廣告內容定稿予公司時，可註明徵求人姓名或名稱之「簡稱」；股東交付之委託書，如已親自填具徵求人或受託代理人姓名或名稱，「填寫內容係屬簡稱，簡稱如足資辨識為該徵求人或受託代理人，應無不可」","C":"由徵求人決定","D":"經主管機關核准得使用簡稱"},"answer":"B","explain":"簡稱原則：徵求人事前申報含簡稱 + 股東填寫之簡稱足資辨識者，認可有效。"},{"num":56,"question":"股東交付之委託書經查核或統計驗證時，發現為「空白委託」之情事者，該股東可否向公司主張親自出席該次股東會？","options":{"A":"空白委託視為已委託，股東不得親自出席","B":"股東未依§10 第 1 項規定填具徵求人或受託代理人姓名而交付委託書者，「股東委託他人代理出席股東會之行為並未完成」，該空白委託之委託書「自始無效」；其後該股東如欲親自出席股東會，「尚難予以限制或禁止」","C":"須報主管機關核准","D":"由公司決定是否許可"},"answer":"B","explain":"空白委託＝未完成委託行為，自始無效；股東親自出席權不受影響。確保股東表決權實質行使。"}]},{"chapter":"委託書·公司處理","questions":[{"num":57,"question":"公司於寄發或以電子文件傳送股東會召集通知時，應注意哪些事項？","options":{"A":"僅須附送委託書即可","B":"(1) 應同時附送委託書予股東，含填表須知/股東委託行使事項/基本資料；當次股東會有董監選舉議案時，應彙總「徵求人名單」與「董事被選舉人之經營理念」併同寄送；(2) 寄發或電子傳送委託書用紙予所有股東應於同日為之；(3) 應於召集事由列舉並說明選任/解任董監、變更章程、減資、停止公開發行、董事競業許可、盈餘/公積轉增資、公司解散合併分割、有價證券私募、重大營業或財產變動，不得以臨時動議提出；(4) 無選舉議案時委任股代為受託代理人事項應於委託書使用須知載明","C":"由公司自行決定揭露範圍","D":"由主管機關核定"},"answer":"B","explain":"公司寄發召集通知之四大義務：附委託書 + 同日寄發 + 重大議案不得臨時動議 + 委任股代事項揭露。"},{"num":58,"question":"公司應於何時揭露股東會召集之相關資料？","options":{"A":"僅於股東會開會前 1 日揭露","B":"(1) 停止過戶日前 12 個營業日：於公開資訊觀測站揭露股東會召集相關資訊；(2) 股東常會 30 日前/臨時會 15 日前：將開會通知書、委託書用紙、各項議案案由及說明資料電子檔傳送至公開資訊觀測站；(3) 股東會開會 15 日前：備妥議事手冊及補充資料供股東索閱，陳列於公司及股代並於股東會現場發放；(4) 股東常會 21 日前/臨時會 15 日前：議事手冊及補充資料電子檔傳送至公開資訊觀測站","C":"由公司章程訂定揭露時程","D":"於股東會開會當日揭露"},"answer":"B","explain":"四個關鍵時點：12 營業日 + 30/15 日 + 15 日 + 21/15 日，分別對應不同類別資料之揭露要求。"},{"num":59,"question":"公司須於何時揭露「徵求人」之相關資料？","options":{"A":"於股東會開會前 1 日揭露","B":"公司應於股東「常會」開會 30 日前（「臨時會」15 日前）製作徵求人徵求資料彙總表冊，並以下列方式之一揭露（公司應於股東會召集通知註明所採揭露方式）：(1) 網路方式：以電子檔案傳送至證基會予以揭露；(2) 報紙方式：連續於日報公告 2 日。當次股東會有選舉議案時，並應彙總徵求人名單與董事被選舉人經營理念併同寄送","C":"由徵求人自行揭露","D":"由集保結算所統一揭露"},"answer":"B","explain":"公司揭露徵求人資料：常會 30 日前/臨時會 15 日前；網路或報紙二擇一；公告方式須註明於召集通知。"},{"num":60,"question":"公司應如何編製股東會「議事手冊」？","options":{"A":"由公司自行訂定編製格式","B":"有關股東會議事手冊編製內容及其他應遵行事項，請參照「公開發行公司股東會議事手冊應行記載及遵行事項辦法」相關規定","C":"由主管機關每年公布範本","D":"由獨董統一編製"},"answer":"B","explain":"議事手冊編製依專法（議事手冊應行記載及遵行事項辦法），含議案說明、補充資料、章程等必要記載事項。"},{"num":61,"question":"公司應如何揭露「徵求人所徵求之股數及非屬徵求受託代理人所代理之股數」資訊？","options":{"A":"於股東會後 7 日內揭露","B":"(1) 時間：股東會「開會當日」，公司或其股代應將「徵求人徵得之股數」及「非屬徵求受託代理人代理之股數」彙總編製統計表；(2) 揭露方式：以電子檔案傳送至證基會，並於股東會開會場所為明確之揭示","C":"於股東會前 1 日傳送","D":"由公司決定揭露方式"},"answer":"B","explain":"徵求/受託股數揭露雙管道：股東會當日傳送至證基會 + 開會場所明確揭示，便利股東知悉。"},{"num":62,"question":"下列何者「不」屬於公司得拒絕發給股東會表決票或代理表決權不予計算之情形？","options":{"A":"委託書用紙非為公司印發","B":"因徵求而送達公司之委託書為轉讓而取得","C":"委託人持有股份未達 1,000 股","D":"徵求人擬支持之董監被選舉人超過該次股東會議案或章程所定應選任人數"},"answer":"C","explain":"§22 列 15 種情形（委託書用紙非公司印發、轉讓取得、不符徵求資格、場所外徵求、超過應選任人數、非法取得、聲明書虛偽、未親填、超 30 人、股代未依規定、違反 §10/§13/§14/§16/§19、出席證轉讓、超代理限額、投票與書面廣告/委託內容不符、其他違反規定），不含「持股未達 1,000 股」。"},{"num":63,"question":"委託書未於股東會開會 5 日前送達公司，公司應如何處理？","options":{"A":"一律視為無效","B":"依經濟部函釋，公司法§177 規定委託書應於股東會開會 5 日前送達，立法目的為便利公司作業，故如未依規定而於股東會當日始向公司提出委託書者，「公司自得依作業情形予以衡量是否接受或拒絕」","C":"經主管機關核准始可受理","D":"由公司章程訂定"},"answer":"B","explain":"5 日前送達之規定屬程序性便利規定；逾期送達者公司有裁量權決定接受或拒絕，非絕對無效。"},{"num":64,"question":"股東交付徵求人或受託代理人之委託書，經查核發現為「不合格件」者，公司可否受理股東申請補發？","options":{"A":"公司應一律補發","B":"經查核發現不合格之委託書，當不合格原因「歸屬於股東」時，公司「不得」受理股東申請補發委託書；公司如已補發予股東時，該補發之委託書亦不得使用","C":"由徵求人補發","D":"由主管機關核定"},"answer":"B","explain":"歸責於股東之不合格件不得補發，避免股東透過補發循環規避；已補發者無效。"},{"num":65,"question":"上市/櫃/興櫃公司召開股東會，公司於印製與使用開會通知書之管理方面有何應辦理事項？","options":{"A":"由公司自行決定印製方式","B":"公司召開股東會「有」董監選舉議案時應依下列程序：(1) 開會通知書（委託書）逐張印製流水編號；委外印製應請印製廠商出具印製數量證明，自行印製應詳細記載印製數量；(2) 作廢者應加蓋作廢章戳並記錄流水編號；(3) 使用應依編號連續使用不斷號，斷號者應註明原因並經主管簽章確認；(4) 公司應詳實記錄使用、作廢及空白數量等資料，合計數量應與印製數量相符","C":"由集保結算所統一印製","D":"由主管機關監製"},"answer":"B","explain":"印製管理四要件：流水編號 + 作廢加章 + 連續使用 + 詳實記錄；目的在防止偽造與替換。"},{"num":66,"question":"上市/櫃/興櫃公司股東未收到股東會開會通知書（委託書），應如何申請補發？","options":{"A":"僅得臨櫃申請","B":"公司召開股東會有董監選舉議案時，股東可依下列方式申請補發：臨櫃申請（加蓋原留印鑑或簽名）/委託他人申請（受託人另檢附身分證明影本及委託書）/電話申請/傳真方式（傳真申請書填載基本資料並簽名或蓋章）/電話語音方式。公司受理時應確認股東身分、地址不符應先變更、補發應加註「補發」字樣並記錄流水編號。對未滿一千股股東與股東會當日申請者得不適用上開作業程序","C":"僅得郵寄申請","D":"由主管機關核發"},"answer":"B","explain":"補發 5 種申請管道；公司受理 3 步驟（身分確認 + 地址校對 + 加註補發字樣與編號）；零股股東/當日申請另有彈性。"},{"num":67,"question":"上市/櫃/興櫃公司股東會有董監選舉議案時，股東申請補發之開會通知書（委託書），公司要如何交付予股東？","options":{"A":"一律郵寄","B":"(1) 股東或受託人臨櫃領取時應留存簽收紀錄；以電話語音方式申請補發臨櫃領取者亦同；以傳真方式申請補發臨櫃領取者，應另檢附傳真文件正本或於傳真之申請書上簽名或蓋章；(2) 以郵寄方式交付時，應依股東指定之通訊或戶籍地址寄發，並影印開會通知書、併同交寄證明留存備查（電腦留存紀錄/報表清冊代替影印者，至少含申請補發股東戶號及郵寄地址等資料，並連同交寄證明或當次購買郵資證明保存備查）；(3) 對未滿一千股股東與股東會當日申請補發者得不適用上開作業程序","C":"由徵求人代為交付","D":"由主管機關核發"},"answer":"B","explain":"兩種交付方式（臨櫃簽收/郵寄留存證明）+ 零股股東/當日申請彈性。記錄留存以利後續查核。"},{"num":68,"question":"委託書規則§20 及§21 所稱「已發行股份總數」之計算，依何規則？","options":{"A":"包括所有已發行股份","B":"依§20，徵求人代理股數不得超過公司「已發行股份總數」之 3%；§21 規定受 3 人以上股東委託之受託代理人，其代理股數除不得超過其本身持有股數之 4 倍外，亦不得超過公司「已發行股份總數」之 3%。其代理股數係回歸公司法§177 規定，不得超過已發行股份總數「表決權」之 3%。依經濟部 101/6/11 經商字第 10102420280 號函釋，所稱「已發行股份總數表決權」係指已發行股份總數扣除「無表決權股」（如§179、§157）後之股數，「不扣除不得行表決權股份數」（如§197-1 第 2 項）","C":"由公司章程自行訂定","D":"由主管機關核定"},"answer":"B","explain":"「已發行股份總數」採表決權概念：扣除無表決權股，但不扣除「不得行表決權股」（§197-1 第 2 項屬未到期持股違規等情形）。"},{"num":69,"question":"公司於何時應就委託書予以「統計驗證」？","options":{"A":"由公司於股東會後辦理","B":"公司召開股東會時，委託書於股東會開會前應經公司之股務代理機構或其他股務代理機構予以統計驗證；但公司「自辦股務」者，得由公司自行辦理統計驗證事務","C":"由集保結算所統一辦理","D":"由主管機關核定"},"answer":"B","explain":"原則委託股代統計驗證；自辦股務之公司例外得自辦驗證。"},{"num":70,"question":"公司召開股東會「有」選舉董監議案者，徵求人或受託代理人於徵得或受託委託書後，應辦理什麼事項？","options":{"A":"由公司自行統計","B":"(1) 徵求人或受 3 人以上 30 人以下股東委託之受託代理人，應彙總代為處理徵求事務者或股東交付之委託書，並編製明細表一式二聯連同委託書「直接交付統計驗證機構」；經統計驗證機構簽收後，明細表一聯由徵求人或受託代理人收執，另一聯由統計驗證機構留存；(2) 徵求人或受託代理人最遲應於股東會開會 5 日前將委託書送達統計驗證機構","C":"由徵求人自行驗證","D":"由公司董事會驗證"},"answer":"B","explain":"徵求人/受託代理人徵得後須直接交統計驗證機構；明細表一式二聯雙方各執；最遲股東會開會 5 日前送達。"},{"num":71,"question":"徵求人或受託代理人如何得知公司委託書之「統計驗證機構」？","options":{"A":"由公司主動通知","B":"可於「股東會召集通知」得知委託書之統計驗證機構；另公司統計驗證機構變更時，依規定應即於「公開資訊觀測站」公告，故當公司變更統計驗證機構時，可經由公開資訊觀測站查詢","C":"由集保結算所通知","D":"由徵求人自行決定"},"answer":"B","explain":"兩種管道：召集通知初次告知 + 公開資訊觀測站變更公告。"},{"num":72,"question":"徵求人或受託代理人於何時可取得「出席證明文件」？","options":{"A":"於股東會開會當日","B":"公司或其股務代理機構最遲應於股東會開會「前 1 日」，開立證明文件交付徵求人或受託代理人","C":"於股東會開會 5 日前","D":"由主管機關核發"},"answer":"B","explain":"出席證明文件最遲於股東會開會前 1 日交付，便利徵求人/受託代理人準備出席。"},{"num":73,"question":"委託書統計驗證機構辦理統計驗證作業，有無「標準作業程序」之規定？","options":{"A":"由各統計驗證機構自行訂定","B":"統計驗證機構應依法令及內部控制制度有關委託書統計驗證作業規定辦理；統計驗證作業規定應依「臺灣集中保管結算所訂定之股務單位內部控制制度標準規範」有關委託書統計驗證作業相關規定訂定。如自辦股務公司或股代違反規定，經主管機關命令糾正或處罰者，「不得再自行或為該違規情事所涉公司辦理股務事務」","C":"由公司章程訂定","D":"由集保結算所個案核准"},"answer":"B","explain":"統計驗證作業依集保結算所「股務單位內部控制制度標準規範」；違規者喪失辦理股務事務資格。"},{"num":74,"question":"公司依規定訂定之委託書「統計驗證作業程序」，須陳報到什麼層級核定？","options":{"A":"總經理核定","B":"辦理委託書統計驗證之作業程序，應經「公司董事會」通過後實施","C":"獨立董事核定","D":"主管機關核定"},"answer":"B","explain":"統計驗證作業程序屬公司治理重要事項，應提董事會通過，確保獨立性與監督力。"},{"num":75,"question":"辦理委託書統計驗證人員之資格條件為何？","options":{"A":"由公司自行決定資格","B":"需符合下列條件之一：(1) 股務作業實務經驗 3 年以上；(2) 受託辦理委託書事務實務經驗 3 年以上；(3) 證券商高級業務員或業務員；(4) 主管機關指定機構舉辦之股務作業測驗合格","C":"限主管機關核可之自然人","D":"由集保結算所指派"},"answer":"B","explain":"四種資格擇一即可；採實務經驗 + 專業證書 + 測驗合格之多元認定。"},{"num":76,"question":"委託書統計驗證機構辦理統計驗證作業應於何時完成？","options":{"A":"股東會開會後 5 日內完成","B":"(1) 股東會「有」選舉董監議案者：統計驗證機構應於徵求人或受託代理人送達委託書之日起「5 日內」（召開臨時會者於「3 日內」）完成統計驗證程序，並將驗證結果通知徵求人或受託代理人；所有統計驗證作業最遲應於「股東會開會前 1 日前」完成；(2) 股東會「無」選舉議案者，最遲應於「股東會開會前 1 日前」完成","C":"股東會開會當日完成","D":"由公司決定"},"answer":"B","explain":"雙時限：5 日/3 日內完成個別驗證 + 股東會開會前 1 日前完成全部驗證；無選舉議案時僅須前 1 日完成。"},{"num":77,"question":"公司召開股東會「有」選舉董監議案者，委託書統計驗證機構於確認驗證結果後，應如何處理？","options":{"A":"僅須通知徵求人","B":"(1) 驗證後委託書應區分為合格件與不合格件，由驗證人員加蓋章戳（合格者得以不超過 100 張為單位、於足以表彰每單位明細之表單加蓋章戳替代），並按日建檔管理；(2) 驗證合格之委託書應於送達日起 5 日內（臨時會 3 日內）編製明細表送交公司或其股代；(3) 統計驗證結果應就每一徵求人或受 3 人以上 30 人以下股東委託之受託代理人作成書面紀錄一式三份（公司/徵求人/驗證機構各一），並於股東會開會前 1 日前由承辦人及主管簽章；(4) 經驗證屬不合格之委託書應裝訂成冊備供查閱，「不予退還」徵求人或受託代理人","C":"由徵求人自行處理","D":"由公司董事會核可"},"answer":"B","explain":"驗證後處理四步驟：合格不合格分檔 + 5/3 日內送明細 + 一式三份書面紀錄 + 不合格件裝訂留存（不退還）。"},{"num":78,"question":"委託書統計驗證機構對於委託書之「驗證方式」及「驗證內容」為何？","options":{"A":"採實質審查","B":"委託書驗證採「書面形式審核」，並僅就下列形式內容予以驗證，至實質內容仍須由「司法機關」予以認定：(1) 委託書是否為該公司印製；(2) 委託人是否簽名或蓋章；(3) 是否填具徵求人或受託代理人之姓名，且其姓名是否正確","C":"採全面審查包括筆跡鑑定","D":"由公司決定驗證內容"},"answer":"B","explain":"驗證採形式審查（公司印製/簽蓋/姓名填具與正確），實質爭議由司法認事；機構不負偽造變造之認定責任。"},{"num":79,"question":"委託書統計驗證機構驗證委託書時，可否以「委託人未於委託書上加蓋原留印鑑」為由，將該委託書剔除並列為不合格件？","options":{"A":"得逕予剔除","B":"委託書統計驗證應驗證之內容係依§13-1 第 2 項規定為：(1) 委託書是否為該公司印製；(2) 委託人是否簽名或蓋章；(3) 是否填具徵求人或受託代理人之姓名，且其姓名是否正確。據此，「股東如已依前揭規定於委託書上簽名或蓋章，驗證單位不得以委託人未加蓋原留印鑑為由逕予剔除」","C":"由公司決定","D":"由主管機關核准"},"answer":"B","explain":"原留印鑑非驗證項目；股東簽名或蓋章即合於形式要件，不得以印鑑不符剔除。"},{"num":80,"question":"甲公司之股務委託乙股代辦理，甲公司股東會有董監選舉議案，甲公司可否「僅將統計驗證事務收回自辦」，至於其他股務事項仍由乙股代辦理？","options":{"A":"得收回部分自辦","B":"甲公司股務既已委託乙股代代辦，「不得僅將委託書統計驗證事務收回自辦」","C":"經乙股代同意得收回","D":"由主管機關核准"},"answer":"B","explain":"股務委託採全部委託原則；不得切割部分自辦，避免責任歸屬不清及中立性受損。"}]},{"chapter":"委託書·股代信託","questions":[{"num":81,"question":"股東如何才能「委託信託事業或股務代理機構擔任徵求人」？所稱股代為何？","options":{"A":"任何股東均可委託","B":"(1) 金控/銀行/保險公司召開股東會，股東及其關係人應持有公司已發行股份總數 10% 以上，並符合特定金管會核准/申報條件之一；(2) 前款以外公司召開股東會，股東應持有 10% 以上（有選舉議案時委託股東中至少 1 人應為董監被選舉人，但擬支持者符合獨董資格者除外）或持有 8% 以上且擬支持被選舉人之一符合獨董資格；(3) 非金融機構之一般公發公司對股東會議案有相同意見之股東，合併計算之股數符合規定者得共同委託；(4) 信託事業/股代如為召開股東會公司之股代或為金控子公司，於選舉議案時不得受託；(5) 「股務代理機構」指符合「股務處理準則§3 第 1 項或第 2 項」規定者","C":"由主管機關核准個案","D":"由公司章程訂定"},"answer":"B","explain":"委託信託/股代為徵求人之三大門檻：金融業 10% + 申報條件；非金融業 10%（含被選舉人要件）或 8% + 獨董要件；可共同委託合併計算；信託/股代消極資格限制。"},{"num":82,"question":"股東委託信託事業或股代擔任徵求人後，可否再為徵求行為？","options":{"A":"可以","B":"股東委託信託事業或股代擔任徵求人後，「不得」再有徵求行為","C":"經主管機關核准得為","D":"經信託事業同意得為"},"answer":"B","explain":"委託專屬性：股東一次委託僅能透過該信託/股代徵求，避免雙重徵求行為造成混淆。"},{"num":83,"question":"若信託股票係受託人所屬「金控母公司股票」，則該受託人得否以持有之信託股票擔任徵求人？","options":{"A":"得擔任","B":"若信託股票係受託人所屬金控母公司股票，則受託人「不得」以持有之信託股票擔任徵求人或委託信託事業、股代擔任徵求人","C":"經主管機關核准得擔任","D":"由委託人決定"},"answer":"B","explain":"委託書規則§6-1 排除：避免金控集團內部利益衝突，子公司持有母公司股票（屬無表決權股）不得擔任徵求人。"},{"num":84,"question":"委託信託事業或股代之股東須持股繼續 1 年以上。若甲（存續）與乙（消滅）合併，乙公司股東持有「乙公司股份」之期間，是否可合併計算為持有「甲公司股份」之期間？","options":{"A":"得合併計算","B":"公司合併時，消滅公司之股東係「於合併基準日」取得存續公司股東之身分；故消滅之乙公司股東其持有甲存續公司股份之期間，「不得」合併計算其持有乙消滅公司股份之期間","C":"由公司章程訂定","D":"由主管機關核准"},"answer":"B","explain":"股東身分轉換以合併基準日為起點；不得溯及合併消滅公司之持股期間。"},{"num":85,"question":"信託事業或股代受託擔任徵求人，其得代理之股數為多少？","options":{"A":"不得超過 3%","B":"代理之股數「不受限制」，即不受已發行股份總數百分之三之限制","C":"不得超過 5%","D":"由公司章程訂定"},"answer":"B","explain":"「無限徵求」機制：信託/股代受 10% 大股東委託擔任徵求人時不受 3% 上限拘束，便利集中股權行使。"},{"num":86,"question":"信託事業或股代受託擔任徵求人，可否再委託他人代為處理徵求事務？","options":{"A":"不可","B":"信託事業或股代受託擔任徵求人者，「得」委託他人代為處理徵求事務；惟仍應依§7、§8 規定，於檢附之「徵求人擬刊登之書面及廣告內容定稿」中載明所委託代為處理徵求事務者名稱、地址、電話及徵求場所之聯絡人姓名","C":"經主管機關核准得委託","D":"限委託集保結算所"},"answer":"B","explain":"得委託，但須於書面廣告載明代為處理徵求事務者之資訊以利透明。"},{"num":87,"question":"信託事業本身召開股東會，可否接受本身股東委託擔任徵求人？信託事業為他公司股東，於他公司召開股東會時委託自己之信託部擔任徵求人？","options":{"A":"兩者皆可","B":"(1) 信託事業本身召開股東會，「不可」接受本身公司股東委託擔任徵求人；(2) 信託事業為他公司股東時，於他公司股東會「不得」委託自己擔任徵求人（即該信託事業應委託其他信託事業/股代擔任徵求人，或以本身股東名義自行徵求）","C":"經主管機關核准得為","D":"由信託事業董事會決定"},"answer":"B","explain":"兩種情形均禁止信託事業自我委託：避免利益衝突 + 自我代理之疑慮。"},{"num":88,"question":"張三為甲信託事業之董事長，亦為乙公司股東。乙公司召開股東會時，張三得否委託甲信託事業擔任徵求人？","options":{"A":"不得","B":"張三與甲信託事業為「不同人格之主體」，故乙公司召開股東會時，張三得委託甲擔任徵求人。但因張三為甲信託事業之董事長，張三與甲訂定委任契約時應注意「民法§106 自己代理禁止之規定」，故張三不得「代表甲信託事業」與其自己簽訂契約","C":"由乙公司決定","D":"經主管機關核准"},"answer":"B","explain":"自然人與法人為不同人格主體，張三委託甲合法；但簽訂委任契約時應由甲信託事業之其他代表人代表，避免民法§106 自己代理禁止規範。"},{"num":89,"question":"股東於委託信託事業或股代擔任徵求人後，是否可接受該信託事業、股代或其他徵求人委託，辦理代為處理徵求事務？","options":{"A":"可","B":"股東委託信託事業或股代擔任徵求人後，「不得」再有徵求行為，「亦不得」於該次股東會再接受該信託事業、股代或其他徵求人之委託，辦理代為處理徵求事務","C":"經主管機關核准得為","D":"由信託事業同意得為"},"answer":"B","explain":"委託專屬性：股東委託後不得在同次股東會雙重身分擔任代為處理徵求事務者，避免角色衝突。"},{"num":90,"question":"甲（存續）與乙（消滅）合併，乙公司「持有丙公司股份」之期間，於甲公司委託信託事業或股代擔任徵求人時，可否合併計算為「甲公司持有丙公司股份」之期間？","options":{"A":"不得合併計算","B":"公司因合併而消滅，其存續或另設立之公司依§6 第 1 項計算「繼續一年以上持有公司已發行股份」之持股期間時，「得併計」消滅公司原持有公開發行公司已發行股份之持股期間。故甲公司持有丙公司股份之期間，「得併計」乙公司持有丙公司股份之期間","C":"由主管機關核准","D":"由甲公司章程訂定"},"answer":"B","explain":"與 Q84 相反：本題為公司持股（甲承受乙之持股）期間合併計算；Q84 為個人股東持股（合併基準日始取得存續公司股東身分）。"},{"num":91,"question":"公司股東會於何種情況下，可委任股代擔任受託代理人？費用由誰負擔？所稱股代為何？股東可由何處得知相關訊息？","options":{"A":"任何情況均可委任","B":"(1) 公司股東會「無選舉董監議案時」，公司可委任股代擔任該公司股東之受託代理人；(2) 依§14，股代以「公正超然立場」擔任委託書之受託代理人，「相關費用得由公司支出」；(3) 「股代」指符合「股務處理準則§3 第 1 項或第 2 項」規定者；(4) 股東資訊取得方式：應於該次股東會「委託書使用須知」載明","C":"限有選舉議案時可委任","D":"由主管機關核准"},"answer":"B","explain":"委任股代為受託代理人四要件：無選舉議案 + 公正超然 + 公司負擔費用 + 委託書使用須知揭露。"},{"num":92,"question":"公司可否委任「自己之股代」擔任受託代理人？","options":{"A":"一律不可","B":"公司除可委任其他股代擔任受託代理人，「亦可」委任自己之股代擔任受託代理人。但「公司本身為股代」者，於股東會開會時，「不可」委任自己作為受託代理人","C":"經主管機關核准得為","D":"由公司章程訂定"},"answer":"B","explain":"可委任自己之股代（即原協助公司股務之股代）；但公司本身為股代時不得自我委任避免角色衝突。"},{"num":93,"question":"公司可委任股代擔任受託代理人是否有「家數之限制」？","options":{"A":"限 3 家以內","B":"公司可視需要委任「多家」股代擔任受託代理人，「並無家數之限制」","C":"限 1 家","D":"由主管機關核定"},"answer":"B","explain":"委任股代家數無上限；公司可視需要委任多家以分散處理。"},{"num":94,"question":"股代受公司委託擔任受託代理人「須注意事項」為何？","options":{"A":"不須特別注意事項","B":"(1) 須該次股東會「無選舉董監議案」；(2) 「不得接受股東全權委託」；(3) 辦理業務應「維持公正超然立場」","C":"可代行使股東全權委託","D":"由主管機關核定"},"answer":"B","explain":"三項注意事項：限無選舉議案 + 禁止全權委託（須逐案表示意見）+ 公正超然立場。"},{"num":95,"question":"股代受公司委託擔任受託代理人時，其委託人數是否受 30 人之限制？","options":{"A":"受 30 人限制","B":"股代經由公司委任擔任該公司股東之受託代理人者，「委託人數不受 30 人限制」，且其所代理之股數「亦不受已發行股份總數百分之三之限制」","C":"限 50 人","D":"由公司章程訂定"},"answer":"B","explain":"公司委任之股代為「制度性受託代理人」，不受非屬徵求受託代理人之 30 人 + 3% 雙重限制；以利股東會運作。"},{"num":96,"question":"股代受公司委任擔任股東之受託代理人，收取委託書時，可否限制收取之對象？","options":{"A":"得限制特定持股以上股東","B":"依§14，公發公司股東會無選舉董監議案時，股代得經由公發公司之委任擔任該公司股東之受託代理人。受託代理人有別於主動徵求委託書之徵求人，而係「受股東之主動委託」取得委託書，代理出席股東會，故「受託代理人不宜限定僅接受一定持股以上股東之委託」","C":"經主管機關核准得限制","D":"由公司章程訂定"},"answer":"B","explain":"受託代理人為被動受託（非主動徵求），不應對股東設身分／持股門檻；應對全體股東開放。"},{"num":97,"question":"股代受公司委託擔任受託代理人時，應檢附哪些資料向公司申報？","options":{"A":"無申報義務","B":"(1) 股代既為受託代理人，仍須依「非屬徵求受託代理人」相關規定辦理：應於股東會開會 5 日前檢附「聲明書」（聲明其受託代理之委託書非為自己或他人徵求而取得）及「委託書明細表」乙份，並於委託書上簽名或蓋章送達公司或其股代；(2) 股東會開會完畢「5 日內」應將委託出席股東會之委託明細、代為行使表決權之情形、契約書副本及主管機關規定事項，製作「受託代理出席股東會彙整報告」備置於股代","C":"由公司代為申報","D":"由主管機關核定"},"answer":"B","explain":"事前申報（5 日前聲明書 + 明細表） + 事後備置（股東會後 5 日內彙整報告）。"},{"num":98,"question":"金控公司股東會「無」選舉議案時，若其股代為該金控旗下之子公司，則該股代得否接受該金控公司之委託擔任受託代理人？","options":{"A":"一律不得","B":"金控公司股東會無選舉議案時，若其股代為該金控公司之子公司，則該股代「得」依§14 規定接受該金控公司之委託擔任股東之受託代理人；惟其辦理該項業務時仍應「維持公正超然立場」，且「不得接受股東全權委託」","C":"由主管機關核准","D":"由金控公司章程訂定"},"answer":"B","explain":"金控集團內部子公司股代得擔任，但仍須遵守公正超然 + 禁止全權委託原則。"},{"num":99,"question":"股代受公司委任擔任股東之受託代理人後，可否「再擔任委託書徵求人」？","options":{"A":"不可","B":"「可以」。委託書規則並未限制股代在受公司委任擔任股東之受託代理人後不得再擔任徵求人。惟股代若同時受公司委任擔任股東之受託代理人及徵求人，「不得將其徵求之委託書作為非屬徵求之委託書出席股東會」","C":"經主管機關核准得為","D":"由公司決定"},"answer":"B","explain":"可兼任受託代理人與徵求人；但二類委託書不得混用，避免徵求/非屬徵求性質混淆。"},{"num":100,"question":"股代擔任發行公司之受託代理人後，是否可「再委託他人代為處理徵求事務」？","options":{"A":"得再委託","B":"股代係經由公發公司之委任擔任該公發公司股東之受託代理人，「自不得再委託他人辦理受託代理相關事務」。另代為處理徵求事務者係接受徵求人委託辦理代為處理徵求事務；而受託代理人「既非徵求人」，自無委託他人代為處理徵求事務之適用","C":"經主管機關核准得為","D":"由公司同意得為"},"answer":"B","explain":"受託代理人不得再委託他人轉受託；亦無「代為處理徵求事務」之適用（該機制限於徵求人）。"},{"num":101,"question":"股代受公司委任擔任受託代理人時，其受託之委託書於股東會「臨時動議」時，可否使用？","options":{"A":"不可","B":"「可以」。依委託書格式二之說明三規定：「本股東代理人得對會議臨時事宜全權處理之」，故股東會委託書之受託代理人於股東會有臨時動議時，自得就其受託股數行使表決權。前揭規定與§14 第 3 項「股代受委任擔任委託書之受託代理人者，不得接受股東全權委託」之「概念有別」","C":"經股東同意得為","D":"由主席決定"},"answer":"B","explain":"委託書格式二說明三授予「臨時事宜全權處理」之概括授權；與§14 第 3 項「不得接受股東全權委託」係兩個不同概念（§14 第 3 項係指各議案應逐案表示意見，非指臨時動議）。"},{"num":102,"question":"股代受公司委任擔任公司股東之受託代理人，於股東會時，若主席提出「原議案之修正案」，可否將原表示贊成原議案之權數轉為支持該修正案？","options":{"A":"可","B":"股代依§14 第 3 項受公司委任擔任公司股東之受託代理人者，「不得接受股東全權委託」，委託人（股東）應依委託書格式二「逐案表示意見」，受託代理人亦須確實依委託人之委託內容行使表決權。故股東會原議案之修正案進行表決時，股代擔任股東之受託代理人對於修正案，「仍應依委託人之委託內容」行使表決權","C":"由主席決定","D":"由公司章程訂定"},"answer":"B","explain":"股代受託代理人應「忠實依委託人逐案意見」行使表決權；不得擅自將原贊成原議案之權數轉支持修正案，須依委託人對該修正案之意見處理。"}]},{"chapter":"委託書·紀念品其他","questions":[{"num":103,"question":"證券投資信託事業（證投信）應如何行使其基金所持有股票之表決權？","options":{"A":"一律須指派本事業人員代表出席","B":"(1) 證投信行使證投信基金持有股票之表決權，得依公司法§177-1 以「書面或電子方式」行使；(2) 證投信依特定方式行使表決權者得不受證投信管理規則§23 第 1 項「應由證投信指派本事業人員代表為之」之限制：①指派符合「股務處理準則§3 第 2 項」條件之公司行使；②任一基金持股未達 30 萬股且全部基金合計未達 100 萬股（電子投票公司則為萬分之一/萬分之三）者，得不指派人員出席；③指派本事業以外之人員出席（依持股門檻有特別規定）；(3) 任一基金持股未達 1,000 股者得不申請開會通知書及不行使表決權，但其股數應計入計算；(4) 指派書應載明各議案行使表決權之指示；(5) 出借股票遇股東會應評估是否請求提前還券","C":"由公司決定","D":"由主管機關核准"},"answer":"B","explain":"證投信表決權行使五大要點：書面/電子方式、指派條件公司或本事業以外人員、低持股豁免、指派書明確記載、出借股票評估還券。"},{"num":104,"question":"證券商應如何行使其持有股票之表決權？","options":{"A":"一律須指派人員出席","B":"(1) 證券商行使持有股票之表決權，得依公司法§177-1 以「書面或電子方式」行使，或指派符合「股務處理準則§3 第 2 項」條件之公司行使；(2) 證券商對於持有股票公司股東會「未採電子投票」且持有股份「未達 30 萬股」者，得不指派人員出席股東會，不受證券商管理規則§20 第 2 項規定之限制；(3) 行使表決權除以電子方式外，均應於指派書上就各項議案行使表決權之指示予以「明確載明」；指派書及電子投票紀錄應留存備查","C":"由證券商章程訂定","D":"由主管機關核准"},"answer":"B","explain":"證券商表決權行使三要點：書面/電子或指派條件公司、低持股+未電子投票豁免、指派書明確載明指示。"},{"num":105,"question":"境外外國機構投資人應如何行使其持有股票之表決權？","options":{"A":"由保管機構代為行使","B":"境外外國機構投資人持有公發公司股份者，其表決權之行使應依「華僑及外國人投資證券管理辦法§16」辦理，且「不得將公司印發之委託書交付徵求人或受託代理人」；得依下列方式行使，不受該辦法§16 第 4 項「應指派國內代理人或代表人出席」之限制：(1) 依公司法§177-1 以書面或電子方式行使，或指派符合「股務處理準則§3 第 2 項」條件之公司行使；(2) 持股未達 30 萬股得不指派人員出席；達 30 萬股以上得由國內代理人/代表人之外之人員出席；(3) 指派書應載明各議案行使表決權之指示","C":"由公司決定","D":"由主管機關代為行使"},"answer":"B","explain":"境外外國機構投資人三大要點：依華外辦法§16 行使、不得交付徵求人/受託代理人、書面或電子或指派條件公司或國內代理代表以外人員。"},{"num":106,"question":"境外外國機構投資人可否擔任公開發行公司股東會委託書徵求人？","options":{"A":"不可","B":"可以","C":"經主管機關核准得為","D":"由公司章程訂定"},"answer":"B","explain":"境外外國機構投資人擔任徵求人並無禁止規定；得依委託書規則辦理。"},{"num":107,"question":"保管機構受託開立之「海外存託憑證專戶」可否擔任公開發行公司股東會委託書徵求人？","options":{"A":"一律得擔任","B":"海外存託憑證專戶實質所有權人為海外存託憑證專戶持有人，海外存託憑證所表彰之法律關係應依持有人與該受託保管機構間之存託契約或保管契約而定。故該專戶所表彰之有價證券表決權行使，及該專戶是否得擔任公發公司股東會委託書徵求人，「應依海外存託憑證專戶全體實質持有人之指示辦理」","C":"一律不得擔任","D":"由保管機構自行決定"},"answer":"B","explain":"存託憑證專戶實質持有人決定原則：依存託/保管契約，由全體實質持有人指示是否擔任徵求人。"},{"num":108,"question":"境外華僑及外國自然人擔任委託書徵求人，出席股東會可否「委託他人」出席股東會？","options":{"A":"可委託他人出席","B":"不可以，應親自出席股東會行使所徵得股份之表決權","C":"經主管機關核准得委託","D":"由公司章程訂定"},"answer":"B","explain":"境外華僑/外國自然人擔任徵求人時須親自出席行使所徵得股份之表決權；不得再委託他人出席。"},{"num":109,"question":"公司是否於每次股東會均應發放股東會紀念品？委託書規則規範股東會紀念品發放之公平原則為何？","options":{"A":"每次股東會均強制發放紀念品","B":"(1) 紀念品係公司於股東會時為回饋股東支持所提供具紀念性質物品；公司是否發放、價值高低及發放時間/地點/方式及剩餘紀念品處理「均由公司自行決定」，現行法令並無強制規定；(2) 依§11 第 4 項，紀念品交付徵求人、保證金金額及收取方式之訂定，「公司應以公平原則辦理」；其立法目的係避免公司藉由紀念品之發放造成不同徵求人間徵求作業（或取得委託書）不公之情形","C":"由主管機關決定","D":"由獨董決定"},"answer":"B","explain":"紀念品發放屬公司自治；惟對徵求人之交付須遵守公平原則，避免造成徵求作業不公。"},{"num":110,"question":"股東會紀念品是否作為「換取委託書」之用？","options":{"A":"係換取委託書之代價","B":"紀念品係由公司對股東發放，「並未因股東是否支持經營階層而異，亦不因其係何者之徵求對象而有所不同」；紀念品由各公司斟酌本身需要決定是否發放及發放種類；該紀念品「非由徵求人提供，亦非用於換取委託書」，故「其發放與委託書之徵求無涉」","C":"經主管機關核准得作為換取","D":"由徵求人提供作為換取"},"answer":"B","explain":"紀念品為股東參與激勵，非用於換取委託書；發放與徵求行為脫鉤。"},{"num":111,"question":"股東持有公司股份越多，其所領取紀念品之份數是否越多？","options":{"A":"依持股比例領取","B":"因發放紀念品「並非公司之盈餘分配」，其發放對象係以「是否具備股東身分」為依據，自「與股東持有股數多寡無關」（即每股東一份，與持股無關）","C":"由公司章程訂定","D":"由獨董決定"},"answer":"B","explain":"紀念品發放以股東身分為基準，與持股股數無關；不適用比例分配原則。"},{"num":112,"question":"公司所發放之股東會紀念品其種類是否有限制？得否以「提貨單、電話卡或加油站之加油單」作為紀念品？","options":{"A":"種類無限制，無公平要求","B":"(1) 公司股東會如發放紀念品，「以一種為限」；其數量如有不足時，得以價值相當者替代之；徵求人僅得以轉交公司所提供之當次股東會紀念品予所徵得之委託人，「不得自行以等值之其他商品交付」；(2) 公司如以提貨單、電話卡、加油站之加油單或其他商品作為紀念品，是否於該商品上加印「股東會紀念品」字樣，「得由公司自行斟酌」","C":"由徵求人決定種類","D":"由主管機關核定"},"answer":"B","explain":"紀念品以一種為限 + 數量不足得以等值替代；徵求人不得擅自更換；提貨單/電話卡/加油單可作紀念品，公司決定是否加印字樣。"},{"num":113,"question":"公司得否以「台灣彩券公司之公益彩券或刮刮樂」作為股東會紀念品？","options":{"A":"得作為紀念品","B":"公益彩券或刮刮樂，其性質與商品提貨單、電話卡、加油單等以兌換特定價值之商品或勞務為目的之票券或儲值卡「不同」，且因「中獎與否與獎金高低不一」，致使股東實際取得之價值不一，「尚難謂符合§11 第 2 項對於紀念品發放應以公平原則辦理之規定」","C":"經主管機關核准得作為","D":"由公司章程訂定"},"answer":"B","explain":"彩券/刮刮樂價值不確定，違反公平原則；不得作為股東會紀念品。"},{"num":114,"question":"股東會紀念品除由公司自行發放外，可否「委託徵求人或受託代理人」代為發放？","options":{"A":"不得","B":"徵求人或受託代理人依規定，檢附明細表送達公司時或繳交一定保證金予公司後，得向公司請求交付紀念品，再由其轉交委託人。惟公司交付紀念品給徵求人及受託代理人時，「不得有差別待遇或歧視之情形」；另公司「自行發放紀念品之處所」與「徵求人徵求場所或受託代理人處所應明顯區分」，俾消除投資人疑慮及減少爭議","C":"經主管機關核准得為","D":"由公司章程訂定"},"answer":"B","explain":"得委託徵求人/受託代理人代發；惟公司交付須無差別待遇 + 公司自發放處所與徵求場所應明顯區分。"},{"num":115,"question":"公司「發放股東會紀念品」可否要求股東先於委託書上「簽名或蓋章」？","options":{"A":"得要求簽蓋始發放","B":"公司股東「無親自或委託他人出席股東會之意願」，惟其依開會通知書所指定地點領取股東會紀念品者，公司「不得」要求股東於開會通知書所附之親自出席聯（出席簽到卡）或委託書上簽名或蓋章後始得領取；如涉及偽、變造委託書情事者，並應負相關「刑事責任」，且委託書所代理之表決權「亦不予計算」","C":"經主管機關核准得為","D":"由公司章程訂定"},"answer":"B","explain":"領取紀念品不得綁定簽蓋委託書；偽變造委託書涉刑事責任 + 表決權不予計算。"},{"num":116,"question":"公司已印製「股東會紀念品實物兌換券」後，徵求人可否自行以「等值之其他商品」代替紀念品交付予委託人？","options":{"A":"可","B":"依§11 規定，徵求人或受託代理人檢附明細表送達公司或繳交一定保證金後，得向公司請求交付紀念品，再由其轉交委託人。故徵求人「僅得以轉交公司所製作之紀念品」予所徵得之委託人，而「不得自行以等值之其他商品交付」","C":"經主管機關核准得為","D":"由委託人同意得為"},"answer":"B","explain":"徵求人不得擅自以其他商品替代公司紀念品；防止以高價值物品換取委託書（變相價購）。"},{"num":117,"question":"證券商營業員拜訪客戶取得委託書，除轉交股東會紀念品外可否再贈送其他商品予客戶？","options":{"A":"得自由贈送","B":"券商營業員拜訪客戶贈送商品作為「業務推廣之用」而非以取得委託書為目的者，與委託書規定無涉；惟若拜訪客戶之目的「係為取得委託書」者，除轉交股東會紀念品外，「不得再加贈其他商品」，以免有「價購委託書」之爭議","C":"經客戶同意得贈送","D":"由公司章程訂定"},"answer":"B","explain":"依拜訪目的區分：業務推廣性質贈送無妨；取得委託書為目的者除紀念品外不得加贈，避免價購委託書嫌疑。"},{"num":118,"question":"徵求人或受託代理人如何向公司取得股東會紀念品？","options":{"A":"由集保結算所統一交付","B":"徵求人或受託代理人「檢附徵得委託書明細表送達公司」或「繳交一定保證金予公司後」，得向公司請求交付紀念品，再由其轉交委託人，「公司不得拒絕」。有關股東會紀念品保證金之金額及收取方式，由公司基於公平原則訂定","C":"由主管機關核發","D":"由公司章程訂定"},"answer":"B","explain":"兩種取得方式（送達明細表 / 繳保證金）；公司不得拒絕；保證金金額由公司基於公平原則訂定。"},{"num":119,"question":"上市/櫃/興櫃公司召開股東會，有發放紀念品且有收取「紀念品保證金」者，其保證金金額及收取方式應於何時辦理公告？","options":{"A":"於股東會開會當日公告","B":"(1) 公司應訂定股東會紀念品保證金收取辦法，並於「股東會停止過戶開始日前至少 12 個營業日」，於「公開資訊觀測站」公告紀念品保證金之金額及收取方式；(2) 公司對於每一徵求人收取每份紀念品保證金價格應「相同」，如收取保證金超過購買價格者，每一份紀念品保證金之金額，應以「公司購買紀念品單價之 1.5 倍」為上限","C":"由徵求人自行洽詢","D":"由主管機關核定"},"answer":"B","explain":"保證金公告：停止過戶日前 12 營業日於觀測站；每份保證金金額對徵求人應相同 + 上限為購買單價 1.5 倍。"},{"num":120,"question":"上市/櫃/興櫃公司倘有收取紀念品保證金者，其徵求人應於何時繳交保證金予公司？","options":{"A":"於股東會開會 5 日前繳交","B":"(1) 徵求人應於「委託書徵求書面資料送達公司當日」，依公司訂定之保證金收取方式繳交股東會紀念品保證金；(2) 徵求人應「以書面」向公司請領紀念品，並註明親自或以配送方式領取紀念品，以配送方式領取者應另填留指定收取紀念品之地點","C":"於徵求結束後繳交","D":"由公司章程訂定"},"answer":"B","explain":"徵求人繳保證金時點 = 徵求書面資料送達公司當日；領取方式須書面註明親自或配送，配送者填指定地點。"},{"num":121,"question":"上市/櫃/興櫃公司倘有收取紀念品保證金者，應如何「交付」紀念品予徵求人？另未收取保證金之公司又應如何辦理？","options":{"A":"由徵求人自行向公司領取，無時程要求","B":"公司應依下列程序辦理：(1) 應「參酌徵求人人數」，以公正、公平、合理之原則計算分配紀念品數量予各徵求人；(2) 公司收取保證金後，應於徵求人將委託書徵求書面資料送達公司之規定期限「最末日後 3 日內」，且最遲於「寄發股東會召集通知 2 日前」，將紀念品交付各徵求人，並應於「同日為之」；(3) 親自領取者公司應留存簽收紀錄，配送方式者依書面指定地點交付並留存配送紀錄；(4) 徵求人於徵求取得委託書後再向公司請求交付紀念品時，應檢附徵得之委託書及其明細表送達公司或其股代，公司應於受理後 3 日內依收取委託書之張數交付相同數量之紀念品，且徵求人得以公司尚未返還之保證金充扺後續請領紀念品之保證金。「未收取保證金之公司，仍應依上述交付規定辦理」","C":"由主管機關代為交付","D":"由公司章程訂定"},"answer":"B","explain":"交付紀念品 4 步驟：人數比例分配 + 期限最末日後 3 日內且寄發召集通知 2 日前同日交付 + 簽收/配送紀錄 + 後續請領 3 日內補發。未收保證金者亦適用。"},{"num":122,"question":"有關「委託書規則」規定之申報書件格式及相關函令，可於何處查詢？","options":{"A":"限於主管機關公文室調閱","B":"可至主管機關「證券期貨局網站（www.sfb.gov.tw）」之「便民服務 / 申辦案件 / 申請案件表格」項下查詢下載","C":"由集保結算所提供查閱","D":"由公司公告"},"answer":"B","explain":"申報書件格式及函令於證券期貨局網站「便民服務 / 申辦案件 / 申請案件表格」查詢下載。"},{"num":123,"question":"違反主管機關依證交法§25-1 所定規則有關徵求人、受託代理人與代為處理徵求事務者之資格條件、委託書徵求與取得之方式、召開股東會公司應遵守之事項及對於主管機關要求提供之資料拒絕提供之規定者，有何處罰規定？","options":{"A":"處 5 萬至 50 萬元罰鍰","B":"依證交法§178 第 1 項，主管機關得處新臺幣「24 萬元以上至 480 萬元」，並得命其限期改善；屆期未改善者，得「按次處罰」","C":"處 100 萬至 1,000 萬元罰鍰","D":"由主管機關個案核定"},"answer":"B","explain":"委託書規則違規之罰則：24-480 萬元罰鍰 + 限期改善 + 按次處罰。"},{"num":124,"question":"公司遇有「黑道或股東不當干擾股東會」時應如何處理？","options":{"A":"由主席宣布散會","B":"公司遇有黑道或股東以暴力或不當方式干擾、妨礙股東會議之不法情事者，公司可「與檢警調機關聯繫，洽請該等機關協助處理」","C":"由獨董處理","D":"由公司章程訂定"},"answer":"B","explain":"遇暴力或不法干擾，公司應主動聯繫檢警調機關協助維持秩序；非由公司自行處理。"},{"num":125,"question":"公開發行股票公司召開股東會得否以「公告方式」通知零股（未滿 1 千股）股東？","options":{"A":"不得","B":"依證交法§26-2 規定，公發股票公司對於持有記名股票「未滿 1 千股股東」，其股東「常會之召集通知得於開會 30 日前」（股東「臨時會於開會 15 日前」）以公告為之。另若將召集通知以電子檔案上傳至公開資訊觀測站，並於完成傳輸後即視為已完成公告","C":"由公司章程訂定","D":"經股東會決議得為"},"answer":"B","explain":"零股股東公告通知：常會 30 日前/臨時會 15 日前公告；電子檔案上傳公開資訊觀測站視同完成公告。"},{"num":126,"question":"違反委託書規則相關規定經處分者，於 1 年內限制其擔任徵求人或辦理代為處理徵求事務之資格。主管機關處分時如何認定行為主體？徵求場所人員違規是否會連帶使公司遭停業 1 年處分？","options":{"A":"公司一律連帶處分","B":"違反委託書規則§5、§6 有關徵求資格規定或§11 第 1 項委託書取得限制等違規行為時，主管機關將「依個案違規事實及事證釐清行為主體」；若係從業人員個人行為而違規，「且非因業者未善盡監督管理之責任所致」者，「公司不致受連帶處分」。業者應善盡監督管理之責任，加強人員教育訓練督促所屬人員落實法令遵循","C":"由主管機關裁量是否處分","D":"由公司決定是否負責"},"answer":"B","explain":"違規責任主體採個案釐清原則：個人行為且公司無監督過失者，公司不連帶處分；公司未善盡監督管理義務者得連帶處分。"}]},{"chapter":"永續發展與資訊揭露","questions":[{"num":1,"question":"依金管會「上市櫃公司永續發展路徑圖」及「接軌 IFRS 永續揭露準則藍圖」，資本額達新臺幣 100 億元以上之上市櫃公司，自何年起應於年報揭露 IFRS 永續揭露準則（IFRS S1/S2）相關資訊？","options":{"A":"2024 年","B":"2025 年","C":"2026 年","D":"2027 年"},"answer":"C","explain":"金管會採分階段接軌 IFRS 永續揭露準則。第一階段（資本額達 100 億元以上之上市櫃公司）自 2026 年起編製適用 IFRS S1 及 S2 之永續資訊，並與財報同時於年報中揭露（即 2027 年申報 2026 年之年報）。"},{"num":2,"question":"依溫室氣體盤查議定書（GHG Protocol），企業向台電購買電力供辦公大樓使用所產生之碳排放，應歸類於哪一個範疇（Scope）？","options":{"A":"範疇一（Scope 1）","B":"範疇二（Scope 2）","C":"範疇三（Scope 3）","D":"範疇四（Scope 4）"},"answer":"B","explain":"範疇一為「直接」溫室氣體排放（如自有工廠製程、公務車燃油）；範疇二為「能源間接」排放（如輸入電力、熱或蒸汽）；範疇三為「其他間接」排放（如員工通勤、供應鏈、產品使用）。購電屬範疇二。"},{"num":3,"question":"依現行「上市上櫃公司編製與申報永續報告書作業辦法」，上市櫃公司應於每年何時完成永續報告書之編製與申報？","options":{"A":"5 月底前","B":"6 月底前","C":"8 月底前","D":"12 月底前"},"answer":"C","explain":"為提升永續資訊揭露之及時性，現行法規已統一規定全體上市櫃公司應於每年 8 月底前完成永續報告書之申報。"},{"num":4,"question":"有關永續報告書之「確信（Assurance）」，下列敘述何者正確？","options":{"A":"所有上市櫃公司之永續報告書均須取得確信","B":"食品工業、化學工業、金融保險業及達一定資本額條件之上市櫃公司，其永續報告書應取得會計師出具之確信報告","C":"確信報告僅能由內部稽核主管出具","D":"溫室氣體盤查結果不需經第三方查證"},"answer":"B","explain":"法規明定特定高風險產業（食品、化工、金融保險）及資本額達標之公司，其永續報告書須經會計師依確信準則出具確信報告；且溫室氣體盤查結果亦須取得第三方查證。"},{"num":5,"question":"全球永續性報告協會（GRI）強調之「雙重重大性（Double Materiality）」原則，其核心意涵為何？","options":{"A":"僅需評估企業對氣候環境的影響","B":"僅需評估氣候環境對企業財務表現的影響","C":"企業應同時評估「企業營運對經濟、環境及人群（含人權）之影響（衝擊重大性）」與「永續議題對企業價值創造之影響（財務重大性）」","D":"企業需分別編製中文與英文雙語報告書"},"answer":"C","explain":"雙重重大性是歐盟 ESRS 及 GRI 等準則的核心理念，要求企業同時評估外部對自身財務的風險（由外而內）及自身營運對外部環境/社會的衝擊（由內而外）。"},{"num":6,"question":"若上市櫃公司之永續報告書或其年報中揭露之 ESG 資訊，有虛偽隱匿情事致生損害於投資人，主要將面臨何種法律責任？","options":{"A":"僅違反道德規範，無法律責任","B":"僅處以行政罰鍰","C":"構成證券交易法第 20 條之財報或公開文件虛偽隱匿，應負民事損害賠償甚至刑事責任","D":"僅需由永續長下台負責"},"answer":"C","explain":"永續資訊已成為影響投資人決策的重大資訊。依證交法§20 第 2 項，發行人申報或公告之財務報告及「其他有關業務文件」內容不得有虛偽或隱匿之情事。"},{"num":7,"question":"為強化董事會對永續發展之治理，金管會推動上市櫃公司設置永續發展委員會。下列敘述何者最符合現行監理方向？","options":{"A":"委員會成員必須全部為外部顧問","B":"鼓勵上市櫃公司董事會轄下設置永續發展委員會（或永續長），且委員會應有獨立董事參與，以督導公司永續發展策略","C":"永續發展委員會之決議可直接取代股東會決議","D":"資本額 20 億元以下之公司嚴禁設置永續發展委員會"},"answer":"B","explain":"上市上櫃公司永續發展實務守則鼓勵公司於董事會下設置永續發展委員會，並由獨立董事參與，以強化最高治理層級對 ESG 議題的監督與決策。"},{"num":8,"question":"針對「永續分類標準（Taxonomy）」，其主要目的為何？","options":{"A":"規範企業的勞工基本薪資","B":"界定何謂「永續經濟活動」，防範企業「漂綠（Greenwashing）」，引導資金投入真正對環境有益的項目","C":"分類上市櫃公司的產業別以收取不同規費","D":"取代既有的 IFRS 會計準則"},"answer":"B","explain":"永續分類標準（如歐盟 Taxonomy 或我國永續經濟活動認定參考指引）旨在提供客觀標準認定哪些商業活動實質有助於減緩氣候變遷，避免企業漂綠。"},{"num":9,"question":"SASB（永續會計準則委員會）準則的最大特色為何？","options":{"A":"針對所有企業適用完全相同的一套指標","B":"具備「產業特定（Industry-Specific）」性質，根據不同產業的特性，訂定對該產業財務表現具重大影響之永續揭露指標","C":"僅關注企業的碳排放，不包含社會面（S）及治理面（G）","D":"為強制性之國際公法"},"answer":"B","explain":"SASB 核心在於「產業專屬性」，將企業分為 77 個行業，針對各行業制定最具財務重大性的 ESG 揭露指標。此與 GRI 採泛用性指標的出發點不同。"},{"num":10,"question":"我國「氣候變遷因應法」所建立的碳定價機制主要為下列何者？","options":{"A":"全面開徵碳稅，由財政部徵收","B":"徵收「碳費」，初期針對年排放量達 2.5 萬噸之排碳大戶，由環境部專款專用於溫室氣體減量","C":"取消所有電費補助","D":"對進口商品全面徵收碳關稅"},"answer":"B","explain":"我國《氣候變遷因應法》明定實施「碳費（Carbon Fee）」制度，由環境部徵收，專款專用於氣候變遷調適及溫室氣體減量。非碳稅制度。"}]},{"chapter":"誠信經營與防範內線交易","questions":[{"num":11,"question":"依證券交易法§157-1，內部人於知悉發行公司有重大影響其股票價格之消息時，在該消息明確後，未公開前或公開後幾小時內，不得對該公司之股票買入或賣出？","options":{"A":"12 小時","B":"18 小時","C":"24 小時","D":"48 小時"},"answer":"B","explain":"證交法§157-1 明定內線交易之沉澱期為消息公開後 18 小時。內部人須待消息公開滿 18 小時後（使市場充分消化資訊），始得買賣股票。"},{"num":12,"question":"上市櫃公司董事及監察人，於年度財務報告公告前幾日，不得交易其股票（即封閉期 Blackout Period）？","options":{"A":"10 日","B":"15 日","C":"30 日","D":"60 日"},"answer":"C","explain":"依「上市上櫃公司治理實務守則」，明定董事於年度財務報告公告前 30 日，每季財務報告公告前 15 日，不得交易其股票。"},{"num":13,"question":"依證券交易法規定，下列何者「非屬」內線交易規範之內部人？","options":{"A":"該公司之董事、監察人、經理人","B":"持有該公司之股份超過百分之十之股東","C":"基於職業或控制關係獲悉消息之人","D":"隨機於網路上看到未經證實之匿名謠言而買賣股票之一般散戶"},"answer":"D","explain":"內線交易規範對象包含：（1）董監經理人及持股 10% 以上大股東；（2）喪失上述身分未滿 6 個月者；（3）基於職業或控制關係獲悉者；（4）喪失前款身分未滿 6 個月者；（5）自上述人員獲悉消息之人。單純看到網路謠言的散戶不構成。"},{"num":14,"question":"關於「重大消息」之認定，實務上通常以何時點判斷消息已達「明確」？","options":{"A":"公司內部基層員工開始討論時","B":"某特定事件之發生具體明確，且其發生之機率甚高，足以對投資人之投資決定產生重大影響時","C":"公司發布正式新聞稿當日","D":"檢調機關開始調查時"},"answer":"B","explain":"依最高法院見解及「重大消息範圍及其公開方式管理辦法」，消息明確時點採「事件具體明確且發生機率高，足以影響理性投資人決策」為斷，不以最終契約簽署或正式公告為限。"},{"num":15,"question":"證券交易法§157「短線交易歸入權」計算內部人 6 個月內進出之利益時，依法規係採何種計算方式？","options":{"A":"先進先出法","B":"加權平均法","C":"最高賣價與最低買價相配法","D":"後進先出法"},"answer":"C","explain":"依證券交易法施行細則§11，短線交易利益計算採「最高賣價與最低買價相配法」，藉此將計算出之獲利最大化，達到嚴懲內部人短線交易之嚇阻目的。"},{"num":16,"question":"依「上市上櫃公司誠信經營守則」，公司對於重大之政治獻金、慈善捐贈或贊助，應經由何單位通過後始得為之？","options":{"A":"永續發展委員會","B":"總經理核准即可","C":"董事會","D":"股東會"},"answer":"C","explain":"為防範企業透過捐贈或贊助進行變相行賄，誠信經營守則明定重大之捐贈或贊助應提報董事會決議通過。"},{"num":17,"question":"建立公司「吹哨者（Whistleblower）保護制度」時，下列哪一項機制違反該制度的核心精神？","options":{"A":"提供獨立且安全的檢舉管道（如專線、外部信箱）","B":"要求檢舉人必須於公開場合具名並與被檢舉人當面對質","C":"建立對檢舉人身分保密之機制","D":"明文規定禁止對檢舉人進行任何形式之報復行為"},"answer":"B","explain":"吹哨者制度的核心在於「保密」與「反報復」。要求檢舉人公開具名及當面對質會引發寒蟬效應，完全違背保護吹哨者的精神。"},{"num":18,"question":"金融機構若發現疑似洗錢或資恐之交易，應於發現後幾個營業日內向法務部調查局申報？","options":{"A":"1 個營業日","B":"2 個營業日","C":"5 個營業日","D":"10 個營業日"},"answer":"B","explain":"依現行《金融機構防制洗錢辦法》§15 第 2 款規定：「對於經檢視屬疑似洗錢或資恐交易者，不論交易金額多寡，均應依調查局所定之申報格式簽報，並於專責主管核定後立即向調查局申報，核定後之申報期限不得逾二個營業日。交易未完成者，亦同。」此係 107 年修法後為與 FATF 國際接軌所縮短之申報期限（舊版為 10 個營業日）；§15 第 3 款另規定明顯重大緊急者應立即以傳真等方式儘速申報。"},{"num":19,"question":"依公司法規定，公司董事為自己或他人與公司為買賣、借貸或其他法律行為（自我交易）時，原則上應由誰為公司之代表？","options":{"A":"董事長","B":"總經理","C":"監察人（若設有審計委員會則為審計委員會）","D":"法務長"},"answer":"C","explain":"依公司法§223，董事為自己或他人與公司交涉時，由監察人為公司之代表。若公司依法設置審計委員會，則依證交法§14-4，由審計委員會之獨立董事成員代表公司，或依審委會決議行之。"},{"num":20,"question":"關於「公司治理主管（CGO）」之設置，下列敘述何者錯誤？","options":{"A":"全體上市櫃公司皆應設置公司治理主管","B":"公司治理主管必須由公司財務長兼任","C":"應為公司高階主管，具備律師、會計師資格或於法務、法遵、內部稽核、財務、股務或公司治理相關單位主管達 3 年以上之經驗","D":"其職權包含協助董事就任及持續進修、提供董事執行業務所需資料等"},"answer":"B","explain":"法規並未強制公司治理主管必須由財務長兼任，實務上常由法務主管、法遵主管、股務主管或獨立設置高階主管擔任，只要符合法定資格條件即可。"}]},{"chapter":"內部控制與內部稽核","questions":[{"num":21,"question":"依據 COSO 內部控制整合框架，內部控制的五大組成要素不包括下列何者？","options":{"A":"控制環境 (Control Environment)","B":"風險評估 (Risk Assessment)","C":"外部稽核 (External Audit)","D":"資訊與溝通 (Information and Communication)"},"answer":"C","explain":"COSO 內控五大要素為：控制環境、風險評估、控制作業 (Control Activities)、資訊與溝通、監督 (Monitoring)。外部稽核不屬於內部控制的內部組成要素。"},{"num":22,"question":"內部稽核主管之任免，依法應經由何種程序辦理？","options":{"A":"由總經理直接任免","B":"由董事長直接任免","C":"應經審計委員會全體成員 1/2 以上同意，並提董事會決議通過","D":"應經股東會決議通過"},"answer":"C","explain":"為確保內部稽核主管之獨立性與超然地位，其任免屬重大事項，依證交法§14-5 規定，須經審計委員會 1/2 以上同意並提董事會決議。"},{"num":23,"question":"公開發行公司「內部控制制度聲明書」，依法應由下列哪些人員簽名或蓋章？","options":{"A":"僅董事長","B":"董事長與財務主管","C":"董事長、總經理及內部稽核主管","D":"董事長與審計委員會召集人"},"answer":"C","explain":"依「公開發行公司建立內部控制制度處理準則」§22 規定，內部控制制度聲明書應由公司之董事長、總經理及內部稽核主管聯名簽章，以示負責。"},{"num":24,"question":"企業風險管理的「三道防線」模型中，負責執行日常營運風險控制的「第一道防線」為下列何者？","options":{"A":"業務與營運單位","B":"風險管理與法遵單位","C":"內部稽核單位","D":"外部會計師"},"answer":"A","explain":"第一道防線為日常營運之業務單位（自行控管）；第二道防線為風險管理及法遵單位（監督與支援）；第三道防線為內部稽核單位（獨立評估）。"},{"num":25,"question":"內部稽核人員應於每月月底前，將上月份之稽核報告及異常事項改善情形，交付下列何者查閱？","options":{"A":"僅總經理","B":"監察人（或審計委員會 / 獨立董事）","C":"外部會計師","D":"金管會證期局"},"answer":"B","explain":"為落實內部監督機制，內稽報告及追蹤報告陳核後，須於次月底前交付監察人或審計委員會之獨立董事查閱。"},{"num":26,"question":"上市櫃公司若欲委任外部會計師進行內部控制制度之專案審查，該會計師之委任應經何單位同意？","options":{"A":"財務主管","B":"審計委員會及董事會","C":"內部稽核主管","D":"股東會"},"answer":"B","explain":"簽證會計師（包含內控專案審查）之委任、解任或報酬，對公司財務業務具重大影響，依證交法§14-5，應經審計委員會 1/2 以上同意並提報董事會。"},{"num":27,"question":"公司應依規定格式，將次一年度之內部稽核計畫，於每年何時限前以網際網路資訊系統申報主管機關備查？","options":{"A":"每年 1 月底前","B":"每年 3 月底前","C":"每年 12 月底前","D":"每年 6 月底前"},"answer":"C","explain":"年度稽核計畫（次年度）應於會計年度終了前（即每年 12 月底前）申報備查；而年度稽核計畫執行情形則為次年 2 月底前申報。"},{"num":28,"question":"內部控制之「控制環境（Control Environment）」要素中，最核心且影響深遠之要素為何？","options":{"A":"資訊系統的更新頻率","B":"稽核抽樣的方法","C":"董事會及高階管理階層對誠信及道德價值觀之操守與態度（即 Tone at the top）","D":"財務報表的編製格式"},"answer":"C","explain":"控制環境是所有其他內控要素的基礎。「Tone at the top（高層基調）」決定了公司整體對內部控制與職業道德的重視程度。"},{"num":29,"question":"當內部稽核人員發掘重大違規情事或公司有受重大損害之虞時，除作成稽核報告外，應立即作成何種處置？","options":{"A":"召開記者會對外公布","B":"應立即作成報告呈核，並通知監察人（或審計委員會 / 獨立董事）","C":"自行與違規人員私下和解","D":"等到年底編製總結報告時再行匯報"},"answer":"B","explain":"遇有重大違規或損害之虞，稽核主管負有立即通報最高治理層級（監察人/獨立董事/審委會）之緊急通報義務。"},{"num":30,"question":"關於「內部控制缺失及異常事項之改善」，下列敘述何者錯誤？","options":{"A":"應至少按季作成追蹤報告","B":"稽核單位應持續追蹤至改善為止","C":"只要提出改善計畫，不需追蹤實際執行結果，即可結案","D":"追蹤情形應列為各部門績效考核之重要項目"},"answer":"C","explain":"內控的核心在於落實與「持續追蹤」。僅提出計畫而未確認實際改善結果前，稽核單位絕對不可結案，必須持續追蹤至確認改善完畢。"}]},{"chapter":"綠色金融與氣候風險管理","questions":[{"num":31,"question":"依據 TCFD（氣候相關財務揭露）框架，氣候風險分為「轉型風險」與「實體風險」。下列何者屬於「實體風險（Physical Risks）」？","options":{"A":"各國政府開徵碳稅導致營運成本增加","B":"國際大廠要求供應鏈必須使用 100% 綠電","C":"極端氣候導致廠房淹水或供應鏈中斷","D":"消費者偏好改變，拒買高碳排產品"},"answer":"C","explain":"「實體風險」係指氣候變遷直接造成的物理性損害（如淹水、颶風、乾旱）；其餘 A、B、D 屬於政策、法規、市場或名譽改變所帶來的「轉型風險（Transition Risks）」。"},{"num":32,"question":"金管會推動「綠色金融行動方案 3.0」之核心願景為何？","options":{"A":"僅鼓勵銀行發行綠色信用卡","B":"整合金融資源，支持淨零轉型，涵蓋推動金融機構碳盤查、氣候風險管理、發展永續分類標準及培力等","C":"強制所有企業停止向石化業借款","D":"要求外資撤出非綠能產業"},"answer":"B","explain":"綠色金融 3.0 的核心在於「整合與推動」，透過金融業的資金力量（如投融資碳排盤查 PCAF）及永續分類標準，引導整體產業邁向 2050 淨零排放。"},{"num":33,"question":"TCFD 架構的四大核心揭露支柱（Pillars）為何？","options":{"A":"財務、行銷、人事、研發","B":"治理 (Governance)、策略 (Strategy)、風險管理 (Risk Management)、指標與目標 (Metrics and Targets)","C":"水資源、廢棄物、碳排放、生物多樣性","D":"供應商、員工、客戶、股東"},"answer":"B","explain":"這是 TCFD 框架最基礎也最必考的核心概念。所有氣候風險的揭露皆須圍繞「治理、策略、風險管理、指標與目標」這四大支柱展開。"},{"num":34,"question":"金融機構在計算其自身的溫室氣體排放時，占比最大且最受國際關注的通常是「範疇三的類別 15」。此類別所指為何？","options":{"A":"員工通勤與差旅排放","B":"辦公大樓的外購電力排放","C":"投資與融資活動所產生之碳排放（Financed Emissions / 財務碳排放）","D":"廢棄物處理排放"},"answer":"C","explain":"對於金融業而言，其自身的直接排碳極少，真正的排碳大宗來自於其放款對象及投資標的之碳排放（即「投融資碳排放」）。目前國際多以 PCAF 方法學進行衡量。"},{"num":35,"question":"在氣候變遷「策略」的評估中，TCFD 強烈建議企業使用何種工具，來測試企業在不同未來氣候情境下（如升溫 1.5°C 或 2°C）的財務韌性？","options":{"A":"歷史成本分析","B":"情境分析 (Scenario Analysis)","C":"杜邦分析 (DuPont Analysis)","D":"淨現值法 (NPV)"},"answer":"B","explain":"氣候變遷的影響具備高度未來不確定性與非線性特徵，無法單靠歷史數據預測，因此 TCFD 建議採用前瞻性的「情境分析」，評估企業在不同升溫情境下的風險與機會。"},{"num":36,"question":"發行「可持續發展連結債券（Sustainability-Linked Bond, SLB）」之主要特色為何？","options":{"A":"募得資金必須 100% 專款專用於指定的綠色環保專案","B":"募得資金必須 100% 專款專用於社會效益專案","C":"資金用途不受限於特定綠色或社會專案，但債券的票面利率等條件會與發行人是否達成預先設定的「永續績效目標（SPTs）」連結","D":"僅能由政府機關發行"},"answer":"C","explain":"一般綠色債券或社會責任債券是「資金用途限定」。而 SLB 是「資金用途不限」，但透過利率升降機制，督促發行人達成整體的永續績效目標（例如：承諾 5 年內減碳 30%，若未達成則利率加碼）。"},{"num":37,"question":"巴塞爾銀行監理委員會（BCBS）強調金融機構應將氣候相關風險納入何種管理體系中？","options":{"A":"僅納入公關部門的形象管理","B":"納入企業整體的風險管理框架（ERM），並涵蓋信用風險、市場風險、流動性風險及作業風險的評估","C":"獨立於所有既有風險管理之外，設立平行的管理架構","D":"交由外部顧問全權負責，內部不需參與"},"answer":"B","explain":"國際監理趨勢要求將氣候風險視為「財務風險的驅動因子（Risk Driver）」，必須深度融入銀行既有的信用審查與整體企業風險管理（ERM）之中，而非僅作公關操作。"},{"num":38,"question":"企業在評估「轉型風險」時，下列哪一項政策工具將對高碳排產業造成最直接的財務衝擊？","options":{"A":"鼓勵植樹造林政策","B":"提高基本工資","C":"碳邊境調整機制（如歐盟 CBAM）及國內碳定價法規之實施","D":"降低企業所得稅"},"answer":"C","explain":"歐盟的碳邊境調整機制（CBAM）要求進口的高碳排產品購買憑證，加上國內碳費的開徵，將直接增加高碳排企業的營業成本，是目前全球製造業面臨最大的轉型風險。"},{"num":39,"question":"我國為推動淨零轉型，國家發展委員會已正式公布的長期減量目標為何？","options":{"A":"2030 年達成碳中和","B":"2040 年全面禁用化石燃料","C":"2050 年達成溫室氣體淨零排放 (Net Zero)","D":"2060 年達成零污染"},"answer":"C","explain":"「2050 淨零排放」是國際共識，我國已將此目標正式納入《氣候變遷因應法》明文規定，並提出 2050 淨零排放路徑及 12 項關鍵戰略。"},{"num":40,"question":"下列何者「不」屬於「永續經濟活動認定參考指引（Taiwan Taxonomy）」中，對於一項經濟活動被認定為「永續」的必要條件？","options":{"A":"對環境目的有實質貢獻 (Substantial Contribution)","B":"未對其他環境目的造成重大損害 (Do No Significant Harm, DNSH)","C":"必須保證該活動為公司帶來最高淨利","D":"符合最低社會保障 (Minimum Social Safeguards)"},"answer":"C","explain":"永續分類標準的「三大核心原則」為：（1）對特定環境目的具實質貢獻；（2）不對其他環境目的造成重大損害（DNSH）；（3）符合勞工與人權的最低社會保障。獲利高低並非認定永續經濟活動的指標。"}]}];

// State
let state = {
  answers: {},  // key: "chIdx-qIdx" -> selected letter
  stars: {},    // key: "chIdx-qIdx" -> true/false
  mode: 'all',  // all | starred | wrong
  currentChapter: 0
};

function stateKey(chIdx, qIdx) { return `${chIdx}-${qIdx}`; }

// Shuffle options, return [{origLetter, text}] array and the new letter for the correct answer
function shuffleOptions(q) {
  const entries = Object.entries(q.options).filter(([l, t]) => t);
  // Fisher-Yates
  for (let i = entries.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [entries[i], entries[j]] = [entries[j], entries[i]];
  }
  const labels = ['A','B','C','D'];
  const shuffled = entries.map(([origLetter, text], i) => ({
    label: labels[i],
    origLetter,
    text,
    isCorrect: origLetter === q.answer
  }));
  const newCorrect = shuffled.find(o => o.isCorrect).label;
  return { shuffled, newCorrect };
}

async function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('cg-quiz-state') || '{}');
    state.answers = saved.answers || {};
    state.stars = saved.stars || {};
  } catch(e) {}
}

async function saveState() {
  try {
    localStorage.setItem('cg-quiz-state', JSON.stringify({ answers: state.answers, stars: state.stars }));
  } catch(e) {}
  cloudSave();
}

function getFilteredChapters() {
  if (state.mode === 'all') return QUESTIONS;
  return QUESTIONS.map((ch, ci) => ({
    ...ch,
    questions: ch.questions.filter((_, qi) => {
      const k = stateKey(ci, qi);
      if (state.mode === 'starred') return state.stars[k];
      if (state.mode === 'wrong') {
        const ans = state.answers[k];
        return ans && ans !== ch.questions[qi].answer;
      }
      return true;
    })
  })).filter(ch => ch.questions.length > 0);
}

function renderSidebar() {
  const filtered = getFilteredChapters();
  const list = document.getElementById('chapterList');
  list.innerHTML = '';

  // "全部" button
  const allBtn = document.createElement('div');
  allBtn.className = 'chapter-item' + (state.currentChapter === -1 ? ' active' : '');
  allBtn.innerHTML = `<span>📚 全部章節</span><span class="ch-count">${filtered.reduce((s,c)=>s+c.questions.length,0)}</span>`;
  allBtn.onclick = () => { state.currentChapter = -1; render(); closeSidebarOnMobile(); };
