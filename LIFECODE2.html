<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>生命密碼 · 全息解析</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C; --gold-l:#F0D080; --gold-d:#7A6030;
  --bg:#080808; --bg2:#0f0f0f; --bg3:#161616;
  --text:#E8E0D0; --text-d:#8A8070;
  --border:#222;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;overflow-x:hidden;}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg at 50% 50%,transparent 0deg,rgba(201,168,76,.03) 60deg,transparent 120deg);
  animation:spin 20s linear infinite;pointer-events:none;z-index:0;}
@keyframes spin{to{transform:rotate(360deg);}}

.wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:2rem 1rem 5rem;}

/* HEADER */
.header{text-align:center;padding:.8rem 0 2rem;}
.header::after{content:'';display:block;width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.8rem auto 0;}
.t-en{font-family:'Cinzel',serif;font-size:10px;letter-spacing:7px;color:var(--gold-d);margin-bottom:10px;}
.t-zh{font-family:'Noto Serif TC',serif;font-size:clamp(24px,7vw,36px);font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 50%,var(--gold-d) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.t-sub{font-size:11px;color:var(--text-d);letter-spacing:3px;margin-top:6px;}

/* INPUT CARD */
.icard{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--border);padding:1.5rem;position:relative;box-shadow:0 0 40px rgba(201,168,76,.05);}
.icard::before,.icard::after{content:'';position:absolute;width:16px;height:16px;border-color:var(--gold-d);border-style:solid;}
.icard::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.icard::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
.lbl{font-size:10px;color:var(--gold-d);letter-spacing:3px;margin-bottom:8px;font-family:'Cinzel',serif;}
input[type=text]{width:100%;background:#0a0a0a;border:1px solid #252525;color:var(--text);font-size:15px;font-family:'Noto Sans TC',sans-serif;padding:11px 14px;outline:none;margin-bottom:1.2rem;transition:border-color .3s;}
input[type=text]:focus{border-color:var(--gold-d);}
.err{font-size:12px;color:#E04040;margin-bottom:10px;display:none;letter-spacing:1px;}
#btn{width:100%;background:transparent;border:1px solid var(--gold-d);color:var(--gold-l);font-size:14px;font-weight:700;letter-spacing:5px;font-family:'Noto Serif TC',serif;padding:14px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
#btn:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.15);}
#btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(201,168,76,.08));opacity:0;transition:opacity .3s;}
#btn:hover::after{opacity:1;}

/* DRUM PICKER */
.drum-row{display:flex;gap:10px;margin-bottom:1.2rem;}
.drum-wrap{flex:1;position:relative;}
.drum-lbl{font-size:9px;color:var(--gold-d);letter-spacing:2px;text-align:center;margin-bottom:6px;font-family:'Cinzel',serif;}
.drum{height:132px;overflow:hidden;position:relative;background:#0a0a0a;border:1px solid #252525;cursor:grab;}
.drum:active{cursor:grabbing;}
.drum::before,.drum::after{content:'';position:absolute;left:0;right:0;height:44px;z-index:2;pointer-events:none;}
.drum::before{top:0;background:linear-gradient(to bottom,#0a0a0a,transparent);}
.drum::after{bottom:0;background:linear-gradient(to top,#0a0a0a,transparent);}
.drum-selector{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:44px;border-top:1px solid var(--gold-d);border-bottom:1px solid var(--gold-d);z-index:1;pointer-events:none;}
.drum-inner{position:relative;transition:transform .15s cubic-bezier(.25,.46,.45,.94);}
.drum-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--text-d);transition:color .15s,font-size .15s;font-family:'Noto Serif TC',serif;user-select:none;}
.drum-item.active{color:var(--gold-l);font-size:18px;font-weight:700;}

/* RESULT */
#result{display:none;margin-top:1.5rem;animation:fadeUp .6s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* BANNER */
.banner{text-align:center;padding:1.5rem 1rem 1.2rem;border:1px solid #222;background:linear-gradient(180deg,var(--bg3),var(--bg));position:relative;margin-bottom:1.2rem;}
.banner::before,.banner::after{content:'';position:absolute;width:24px;height:24px;border-color:var(--gold);border-style:solid;}
.banner::before{top:-1px;left:-1px;border-width:1px 0 0 1px;}
.banner::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0;}
.mnum{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;font-family:'Noto Serif TC',serif;margin:0 auto 12px;color:#fff;border:2px solid;position:relative;}
.mnum::before{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid;opacity:.3;animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.3;}50%{transform:scale(1.08);opacity:.1;}}
.mtitle{font-family:'Noto Serif TC',serif;font-size:clamp(18px,5vw,24px);font-weight:900;margin-bottom:10px;letter-spacing:3px;}
.tags{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:1rem;}
.tag{font-size:10px;padding:3px 12px;letter-spacing:2px;border:1px solid;font-family:'Cinzel',serif;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #1e1e1e;margin-bottom:1.2rem;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:none;border:none;border-bottom:2px solid transparent;padding:10px 14px;font-size:11px;cursor:pointer;color:var(--text-d);white-space:nowrap;letter-spacing:2px;font-family:'Cinzel',serif;transition:all .2s;}
.tab.on{color:var(--gold-l);}

/* CONTENT */
.cc{background:var(--bg3);border:1px solid #1e1e1e;padding:1.1rem;margin-bottom:.8rem;}
.sec{font-size:9px;color:var(--gold-d);letter-spacing:3px;margin-bottom:8px;font-family:'Cinzel',serif;}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:.8rem;}
p.body{font-size:13px;line-height:1.9;color:var(--text);}

/* HOLO */
#holo-wrap{background:var(--bg3);border:1px solid #1e1e1e;padding:.5rem;}
#holo-canvas{display:block;width:100%;}
#dl-btn{display:block;width:100%;text-align:center;margin-top:.8rem;padding:11px;background:transparent;border:1px solid #2a2a2a;font-size:11px;color:var(--text-d);cursor:pointer;letter-spacing:2px;font-family:'Cinzel',serif;transition:all .3s;}
#dl-btn:hover{border-color:var(--gold-d);color:var(--gold-d);}

/* COMBOS */

/* DETAIL */
.drow{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;}
.dicon{font-size:16px;flex-shrink:0;}
.dlbl{font-size:9px;color:var(--gold-d);letter-spacing:2px;margin-bottom:4px;font-family:'Cinzel',serif;}
.dval{font-size:13px;line-height:1.8;color:var(--text);}
.srow{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.srng{width:50px;font-size:10px;color:var(--text-d);text-align:right;flex-shrink:0;}
.scirc{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;font-family:'Noto Serif TC',serif;border:2px solid;flex-shrink:0;}

.footer{text-align:center;margin-top:2rem;font-size:9px;color:#2a2a2a;letter-spacing:3px;font-family:'Cinzel',serif;}

@media(max-width:400px){
  .two{grid-template-columns:1fr;}
  .cgrid{grid-template-columns:1fr;}
  .tcodes{gap:6px;}
  .tcode{min-width:80px;padding:8px 10px;}
}
</style>

<body>
<canvas id="particles"></canvas>
<div class="wrap">
  <div class="header">
    <div class="t-en">LIFE CODE · HOLOGRAM</div>

<script>
// ── 粒子 ──
(()=>{
  const cv=document.getElementById("particles"),ctx=cv.getContext("2d");
  let W,H,pts=[];
  const resize=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
  resize();addEventListener("resize",resize);
  for(let i=0;i<50;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.2+.3,a:Math.random()*.5+.1});
  const draw=()=>{
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(201,168,76,${p.a*.4})`;ctx.fill();});
    requestAnimationFrame(draw);
  };draw();
})();

// ── Drum Picker ──
const ITEM_H=44;
function makeDrum(innerId,items,defaultIdx){
  const inner=document.getElementById(innerId);
  const drum=inner.parentElement;
  // 上下padding讓中間item可以對齊
  const pad=2; // 上下各2個空白item
  const all=[...Array(pad).fill(""),  ...items, ...Array(pad).fill("")];
  inner.innerHTML=all.map((v,i)=>`<div class="drum-item" data-val="${v}">${v}</div>`).join("");
  const els=inner.querySelectorAll(".drum-item");

  let curIdx=defaultIdx+pad;
  let startY=0,startTop=0,isDragging=false;
  let curTop=-(curIdx*ITEM_H)+(ITEM_H);

  const update=(idx,animate)=>{
    curIdx=Math.max(pad,Math.min(all.length-pad-1,idx));
    const newTop=-(curIdx*ITEM_H)+ITEM_H;
    if(animate) inner.style.transition="transform .2s cubic-bezier(.25,.46,.45,.94)";
    else inner.style.transition="none";
    inner.style.transform=`translateY(${newTop}px)`;
    curTop=newTop;
    els.forEach((el,i)=>{el.classList.toggle("active",i===curIdx);});
  };
  update(curIdx,false);

  // 觸控/滑鼠
  const getY=e=>e.touches?e.touches[0].clientY:e.clientY;
  drum.addEventListener("mousedown",e=>{isDragging=true;startY=getY(e);startTop=curTop;drum.style.cursor="grabbing";});
  drum.addEventListener("touchstart",e=>{isDragging=true;startY=getY(e);startTop=curTop;},{passive:true});
  const move=e=>{
    if(!isDragging)return;
    const dy=getY(e)-startY;
    const newTop=startTop+dy;
    inner.style.transition="none";
    inner.style.transform=`translateY(${newTop}px)`;
    curTop=newTop;
  };
  document.addEventListener("mousemove",move);
  document.addEventListener("touchmove",move,{passive:true});
  const end=()=>{
    if(!isDragging)return;
    isDragging=false;drum.style.cursor="grab";
    const snapIdx=Math.round((-curTop+ITEM_H)/ITEM_H);
    update(snapIdx,true);
  };
  document.addEventListener("mouseup",end);
  document.addEventListener("touchend",end,{passive:true});
  // 手機：防止頁面跟著滾動
  drum.addEventListener("touchmove",e=>e.preventDefault(),{passive:false});

  return {
    getVal:()=>all[curIdx]||"",
    setItems:(newItems,idx)=>{
      const newAll=[...Array(pad).fill(""),...newItems,...Array(pad).fill("")];
      inner.innerHTML=newAll.map(v=>`<div class="drum-item" data-val="${v}">${v}</div>`).join("");
      const newEls=inner.querySelectorAll(".drum-item");
      curIdx=Math.max(pad,Math.min(newAll.length-pad-1,(idx||0)+pad));
      const newTop=-(curIdx*ITEM_H)+ITEM_H;
      inner.style.transition="none";
      inner.style.transform=`translateY(${newTop}px)`;
      curTop=newTop;
      newEls.forEach((el,i)=>el.classList.toggle("active",i===curIdx));
      // reattach drag with new els
    }
  };
}

// 年月日選項
const years=[]; for(let y=2010;y>=1920;y--)years.push(String(y));
const months=[]; for(let m=1;m<=12;m++)months.push(String(m));
const days31=[]; for(let d=1;d<=31;d++)days31.push(String(d));

const drumY=makeDrum("dyr-inner",years,30); // default 1980
const drumM=makeDrum("dmo-inner",months,0);
let drumD=makeDrum("ddy-inner",days31,0);

// 年月變動時更新日
function updateDays(){
  const y=+drumY.getVal()||2000,m=+drumM.getVal()||1;
  const max=new Date(y,m,0).getDate();
  const ds=[]; for(let d=1;d<=max;d++)ds.push(String(d));
  drumD.setItems(ds,0);
}

const COL={1:"#FFD700",2:"#FF4444",3:"#4488FF",4:"#D09860",5:"#44CC66",6:"#FFD700",7:"#4488FF",8:"#FF4444",9:"#D09860"};
const COL_BG={1:"#1a1400",2:"#1a0000",3:"#000d22",4:"#120c06",5:"#041a08",6:"#1a1400",7:"#000d22",8:"#1a0000",9:"#120c06"};
const DATE_C="#E87020",MON_C="#CC3377",YR1_C="#8866FF",YR2_C="#0099AA";
function co(n){return COL[n]||"#888";}

function ts(n){let x=Math.abs(n);while(x>9)x=String(x).split("").reduce((a,b)=>a+Number(b),0);return x||9;}
function calc(y,m,d){
  const ys=String(y).padStart(4,"0"),ms=String(m).padStart(2,"0"),ds=String(d).padStart(2,"0");
  const A=+ds[0],B=+ds[1],C=+ms[0],D=+ms[1],E=+ys[0],F=+ys[1],G=+ys[2],H=+ys[3];
  const I=ts(A+B),J=ts(C+D),K=ts(E+F),L=ts(G+H);
  const M=ts(I+J),N=ts(K+L),O=ts(M+N);
  const pL=ts(I+M),pR=ts(J+M),P=ts(pL+pR);
  const qL=ts(K+N),qR=ts(L+N),Q=ts(qL+qR);
  const R=ts(P+Q),rL=ts(N+O),rR=ts(M+O);
  const W=ts(J+M),X=ts(I+M),S=ts(X+W);
  const V=ts(K+N),U=ts(L+N),T=ts(V+U);
  return{A,B,C,D,E,F,G,H,I,J,K,L,M,N,O,P,Q,R,rL,rR,pL,pR,qL,qR,S,T,U,V,W,X};
}

// ── Canvas 全息圖 ──
function drawHolo(ch,name){
  const canvas=document.getElementById("holo-canvas");
  const DPR=Math.min(window.devicePixelRatio||1,2);
  const CW=700, CH=700;  // 正方形
  canvas.width=CW*DPR; canvas.height=CH*DPR;
  canvas.style.width="100%";
  const ctx=canvas.getContext("2d");
  ctx.scale(DPR,DPR);
  // 背景漸層：頂部深黑到底部深灰
  const bgGrad=ctx.createLinearGradient(0,0,0,CH);
  bgGrad.addColorStop(0,"#080808");
  bgGrad.addColorStop(1,"#2a2a2a");
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,CW,CH);
  const cx=CW/2;
  const F="'Noto Serif TC','Noto Sans TC',sans-serif";

  // 數字：無描邊，淡漸層
  function numAt(x,y,n,sz,c){
    ctx.font=`900 ${sz}px ${F}`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    const base=c||co(n);
    // 淡漸層：上方亮色，下方稍暗
    const grad=ctx.createLinearGradient(x,y-sz*0.6,x,y+sz*0.6);
    grad.addColorStop(0,base+"ff");
    grad.addColorStop(1,base+"99");
    ctx.fillStyle=grad;
    ctx.fillText(String(n),x,y);
  }
  function txtAt(x,y,s,sz,c,align="center"){
    ctx.font=`400 ${sz}px ${F}`; ctx.textAlign=align; ctx.textBaseline="middle";
    ctx.fillStyle=c; ctx.fillText(s,x,y);
  }
  function starAt(x,y,sz,c){
    ctx.font=`900 ${sz}px ${F}`; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillStyle=c; ctx.fillText("★",x,y);
  }

  const RSZ=240, WSZ=240, renTop=90;
  // 固定比例，不依賴 measureText（手機桌機一致）
  const renH=RSZ*0.85;
  const renBot=renTop+renH, wangTop=renBot-20;
  const wangH=WSZ*0.88;
  const wHalf=WSZ*0.82/2;
  const wL=cx-wHalf, wR=cx+wHalf;

  const bar1Bot=wangTop+wangH*0.29, bar2Top=wangTop+wangH*0.46;
  const bar2Bot=wangTop+wangH*0.64, bar3Top=wangTop+wangH*0.79, bar3Bot=wangTop+wangH*0.88;
  const MN_y=(bar1Bot+bar2Top)/2;
  const IJKL_y=(bar2Bot+bar3Top)/2+20;
  const base_y=bar3Bot+42;                        // 生日框往上20px
  const O_y=renTop+(renBot-renTop)*0.62+50;       // O區往下10px（+40→+50）
  const seg=(wR-wL)/4;
  const Mx=wL+seg, Nx=wR-seg;
  const Ix=wL+seg/2, Jx=wL+seg*1.5, Kx=wL+seg*2.5, Lx=wL+seg*3.5;

  // 拉寬 1.6x
  ctx.save();
  ctx.translate(cx,0); ctx.scale(1.6,1); ctx.translate(-cx,0);

  // 全字漸層：頂部亮金到底部深金
  const charGrad=ctx.createLinearGradient(cx,renTop,cx,wangTop+wangH);
  charGrad.addColorStop(0,"#F0D080");
  charGrad.addColorStop(0.4,"#C9A84C");
  charGrad.addColorStop(1,"#7A5A20");
  ctx.font=`100 ${RSZ}px ${F}`; ctx.textAlign="center"; ctx.textBaseline="top";
  ctx.fillStyle=charGrad; ctx.globalAlpha=0.9;
  ctx.fillText("人",cx,renTop);
  ctx.font=`100 ${WSZ}px ${F}`; ctx.fillText("王",cx,wangTop);
  ctx.globalAlpha=1;

  const grd=ctx.createRadialGradient(cx,O_y,0,cx,O_y,55);
  grd.addColorStop(0,co(ch.O)+"44"); grd.addColorStop(1,"transparent");
  ctx.fillStyle=grd; ctx.fillRect(cx-70,O_y-70,140,140);

  numAt(cx,O_y,ch.O,36);
  starAt(cx,O_y-28,13,"#C9A84C");
  ctx.font=`400 11px ${F}`; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillStyle="#C9A84C88"; ctx.fillText("主性格",cx,O_y+30);

  numAt(Mx,MN_y,ch.M,28); numAt(Nx,MN_y,ch.N,28);
  numAt(Ix,IJKL_y,ch.I,26); numAt(Jx,IJKL_y,ch.J,26);
  numAt(Kx,IJKL_y,ch.K,26); numAt(Lx,IJKL_y,ch.L,26);
  starAt(Ix-20,IJKL_y,13,"#C9A84C88");
  starAt(Lx+20,IJKL_y,13,"#C9A84C88");

  // 生日格灰色漸層
  const bh=46, bw=(wR-wL)/8;
  const digCols=[DATE_C,DATE_C,MON_C,MON_C,YR1_C,YR1_C,YR2_C,YR2_C];
  const digits=[ch.A,ch.B,ch.C,ch.D,ch.E,ch.F,ch.G,ch.H];
  ctx.strokeStyle="#555"; ctx.lineWidth=1.5;
  ctx.strokeRect(wL,base_y,wR-wL,bh);
  digits.forEach((dg,i)=>{
    const bx=wL+i*bw;
    const grad=ctx.createLinearGradient(bx,base_y,bx,base_y+bh);
    grad.addColorStop(0,"#282828"); grad.addColorStop(1,"#444444");
    ctx.fillStyle=grad; ctx.fillRect(bx,base_y,bw,bh);
    ctx.strokeStyle="#555"; ctx.lineWidth=0.5; ctx.strokeRect(bx,base_y,bw,bh);
    numAt(bx+bw/2,base_y+bh/2,dg,20,digCols[i]);
  });
  [[wL+bw*2],[wL+bw*4]].forEach(([x])=>{
    ctx.strokeStyle="#666"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x,base_y); ctx.lineTo(x,base_y+bh); ctx.stroke();
  });


  // 姓名（無括號）
  const holoLabel=name?`${name} 的生命全息圖`:"生命全息圖";
  ctx.font=`900 24px ${F}`; ctx.textAlign="center"; ctx.textBaseline="middle";
  const labelGrad=ctx.createLinearGradient(cx-120,0,cx+120,0);
  labelGrad.addColorStop(0,"#F0D080");
  labelGrad.addColorStop(0.5,"#C9A84C");
  labelGrad.addColorStop(1,"#F0D080");
  ctx.fillStyle=labelGrad;
  ctx.fillText(holoLabel,cx,base_y+bh+38);

  ctx.restore();

  // 字外元素（不受拉寬）
  function wx(ox){return cx+(ox-cx)*1.6;}
  const CSZ=28;

  // P 聯合碼 20-40（左外）
  const p_x=wx(Ix-20)-8-50, p_y=O_y;
  txtAt(p_x,p_y-24,"20-40",13,"#7A6030");
  numAt(p_x-38,p_y,ch.P,CSZ);
  txtAt(p_x-18,p_y,":",18,"#3a3a2a");
  numAt(p_x+2,p_y,ch.pL,CSZ);
  numAt(p_x+30,p_y,ch.pR,CSZ);

  // Q 聯合碼 40-60（右外）← 標籤硬寫 "40-60"
  const q_x=wx(Lx+20)+8+50, q_y=O_y;
  txtAt(q_x,q_y-24,"60~",13,"#7A6030");
  numAt(q_x-28,q_y,ch.qL,CSZ);
  numAt(q_x-4,q_y,ch.qR,CSZ);
  txtAt(q_x+16,q_y,":",18,"#3a3a2a");
  numAt(q_x+38,q_y,ch.Q,CSZ);

  // R 區 60~（頂部）← 標籤硬寫 "60~"
  const R_top_y=renTop-40, rLR_y=renTop-14;
  // 頂上 Q 區：三個數字，上方標 40-60，無其他標籤
  txtAt(cx,R_top_y-24,"40-60",13,"#7A6030");
  numAt(cx-46,rLR_y,ch.rL,CSZ);
  numAt(cx,R_top_y,ch.R,CSZ);
  ctx.strokeStyle=co(ch.R); ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx-18,R_top_y+18); ctx.lineTo(cx+18,R_top_y+18); ctx.stroke();
  numAt(cx+46,rLR_y,ch.rR,CSZ);
}

  ["ho","ov","de"].forEach(i=>{const el=document.getElementById("tab-"+i);if(el)el.style.display="none";});

}

document.getElementById("btn").onclick=()=>{
  const y=+drumY.getVal(), m=+drumM.getVal(), d=+drumD.getVal();
  if(!y||!m||!d){document.getElementById("err").style.display="block";return;}
  document.getElementById("err").style.display="none";
  const ch=calc(y,m,d);
  const O=ch.O,pr=PR[O],mc=co(O),bg=COL_BG[O]||"#111";
  const name=document.getElementById("iname").value.trim();
  MC=mc;

  // Banner
  const mn=document.getElementById("mnum");
  mn.textContent=O; mn.style.background=bg; mn.style.borderColor=mc;
  mn.style.color=mc; mn.style.boxShadow=`0 0 30px ${mc}44`;
  document.getElementById("mtitle").textContent=(name?name+" · ":"")+O+"號人 · "+pr.t;
  document.getElementById("mtitle").style.color=mc;
  document.getElementById("tags").innerHTML=pr.kw.map(k=>`<span class="tag" style="border-color:${mc}44;color:${mc};background:${bg};">${k}</span>`).join("");



  // 總覽
  document.getElementById("t-core").innerHTML=`<div class="sec">Core · 核心特質</div><p class="body">${pr.core}</p>`;
  document.getElementById("t-str").innerHTML=`
    <div class="sec" style="color:${mc}88;">High · 高能量</div>
    <p class="body">${pr.hi}</p>`;
  document.getElementById("t-weak").innerHTML=`
    <div class="sec">Low · 低能量</div>
    <p class="body">${pr.lo}</p>`;
  document.getElementById("t-lesson").innerHTML=`
    <div class="sec" style="color:${mc};">Talent · 天賦優勢</div>
    <p class="body">${pr.str}</p>
    <div class="sec" style="margin-top:12px;">Lesson · 人生功課</div>
    <p class="body">${pr.lesson}</p>`;

  // 衝突分析
  const allNums=[ch.O,ch.M,ch.N,ch.I,ch.L,ch.P,ch.Q,ch.R];
  const conflicts=findConflicts(allNums);
  const mnGap=findMNGap(ch.M,ch.N);
  const ilGap=findILGap(ch.I,ch.L);
  const outerType=getOuterType(ch.O);
  const outerInfo=OUTER_TYPE[outerType]||{};

  let conflictHTML='';
  if(conflicts.length>0){
    conflictHTML+=conflicts.map(c=>`
      <div class="cc" style="margin-bottom:8px;border-left:2px solid ${mc}44;">
        <div class="sec" style="color:${mc};">⚡ ${c.title}</div>
        <p class="body" style="margin-bottom:6px;">${c.core}</p>
        <p style="font-size:12px;color:#44CC66;line-height:1.7;">▲ ${c.hi}</p>
        <p style="font-size:12px;color:#FF6666;line-height:1.7;margin-top:4px;">▼ ${c.lo}</p>
      </div>`).join('');
  }
  if(mnGap){
    conflictHTML+=`
      <div class="cc" style="margin-bottom:8px;border-left:2px solid #8866FF44;">
        <div class="sec" style="color:#8866FF;">🏠 內外形象 · ${mnGap.title}</div>
        <p class="body" style="margin-bottom:6px;">${mnGap.core}</p>
        <p style="font-size:12px;color:#44CC66;line-height:1.7;">▲ ${mnGap.hi}</p>
        <p style="font-size:12px;color:#FF6666;line-height:1.7;margin-top:4px;">▼ ${mnGap.lo}</p>
      </div>`;
  }
  if(ilGap){
    conflictHTML+=`
      <div class="cc" style="margin-bottom:8px;border-left:2px solid #0099AA44;">
        <div class="sec" style="color:#0099AA;">🎭 動機能量落差 · ${ilGap.title}</div>
        <p class="body" style="margin-bottom:6px;">${ilGap.core}</p>
        <p style="font-size:12px;color:#44CC66;line-height:1.7;">▲ ${ilGap.hi}</p>
        <p style="font-size:12px;color:#FF6666;line-height:1.7;margin-top:4px;">▼ ${ilGap.lo}</p>
      </div>`;
  }
  if(!conflictHTML) conflictHTML=`<p class="body" style="color:var(--text-d);">此命盤的各項能量方向較為一致，人生課題相對清晰。</p>`;

  document.getElementById("t-conflict").innerHTML=conflictHTML;

  // 外心主義
  document.getElementById("t-outer").innerHTML=outerType?`
    <div class="sec" style="color:${mc};">外心主義 · ${outerType}</div>
    <p class="body" style="margin-bottom:8px;">${outerInfo.desc}</p>
    <p style="font-size:12px;color:var(--text-d);line-height:1.8;">💰 ${outerInfo.money}</p>
    <p style="font-size:12px;color:var(--text-d);line-height:1.8;margin-top:4px;">💬 ${outerInfo.comm}</p>`:'';

  document.getElementById("result").style.display="block";
  // 先顯示全息圖 tab
  switchTab("ho");
  document.fonts.ready.then(()=>drawHolo(ch,name));



  document.getElementById("detail").innerHTML=[
    {i:"💼",l:"Career · 適合職業",v:pr.career},
    {i:"❤️",l:"Love · 感情模式",v:pr.love},
    {i:"💰",l:"Wealth · 財富觀",v:pr.wealth}
  ].map(x=>`<div class="drow cc"><div class="dicon">${x.i}</div><div><div class="dlbl">${x.l}</div><div class="dval">${x.v}</div></div></div>`).join("")+
  `<div class="cc"><div class="sec" style="color:${mc};">Life Stages · 人生三階段</div>${[{r:"21-40",l:"工作人際",v:ch.S},{r:"41-60",l:"事業發展",v:ch.R},{r:"61+",l:"家庭財富",v:ch.T}].map(s=>`<div class="srow"><div class="srng">${s.r}</div><div class="scirc" style="color:${co(s.v)};border-color:${co(s.v)};background:${COL_BG[s.v]||"#0a0a0a"};">${s.v}</div><div><div style="font-size:13px;font-weight:500;color:var(--text);">${s.l}</div><div style="font-size:11px;color:var(--text-d);margin-top:2px;">${PR[s.v]?PR[s.v].t+" · "+PR[s.v].kw[0]:""}</div></div></div>`).join("")}</div>`;

  // scroll to result
  setTimeout(()=>document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"}),100);
};

document.getElementById("dl-btn").onclick=()=>{
  const a=document.createElement("a");
  a.download="全息圖.png";
  a.href=document.getElementById("holo-canvas").toDataURL("image/png");
  a.click();
};
</script>
</body>
</html>
